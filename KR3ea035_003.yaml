body:
  text: 卷之三四時氣第十九篇內首節有四時之氣故名篇黃帝問於岐伯曰夫四時之氣舍不同形百病之起皆有所生灸刺之道何者為定一本作寶岐伯答曰四時之氣各有所在灸刺之道得氣穴為定故春取經血脈分肉之間甚者深取之間者淺刺之夏取盛經孫絡取分間絶皮膚秋取經輸邪在腑取之合冬取井滎必深以留之春取經之經當作絡義見素問水熱穴論間去聲此言灸刺之道順四時之氣而已春取絡穴之血脈分肉間如手太陰肺經列缺為絡之類當視其病之輕重而為刺之淺深也水熱穴論云春取絡脈分肉夏取盛經孫絡處分間盛經者如手陽明大腸經陽溪為經之類孫絡者即脈度篇所謂支而橫者為絡絡之別者為孫也視其經穴孫絡處分之間止於皮膚絶而刺之不至於深入也水熱論云夏取盛經分腠又曰絶膚而病去者邪居深也蓋言夏氣在表故病在表止於皮膚絶而不深入以刺之正以邪之所居甚淺也又曰所謂盛經者陽經也則止取手足六陽經之經穴耳秋取各經之輸穴如手太陰肺經太淵為輸之類水熱穴論云取輸以瀉陰邪則知是六陰經之輸穴也若在腑則取六陽經之合穴如手陽明大腸經曲池為合之類不熱穴論云取合以虛陽邪則知是六陽經之合穴也冬取井滎冬氣入深必當深刺以久留之水熱穴論云取井以瀉陰逆則陰經當刺井穴如手太陰肺經少商為井之類取滎以實陽氣則陽經當刺滎穴如手陽明大腸經二間為滎之類溫瘧汗不出為五十九痏此言刺溫瘧之法也素問瘧論帝曰先熱而後寒者何也岐伯曰此先傷於風而後傷於寒故先熱而後寒也亦以時作故曰溫瘧另有先寒而後熱為寒瘧但熱而不寒為疸瘧然溫瘧汗不出者當取五十九腧以刺之五十九腧詳後熱病篇第二十二節風㽷膚脹為五十七痏取皮膚之血者盡取之㽷即水以水為疾故加以疾之首此言刺風水之法也風水見素問奇病論水熱穴論評熱病論本經論疾診尺篇膚脹者即本經水脹論之所謂膚脹也按膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡痛皮厚按其腹窅而不起腹色不變此其候也當取五十七腧以刺之五十七腧詳見素問水熱穴論中飧泄補三陰之上補陰陵泉皆久留之熱行乃止此言飧泄之疾當補脾經之陰陵泉也三陰者足太陰脾經也陰陵泉乃脾經之合穴脾氣虛故飧泄宜補之必久留其針候針下熱行乃止針一說補三陰之上者補三陰交乃足三陰脈氣之所交宜補之因有二穴故用二補字及有一皆字轉筋於陽冶其陽轉筋於陰治其陰皆卒刺之卒猝同此言刺轉筋者當分陰陽而卒刺之也凡手足之外廉皆屬陽經若轉筋於陽則治其陽經凡手足之內廉皆屬陰經若轉筋於陰則治其陰經皆當猝然刺之而不使病人知之則刺易人而病易去也徒㽷先取環谷下三寸以鈹針針之已刺而筒之而內之入而復之以盡其水必堅來緩則煩悶來急則安靜間日一刺之㽷盡乃止飲閉藥方刺之時徒飲之方飲無食方食無飲無食他食百三十五日㽷即水證故加疾之首鈹音皮筒音桶內納同此言刺水腫之法也徒但也上文言風水者有風有水也此曰徒㽷則有水無風也見素問陰陽別論平人氣象論宜明五氣論本經水脹論先取環谷下三寸按各經無環谷穴止足少陽膽經有環跳穴今曰下三寸意者風市穴乎理亦甚的且針灸聚英不載風市治病之驗姑缺之以俟知者以鈹針針之本經九針論云五曰鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱相爭者也筒直也已刺而直其針以納之既入而又復之必欲盡去其水水方盡時其肉必堅且水來緩則內必煩悶來急則內必安靜間日一刺之候水去盡而止針但水未盡之時小便必閉今水已去盡必飲通閉之藥以利其水防其再腫然服閉藥之法方刺之時即但飲之方飲之時無用食物或食物時無飲此藥且又不可食異品他食如此守之至一百三十五日之外其病始不復矣著痹不去久寒不已卒取其三里著著同痹必至反此言刺寒痹之法也素問痹論云以濕勝者為著痹又曰其多汗而濡者此其逢濕甚也蓋著有沉著之意必其重而難去者也今久冷不已當猝取三里而刺之不使病人明知也三里系足陽明胃經穴按久寒以冷字釋者蓋以寒氣盛者為痛痹今既曰著痹則非痛痹也故知此為冷字之義骨為幹按前經脈篇黃帝云人始生先成精精成而腦髓生骨為幹血為營筋為剛肉為牆皮膚堅而毛髮長等語今本篇此句與上下文不相蒙意者乃經脈篇之脫簡歟腸中不便取三里盛瀉之虛補之此言刺大便不通之法也腸大腸也大腸不通當取三里穴以刺之其不便者由於邪氣之盛則瀉之由於正氣之虛則補之耳癘風者素刺其腫上已刺以鋭針針其處按出其惡氣腫盡乃止常食方食無食他食癘音癩此言刺癘風之法也按素問風論云癘者有榮衛熱胕其氣不清故使鼻柱壞而色敗皮膚瘍潰風寒客於脈而不去名曰癘風骨空論長刺節論皆謂之大風也內有刺法當平日刺其腫上已刺數以針之鋭者針其患處仍以手按出其惡毒之氣必腫盡乃止針不盡不止也凡食品如常者始食之若異品他食宜無食也腹中常鳴氣上衝胸喘不能久立邪在大腸刺肓之原巨虛上廉三里此言刺邪在大腸者之法也腹中常鳴者以水與火相激而成聲也氣上衝於胸發而為喘不能久立乃邪在大腸故病如是也當刺盲之原按本經九針十二原篇云肓之原出於脖胦者是也一名下氣海一名下肓臍下一寸半系任脈經穴針八分得氣即瀉後宜補又取巨虛上廉及三里穴以刺之按巨虛上廉一名上巨虛在三里下三寸本經本輸篇云胃經膝下三寸三里為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉大腸屬上廉小腸屬下廉故此篇邪在大腸宜刺巨虛上廉而下節邪在小腸宜刺巨虛下廉小腹控睪引腰脊上衝心邪在小腸者連睪系屬於脊貫肝肺絡心系氣盛則厥逆上衝腸胃熏肝散於肓結於臍故取之肓原以散之刺太陰以豫之取厥陰以下之取巨虛下廉以去之按其所過之經以調之睪音皋此言刺邪在小腸者之法也人有小腹中控其睪丸陰丸屬肝經引腰脊間上衝於心者邪在小腸也蓋小腸連睪系屬於脊貫肝與肺絡心之系今邪氣盛則厥逆上衝於腸胃熏於肝散於任脈經肓之原即下氣海穴見上文結於臍中之神闕亦系任脈經故當刺肓之原以散其結又刺手太陰肺經穴以與其補又取足厥陰肝經穴以下其邪以小腸之邪連睪屬脊貫肝肺又取足陽明胃經下巨虛以去其邪又按小腸經凡脈所過之經以調其氣可也善嘔嘔有苦長太息心中憺憺恐人將捕之邪在膽逆在胃膽液泄則口苦胃氣逆則嘔苦故曰嘔膽取三里以下胃氣逆則刺少陽血絡以閉膽逆卻調其虛實以去其邪憺音淡則刺之則當作側膽之經絡在肋之後旁故曰側此言刺邪在膽者之法也病有善嘔而嘔出苦味又長太息其心中憺憺然之靜中似恐有人將捕之此邪在膽經也蓋膽邪逆於胃故膽液泄則口苦而嘔故曰嘔膽之證當取足陽明胃經三里以下胃氣之逆又側刺足少陽膽經之血絡以出其血而止膽之逆閉者止也孟子云陳善閉邪朱注云閉止也卻又調兩經之虛實虛則補而實則瀉以終去其邪而不使之復也飲食不下膈塞不通邪在胃脘在上脘則刺抑而下之在下脘則散而去之則側同此節當與上膈篇參看此言刺邪在胃脘者之法也凡飲食不下而膈膜之前齊鳩尾後齊十一椎者覺塞不通此乃邪在胃脘也胃脘上下脘之總名如在上脘臥針刺之當抑而下之即本經上膈篇之所謂氣為上膈故治之者如此如在下脘則刺下脘當散而去之即上膈篇之所謂蟲為下膈故治之者如此小腹痛腫不得小便邪在三焦約取之太陽大絡視真絡脈與厥陰小絡結而血者腫上及胃脘取三里此言刺邪在三焦者之法也三焦者即後三焦合於右腎者也本經本臟篇云腎合三焦膀胱言右腎合三焦左腎合膀胱素問靈蘭祕典論云三焦為決瀆之官膀胱為州都之官則三焦膀胱皆可小便者也小腹痛而腹腫難以小便其邪在於三焦而三焦有邪約之也當取足太陽大絡而刺之即飛揚穴是也本經本輸篇三焦者上踝五寸光明之別入貫腨腸出於委陽並太陽之正絡膀胱又必視其絡脈與足厥陰肝經有結血者盡取之若少腹腫及於胃脘則取胃經之三里穴以刺之睹其色察其以知其散復者視其目色以知病之存亡也一其形聽其動靜者持氣口人迎以視其脈堅且盛且滑者病日進脈軟者病將下諸經實者病三日已氣口候陰人迎候陽也此與首篇第十節相似此言凡候病者當盡望聞問切之法也以為也論語云視其所以凡人有病須知睹病人之氣色察病人之所為知其病氣之或散或復其要在於視其目中之色以知其病之存亡也蓋目為五臟之精華故尤以是為主耳又以一其形之肥瘦曰一者肥瘦各相等否聽其身之動靜凡身體病證語默皆是其要又在於診其脈體以知其病之迸退也持其右手寸部之氣口左手寸部之人迎以視之其脈且堅且盛且滑者在氣口為內傷日進在人迎為外感日進也其脈不堅不盛不滑而軟者在氣口為內傷將退在人迎為外感將退也縱或諸經尚實然氣口人迎已軟其病至三日而可已耳蓋氣口為內所以候足手六陰經之病人迎為外所以候足手六陽經之病也素問六節藏象論本經終始禁服等篇皆云氣口一盛病在足厥陰一盛而躁病在手厥陰氣口二盛病在足少陰二盛而躁病在手少陰氣口三盛病在足太陰三盛而躁病在手太陰故曰氣口候陰也人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明故曰人迎候陽也五邪第二十內論五臟之邪故名篇邪在肺則病皮膚痛寒熱上氣喘汗出咳動肩背取之膺中外腧背三節五臟一本作五節之傍以手疾按之快然乃刺之取之缺盆中以越之此言肺邪諸病而有刺之之法也凡邪在於肺皮為肺之合故皮膚痛發為寒熱氣上而喘汗出者以腠理疏也咳動肩背者以肺為五臟華蓋而肩乃肺經脈氣所行也當取膺中外腧雲門中府等穴以刺之雲門巨骨下俠氣戶旁二寸陷中去任脈兩旁相去各六寸中府雲門下一寸乳上三肋間去中行亦六寸各灸五壯針三分又取背三節旁之肺俞及取五椎旁之心俞穴俱系足太陽膀胱經穴去脊中各開一寸五分針三分留七呼但心俞禁針然先以手速按其處自覺快爽乃刺之耳又必取缺盆穴使邪氣從此而上越也系足陽明胃經穴肩下橫骨陷中針二分留七呼不宜太深深則使人逆息邪在肝則兩脅中痛寒中惡血在內行善掣節時腳腫取之行間以引脅下補三里以溫胃中取血脈以散惡血取耳間青脈以去其掣掣音徹此言肝邪諸病而有刺之之法也凡邪在於肝則兩脅中痛蓋肝之經脈貫胸中布脅肋也胃中必寒木旺則土衰也惡血在內以肝氣不疏也行善牽掣其關節時或腳腫以肝之經脈自足大指上行內踝入陰器以上季脅及肋也當取足厥陰肝經行間穴以引出脅下之邪在足大指縫間動脈應手針三分灸三壯補足陽明胃經三里以溫其胃中之寒取肝經血脈外見者以散其在內之惡血取耳間青脈以去其所行之掣節邪在脾胃則病肌肉痛陽氣有餘陰氣不足則熱中善飢陽氣不足陰氣有餘則寒中腸鳴腹痛陰陽俱有餘若俱不足則有寒有熱皆調於三里此言脾胃有邪諸病而有刺之之法也凡邪在脾胃則病肌肉痛以脾主肌肉也若胃為陽經而胃之邪氣有餘則不足者不能勝有餘也其病為胃勝當為熱中而善飢蓋火與陽為類而火消穀則易飢耳反此而脾為陰經胃之正氣不足脾之邪氣有餘其病為脾勝當為寒中而腸鳴腹痛也設脾胃俱邪氣有餘或正氣不足則胃當為熱而脾當為寒也當取足陽明胃經三里穴以調之有餘則瀉而不足則補耳邪在腎則病骨痛陰痹陰痹者按之而不得腹脹腰痛大便難肩背頸項痛時眩取之湧泉崑崙視有血者盡取之此節與後篇次節骨痹舉節不用而痛汗注煩心取三陰之經補之其義大同此言腎邪諸病而有刺之之法也邪在於腎則病骨痛以腎主骨而陰痹當在陰分也陰痹者痛無定所按之而不可得即痹論之所謂以寒勝者為痛痹也後世以為白虎歷節風又曰痛風其小腹脹以腎脈入小腹也其腰痛以腰為腎之府也其大便難以腎通竅於二便也其肩背頸項痛此皆膀胱經脈所行以腎與膀胱為表裡也且時時眩暈亦兼膀胱與腎邪也當取腎經之湧泉穴足心陷中屈足卷指宛宛中跪取之針三分留三呼灸三壯又取膀胱經之崑崙穴足外踝後跟骨上陷中細脈動應手針三分灸三壯妊婦忌之視有血者則三經盡取之可也邪在心則病心痛喜悲時眩僕視有餘不足而調之其輸也此言心邪諸病而有刺之之法也邪在心故心必痛且善悲本神篇云心氣虛則悲然實則然時或眩僕或邪氣有餘或正氣不足皆病如是也當視其有餘不足而調之實則瀉而虛則補皆取其神門之為輸穴者以刺之耳神門繫心經穴在掌後鋭骨端陷中針三分留七呼灸七壯按本經邪客篇云少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在心者皆在心之包絡包絡者心主之脈也故獨無腧焉其外經病而內不病故獨取其經於掌後鋭骨之端寒熱病第二十一篇內所論諸證不止寒熱然首節所論在寒熱故名篇但此寒熱主外感言與瘰癧之寒熱不同皮寒熱者不可附席毛髮焦鼻槁臘不得汗取三陽之絡以補手太陽肌寒熱者肌痛毛髮焦而唇槁臘不得汗取三陽於下以去其血者補足太陰以出其汗骨寒熱者病無所安汗注不休齒未攪取其少陰於陰股之絡齒已槁死不治骨厥亦然臘思亦切此言寒熱不同而刺之亦異也邪之在人其始寒熱在於皮正以肺主皮毛開竅於鼻故皮痛而不可近席毛髮焦燥鼻孔枯臘臘者干也如不得汗當取足太陽膀胱經之絡穴飛揚以瀉之蓋太陽為三陽也又當取手太陰肺經之絡穴列缺以補之正以太陽主表故宜瀉其邪而肺主皮毛必宜補之於既瀉之後也既而寒熱在於肌肉正以脾主肌肉又主唇故肌痛及毛髮焦而唇槁臘也如不得汗當取足太陽於下以去其血又補足太陰脾經以出其汗也不言穴者必俱是絡穴其終也寒熱在於骨病既不安汗亦不休如齒未槁當取足少陰腎經之絡穴大鐘以刺之倘齒已槁則死不治矣外有骨發為厥之證亦驗其齒以治之耳骨痹舉節不用而痛汗注煩心取三陰之經補之此節與前篇邪在腎則病骨痛陰痹相同但此節取三陰無義一本作三陽則治法亦與前篇相同此言病骨痹者而有刺之之法也骨痹已成節不能舉而痛汗注於外心煩於內正以腎主骨又其脈之支者從肺出絡心注胸中故病如是也當取足太陽膀胱之經穴崑崙以補之蓋膀胱與腎為表裡也身有所傷血出多及中風寒若有所墮墜四肢懈惰不收名曰體惰取其小腹臍下三結交三結交者陽明太陰也臍下三寸關元也此言病體惰者而有刺之之法也身有所傷出血己多而傷處中乎風寒此證近於後世之所謂破傷風或有所惰墜不必身傷出血也四肢懈惰其名曰體惰當取小腹臍下三結交之穴以刺之蓋本經為任脈而足陽明胃足大陰脾經之脈亦結於此故謂之三結交也即臍下三寸之關元穴耳厥痹者厥氣上及腹取陰陽之絡視主病也瀉陽補陰經也頸側之動脈人迎人迎足陽明也在嬰筋之前嬰筋之後手陽明也名曰扶突次脈足少陽也名曰天牖次脈足太陽也名曰天柱腋下動脈臂太陰也名曰天府足少陽當作手少陽觀前本輸篇第十三節云手少陽也名曰天牖六次脈可證此言厥痹者而有刺之之法也痹病在內厥氣上逆以及於腹當取陰經之絡即下文手太陰肺經之天府是也刺陽經之絡即下文足陽明胃經之人迎手陽明大腸經之扶突手少陽三焦經之天牖足太陽膀胱經之天柱是也於陽經則瀉之於陰經則補之但人迎之穴乃頸側之動脈在嬰筋之前嬰筋者頸之豎筋也頸大脈動應手夾結喉兩旁一寸五分以候五臟氣一云禁針又云針四分過則殺人扶突之穴在嬰筋之後氣舍後一寸半在頸當曲頰下一寸仰而取之針三分灸二壯天牖之穴其脈次於扶突之後天牖本手少陽三焦經之穴而此以為足少陽者誤以手為足頸大筋外缺盆上天容後天柱前完骨下髮際上針五分得氣即瀉瀉盡更留三呼瀉三吸不宜補天柱之穴其脈次於天牖之後挾項後髮際大筋外廉陷中針二分留三呼灸不及針天府之穴乃腋下之動脈其脈行於臂故不稱曰手太陰而曰臂太陰也腋下三寸臂臑內廉動脈陷中以鼻取之針四分留七呼禁灸陽迎頭痛胸滿不得息取之人迎陽迎斷作陽明因下有迎字及明迎韻似而誤書訛傳者上節五穴總治厥痹之證而此下五節則分言五穴可以治諸證此節則以人迎所治之病而言之也陽明胃經邪盛頭痛胸滿不得息當取上文人迎穴耳暴瘖氣鞭取扶突與舌本出血鞭當作梗此節以扶突所治之病言之也暴時瘖啞而氣梗於喉當取上文扶突穴及舌本即風府穴系督脈經項後入髮際一寸半宛宛中針三分禁灸令人失音暴聾氣蒙耳目不明取無牖此節以天牖所治之病言之也按針灸聚英云主暴聾氣目不明耳不聰暴攣癇眩足不任身取天柱此節以天柱所治之病言之也暴攣者拘攣也暴癇者癲癇也暴眩者眩暈也合三證而足不任身皆當取上文天柱穴耳暴疸內逆肝肺相搏血溢鼻口取天府此節以天府所治之病言之也暴時大熱而在內氣逆乃肝肺兩經之火邪相為搏擊以致血溢於鼻口當取上文天府穴耳此為大牖五部大當作天此句總結上文五節其穴為天牖五部也曰天牖五部者舉一穴以統五穴耳猶後世立湯藥之方舉一品以概衆品也臂陽明有入頄遍齒者名曰大迎下齒齲取之臂惡寒補之不惡寒瀉之足太陽有入頄遍齒者名曰角孫上齒齲取之在鼻與頄前方病之時其脈盛盛則瀉之虛則補之一曰取之出鼻外足太明有挾鼻入於面者名曰懸顱屬口對入系目本視有過者取之損有條益不足反者益頄音仇齲丘禹切此言齒齲者當即上下齒而分經以治之也臂陽明即手陽明大腸經也以其脈行於臂故不稱曰手而曰臂也手陽明之脈其支者從缺盆上頸循天鼎扶突上貫於頰入下齒縫中還出挾口交人中左之右右之左上挾鼻孔循禾髎迎香以交於足陽明故曰臂陽明有入頄遍齒者其名曰大迎正以大迎出足陽明穴而手陽明之脈則入而交之也面顴為頄名大迎在曲頷前一寸五分骨陷中細脈又以口下當兩肩是穴針三分留七呼灸三壯齒有痛病謂之齲故下齒病齲者當取此臂陽明之穴商陽二間三間皆治痛齒如惡寒飲者虛也宜補之不惡寒飲者實也宜瀉之足太陽膀胱經之脈亦入頄遍齒其所入之脈乃手少陽三焦經之角孫穴其上齒齲者正足陽明胃經脈氣之所歷取之在鼻與頄前乃地倉巨髎等穴也如正痛之時其脈必盛盛則宜瀉之或虛則宜補之一曰當取之出於鼻外即本經之禾髎迎香等穴也足陽明胃經之脈有挾鼻孔入於面者其脈會於足少陽膽經之懸顱穴屬口對入以繫於目本當視其有病者所以取之邪氣有餘則損正氣不足則益益者補也正以不足與有餘相反故益之耳其足太陽有通項入於腦者正屬目本名曰眼系頭目苦痛取之在項中兩筋間入腦乃別陰蹺陽蹺陰陽相交陽入陰陰出陽交於目鋭眥陽氣盛則瞋目陰氣盛則瞑目瞑音準此言頭目痛者當取玉枕而又言睛明為陰陽二蹺之所交乃寤寐之所以分病也足太陽膀胱經有通項入於腦者名曰玉枕開督脈一寸半腦戶枕骨上入髮際二寸針三分留三呼灸三壯此正屬於目之根兩眼中之系皆繫於此故名之曰眼系凡苦頭痛或苦目痛者皆取之其脈在項中兩筋間入於腦與陰蹺陽蹺相別實各陰陽諸經交會之所也又陽蹺之脈入於陰陰蹺之脈出於陽交於目鋭眥之睛明穴陽蹺之氣盛則目瞋而不得閉陰蹺之氣盛則目瞑而不得開也熱厥取足太陰少陽皆留之寒厥取足陽明少陰於足皆留之少陽作少陰少陰作少陽素問有厥論本經終始篇亦有刺寒厥熱厥法此言寒熱二厥而各有刺之之法也按素問厥論曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥蓋以熱厥為足三陽氣勝則所補在陰故當取足太陰以補之其少陽當作少陰皆留其針也寒厥為足三陰氣勝則所補在陽故當取足陽明以補之其少陰當作少陽皆留其針也舌縱涎下煩悗取足少陰此言舌縱涎下煩悶者而有刺之之法也病有舌縱而不收其涎自下內則煩悶者皆足少陰腎經之衰也當取腎經之穴以補之按本經口問篇帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰振寒灑灑鼓頷不得汗出腹脹煩悗取手太陽此言振寒為病者而有刺之之法也凡振寒而灑灑然鼓其頷間汗不得出內腹作脹而煩悶此乃元氣不足也當取手太陰肺經以補之刺虛者刺其去也刺實者刺其來也此言刺虛實者之法也凡刺虛者當乘其氣之去而隨之隨之者所以補之也凡刺實者當乘其氣之來而迎之迎之者所以瀉之也九針十二原篇云迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之春取絡脈夏取分鷹秋取氣口冬取經輸凡此四時各以時為齊絡脈治皮膚分腠治肌肉氣口治筋脈經輸治骨髓齊劑同此言四時各有所刺者以其各有所治也春取絡脈而刺之者以絡脈治皮膚也如肝經蠡溝為絡之類夏取分腠而刺之者以分腠治肌肉也如夏取心與小腸分肉腠理之類秋取氣口而刺之者以氣口治筋脈也秋屬肺經故取之冬取經輸而刺之者以經輸治骨髓也如腎經太溪為輸復溜為經之類按本經四時氣篇言春取經血脈分肉之間素問水熱穴論亦云春取絡脈分肉間四時氣篇言夏取盛經孫絡取分間絶皮膚水熱穴論夏取盛經分腠理四時氣篇言秋取經輸水熱穴論云秋取經輸四時氣篇言冬取井滎水熱穴論云冬取井滎以前三篇同異如此當備此以參考之五臟身有五部伏兔一腓二腓者腨也背三五臟之腧四項五此五部有癰疽者死此言癰疽生於五部者必死也五臟在內而關係於身者有五部其一在伏兔系足陽明胃經穴膝上六寸起肉正脆坐而取之一云膝蓋上七寸以左右各三指按捺上有肉起如兔之狀其二在腓腹腓腹者腨也其穴名承筋一名腨腸一名直腸俗雲腿肚禁針灸三壯足太陽膀胱經穴其三在背背之中曰督脈而背旁四行皆足太陽膀胱經穴其四在五臟之俞肺俞三椎旁心俞五椎旁肝俞九椎旁脾俞十一椎旁腎俞十四椎旁各開中行一寸半其五在項亦系督脈與足太陽經此五部有癰疽者必死也按此言癰疽之不可治而自下節至末皆言有可治之所蓋出汗正所以去邪也然當知用藥亦猶是耳病始手臂者先取手陽明大陰而汗出此承上文而言病始手臂者而有先刺之法也手臂乃手陽明大腸經手大陰肺經脈氣所行故病始手臂者先取此二經刺之以出汗則其邪可去矣病始頭首者先取項太陽而汗出此承上文而言病始於頭者而有先刺之法也項上於頭乃足太陽膀胱經脈氣所行故病始於頭者先取此經刺之以出汗其邪可去矣病始足脛者先取足陽明而汗出此承上文而言病始足脛者而有先刺之法也足脛外廉乃足陽明胃經脈氣所行故病始於足脛者先取此經刺之以出汗其邪可去矣臂太陰可汗出足陽明可汗出故取陰而汗出甚者止之於陽取陽而汗出甚者止之於陰此承上文而言肺胃兩經皆可以發汗若汗多者陰取之陽陽取之陰也臂太陰者即手太陰肺經也素問刺禁論亦有臂太陰以脈行於臂故云然此經與足陽明胃經皆可發汗若刺肺經而汗出太甚則瀉胃經以止之蓋陽瀉則陰勝也刺胃經而汗出太多則瀉肺經以止之蓋陰瀉則陽勝也凡刺之害中而不去則精泄不中而去則致氣精泄則病甚而框致氣則生為癰疽矣中去聲按前本輸篇云害中而不去則精泄害中而去則致氣比此少一不字蓋此乃為生癰疽而發故上以瀉實言之也此承上文而言行針者之誤有二也凡刺者瀉實既中其害則當去其針而久之不去則精氣反泄所以病益甚而恇羸也既不中其害則當留針以再瀉而遂乃去之則邪氣仍致所以生為癰疽也蓋皆指瀉實而言耳癲狂第二十二內論癲狂諸證故名篇但首無起語疑是岐伯所言也目眥外決於面者為鋭眥在內近鼻者為內眥上為外眥下為內眥此言目眥分為內外而又各統其上下也眥眼角也目眥外決於面者為鋭眥俗云外眼角在內近鼻者為內眥俗云內眼角眼之上泡屬於外眥眼之下泡屬於內眥也按本篇俱論癲狂厥逆而此首節獨以內外眥為言者須知人身臟腑之神以目為主故先以目眥言之示人以觀神之法也癲疾始生先不樂頭重痛視舉目赤甚作極已而煩心候之於顏取手太陽陽明太陰血變而止此以下八節皆論癲疾諸證而此下三節則即其始作之證而有刺之之法也凡癲疾始生其意先不樂其頭先重而痛其所視舉目先赤三者已甚遂癲疾乃作至於作極則其心大煩當候之於顏以知之本經五色篇庭者顏也又曰庭者首面也乃取手太陽小腸經手陽明大腸經手太陰肺經以刺之候至血變而止針按小腸經支正小海大腸經偏歷溫溜肺太淵列缺癲疾始作而引口啼呼喘悸者候之手陽明太陽左強者攻其右右強者攻其左血變而上穴考同前此又即癲疾始作之證而有刺之之法也其口牽引或啼或呼喘急驚悸者候之手陽明大腸經手太陽小腸經左強右強凡證候脈體俱不病也其不強者為病故左強攻右右強攻左至血出色變而止針癲疾始作先反僵因而脊痛候之足太陽陽明太陰手太陽血變而止按膀胱經委陽飛揚僕參金門小腸見前胃經三里解溪脾經隱白公孫此又即癲疾先作之證而有刺之之法也癲疾始作先反僵仆隨即脊痛當取足太陽膀胱經足陽明胃經足太陰脾經手太陽小腸經以刺之候至血變而止針治癲疾者常與之居察其所當取之處病至視其有過者瀉之置其血於瓠壺之中至其發時血獨動矣不動灸窮骨二十壯窮骨者骶骨也此言治癲疾之法也凡欲治癲疾者常與之居察其病在何經當取何穴及病己發時視其有病之經瀉之即以所刺之血置之瓠壺之中至於此病又發其血當獨動如血不動宜灸脊盡之骶骨二十壯穴名長強伏地取之針二分留七呼灸五壯骨癲疾者顑齒諸腧分肉皆滿而骨居汗出煩悗嘔多沃沫氣下泄不治顑苦感切舊釋以為飢黃起行今此篇與本經雜病篇有曰顑痛當有定所想頷與顑可通用屈原賦離騷云長顑頷亦何傷又可總稱此言癲疾之證而決其不可治也癲疾成於骨病故曰骨癲疾其頷齒中諸穴分肉邪氣閉滿尪羸太甚唯骨獨居汗出於外煩悗於內此或有可治者若至於在上作嘔沃沫出多在下氣泄則上下交病此不可治之證也筋癲疾者身倦攣急大刺項大經之大抒脈嘔多沃沫氣下泄不治此言筋癲疾者有可治之穴有不可治之證也筋癲疾者癲病成於筋也其身倦怠拘攣其脈急大當刺足太陽膀胱經之大抒穴若在上多嘔沃沫在下泄氣此不可治之證也大抒項後第一椎下兩旁去脊中各一寸半針五分灸七壯脈癲疾者暴僕四肢之脈皆脹而縱脈滿盡刺之出血不滿灸之挾項太陽灸帶脈於腰相去三寸諸分肉本輸嘔多沃沫氣下泄不治此言脈癲疾者有可治之穴有不可治之證也脈癲疾者癲疾成於脈也猝時僵仆四肢之脈皆脹滿而弛縱如其脈果滿則盡刺之以出其血如其脈不滿則灸足太陽膀胱經挾項之天柱穴挾項後髮際大筋外廉陷中針二分留六呼灸三壯又灸足少陽膽經之帶脈穴此穴相去於腰計三寸許帶脈季脅下一寸八分陷中針六分灸三壯及諸經分肉之本穴蓋指四肢之脈皆脹而縱之所也設在上嘔多沃沫在下泄氣則不可治矣癲疾者疾發如狂者死不治此言癲疾太甚如狂者其證不可治也狂始生先自悲也喜忘苦怒善恐者得之憂飢治之取手太陰陽明血變而止及取足太陰陽明肺大腸胃脾穴見前此以下六節皆論狂疾諸證而此一節則即其始生之證有得之於憂飢者而有刺之之法也凡狂始生時悲者肺之志忘者心之病怒者肝之志恐者腎之志今諸證皆見皆得之於憂飢也當取手太陰肺經手陽明大腸經足太陰脾經足陽明胃經以刺之候其血出色變而止針狂始發少臥不飢自高賢也自辨智也自尊貴也善罵詈日夜不休治之取手陽明太陽太陰舌下少陰視之盛者皆取之不盛釋之也大腸小腸肺穴見前心神門少衝穴此言狂有始發之證而有刺之之法也上節言始生而此曰始發則病已成而發也凡狂始發時不欲臥不言飢自以為高賢辨智而尊貴其罵詈無有止時當取手陽明大腸經手太陽小腸經手太陰脾經及舌下之廉泉穴與手少陰心經等處又必視其血脈盛者皆取之如不盛則釋之而不取也狂言驚善笑好歌樂妄行不休者得之大恐治之取手陽明太陽太陰好去聲樂入聲此言狂有得之大恐者而有刺之之法也其證狂言又驚又善笑又好歌樂又妄行不休此皆得之於大恐也當取手陽明大腸經手太陽小腸經手太陰肺經以刺之大腸小腸肺穴見前狂目妄見耳妄聞善呼者少氣之所主也治之取手太陽太陰陽明足太陰頭兩顑此言狂有生於少氣者而有刺之之法也妄有見聞而口則善呼乃正氣衰所致也當取手太陽小腸經手太陰肺經足太陰脾經及頭與兩顑之穴以治之穴俱見前狂者多食善見鬼神善笑而不發於外者得之有所大喜治之取足太陰太陽陽明後取手太陰太陽陽明此言狂有得之大喜者而有刺之之法也狂有多食善見鬼神善笑而不發外者此乃得之有所大喜也當取足太陰脾經足太陽膀胱經足陽明胃經後又取手太陰肺經手太陽小腸經手陽明大腸經以治之穴俱見前狂而新發未應如此者先取曲泉左右動脈及盛者見血有頃已不已以法取之灸骨骶二十壯應平聲此言狂有新發而不宜太甚者當有刺灸之法也上節狂證俱為太甚然狂新發未應如此當先取足厥陰肝經左右曲泉穴以刺之及脈之盛者皆出其血有頃病當自已如不已則灸骨骶二十壯夫曰以法取之則如前置血於瓠之中而驗之也風逆暴四肢腫身漯漯唏然時寒飢則煩飽則善變取手太陰表裡足少陰陽明之經肉清取滎骨清取井經也此言有風逆者當驗其證取其穴也風由外感厥氣內逆暴時四肢作腫其身漯漯然而無所拘束唏然冷笑貌此雖非笑而身則唏然覺寒未食而飢則甚煩既食而飽則多變不寧當取手太陰肺經手陽明大腸經之為表裡者而刺之又取足少陰腎經足陽明胃經以刺之其肉冷則取各經之滎穴若骨冷則取各經之井穴經穴以刺之蓋亦指上四經而言耳腎穴築賓余穴見前厥逆為病也足暴冷胸將若裂腸若將以刀切之煩而不能食脈大小皆澀暖取足少陰清取足陽明清則補之溫則瀉之此又言厥逆諸證而有刺之之法也有厥逆為病者其足暴冷上胸下腸痛如裂切之狀煩悶不能進食脈來或大或小俱帶澀滯如身體溫暖則取足少陰腎經以瀉之如身體清冷則取足陽朋胃經以補之穴見前厥逆腹脹滿腸鳴胸滿不得息取之下胸二脅咳而動手者與背腧以手按之立快者是也此又言厥逆諸證而有刺之之法也有厥逆者其腹脹滿其腸則鳴胸中滿而不得息當取其胸之下左右二脅之間蓋取足厥陰肝經之穴也如病人咳嗽而穴應醫人手者當取背腧穴以刺之所謂咳而動手者若以手按之其必立快也肝穴期門章門內閉不得溲刺足少陰太陽與骶上以長針穴見前此言不得溲者而有刺之之法也內閉不得小便當刺足少陰腎經足太陽膀胱經及督脈之骶骨上其骶骨上宜用長針以刺之九針論云八曰長針取法於綦針長七寸主取深邪遠痹者也氣逆則取其太陰陽明厥陰甚取少陰陽明動者之經也此言氣逆者而有刺之之法也有氣逆者當取足太陰脾經足陽明胃經足厥陰肝經如病甚則取足少陰腎經之經穴復溜足陽明胃經之經穴解溪也穴見前少氣身漯漯也言吸吸也骨痠體重懈惰不能動補足少陰此又言少氣諸證而有刺之之法也有少氣者身漯漯然而無所拘束言吸吸然而無所接續骨痠體重懈惰不能動當取足少陰腎經以補之穴見前短氣息短不屬動作氣索補足少陰去血絡也此言短氣諸證而有刺之之法也有短氣者息短而不連屬動作而氣索然當補足少陰腎經其有血絡則去之也以上六節仍指癲狂而言即第十八節骶上穴可推熱病第二十三篇內所言諸病不一然論熱病更多故名篇偏枯身偏不舉而痛言不變志不亂病在分腠之間巨針取之益其不足損其有餘乃可復也偏枯見素問生氣通天論陰陽別論等篇此言偏枯之證而有刺之之法也有患偏枯者半體不能舉用而疼痛言固如常志亦不亂其病當不在內而在於分肉腠理之間宜用巨針取之虛則補之實則瀉之斯可復於無病也痱之為病也身無痛者四肢不收智亂不甚其言微知可治甚則不能言不可治也病先起於陽後入於陰者先取其陽後取其陰浮而取之痱音肥此言痱病之證而有刺之之法也痱者風痱也其病身體無痛但四肢不收耳上節偏枯曰痛而此痱病曰不痛上節身偏不舉而此曰四肢俱不收此其所以為偏枯與痱病之辨也如神智雖亂而不至於甚人言雖不盡曉而亦微有所知此病尚有可治若智亂太甚自已全不能言則不可治也如病先起於陽經而後入於陰經者必先取其陽而後取其陰當浮其針以取之蓋陽在表病先起於表故宜浮而取之但經文不言病先起於陰後出於陽者先取其陰後取其陽沉而取之之意須知病先起於陰者其病終不可治故不言之仰亦即病先起於陽者以反推之耶以理詳之終為不治之證否則經文言之悉矣觀前後篇可知也熱病三日而氣口靜人迎躁者取之諸陽五十九刺以瀉其熱而出其汗實其陰以補其不足者身熱甚陰陽皆靜者勿刺也其可刺者急取之不汗出則泄所謂勿刺者有死徵也此以下二十節皆言熱病而此一節則言熱病證脈相應者當刺之以出汗而泄邪證脈不相應者不必刺也熱病已三日而氣口脈靜其人迎脈躁者乃病在六陽經也此正證脈相應當取之諸陽經以瀉之如前終始篇所謂人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數者名曰溢陽溢陽為外格此可見人迎脈躁者為病在諸陽也當取之諸陽經以瀉之如上文終始篇所謂瀉足少陽等語是也又行五十九刺之法始本篇下文所謂五十九刺者是也皆所以瀉其實而出其汗耳又從而實其陰經以補其不足者即終始篇所謂人迎一盛瀉足少陽而補足厥陰一盛而躁瀉手少陽而補手厥陰人迎二盛瀉足太陽而補足少陰二盛而躁瀉手太陽而補手少陰人迎三盛瀉足陽明而補足太陰三盛而躁瀉手陽明而補手太陰者是也若身本熱而脈口固靜人迎不躁乃陰經陽經皆靜也是謂證脈不相應刺之無益勿刺之可也但如上文所謂氣口靜人迎躁者宜急取諸陽經以瀉之急取諸陰經以補之其急取諸陽者縱不汗出其邪亦從此而泄矣吾所謂身熱甚而陰陽皆靜為不必刺者以其有死徵也蓋邪盛脈宜躁今邪盛而熱甚正以正氣衰而脈不能躁不謂之死徵而何熱病七日八日脈口動喘而短一本作弦者急刺之汗且自出淺刺手大指間此言熱病而脈口之脈證俱見者當刺手太陰肺經也終始篇謂脈口三盛病在手太陰者熱病已七八日其脈口之脈甚動證則喘而短氣當急取手太陰肺經之少商則汗當自出但刺之者宜淺刺手之大指間即少商穴也熱病七日八日脈微小病者溲血口中乾一日半而死脈代者一日死此又言熱病脈證不相應者為必死也熱病已七八日其脈雖微小其證則甚熱下為溲血而上為口乾此邪盛而正虛也當至一日半而死若脈之微小中而兼代脈來見者止在一日間耳其死便促也熱病已得汗出而脈尚躁喘且復熱勿刺膚喘甚者死此又言熱病脈證不相應者為必死也熱病已得汗出則邪宜退矣其脈不宜躁而今尚躁其證不宜喘不宜熱而今反喘且復熱夫躁與熱則邪氣盛喘則正氣虛勿刺其膚刺之無益也若至於喘甚則必死矣熱病七日八日脈不躁躁不散數後三日中有汗三日不汗四日死未曾汗者勿腠刺之數音朔此又言熱病脈證不相應者為必死也熱病已七八日脈雖不躁然亦不散且帶數是邪尚未退當再過三日之中宜有汗出而愈若不汗出乃正氣衰而不能為汗至於四日當死也且未曾汗出勿刺其膚腠刺之無益也熱病先膚痛窒鼻充面取之皮以第一針五十九苛軫鼻索皮於肺不得索之火火者心也軫當作𤺋海篇有此字此言熱病之邪在皮者當取之皮如病不已必補心以勝肺也肺屬金其合在皮今熱病之始膚痛鼻塞面亦充然而浮乃病在於皮也當取之皮以瀉之所謂刺皮無傷肉之義也用第一針名鑱針者以刺五十九穴之皮九針論云一曰鑱針者取法於巾針去末半寸卒鋭之長一寸六分主熱在頭身且身體苛重鼻上生疹皆皮病也此其求之於皮即所以求之於肺也如刺之而病不得退則當求之於火所謂火者心也補其心經以致火王則金衰肺熱自可退耳熱病先身澀倚而熱煩悗干唇口嗌取之脈以第一針五十九膚脹口乾寒汗出索脈於心不得索之水水者腎也此言熱病之邪在脈者當取之脈如病不已必補腎以勝心也心屬火其合在脈今熱病之始其身澀滯倚著而熱心則煩悶唇口與嗌皆干乃病在於脈也當取之脈以瀉之所謂刺脈無傷皮也用第一針名曰鑱針者以刺五十九穴之脈正以膚脹口乾冷汗出皆脈病也此其求之於脈即所以求之於心也如刺之而病不得退則當求之於水所謂水者腎也補其腎經致水王則火衰心熱自可退耳熱病嗌乾多飲善驚臥不能起取之膚肉以第六針五十九目眥青索肉於脾不得索之木木者肝也此言熱病之邪在肉者當取之肉如病不已必補肝以勝脾也脾屬土其合在肉今熱病而嗌乾故多飲且善驚悸四肢懈倦臥不能起乃病在於肉也當取之膚肉以瀉之所謂刺肉無傷筋也用第六針名曰員利針者以刺五十九穴之肉九針論六曰員利針取法於犛針微大其末反小其身令可深納長一寸六分主取癰痹者也正以目眥色青乃木來剋土主肉病也此其求之於肉即所以求之於脾也如刺之而病不得退則當求之於木所謂木者肝也補其肝木以致木王則土衰脾熱自可退耳熱病面青腦痛手足躁取之筋間以第四針於四逆筋躄目浸索筋於肝不得索之金金者肺也此言熱病之邪在筋者當取之筋如病不已必補肺以勝肝也肝屬目其合在筋今熱病而面青肝色見也腦痛肝邪隨督脈會於巔也手足躁者以脾主四肢而肝熱有餘四肢熱也且木病在於四末也乃病在於筋當取之筋以瀉之所謂刺筋無傷骨也用第四針名曰鋒針者以刺四肢之厥逆九針論四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血正以肝主筋今筋痹足不能行也肝主目今目浸淚出不收也皆筋病也此其求之於筋即所以求之於肝也如刺之而病不已則當求之於金所謂金者肺也補其肺金以致金王則木衰肝邪自可退耳熱病數驚瘛瘲而狂取之脈以第四針急瀉有餘者癲疾毛髮去索血於心不得索之水水者腎也此言熱病之邪在血脈當取之血脈如病不已必補水以勝心也心屬火其合在血脈故上文已言熱病在脈而此又言熱病在血者又當取之血也熱病數驚心邪有餘也瘛瘲者熱極生風也狂則邪尤甚矣其病在脈當用第四針曰鋒針者以急瀉心脈有餘之邪正以脈病則血病故發為狂疾血之熱也毛髮亦去發為血餘也此其求之於血正所以求之於心也如刺之而病不退則當求之於水所謂水者腎也補其腎水以致水王則火衰心邪自可退耳熱病身重骨痛耳聾而好瞑取之骨以第四針五十九刺骨病不食齧齒耳青索骨於腎不得索之土土者脾也此言熱病之邪在骨者當取之骨如病不已必補脾以勝腎也腎主水其合在骨今熱病而身體重其骨痛其耳聾腎開竅於耳又好瞑目陰病則目瞑乃病在於骨也當取之骨用第四針曰鋒針者以刺五十九穴之骨且其熱病而不能食又齧其齒齒為骨余也耳又青腎竅在耳腎衰故耳青此其求之於骨正所以求之於腎也如刺之而病不已則當求之於土所謂土者脾也補其脾經以致土王則水衰腎邪自可退耳熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治此言熱病在髓者不可治也熱病而痛無定所耳中聾不能有聞四肢懈惰不能收持口中乾枯此其陽經熱甚而陰經頗有寒意若遷延日久陰經亦已熱甚遂至熱在於髓則死不可治矣熱病頭痛顳顬目𤬓脈痛善衄厥熱病也取之以第三針視有餘不足寒熱痔此言熱病名厥熱者有諸證有治法也熱病頭痛其顳顬一名腦空屬足少陽膽經穴在腦後玉枕骨下陷中與目善𤬓而筋脈動脈亦作痛鼻中善衄此乃厥氣上逆而成熱病也取之以第三針曰匙針者以刺之九針論三曰匙針取法於黍粟之鋭長三寸半主按脈取氣令邪出視其有餘則瀉不足則補且厥熱之病又必發之而為寒熱結之而為痔疾也熱病體重腸中熱取之以第四針於其輸及下諸指間素氣於胃胳得氣也胳音各釋文云腋下也胃之經脈與腋下無著疑當作絡此言熱病在胃者當取之胃所以去其邪氣也熱病而身體重以胃土主肉故體重也及腸中必熱當取之以第四針曰鋒針者以刺胃經之輸穴陷谷足大指次指外間本節後陷中去內庭二寸針五分留七呼灸三壯及下諸指間即厲兌內庭等穴也此其索氣於胃之經絡則邪氣必因之而泄矣熱病挾臍急痛胸脅滿取之湧泉與陰陵泉取以第四針針嗌裡嗌音益此言熱病在腎脾者有諸證有治法也熱病挾臍急痛其胸脅皆滿乃脾腎二經之邪也當取腎經之湧泉脾經之陰陵泉以瀉之其所用者乃第四針曰鋒針者耳又須針其嗌咽之裡可也熱病而汗且出及脈順可汗者取之魚際太淵大部太白瀉之則熱去補之則汗出汗出太甚取內踝上橫脈以上之此言熱病之汗可出則出之可止則止之也熱病而汗且出但未甚出也其脈亦順非不可治之脈也故法有可汗者當取手太陰肺經之魚際太淵脾經之大都太白瀉此四穴則熱自去補此四穴則汗自出若汗出太甚則又取內踝上橫脈曰三陰交者以瀉之則汗自止矣熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生此言熱病汗後脈躁者死反是則生也熱病已得汗脈宜靜今反躁盛者此乃陰經之脈衰弱已極故有陽脈而無陰脈也其人主於死若得汗之後而脈遂能靜則有陰以配陽必能以有生矣此節所重者脈之順也熱病者脈尚躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生此言熱病脈盛而不得汗者死反是則生也熱病脈躁盛宜得汗今反不得汗者此乃陽經之脈衰弱已極故表虛而不能發汗也其人主於死若脈躁盛而汗出脈靜者必能以有生矣此節所重者證之順也熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿甚者死三曰目不明熱不己者死四曰老人晏兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不己者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也痙音敬義見後齘音解齒怒也此言熱病不可刺者九以其必至於死也其一曰熱病汗不得出大顴骨之上發而為赤胃邪盛也穀氣與胃邪相爭發而為噦胃氣虛也此其所以死也其二曰熱病下則為泄而腹尤甚滿不以泄減脾氣衰也此其所以死也其三曰目以熱而不明熱又甚而不已肝氣衰也此其所以死也其四曰凡老人嬰兒熱病而腹滿者脾邪盛也此其所以死也其五曰熱病而汗既不出心氣衰也血或嘔或下則邪尤盛也此其所以死也其六曰舌本已爛熱猶不已心邪盛也此其所以死也其七曰熱病咳而且衄肺邪盛也其熱已極汗猶不出心氣衰也縱汗出而不至足此即上節陽脈之衰此其所以至於死也其八曰熱病而髓甚熱熱則髓枯腎氣衰也此其所以至於死也其九曰熱病發而為痙蓋熱極生風而為強病也此其所以至於死也凡此九者其腰必折其病發為瘛瘲其齒必噤且齘皆死徵已見刺之無益也所謂五十九刺者兩手外內側各三凡十二痏五指間各一凡八痏足亦如是頭入發一寸旁三分各三凡六痏更入發三寸邊五凡十痏耳前後口下者各一項中一凡六痏巔上一囟會一髮際一廉泉一風池二天柱二此明上文之五十九穴也魚際在大指內側商陽在次指內側中衝在中指內廉關衝在四指外廉少衝在小指內廉少澤在小指外側或外內廉或側各三則手有六經計六井穴左右手共十二痏也曰痏者蓋刺瘡曰痏故即痏為數也五指間各一則每指第三節盡處縫間計有四處左右共八痏也其足所刺八處亦如是也頭入發一寸旁三分此分字作去聲猶言三處也若平聲則三分旁無穴蓋督脈之上星在頭直入發一寸今足太陽膀胱經之五處穴在上星旁一寸半其曰承光五處後一寸半曰通天承光後一寸半則又在五處之上也兩旁各三計有六穴故刺之者凡六痏也更入發三寸邊五謂臨泣目窗正營承靈腦空此皆足少陽膽經之穴去督脈中行各三寸左右共十穴故刺之者凡十痏也耳前聽會穴左右共二耳後完骨穴左右共二俱系足少陽膽經口下承漿穴系任脈經項中風府穴系督脈經凡所以刺之者六痏也巔上一謂百會穴前頂後一寸半囟會一上星後一寸髮際一前髮際謂神庭入髮際五分後髮際謂風府系督脈經穴項後入髮際一寸廉泉一系任脈經穴頷下結喉上四寸仰而取之風池二系足少陽膽經穴耳後顳顬後腦空下髮際陷中天柱二系足太陽膀胱經穴挾項後髮際大筋外陷中由前計之共有五十九穴也按此與素問水熱穴論中五十九穴不同要知彼之五十九穴所以刺水病而此則刺熱病病有不同故穴因以異成無己注傷寒論乃兩入之蓋不考諸穴所在耳既曰治傷寒則當從靈樞而不宜以治水之穴入矣氣滿胸中喘息取足太陰大指之端去爪甲如韭葉寒則留之熱則疾之氣下乃止此以下七節另言雜證與上熱病無涉而此一節則言氣證者之有刺法也凡氣滿於胸中而其息喘促者呼吸為息則病在上者取之下當刺足太陰脾經之隱白穴在足大指之端去爪甲如韭葉如寒而有此證則久留其針以補之使至於溫如熱而有此證則疾去其針使至於寒候其氣下不喘乃止針也心疝暴痛取足太陰厥陰盡刺去真血絡此言心疝者之有刺法也有患心疝而暴時作痛者當取足太陰脾經足厥陰肝經凡有血絡者盡刺去其血可也喉痹舌卷口中乾煩心心痛臂內廉痛不可及頭取手小指次指爪甲下去端如韭葉此言喉痹者之有刺法也素問陰陽別論云一陰一陽結謂之喉痹則喉痹明系手厥陰心包絡手少陽三焦經也其病舌卷而短口中作干心煩且痛臂之內廉亦痛不能舉之以上及頭當取手小指之次指即第四指也系手少陽三焦經其穴在次指之端名關衝去爪甲如韭葉者是也三焦井穴針一分留三呼灸一壯目中赤痛從內眥始取之陰蹺此盲目中赤痛者之有刺法也目中赤痛從內眥始者乃足太陽膀胱經之睛明穴也膀胱與腎為表裡當取腎經之照海穴以補之所謂病在上者取之下而補陰則陽退也此穴乃陰蹺脈氣所發故曰取之陰蹺也按前癲狂篇以目外眥為鋭眥而眼之上屬於外眥以內近鼻者為內眥而眼之下屬於內眥此篇以目之赤痛從內眥始者刺腎經正以睛明屬膀胱者與腎為表裡也又本經論疾診尺篇有云脈從上下者太陽病則眼之上似乎屬之膀胱經推之與眼之下屬之內眥者相同矣殊不知太陽之脈氣盡行於頭故其病自上而下者如此非有彼此不同也至於下文所謂從下上者陽明病從外走內者少陽病義亦如此須知從內走外者亦太陽病也特未之明言耳風痙身反折先取足太陽及膕中及血絡出血中有寒取三里按海篇痙音敬釋云風強病也另痓音熾釋云惡也二病不同後世不考互書者非此言風痙者之有刺法也感風而體強者曰風痙其身反折而不能伸此乃足太陽膀胱經證也當先取足太陽膀胱之委呂穴其有血絡者出之如有寒而不止於風則取足陽明胃經之三里以刺之癃取之陰蹺及三毛上及血絡出血此言癃者之有刺法也膀胱不利為癃謂小便不通也膀胱與腎為表裡當取腎經之照海穴以刺之用陰蹺脈氣所發也及肝經之大敦穴在足大指外側之三毛上及二經之有血絡者皆取之出血李東垣曰腎主閉藏肝主疏泄則取之兩經也宜矣男子如蠱女子如怚身體腰脊如解不欲飲食先取湧泉見血視跗上盛者盡見血也怚秦呂切又子御切玉篇云驕也但義不甚通疑當作疽此言男女成脹郁證者當有刺之之法也男子有脹病如犯蠱毒相似女子有郁病如成疽疾相似其身體腰脊俱如解分不相連屬又不欲飲食此病在上者當取之下宜先取腎經湧泉穴以見血又視足面之為跗上者其血絡盛處盡取之以見血蓋指足陽明胃經也厥病第二十四篇內所論不止厥病然首節有厥頭痛厥心痛等病故名篇然此厥之義乃氣逆而以此連彼之謂實與素問之厥論不同厥頭痛面若腫起而煩心取之足陽明太陰厥頭痛頭脈痛心悲善泣視頭動脈反盛者刺盡去血後調足厥陰厥頭痛貞貞頭重而痛瀉頭上五行行五先取手少陰後取足少陰厥頭痛意善忘按之不得取頭面左右動脈後取足太陰厥頭痛項先痛腰脊為應先取天柱後取足太陽厥頭痛頭痛甚耳前後脈湧有熱一本云有動脈瀉出其血後取足少陽真頭痛頭痛甚腦盡痛手足寒至節死不治頭痛不可取於腧者有所擊墮惡血在於內若肉傷痛未已可則側同刺不可遠取也頭痛不可刺者大痹為惡日作者可令少愈不可已頭半寒痛先取手少陽陽明後取足少陽陽明行音杭令平聲凡各經之穴宜按針灸聚英以取之此言頭痛有厥痛有真痛其諸證皆有刺之之法也厥頭痛者邪氣逆於他經上干於頭而痛也其氣不循經隧而有逆行之意故亦名之曰厥真頭痛者邪氣專入頭腦而痛非由他經之所幹也有厥頭痛者面腫於外心煩於內當取足陽明胃經足太陰脾經以刺之有厥頭痛者心悲而善泣當視其頭之動脈反盛者刺之以盡去其血後調足厥陰肝經以刺之有厥頭痛者貞貞然而不移其頭甚重而痛當瀉頭上之五行每行有五共二十五穴其中行督脈經之上星囟會前頂百會後頂穴是也次兩旁即足太陽膀胱經之五處承光通天絡郤玉枕穴是也又次兩旁即足少陽膽經之臨泣目窗正營承靈腦空穴是也又先取手少陰心經後取足少陰腎經之穴以刺之有厥頭痛者其意善忘按其痛處又無定所當取頭面左右之動脈後取足太陰脾經之穴以刺之有厥頭痛者其項先痛而腰脊隨痛以應之當取足太陽膀胱經之天柱穴復取本經之他穴以刺之有厥頭痛者頭痛已甚其耳前後之脈湧起而熱當瀉其熱脈之血後取足少陽膽經之穴以瀉之有真頭痛者頭痛最甚其腦盡痛如手足盡冷皆至於節當為死不治也有頭痛不可取腧穴以刺之者以其有所擊墮惡血在於內亦能令人頭痛所以不可取干腧穴也若擊墮之處肉有所傷而頭痛未已可取針以側刺其頭痛之處不必遠取諸穴以刺之也有頭痛不可刺者以其素成大痹而為惡患亦能令人頭痛若此痛日發者目可令其略愈不能使之終已也有頭之半冷痛者先取手少陽三焦經手陽明大腸經後取足少陽膽經足陽明胃經以刺之厥心痛與背相控善瘛如從後觸其心傴僂者腎心痛也先取京骨崑崙髮針不已取然谷厥心痛腹脹胸滿心尤痛甚胃心痛也取之大都太白厥心痛痛如以錐針刺其心心痛甚者脾心痛也取之然谷太溪厥心痛色蒼蒼如死狀終日不得太息肝心痛也取之行間太衝厥心痛臥若徒居心痛間動作痛益甚色不變肺心痛也取之魚際太淵莫心痛手足青至節心痛甚旦發夕死夕發旦死心痛不可刺者中有盛聚不可取於腧腸中有蟲瘕及蛟蛔皆不可取以小針心腸痛憹作痛腫聚往來上下行痛有休止腹熱喜渴涎出者是蛟蛔也以手聚按而堅持之無令得移以大針刺之久持之蟲不動乃出針也恲腹憹痛形中上者瘕音賈蛔音賄令平聲恲音烹末中上之中去聲此節當與後雜病篇心痛諸證參看此言心痛者有厥痛有真痛其諸證皆有刺之之法也厥心痛者邪氣入於五臟五臟氣來干心而痛如下文腎心痛之類是也真心痛者邪氣自入於心而痛非由他經之所幹也有厥心痛者心與背相控引而痛且善瘛如驚風之狀如從後背向前來觸其心而形似傴僂者正以腎經有邪而心因以痛謂之腎心痛也腎與膀胱為表裡當先取膀胱經之京骨崑崙二穴如髮針而痛未已又取腎經之然谷穴以刺之有厥心痛者腹脹胸滿心尤痛甚乃胃經有邪而心因以湧謂之胃心痛也胃與脾為表裡當取脾經之大都太白以刺之有厥心痛者其痛如以錐針刺其心心遂痛甚乃脾經有邪而心因以痛謂之脾心痛也當取腎經之然谷太溪二穴以刺之有厥心痛者其色蒼蒼然如死狀終日欲一太息而不可得乃肝經有邪而心因以痛謂之肝心痛也當取肝經之行間太衝二穴以刺之有厥心痛者臥若獨居其心覺痛間或動作其痛益甚是動靜皆痛也面色不變乃肺經有邪而心因以痛謂之肺心痛也當取肺經之魚際太淵穴以刺之有真心痛者手足之色青至指節心痛更甚此乃邪入於心其死在旦夕間也有心痛不可取於腧穴者以其中有盛聚而心因以痛與外之腧穴無涉故不可取干腧穴也有腸中有蟲瘕及蚊蛔而痛者皆當取以大針而不可取以小針也然何以驗之其心與腸痛懊憹不能自寧或時腫聚或時往來上下而行但痛有休止耳又腹中熱口中渴且出涎是乃蚊蛔為祟也刺之之法當以手撮聚按捺而堅持之無令得以移動遂以第九大針刺之且其手宜久持之蟲不能動遂乃出針然欲知有蟲不但如前病證而已恲至於腹而懊憹作痛其蟲形中上而升者即可以蟲治也大針見九針論耳聾無聞取耳中耳鳴取耳前動脈耳痛不可刺者耳中有膿若有干耵聹耳無聞也耳聾取手小指次指爪甲上與肉交者先取手後取足耳鳴取手中捐爪甲上左取右右取左先取手後取足耵都領切聹乃頂切耳中垢此言耳病諸證皆有刺之之法也有耳聾無聞者當取耳中聽宮穴以刺之系手太陽小腸經聽宮名多所聞耳中珠子大如赤小豆針三分灸三壯有耳鳴者取耳中動脈即耳門穴系手少陽三焦經耳前起肉針三分留三呼灸三壯有耳痛不可刺者以耳中有膿故也若膿積而為干耵聹則耳必無聞須出此干耵聹而痛可止矣有耳至聾者當取手小指之次指爪甲上與肉交者即手少陽三焦經關衝穴也先取此後又取足少陽膽經之竅陰以刺之關衝針一分留三呼灸一壯竅陰在足四指端針一分留一呼灸三壯有耳止鳴者當取手之中指爪甲上即手厥陰心包絡經中衝穴左鳴取右右鳴取左先取手經後取足厥陰肝經大敦穴以刺之足髀不可舉側而取之在樞閣中以員利針大針不可刺此言足髀不能舉者有當取之穴當用之針也足在下髀在股外皆不能舉者當側臥而取之在髀樞中即足少陽膽經之環跳穴也側臥伸下足屈上足以右手摸穴以左手搖撼取之針一分留二呼灸三壯用第六員利針以刺之其第九大針不可刺也員利針大針見本經九針論病注下血取曲泉此言下血者有當刺之穴也凡病注下血者以肝不能納血也當取肝經之曲泉以刺之風痹淫濼病不可已者足如履冰時如入湯中股脛淫濼煩心頭痛時嘔時悶眩已汗出久則目眩悲以喜恐短氣不樂不出三年死也以已同樂入聲此言風痹之有諸證者不出三年死也有病名風痹者其邪氣淫泆消濼病難得愈足如履冰之寒又如入湯之熱寒熱無常下而股脛則淫濼不寧中而心則煩而不靜上而頭則痛不能安時嘔時悗眩暈既已則汗出久則又眩悲哀既已則或喜或恐或短氣或不樂此其陰陽不和臟俯不營營衛不交血氣偏勝其死當在三年之內耳小不利則不分標本而必先治之本經以本篇論標本後論病傳分為二篇素問合標本病傳論共為一篇先病而後逆者治其本先逆而後病者治其本先寒而後生病者治其本先癘而後生寒者治其本先熱而後生病者治其本先泄而後主他病者治其本必且調之乃治其他病先病而後中滿者治其標先病而後泄者治其本先中滿而後煩心者治其本有客氣有同氣大小便不利治其標大小便利治其木病發而有餘本而標之先治其本後治其標病發而不足標而本之先治其標後治其本謹詳察間甚以意調之間者並行甚為獨行先小大使不利而後生他病者治其本也間去聲此言凡病皆當先治其本唯中滿及大小便不利者則不分為本為標而先治之也夫先病曰本後病曰標故凡先生初病而後病勢逆者必先治其初病之為本若先病勢逆而後生他病者則必以病勢逆之為本而先治之也凡先生寒病而後生他病者必先治寒病之為本若先生他病而後生寒病者則又以他病之為本而先治之也凡先生熱病而後生他病者必先治熱病之為本若先生泄病而後生他病者則亦以泄病之為本而先治之也蓋病有不同必且先調其本乃治其他病耳唯有先生他病而後中滿者則不治其本而必先治中滿之為標至於先生他病而後生泄病者則亦治其他病之為本而不治其泄病之為標也然不唯中滿為標者之當治雖先生中滿而後生煩心之病則中滿為本亦必先治中滿矣夫不分為本為標而必先治中滿者何也正以人之病氣有二病本不相同而乃彼此相傳者謂之客氣也有二病之氣本相同類而乃彼此相傳者謂之同氣也即如先中滿而後小大便不利者乃病之同氣也正以有中滿之病者必至於大小便之不利耳此則必先治大小便不利者之為標而不治中滿之為本也若大小便利者則先治中滿之為本而不必治大小便之利者矣且百病之標本當分而虛實之大勢宜審即如病發而有餘則邪氣勝也當先治其本以瀉其邪而後治其標則諸病可漸平矣所謂本而標之也此凡病先治其本之謂也病發而不足則正氣虛也當先治其標以去他病而後治其本則本體自可補矣所謂標而本之也此中滿大小不利先治其標之謂也且百病之生也有五臟相剋而病勢日甚者謂之甚如肝克脾脾克腎之類是也有五臟間傳而病勢未甚者謂之間如肝傳心心傳脾之類是也謹當察其間甚以意調之間者病證並行而勢輕甚者病證獨行而勢重所謂中滿與小大便不利者即並行之病也故先大小便不利而後生他病者亦治大小便不利之為本而後治他病之為標也蓋以中滿對別病而言固必先治中滿若以中滿對小大便不利而言則又先治大小便之不利也此與素問標本病傳論相同乃治病者之樞要歟雜病第二十六內論雜病不一故名篇厥挾脊而痛至頂頭沉沉然目䀮䀮然腰脊強取足太陽膕中血絡厥胸滿面腫唇漯漯然暴言難甚則不能言取足陽明厥氣走喉而不能言手足清大便不利取足少陰厥而腹向向然多寒氣腹中榖榖便溲難取足太陰䀮音荒目不明又狼䀮南夷國名人能夜市金榖音谷此言厥病諸證而各有刺之之法也厥之為義見素問厥論篇今厥逆為病挾脊而痛至於其頂頭則昏沉而不能舉目則䀮䀮然而不明腰脊皆強而不能屈伸此乃足太陽膀胱有邪也當取其膕中之穴曰委中者以去其血絡也厥逆為病胸滿面腫其唇則漯漯然而有涎出唾下之意猝暴難言甚則全不能言此乃足陽明胃經有邪也當取胃經之穴以刺之厥逆為病言氣上走於喉而不能言手足皆冷大便不利當取足少陰腎經之穴以刺之厥逆為病腹中向向然而氣善走布且多有寒氣又榖榖然而有聲大便甚難當取足太陰脾經之穴以刺之嗌乾口中熱如膠取足少陰此言嗌乾口熱者當有刺之之法也嗌咽乾燥口中甚熱其津液如膠之稠當取足少陰腎經之穴以補之水王則火衰也膝中痛取犢鼻以員利針發而間之針大如犛刺膝無疑此言膝痛者有當刺之穴當用之針也膝中痛當取足陽明胃經之犢鼻穴以刺之膝臏下䯒骨上俠解溪大筋陷中形如牛鼻故名針三分灸三壯其所用之針則第六曰員利針者必發其針而又間刺之非只一次而已也此針取法於犛針微大其末反小其身令可深納長一寸六分刺膝用之無疑也喉痹不能言取足陽明能言取手陽明此言喉痹者當審其能言不能言而分經以刺之也按此與下共三節皆取之手足陽明二經瘧不渴間日而作取足陽明渴而日作取手陽明此言瘧證者當審其渴不渴間作日作而分經以刺之也齒痛不惡清飲取足陽明惡清飲取手陽明惡去聲此言齒痛者當審其惡冷飲不惡冷飲而分經以刺之也胃經惡熱不惡寒大腸惡寒不惡熱故刺之者如此聾而不痛者取足少陽聾而痛者取手陽明此言耳聾者當審其痛與不痛而分經以刺之也衄而不止衃血流取足太陽衃血取手太陽不已刺宛骨下不已刺膕中出血宛腕同此言衄血者當審其血之多寡病之難易而分經以刺之也鼻中出血曰衄血至敗惡凝聚其色赤黑者曰衃衃血成流則血去多而不止於衃血也當取足太陽膀胱經以刺之其膕中出血仍是膀胱經之委中穴也若止曰衃血則不成流而去之似少也當取手太陽小腸經穴以刺之其腕骨下即手少陰心經之通里穴正以心與小腸為表裡也腰痛痛上寒取足太陽陽明痛上熱取足厥陰不可以俯仰取足少陽此言腰痛者當審其痛處之冷熱及不可以俯仰而分經以刺之也中熱而喘取足少陰膕中血絡此言熱喘者而有刺之之法也足少陰腎經也膕中血絡足太陽膀胱經委中穴也喜怒而不欲食言益小取足太陰怒而多言刺足少陽此言善怒者當審其欲食不食難言多言而分經以刺之也顑痛刺手陽明與顑之盛脈出血顑苦感切舊釋以為飢黃起行今曰顑痛必有其處想顑與頷同此言顑痛者而有刺之之法也手陽明當是商陽穴顑之盛脈是胃經頰車穴項痛不可俯仰刺足太陽不可以顧刺手太陽也此言項痛者當審其不可俯仰不可顧而分經以刺之也按俯仰屬背與腰故曰足太陽而顧則屬肩與項故曰手太陽也小腹滿大上走胃至心淅淅身時寒熱小便不利取足厥陰腹滿大便不利腹大亦上走胸嗌喘息喝喝然取足少陰腹滿食不化腹響晌然不能大便取足太陰此言小大腹滿者當審其諸證而分經以刺之也小腹滿者小腹也腹滿者大腹也小腹滿者小便不利大腹滿者大便不利小腹滿者其滿大上走胃至心不及胸咽也身若淅淅然時發寒熱當取足厥陰肝經以刺之大腹滿者其滿大亦上走胸咽不止胃與心也故喘息喝喝然此則當取足少陰腎經以刺之又有大腹滿者其所食不化腹中響響然而布氣此則當取足太陰脾經以刺之然凡大腹滿者其大便不利則一也心痛引腰脊欲嘔取足少陰心痛腹脹嗇嗇然大便不利取足太陰心痛引背不得息刺足少陰不己取手少陽心痛引小腹滿上下無定處便溲難刺足厥陰心痛但矩氣不足以息刺手太陰心痛當九節刺之按已刺按之立已不已上下求之得之立已此節當與前厥病論心痛諸證參看此言心痛者取審其諸證而分經以刺之也有心痛者其痛後則引之於腰脊前則欲嘔當取足少陰腎經以刺之有心痛者其腹中脹滿嗇嗇然大便為之不利嗇吝嗇便難猶是也當取足太陰脾經以刺之有心痛者其痛後引至背前則不得喘息當取足少陰腎經以刺之如不已又取手少陽三焦經以刺之有心痛者其痛引至小腹而滿或上或下痛無定處大小便皆難當取足厥陰肝經以刺之有心痛者短氣不足以息當取手太陰肺經以刺之有心痛者其痛當背第九節以刺之乃督脈經筋縮穴之處也宜先按之按已而刺刺後按之其痛當立已如不已則上而八椎無穴下而十椎無穴又復求之其痛必立已矣頷痛刺足陽明曲周動脈見血立已不已按人迎於經立已此言頷痛者而有刺之之法也頷痛者當取足陽明胃經頰車穴以刺之此穴在耳下曲頰端動脈環繞一周故曰曲周也如見血其病立已如不已當按人迎穴於本經以刺之其病必已也穴在頸脈陷中非左右手寸口人迎脈也故曰按人迎於經氣逆上刺膺中陷者與下胸動脈此言氣逆者而有刺之之法也凡氣逆者上刺膺中陷者中即足陽明胃經膺窗穴也及下胸前之動脈當是任脈經之膻中穴也蓋在中謂之胸胸之旁為膺耳膺窗在巨骨下五寸八分陷中左右去中行各四寸針四分灸五壯膻中兩乳間陷中氣病治此禁針灸七壯又曰針三分腹痛刺臍左右動脈已刺按之立已不已刺氣街已刺按之立已此言腹痛者當刺足陽明胃經之天樞穴如不已又刺本經之氣衝也天樞臍中兩旁左右各開二寸千金云魂魄之舍不可針一云針三分留七呼灸五壯氣街即氣衝夾臍相去四寸鼠鼷上一寸動脈應手宛宛中衝脈所起灸七壯禁針一云針三分留七呼痿厥為四末束悗乃疾解之日二不仁者十日而知無休病已止歲以草刺鼻嚏而已無息而疾迎引之立已大驚之亦可已歲疑作藏此言痿厥病在四末才當有刺之之法也四末四肢也凡痿病厥病素問有痿論厥論而手足四肢攣束悗亂當刺四肢之穴以速解之每日解之者必二次甚有不仁而無知者切其肉不痛者是也解之至於十日則二十次矣其肉亦當有知此法行之無休候病既已而止針每藏以草刺鼻必嚏如嚏既已當自屏其氣無得呼吸以成息而急以原草迎其氣以引出之其病可立已設以大驚之事驚之其病亦可已也周痹第二十七痹病之痛隨脈以上下則周身而為痹故名篇此篇當與素問痹論參看黃帝問於岐伯曰周痹之在身也上下移徙隨脈其上下左右相應間不容空願問此痛在血脈之中邪將在分肉之間乎何以致是其痛之移也間不及下針其慉痛之時不及定治而痛已止矣何道使然願聞其故岐伯答曰此衆痹也非周痹也黃帝曰願聞衆痹岐伯對曰此各在其處更發更止更居更起以右應左以左應右非能周也亙發更休也黃帝曰善刺之奈何岐伯對曰刺此者痛雖己止必刺其處勿令復起此因帝問周痹而伯指之為衆痹也周痹者周身上下為痹也衆痹者痹在各所為痛也帝問周痹上下移徙隨脈其上下左右相應但不知痛在血脈之中抑在分肉之間及其痛之移而去也不及下針針其畜聚痛處之時不及定治而痛已止其痛也何由而其去也何路伯言此衆痹也非周痹也蓋衆痹者病在一處則痛亦在一處隨發隨止隨止隨起特以左右之脈相同故左可應右右可應左耳非能周身而痛也刺之者痛雖已止亦當刺其原痛之處勿令復起可也帝曰善願聞周痹何如岐伯曰周痹者在於血脈之中隨脈以上隨脈以下不能左右各當其所黃帝曰刺之奈何岐伯對曰痛從上下者先刺其下以過之一作遏下同後刺其上以脫之痛從下上者先刺其上以過之後刺其下以脫之此言刺周痹之有法也周痹者在於血脈之中隨脈以上或隨脈以下非比衆痹之在於左右各當一處者之有定所也故刺之者其脈從上而下當先刺其下之痛處以遏絶之後乃刺其上之痛處以脫痛根而不使之復下其痛從下而上當先刺其上之痛處以遏絶之後乃刺其下之痛處以脫病根而不使之復上此則求之上下而不求之左右乃治周痹之法也黃帝曰善此痛安生何因而有名岐伯對曰風寒濕氣客於處分肉之間追切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痹發發則如是此言邪氣聚於分肉之間故周痹發於血脈之中也帝問周痹之病從何而生又何因而有周痹之名伯言風寒濕三氣雜至合而為痹者是也蓋以三氣始客於外分肉之間迫於分肉而為沫沫得寒則聚聚則排分肉而各分裂之惟分裂則痛痛則心專在痛處而神亦歸之神歸即氣歸也所以痛處作熱熱則痛散而暫解雖時暫解其氣尚逆而為厥厥則三氣隨血脈以上下者或痛從上而下或痛從下而上則彼之為痹發於血脈之中指周痹之人言非衆痹之發於一處者可同也故不發則已發則大略如是而已此非痛之所由生而周痹之所以有名乎然周痹所以有名之義下文乃詳言之帝曰善余已得其意矣缺岐伯曰此內不在臟而外未發於皮獨居分肉之間真氣不能周故命曰周痹故刺痹者必先切循其下之六經視其虛實及大絡之血結而不通及虛而脈陷空者而調之尉而通之其瘛堅轉引而行之黃帝曰善余已得其意矣亦得其事也九著經巽之理十二經脈陰陽之病也此承上文而又詳周痹所以有名之義遂及刺之之法也伯言此周痹者內不在於五臟而外不發於皮膚獨居於分肉之間所謂迫切為沫沫聚為痛神歸為熱痛解為厥厥逆而痹發也蓋由真氣不能周於身而邪氣隨脈以上下故命曰周痹刺此者必先切循其足之三陰三陽視其虛實及大絡之血結而不通及虛而脈陷空中者或補或瀉而調之又且尉而通之其有瘛且堅者乃轉引而行之此乃治周痹之法也帝則通其意而又通其事知九針為用最大故嘆九者乃至恆至順之理凡十二經之病不可不用者也
