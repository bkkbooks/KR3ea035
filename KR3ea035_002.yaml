body:
  text: 卷之二經脈第十按此篇言十二經之脈故以經脈名篇實學者習醫之第一要義不可不究心熟玩也後世能言不識十二經絡開口動手便錯而於此懵然惜哉滑伯仁十四經發揮針灸聚英等書各本於此但不若此篇尤詳凡內經全書之經絡皆自此而推之耳雷公問於黃帝曰禁脈之言凡刺之理經脈為始營其所行制其度量內次五臟外別六腑願盡聞其道黃帝曰人始生先成精精成而腦髓生骨為幹脈為營筋為剛肉為牆皮膚堅而毛髮長谷入於胃脈道乃通血氣乃行雷公問曰願卒聞經脈之始生黃帝曰經脈者所以能決死主處百病調虛實不可不通按禁脈當作禁服本經第四十八禁服篇云凡刺之理經脈為始營其所行知其度量內刺五臟外刺六腑則此篇數語乃出於禁服篇也此帝因雷公之間必原脈道之所以行而示以經脈之所當知也人之始生先成於精本經決氣篇云兩神相搏合而成形常先身生是謂精精成而腦髓生腎通於腦其骨為幹猶木之干其脈為營猶將之營史記云以師兵為營衛其筋為剛其肉為牆至皮膚堅而後毛髮長及其已生必谷入於胃則脈道以通而血氣乃行此經脈者可以決死生處百病而調虛實乃人之不可不知也按素問三部九候論云必先知經脈然後知病脈此經脈之所當知也肺手太陰之脈起於中焦下絡大腸還循胃口上隔屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩臂痛風寒汗出中風小便數而欠氣虛則肩臂痛寒少氣不足以息溺色變為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者則寸口反小於人迎也瞀音務臑音猱數音朔按自肺至肝督任滑伯仁有十四經發揮義猶未悉其各經圖形起止歌訣宜詳閱之此言肺經脈氣之行乃為第一經之經脈也言肺者即手太陰經之脈也凡言手者以其井滎輸經合等穴自手而始也凡言足者以其井滎輸經合等穴自足而始也後凡各經分手足者以此起發也中焦者中脘也在臍上四寸胃口胃之上脘在臍上五寸絡猶兜也如今人橫線為絡而兜物也循巡也膈隔也凡人心下有膈膜前齊鳩尾後齊十一椎周圍著脊所以遮隔濁氣不使上熏心肺也肺系者喉嚨也喉以候氣下接於肺肩下脅上際曰腋膊下對腋處為臑肩肘之間也臑盡處為肘肘以下為臂廉隅也手掌後高骨旁動脈為關關前動脈為寸口曰魚魚際者謂掌骨之前大指本節之後其肥肉隆起處統謂之魚魚際則其問之穴名也端秒也按本經營衛生會五味邪客刺節真邪等篇言人身有前三焦者宗氣出於上焦即所謂積於胸中又謂之積於膻中也出喉嚨以司呼吸其營氣者陰精之氣也由中焦之氣陽中有陰者隨上焦之氣以降於下焦而生此陰氣故謂之清者為營又謂之營氣出於中焦者是也然營氣陰性精專隨宗氣以運行於經隧之中故謂之營行脈中者是也其衛氣者陽精之氣也由下焦之氣陰中有陽者隨中焦之氣以升於上焦而生此陽氣故謂之濁者為衛又謂之衛氣出於下焦者是也然衛氣陽性剽悍不隨宗氣而行而自行於各經皮膚分肉之間故謂之衛行脈外者是也茲手太陰之脈起於中焦以至下文云云者本言宗氣與營氣同行而衛氣不與焉者也即營衛生會篇所謂與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣然此特言肺經運行之始耳起於中焦者即營衛生會篇所謂中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈者是也言由穀氣入胃其精微之氣起於中焦下絡大腸以肺與大腸相為表裡也轉巡胃之上口屬之於肺即從肺系橫出腋下蓋由胸部第四行之中府雲門以出腋下下循腨內歷天府俠白行於手少陰心經手厥陰心主包絡兩經之前下入肘中抵尺澤穴即營衛生會篇所謂上焦出於胃上口並咽以上貫隔而布胸中走腋循太陰之分而行者也既下肘中乃循臂內上骨之下廉歷孔最列缺入寸口之經渠太淵以上魚又循魚際出大指之端至少商穴而止也其支者如木之有枝以其自直行之脈而旁行之也臂骨盡處為腕脈之大隧為經交經者為絡蓋本經經脈雖終於大指之端而絡脈之行從腕後之列缺穴交於手之陽明經而由合谷三間二間以至於商陽穴又隨商陽而上行電及其動穴驗病肺發脹滿致膨膨然俗云膨脝而喘急咳嗽缺盆中痛本經脹論云肺脹者虛滿而喘咳甚則交兩手而掣瞀者此之謂臂氣厥逆也肺脈由中府出腋循臑下肘入手是皆肺經所生之病耳然又有諸病或出本經或由合經為咳為上氣為喘為渴為煩心為胸滿肺脈貫膈而布胸中為臑臂內前廉痛為厥掌中熱脈行手少陰心主之前邪氣有餘則為肩臂痛於風寒絡脈交於手上肩背為汗出中風為小便頻數而發之為欠母病及腎正氣不足則為肩臂疼痛寒冷絡行手陽明為少氣不足以息本經病為溺色變邪及子其諸病有如此者然盛則當瀉之虛則當補之熱則瀉者疾去其針寒則補者久留其針脈下陷者則用艾以灸之若不盛不虛則止以本經取之而不必求之手陽明也所謂盛者何以知之寸口較人迎之脈三倍而躁則肺經為實如終始篇所謂瀉手太陰肺而補手陽明大腸者是也虛者何以知之寸口較人迎之脈三倍而小則肺經為虛如終始篇所謂補手太陰肺而瀉手陽明大腸者是也按難經二十二難以是動為氣所生為血即動生二字分為氣血且以氣先血後為難不知肺經則言肺所生病大腸則言津液所生病胃則言血所生病脾則言脾所生病心則言心所生病小腸則言液所生病膀胱則言筋所生病腎則言腎所生病心主則言脈所生病三焦則言氣所生病膽則言骨所生病肝則言肝所生病何嘗以所生之病皆定為血也今詳本篇前後辭義分明不以所動屬氣所生屬血乃難經之臆說耳又按至真要大論云所謂動者知其病也蓋言凡知太衝衝陽尺澤等穴氣絕為死不治正以其動則可以驗病不動則氣絕耳此篇是動之義正言各經之穴動則知其病耳按自此肺經以至肝經及兩蹻督任共計一十六丈二尺之脈宗氣主呼吸而行脈路一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸漏水下一刻計一百三十五息脈行八丈一尺二刻計二百七十息脈行一十六丈二尺為一周身漏水下百刻計一萬三千五百息脈行八百一十丈周夜共行五十度周於身並非言手太陰行於寅時手陽明行於卯時足陽明行於辰時足太陰行於已時手少陰行於午時手太陽行於未時足太陽行於申時足少陰行於酉時手厥陰行於戌時手少陽行於亥時足少陽行於子時足厥陰行於丑時至後世子午流注針灸等書始有為此說者張世賢熊宗立遂乃分時註釋如果十二經分配十二時則一時止行得一經何以能八刻之一千八十息脈行六十四丈八尺而四度周於身也又何以能十二時之一萬三千五百息脈行八百一十丈而五十度周於身也況每經體有長短穴有多寡假如手少陰心止有九穴左右討一十八穴不過自手小指至肘上臑內而已今曰行於午時其一時當得一千一百二十五息脈行六十七丈五尺較之足太陽膀胱經有六十三穴左右共計一百二十六穴直至目之內眥上行於頭轉至項後行背四行下行委中以至足之小指外側其穴道身體盡一身之長今曰行於申時則一時之中亦止得息數一千一百二十五息脈數止得六十七丈五尺乎其餘各經長短不同又皆息數脈數俱以一時之中而盡合乎所謂一時止行一經者實理勢之所必無也彼或以二十三難始從中焦始字遂指寅為肺便以卯為大腸而直輪至醜為肝經耶殊不知紀漏者必始寅初一刻而經脈運行之始始於肺經謂之始於寅時一刻則可若泥定肺經止行於寅時則非也故自二刻一周身之後又從中焦而起一日一夜有五十次起於中焦合晝夜而皆然不但寅時而已何可以始於一刻而遂指肺之必行於寅時也至有以余時配各經者又謬之謬矣李東垣此事難知集針灸聚英及歷朝太醫院刊勒諸經穴名於石碑者亦以各經分配各時蓋相仍於後世醫籍而未究經典耳而考靈素豈軒岐之本旨哉難經曰肺重三斤三兩六頁兩耳凡八葉主藏魄四垂如蓋附著於脊之第三椎中有二十四空行列分布諸臟之氣為諸臟之華蓋人有二喉前喉為喉嚨通於五臟主氣出入靈樞憂恚無言篇云喉嚨者氣之所以上下者也後喉為咽喉主納水穀通於六腑憂恚無言篇云咽喉者水穀之道也難經曰喉嚨重十二兩廣二寸長一尺二寸九節咽門重十二兩廣二寸半至胃長一尺六寸腸胃篇伯高曰咽門重十兩廣長同素問靈蘭秘典論云肺者相傅之官治節出焉靈樞本神篇云肺小則少飲不病喘喝肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則居奔迫肺善脅下痛肺堅則不病咳上氣肺脆則苦消癉易傷肺端正則和利難傷肺偏傾則胸偏痛也又云白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也附肺經諸穴歌愚謂欲明經脈須熟穴名但徐氏歌俱自井滎而始殊非本篇各經起止正義滑氏歌合起止似無意味讀者難之今各陰經照滑氏陽經照徐氏則合於起止且長短句法亦照徐氏學者頗便惟先熟穴名而經脈自了然矣俗醫云吾大方脈非針灸科何須識經穴名此所以為庸下而不能入軒岐正脈也手太陰十一穴中府雲門天府列俠白下尺澤孔最見列缺經渠太淵下魚際抵指少商如韭葉又分寸歌太陰肺兮出中府雲門之下一寸許雲門璇璣旁六寸巨骨之下二骨數天府腋下三寸求俠白肘上五寸主尺澤肘中約紋論孔最腕上七寸取列缺腕側一寸半經渠寸口陷中是太淵掌後橫紋頭魚際節後散脈舉大指本節後少商大指端內側此穴若針疾減愈雲門巨骨下俠氣戶旁二寸陷中去中行任脈六寸氣戶巨骨下俞府兩旁各二寸陷中去中行任脈四寸去膺窗四寸八分俞府巨骨下璇璣旁二寸陷中璇璣天突下一寸天突結喉下四寸宛中上挨穴之法則天突起至璇璣由璇璣至雲門其法甚簡後仿此大腸手陽明之脈起於大捐次指之端循指上廉出臺谷兩骨之間上入兩筋之間循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也髃牛口反頰音莢鼽音求衄音肉此言大腸經脈氣之行乃為第二經也大指次指者手大指之次指即第二指名食指也肺經本出於大指而大腸經則出於次指茲言大指次指者乃大指之次指非言既出於大指而又出於次指也循指之指正次指電合谷者本經穴也俗名虎口肩端兩骨間為愬骨肩呷上際處為天柱骨缺盆足陽明胃經穴也頭莖為頸耳以下曲處為頰言大腸者乃手陽明經之脈受手太陰之交遂起於次指之端循此次指之商陽二間三間之上廉出合谷穴在兩骨之間又上陽谿穴即兩筋之間又循臂之上廉偏歷溫溜下廉上廉三里入肘外廉之曲池穴上循臑外之前廉歷肘髎五里臂臑以上肩之肩髃穴又出髃骨之前廉循巨骨穴上出天柱骨之會上會於大椎自大椎而下入缺盆循足陽明經脈外絡繞肺臟復下膈當天樞之外會屬於大腸其別支者雖由偏歷而入又自缺盆上行於頸循天鼎扶突上貫於頰入下齒縫中復出夾口兩吻相交於人中之內左脈往右右脈往左上挾鼻孔循禾憇迎香而終以交十足陽明胃經也及其動穴驗病則為齒痛脈入齒縫為頸腫脈上貫是主津液所生之病耳又有諸病之生或出本經或由合經為目黃大腸內熱為口乾脈挾口為鼽為衄脈挾鼻孔為喉痹脈山挾口為肩之前臑痛脈上臑肩為大指之次指不能舉用井滎五腧皆由次指而上其邪氣有餘而實則凡脈所經過者皆熱而腫其正氣不足而虛則為寒慄不能遽復然盛則當瀉之虛則當補之熱則瀉者疾去其針寒則補者久留其針脈陷下者則用艾以灸之若不盛不虛則止以本經取之而不必求之手太陰肺經也所謂盛者何以知之人迎較寸口之脈三倍而躁則大腸經為實如終始篇所謂瀉手陽明大腸而補手太陰肺者是也虛者何以知之人迎較寸口之脈三倍而小則大腸經為虛如終始篇所謂瀉手太陰肺而補手陽明大腸者是也平人絕谷篇伯高曰迴腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半難經云大腸重二斤十二兩腸胃篇同按直腸曰直則大腸周迴疊積當名曰回素問靈蘭秘典論云大腸者傳道之官變化出焉靈樞本神篇云肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結附大腸經諸穴歌手陽明廿穴名循商陽二間三間而行歷合谷陽谿之俞過偏歷溫溜之濱下廉上廉三里而近曲池肘憇五里之程臂臑肩憇牛口反上於巨骨天鼎紆意俱反縈紆曲也乎扶突禾憇唇連迎香鼻迫又分寸歌商陽鹽指內側邊二間來尋本節前三間節後陷中取合谷虎口岐骨間陽谿上側腕中是偏歷腕後三寸安溫溜腕後去五寸池前五寸下廉看池前三寸上廉中池前二寸三里逢曲池曲骨紋頭盡肘憇大骨外廉近大筋中央尋五里肘上三寸行向里臂臑肘上七寸量肩憇肩端舉臂取巨骨肩尖端上行天鼎喉旁四寸真扶突天突旁三寸禾憇水溝旁五分迎香禾憇上一寸大腸經穴自分明左右共四十穴胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿郤循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒善呻數欠顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則欲上高而歌棄衣而走賁響腹脹是為骭厥是主血所生病者狂瘧溫淫汗出鼽衄口喎唇胗頸腫喉痹大腹水腫膝臏腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛中指不用氣盛則身已前皆熱其有餘於胃則消穀善飢溺色黃氣不足則身已前皆寒慄胃中寒則脹滿為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大三倍於寸口虛者人迎反小於寸口也頞音遏顱音盧髀音比去聲臏音賓跗音撫數音朔賁音奔骭音䯒喎音狐胗音診此言胃經脈氣之行乃為第三經也頞鼻莖也山根為頞郤卻同腮下為頷頷中為頤腮前為髮際髮際前為額顱股內為髀髀前膝上起肉處為伏兔伏兔後為髀關挾膝筋中為臏脛骨為骭足面為跗足陽明受手陽明之交起於鼻之兩旁迎香穴上行而左右相交於頞中過睛明之分下循鼻外歷承漿四白巨憇上入齒中還出挾口兩吻地倉環繞唇下左右相交於承漿卻循頤後下廉出大迎循頰車上耳前歷下關過客主人循髮際行懸釐頷厭之分經頭維會於額顱之神庭其支別者從大迎前下人迎循喉嚨歷水突氣舍入缺盆行足少陰俞府之外下膈當上脘中脘之分屬胃絡脾其直行者從缺盆而下下乳內廉循氣戶庫房屋翳膺窗乳中乳根不容承滿梁門關門太乙滑肉門下挾臍歷天樞外陵大巨水道歸來諸穴而入氣衝中即氣街其支者自屬胃處起胃下口循腹裡過足少陰肓俞之外本經之裡下至氣衝中與前之入氣衝者合既相合於氣衝中乃下髀關抵伏兔歷陰市梁丘下入膝臏中經犢鼻下循足面曰跗之衝陽陷谷入中指外間之內庭至厲兌穴而終也其絡脈之支別者自膝下三寸循三里穴之外別下歷上廉條口下廉豐隆解谿衝陽陷谷以至內庭厲兌而合也又其支者別跗上衝陽穴別行人大指間出足厥陰行間穴之外循大指下出其端以交於足太陰也及其動穴驗病陽明虛則洒洒振寒善呻且數數而欠瘧論云陽明虛則寒慄鼓頷其顏則黑如病至時則惡人與火聞木音則惕然而驚心欲動素問陽明脈解篇云陽明主肉其脈血氣盛邪客之則熱熱甚則惡火又云陽明厥則喘而悗悗則惡人又曰胃者土也故聞木音而驚者土惡木也又脈解篇云所謂甚則惡人與火聞木音則惕然而驚者陽氣與陰氣相搏水火相惡故惕然而驚也獨閉戶而處脈解篇云所謂欲獨閉戶脯而處者陰陽相薄也陽盡而陰盛故欲獨閉戶牖而處也甚則欲上高而歌棄衣而走陽明脈解篇岐伯曰四肢者諸陽之本也陽盛則四肢實實則能登高也熱盛於身故棄衣而走也為賁響腹脹以陽明火盛而與水相激故有聲及脹也其氣厥逆則從骭而厥脈自足次指從䯒外廉上行是乃陽明血分所生之病耳然又有諸病或從本經或由合經為狂為瘧其氣溫熱而淫洗為汗出為鼽為衄脈循鼻外為口喎為唇胗挾口環唇為頸腫循頤出大迎為喉痹循喉嚨入缺盆為大腹水腫循腹裡為膝臏腫痛膝臏本經穴又循膺膺窗等處乳乳中乳根氣街即氣衝股梁丘陰市等處伏兔本經穴䯒外廉三里而下等處足跗上皆痛陷骨衝陽解谿等處為足中指不能舉用脈行於次指而中指相連如邪氣盛則身已前皆熱其熱有餘於胃則消穀善飢為溺色黃胃熱下入膀胱如正氣不足則身已前皆寒慄如胃中寒則脹滿且邪氣盛則當瀉之正氣虛則當補之熱則速去其針而瀉之寒則久留其針而溫之脈下陷者則用艾以灸之若不盛不虛則以本經取之而不必求之於足太陰脾經也所謂盛者何以驗之人迎較寸口之脈大者三倍則胃經為實如終始篇所謂瀉足陽明胃而補足太陰脾者是也虛者何以驗之人迎較寸口之脈小者三倍則胃經為虛如終始篇所謂補足陽明胃而瀉足太陰脾者是也平人絕谷篇伯高曰胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿難經云胃重二斤一兩脾胃者倉廩之官靈蘭秘典論云脾胃者倉廩之官五味出焉本臟篇云脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下脘約不利肉䐃不堅者胃緩肉䐃無小里累者胃急肉䐃多少里累者胃結胃結者上脘約不利也附胃經諸穴歌足陽明四十五自承泣四白而數巨憇有地倉之積大迎來頰車之夥下關頭維以人迎水突氣舍與缺盆氣戶兮庫房屋翳膺窗兮乳中乳根不容承滿梁門關門太乙滑肉滑肉門天樞外陵大巨從水道歸來氣衝入髀關之境伏兔至陰市梁丘犢鼻自三里而行上巨虛即上廉兮條口下巨虛即下廉兮豐隆解谿衝陽入陷谷下內庭厲兌而終又分寸歌胃之經兮足陽明承泣目下七分尋四白目下方一寸巨憇鼻孔旁八分地倉夾吻四分近大迎頷下寸三中頰車耳下八分穴下關耳前動脈行頭維神庭旁四五神庭督脈穴在中行髮際上五分頭維去神庭四寸五分人迎喉旁寸五真水突筋前迎下在氣舍突下穴相乘氣舍在水突下缺盆舍下橫骨肉各去中行寸半明氣戶璇璣旁四寸至乳六寸又四分庫房屋翳膺窗近乳中正在乳頭心次有乳根出乳下各一寸六不相侵自氣戶至乳根六穴上下相去各一寸六分去中行任脈各四寸卻去中行須四寸以前穴道與君陳不容巨闕旁三寸巨闕任脈穴臍上六寸五分卻近幽門寸五新幽門腎經穴巨闕旁一寸五分在胃經任脈二脈之中其下承滿與梁門關門太一滑肉門上下一寸無多少共去中行三寸中天樞臍旁二寸間樞下一寸外陵安樞下二寸大巨穴樞下四寸水道全樞下六寸歸來好共去中行二寸邊氣衝鼠鼷上一寸鼠鼷橫骨盡處又去中行四寸專髀關膝上有尺二伏兔膝上六寸是陰市膝上方三寸梁丘膝上二寸記膝臏陷中犢鼻存膝下三寸三里至膝下六寸上廉穴膝下七寸條口味膝下八寸下廉看膝下九寸豐隆系卻是踝上八寸量比那下廉外邊綴解谿去庭六寸半庭內庭也衝陽庭後五寸換陷谷庭後二寸間內庭次指外間現足大指次指外間陷中厲兌大指次指端去爪如韭胃井判愚按足陽明胃經穴自缺盆氣戶庫房屋翳膺窗乳中乳根去中行各四寸上下相去各一寸六分自不容承滿梁門關門太乙滑肉門去中行各三寸上下相去各一寸自天樞外陵大巨水道歸來去中行各二寸上下相去不等其氣衝一穴則又去中行二寸鼠鼷上一寸其屈曲有如此者徐氏針灸書皆以二行言之誤矣左右各四十五穴共九十穴脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上踹內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌木散舌下其支者復從胃別上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重是主脾所生病者舌本痛體不能動搖食不下煩心心下急痛溏瘕泄水閉黃疸不能臥強立股膝內腫厥足大捐不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大三倍於人迎虛者寸口反小於人迎也踝湖瓦切此言脾經脈氣之行乃為第四經也核骨一作核骨俗云孤拐骨足跟後兩旁起骨為核骨腓腹為腨髀內為股臍上為腹咽以咽物居喉之前至胃長一尺六寸為胃之系舌本舌根也足太陰起大指端之隱白穴受足陽明之交也循大指內側白肉際大都穴過核骨後歷太白公孫商丘上內踝前廉之三陰交又上腨內循䯒骨後之漏骨上行二寸交出足厥陰之前至地機陰陵泉上循膝股前廉之血海箕門迤邐入腹經衝門府舍中極關元復循腹結大橫會下脘歷腹哀過日月期門之分循本經之裡下至中脘之際以屬脾絡胃又由腹哀上膈循食竇天溪胸鄉周榮曲折向下至大包又自大包外曲折向上會中府上行人迎之裡挾喉連舌本散舌下而終其支行者由腹哀別行再從胃部中脘穴之外上膈注於膻中之裡心之分以交於手少陰心經也及其動穴驗病則為舌本強脈挾咽連舌本散舌下為食則嘔脾主化食為胃脘痛絡胃為腹脹脈入腹為善意本經口問篇寒氣客於胃厥逆從下上散復出於胃故為噫得後去後與氣泄氣則病快然如衰脾氣輸泄身體皆重脾主肉是皆本經所生之病也又有諸病之生或由本經或由合經其舌本痛上舌本強而此則甚體不能動搖即上文重而甚食不下不但嘔而已煩心心下急痛脈注心中溏脾氣不實瘕泄難經五十六難有大瘕泄水閉六元正紀大論有甚則水閉跗腫言水蓄於內而大小便皆閉也黃疸素問平人氣象論本經論疾診尺篇皆有黃疸不能臥強立股膝內腫血海箕門衝門等處厥足大指不能舉用隱白大都太白等處然邪氣之盛者則瀉之正氣之虛者則補之熱則疾去其針寒則久留其針脈陷下者則用艾以灸之若不盛不虛則以本經取之而不必求之足陽明胃經也所謂盛者何以驗之寸口較人迎之脈大者三倍則脾經為實如終始篇所謂瀉足太陰脾而補足陽明胃者是也虛者何以驗之寸口較人迎之脈小者三倍則脾經為虛如終始篇所謂補足太陰脾而瀉足陽明胃者是也難經云脾重二斤三兩扁廣三寸長五寸有散膏半斤主裡血溫五臟主藏意素問靈蘭秘典論云脾胃者倉廩之官五味出焉本臟篇云脾小則臟安難傷於邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消癉易傷脾端正則和利難傷脾偏傾則善滿善脹也又云黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也附脾經諸穴歌足太陰脾中洲二十一穴隱白遊赴大都兮瞻太白訪公孫兮至商丘越三陰之交而漏谷地機可即步陰陵之泉而血海箕門是求入衝門兮府舍軒豁解腹結兮大橫優遊腹哀食竇兮接天溪而同派胸鄉周榮兮綴大包而如鉤又分寸歌大指端內側隱白節後陷中求大都太白內側核骨下節後一寸公孫呼商丘內踝微前陷踝上三寸三陰交踝上六寸漏谷是膝下五寸地機朝膝下內側陰陵泉與陽陵泉穴相對血海膝臏上內廉箕門穴在魚腹取動脈應手越筋間衝門期下尺五分期門肝經穴巨闕旁四寸五分巨闕任脈穴臍上六寸五分府舍期下九寸看腹結期下六寸人大橫期下五寸半腹哀期下方二寸期門肝經穴道現巨闕之旁四寸五卻連脾穴休胡亂自此以上食竇穴天溪胸鄉周榮貫相去寸六無多寡又上寸六中府換肺經穴大包腋下有六寸淵液腋下三寸絆淵液膽經穴腋下三寸與下脾經大包穴相連愚按中府肺經穴也周榮胸鄉天溪食竇脾經穴也期門肝經穴也肝經之下有脾經之腹哀大橫腹結府舍衝門諸穴則中行開四寸五分三經之穴上下相連左右共四十二穴心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病嗌乾心痛渴而欲飲是為臂厥是主心所生病者目黃脅痛臑臂內後廉痛厥掌中熱痛為此諸病盛則瀉之虛則補之熱則疾之寒則圖之陷下則灸之不盛不虛以經取之盛者寸口大再倍於人迎虛者反小於人迎也嗌音益此言心經脈氣之行乃為第五經也心系有二一則上與肺相通而入肺大葉間一則由肺葉而下曲折向後並脊裡細絡相連貫脊髓與腎相通正當七節之間蓋五臟系皆通於心而心通五臟系也手少陰經起於心循任脈之外屬心系下膈當臍上二寸之分絡小腸其支者從心系出任脈之外上行而挾咽系目也其直者復從心系直上至肺臟之分出循腋下抵極泉也穴在臂內腋下筋間動脈入胸自極泉下循臑內後廉行手太陰心主兩經之後歷青靈穴下忖內廉抵少海手腕下踝為兌骨自少海而下循臂內後廉歷靈道通里至掌後兌骨之端經陰郄神門入掌內廉至少府循小指端之少衝而終以交於手太陽也滑伯仁曰心為君主之官示尊於他臟故其交經授受不假支別云及其動穴驗病則為嗌乾脈上挾咽心痛本經病渴而欲飲心火內炎是乃臂氣逆而上行脈循臂而上肘臑腋此心所生之病也又有諸病之生或出本經或由合經為目黃脈系目系為脅痛脈腋下臑臂內後廉痛脈循臂臑後廉厥掌中熱痛心包絡所屬心為君主病同然邪氣之盛者則當瀉之正氣之虛者則當補之熱則瀉者疾去其針寒則溫者久留其針脈陷下者則用艾以灸之若不盛不虛則止取之本經而不必求之手太陽小腸經也所謂盛者何以驗之寸口較人迎之脈大者二倍而躁則心經為實如終始篇所謂瀉少陰心而補手太陽小腸者是也虛者何以驗之寸口較人迎之脈小者二倍而不躁人迎大二倍而躁則心經為虛如終始篇所謂補手少陰心而瀉手太陽小腸者是也心重一十二兩附著於脊之第五椎居肺下膈上中有七孔三毛盛精汁三合主藏神素問靈蘭秘典論云心者君主之官神明出焉本臟篇云心小則安邪弗能傷易傷於憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則贓外易傷於寒易恐以言心堅則臟安守固心脆則善病消癉熱中心端正則和利難傷心偏傾則操持不一無守司也赤色小理者心小粗理者心大無𩩲骬者心高𩩲骬小短舉者心下𩩲骬長者心下堅𩩲骬弱小以薄者心脆𩩲骬直下不舉者心端正𩩲骬倚一方者心偏傾也附心經諸穴歌手少陰九穴成極泉青靈少海深自靈道通里而達過陰郄神門而迎抵於少府少衝可尋又分寸歌少陰心起極泉中腋下筋間脈入胸臂內腋下筋間動脈入胸青靈肘上三寸取伸付舉臂取之少海肘後端五分付內廉節後大骨外去肘端五分屈肘向頭得之靈道掌後一寸半通里掌後一寸同陰郄腕後方半寸神門掌後兌骨隆少府節後勞宮直小指內側取少衝凡九穴左右一十八穴小腸手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩腫交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病嗌痛頷腫不可以顧肩似拔臑似折是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者反小於寸口也胛音甲眥音資䪼音拙顴音權折音舌此言小腸經脈氣之行乃為第六經也臂骨盡處為腕腕下兌骨為踝脊兩旁為膂膂上兩角為肩解肩解下成片骨為肩胛目外角為銳眥目下為䪼目內角為內眥手太陽脈起小指少澤穴循手少陰心經之交也由是循外側之前谷後谿上腕出踝中歷腕骨陽谷養老穴直上循臂骨下廉支正出肘內側兩筋之間歷小海穴上循臑外廉行手陽明少陽之外上肩循肩貞脯俞天宗秉風曲垣肩外俞肩中俞諸穴乃上會大椎左右相交於兩肩之上自交肩下入缺盆循肩向腋下行當膻中之分絡心循胃系下膈過上脘抵胃下行任脈之外當臍上二寸之分屬小腸其支行者從缺盆循頸之天窗天容上頰抵顴髎上至目銳眥過瞳子髎卻入耳中循聽宮而終其支別者別循頰上䪼抵鼻至目內眥睛明穴以斜絡於顴而交於足太陽經也及其動穴驗病則為嗌痛為頷腫不可以顧脈循咽循頸上頰為肩似拔而痛脈出肩解繞肩腫為臑似折而難舉脈循於臑是主心液不足而為之生病也又有諸病之生或出本經或由合經為耳聾脈入耳中循聽宮為目黃支入目之銳眥內眥為頰腫支上頰別頰為頸頷肩臑肘臂外後廉痛皆經脈所過之處故邪氣盛則瀉之正氣虛則補之熱則疾去其針寒則久留其針脈下陷者則用艾以灸之若不盛不虛則止取之本經而不必求之手少陰心經也所謂盛者何以驗之人迎較寸口之脈大者二倍而躁則小腸經為實如終始篇所謂瀉手太陽小腸而補手少陰心者是也虛者何以驗之人迎較寸口之脈小者二倍而不躁則小腸經為虛如終始篇所謂補手太陽小腸而瀉手少陰心者是也平人絕谷篇云小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半又腸胃篇云小腸後附脊左環回周疊積其注於迴腸者外附於臍上回運環十六曲大二寸半徑八分分之少半長三丈三尺素問靈蘭秘典論云小腸者受盛之官化物出焉本臟篇云心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結附小腸諸穴歌小腸穴十九中路從少澤步前谷後谿之隆道尊腕骨觀陽谷養老之崇得支正於小海逐肩貞以相從值臑俞兮遇天宗乘秉風兮曲垣中肩外俞兮肩中俞啟天窗兮見天容匪由顴憇曷造聽宮又分寸歌小指端外為少澤前谷外側節前覓節後捏拳取後谿腕骨腕前骨陷側兌骨下陷陽谷討腕上一寸名養老支正腕後量五寸小海肘端五分好肩貞胛下兩骨解曲胛下兩骨解間肩愬後陷中臑俞大骨下陷保大骨下胛上廉舉臂取之天宗秉風后骨陷秉風憇外舉有空大憇外肩上小憇後舉臂有空曲垣肩中曲胛陷外俞胛後一寸從即肩外俞肩胛上廉去脊三寸陷中肩中二寸大抒旁天窗扶突後陷詳頸大筋間前曲頰下扶突後動脈應手陷中天容耳下曲頰後顴憇面頄銳端量面頄骨下廉銳骨端陷中聽宮耳端大如菽耳中珠子大如赤小豆此為小腸手太陽左右共三十八穴膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫踹內出外踝之後循京骨至小捐外側是動則病沖頭痛目似脫項如拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所主病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛小指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大再倍於寸口虛者人迎反小於寸口也膊音傅膂音旅臀音屯膕音國胛音甲踹腨同此言膀胱經經脈之行乃為第七經也目大角為內眥髮際前為額腦上為巔頂也腦頭髓也腦後為項肩後之下為肩膊推骨為脊尻上橫骨為腰挾脊為膂臀尻也挾腰髓骨兩旁為機機後為臀腓腸上膝後曲處為膕膂內為胛即挾脊肉也股外為髀捷骨之下為髀樞腓腸為腨足太陽之脈起目內眥睛明穴受手太陽之交也上額循攢竹過神庭歷曲差五處承光通天自通天斜行左右交於頂上之百會其支行者從巔至百會抵耳上角過率谷浮白竅陰穴所以散養於筋脈也其直行者由通天絡郄玉枕入絡腦復出下項以抵天柱又由天柱而下過大椎陶道卻循肩膊內挾脊兩旁相去各一寸半下行於大杼風門肺俞厥陰俞心俞膈俞肝俞膽俞脾俞胃俞三焦俞腎俞大腸俞小腸俞膀胱俞中膂內俞白環俞由是抵腰中入循膂絡腎下屬膀胱其支別者從腰中循腰髓下挾脊歷上髎次髎中髎下髎義詳針灸聚英會陽下貫臀至承扶殷門浮郄委陽入膕中之委中穴其支別者為挾脊兩旁第二行相去各三寸之諸穴自天柱而下從膊內左右別行下貫腫膂歷附分魄戶膏育神堂譩譆膈關魂門陽綱意舍胃倉盲門志室胞盲秩邊下歷尻臀過髀樞也又循髀樞之裡承扶之外一寸五分之間而下與前之入膕中者相合下行循合陽下貫腨內歷承筋承山飛揚附陽出外踝後之崑崙僕參申脈金門循京骨束骨通谷至小指外側之至陰穴以交於足少陰腎經也及其動穴驗病則為邪氣衝頭而痛脈上額交巔入絡於腦目似脫脈起目內眥項如拔脈還別下項脊痛脈挾脊腰似折脈抵腰中髀不可以曲脈過髀樞如結脈入膕中踹如裂脈貫踹內是皆外踝脈氣所過之所其氣逆上行而生此諸病也又有諸病之生或出本經或由合經為痔脈貫臀為瘧刺瘧篇有太陽之瘧為狂癲疾本經癲狂篇二十二有刺太陽經者為頭囟項痛脈上額交巔入腦下項為目黃脈起目內眥為淚出同上為鼽衄內眥近鼻為項背腰尻膕踹腳皆痛脈氣所經之處為足小指不能舉用故邪氣盛則瀉之正氣虛則補之熱則疾去其針以瀉之寒則久留其針以溫之脈下陷者則用艾以灸之若不盛不虛止以本經取之而不必求之足少陰腎經也所謂盛者何以驗之人迎較寸口之脈大者二倍則膀胱經為實如終始篇所謂瀉足太陽膀胱而補足少陰腎者是也虛者何以驗之人迎較寸口之脈小者二倍則膀膠經為虛如終始篇所謂補足太陽膀胱而瀉足少陰腎者是也膀胱重九兩二銖縱廣九寸居腎之下大腸之側小腸下口乃膀胱上口水液由是滲入焉盛溺九升九合素問靈蘭秘典論云膀胱者州都之官津液藏焉氣化則能出矣本臟篇云腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也附膀胱經諸穴歌足太陽六十三睛明攢竹詣曲差五處之鄉承光通天見絡郄玉枕之行音杭天柱高兮大抒抵風門開兮肺俞當厥陰心膈之俞肝膽脾胃之藏三焦腎兮大腸小腸膀胱俞兮中膂白環自從大杼至此去脊中寸半之間又有上次中下四髎在腰四空以和調會陽居尻尾之旁吾背二行始了仍上二椎旁附分二椎下兩旁去脊中三寸三椎旁魄戶膏肓並四椎而過神堂譩譆兮膈關魂門陽綱意舍兮胃倉肓門志室胞肓背以秩邊而分承扶浮郄與委陽殷門委中而合陽至承筋與承山到飛揚與附陽會崑崙僕參申脈探金門京骨之場由束骨而通谷抵小指外至陰之間又分寸歌足太陽兮膀胱經目內眥角始睛明眉頭陷中攢竹取曲差發際上五分五處發上一寸是承光發上二寸半通天絡郄玉枕穴相去寸五調勻看玉枕夾腦一寸三入發二寸枕骨現天柱項後髮際中大筋外廉陷中獻自此夾脊開寸五第一大杼二風門三椎肺俞厥陰四厥陰俞心俞五椎之下論膈七肝九十膽俞十一脾俞十二胃十三三焦十四腎愚按魄戶對肺俞神堂對心俞魂門對肝俞意舍對脾俞志室對腎俞蓋以肺藏魄心藏神肝藏志脾藏意腎藏志是謂五神臟也大腸十六之下推小腸十八膀十九中膂內俞二十椎白環廿一椎下當白環俞即腰俞以上諸穴可排之更有上次中下髎一二三四腰空好會陽陰尾尻骨旁背部二行諸穴了又從脊上開三寸第二椎下為附分三椎魄戶四膏盲第五椎下神堂尊第六譩譆膈關七第九魂門陽綱十十一意舍之穴有十二胃倉穴已分十三盲門端正在十四志室不須論十九胞盲甘秩邊背部三行諸穴勻又從臀下陰紋取承扶居於陷中主浮郄扶下方六分委陽扶下寸六數殷門扶下六寸長膕中外廉兩筋鄉委中膝膕約紋里此下三寸尋合陽承筋腳跟上七寸穴在腨腸之中央承山腨下分肉間外踝七寸上飛揚附陽外踝上三寸崑崙後跟陷中央僕參亦在踝骨下申脈踝下五分張金門申脈下一寸京骨外側骨際量束骨本節後陷中通谷節前陷中強至陰卻在小指側太陽之穴始周詳計六十三穴左右共一百二十六穴腎足少陰之脈起於小指之下邪趨足心出於然谷之下循內踝之後別入跟中以上踹內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕如人將捕之是為骨厥是主腎所生病者口熱舌於咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之灸則強食生肉緩帶披髮大杖重履而步盛者寸口大再倍於人迎虛者寸口反小於人迎也邪斜同跟音根䀮音荒強上聲此言腎經脈氣之行乃為第八經也趨向也跟足根也腎足少陰起足小指之下斜趨足心之湧泉轉出內踝前起大骨下之然谷下循內踝後之太谿別入跟中之大鐘照海水泉乃折自大鐘之外上循內踝行厥陰太陰兩經之後經本經復溜交信穴過脾經之三陰交上腨內循築賓出膕內廉抵陰谷上股內後廉貫脊會於督之長強還出於前循橫骨大赫氣穴四滿中注肓俞當肓俞之所臍之左右屬腎下臍過任脈之關元中極而絡膀胱焉其直行者從盲俞屬腎外上行循商曲石關陰都通谷諸穴貫肝上循幽門上膈歷步廊入肺中循神封靈墟神藏或中俞府而上循喉嚨並人迎挾舌本而終其支者自神藏別出繞心注胸之膻中以交於手厥陰心包絡經也及其動穴驗病則病飢而又不欲食蓋虛火盛則飢而不欲食者脾氣弱也面如漆柴漆則腎之色黑者形於外而如漆柴則腎主骨者瘦矣咳唾則有血脈入肺中則為咳而唾中有血則腎主有損喝喝而喘脈入肺中循喉嚨挾舌本火盛水虧之疾坐而欲起陰虛不能寧靜目䀮䀮無所見水虧肝弱心如懸若飢狀脈支者從肺出絡心氣不足則善恐心惕惕如人將捕之素問陰陽應象大論云腎在志為恐恐傷骨此皆腎主於骨骨之氣逆而厥故為腎所生病也然又有諸病之生或出本經或由合經為口熱為舌乾為咽腫為上氣為嗌乾及痛脈循喉嚨挾舌本為煩心為心痛脈從肺絡心為黃疸五疸有女勞疸為腸澼素問通評虛實淪大奇論皆有腸澼為脊股內後廉痛脈所經等處為痿痿有骨痿義見痿論為厥義見厥論為嗜臥骨痿則嗜臥為足下熱而痛脈起足心湧泉故邪氣盛則瀉之正氣虛則補之熱則疾去其針以瀉之寒則久留其針以溫之脈陷下者則用艾以灸之若不盛不虛則止取本經而不必求之足太陽膀胱經也如灸者則當勉強進食必生長其肉又寬緩其帶古人腰必束帶散披其發扶大杖著重履以緩步之蓋不太勞動以腎氣之衰弱也余經不言此法而唯腎經詳言者以腎經屬水為身之本而病人多犯其戒故獨言之詳所謂盛者何以驗之寸口較人迎之脈大者二倍則腎經為實如終始篇所謂瀉足少陰腎而補足太陽膀胱者是也虛者何以驗之寸口較人迎之脈小者二借則腎經為虛如終始篇所謂補足少陰腎而瀉足太陽膀胱者是也腎有兩枚重一斤二兩狀如石卵附著於脊之十四椎下各開一寸半素問靈蘭秘典論云腎者作強之官伎巧出焉本臟篇云腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背脊膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則苦病消癉易傷腎端正則和利難傷腎偏傾則苦腰尻痛也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也附腎經諸穴歌足少陰兮甘七湧泉流於然谷太谿大鐘兮水泉綠照海復溜兮交信續從築賓兮上陰谷掩橫骨兮大赫麓氣穴四滿兮中注肓俞上通乎商曲守石關兮陰都寧閉通谷兮幽門肅步廊神封而靈墟存神藏或中而俞府足又分寸歌足掌心中是湧泉然谷踝下一寸前內踝前一寸太谿踝後跟骨上大鐘跟後踵中邊足跟後踵中大骨上兩筋間也水泉溪下一寸覓照海踝下四分安復溜踝上前二寸交信踝上二寸聯二穴止隔筋前後太陰之後少陰前前旁骨是復溜後旁骨是交信二穴止隔一條筋築賓內踝上腨分陰谷膝下曲膝間橫骨大赫麓氣穴四滿中注亦相連各開中行止半寸上下相去一寸便上膈肓俞亦一寸肓俞臍旁半寸邊盲俞商曲石關來陰都通谷幽門開各開中行五分俠六穴上下一寸裁步廊神封靈墟存神藏或中俞府尊各開中行計二寸上下寸六六穴同俞府璇璣旁二寸取之得法有成功愚按陰都中脘旁五分通谷上脘旁五分幽門巨闕旁五分又按下自橫骨氣穴四滿中注上下各去一寸所謂橫骨在肓俞下五寸有以也但自橫骨至中注各開中行一寸半盲俞商曲石關陰都通谷幽門各開中行五分自步廊神封靈墟神藏彧中俞府去中行各二寸其屈曲有如此徐氏針灸書皆以二行言之誤矣計二十七穴左右共五十四穴心主於厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循腨內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病手心熱臂肘攣急腋腫甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休是主脈所生病者煩心心痛掌中熱為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者寸口反小於人迎也攣音鸞憺音澹此言心包絡經脈氣之行乃為第九經也脅上際為腋小指次指即手小指之次指乃無名指也蓋自小指而逆數之故云然手厥陰心包絡經之脈起於胸中出屬心下之包絡受足少陰腎經之交也由是下膈歷絡於膻中中脘及陰交之三焦臍下一寸為陰交其支者自屬心包上循胸出脅下腋三寸天池穴上行抵腋下下循臑內之天泉以界手太陰肺經手少陰心經兩經之中間人肘中之曲澤穴又由肘中下臂行臂兩筋之間循郄門間使內關大陵入掌中勞宮循中指出其端之中衝其支別者從掌中循無名指出其端而交於手少陽三焦經也及其動穴驗病則為手心熱脈行掌中勞宮為臂肘攣急為腋腫皆脈所經處甚則胸脅支滿脈循胸出脅為心中憺憺大動宜安靜而反動也脈出心包為面赤心之色為赤為目黃目為五臟之精心病則目黃為喜笑不休心在聲為笑是皆心主脈而脈生此病也又有為煩心為心痛為掌中熱之諸病故邪氣盛則瀉之正氣虛則補之熱則瀉者疾去其針寒則溫者久留其針脈陷下者則用文以灸之若不盛不虛則止以本經取之而不必求之手少陽三焦經也然所謂盛者何以驗之寸口較人迎之脈大者一倍而躁則心包絡為實如終始篇所謂瀉手厥陰心包絡而補手少陽三焦者是也虛者何以驗之寸口較人迎之脈小者一倍而不躁則心包絡為虛如終始篇所謂補手厥陰心包絡而瀉手少陽三焦者是也心包絡在心下橫膜之上豎膜之下與橫膜相黏而黃脂里者心也其脂膜之外有細筋膜如絲與心肺相連者心包絡也此經本有名有形其經絡起於腋下之大池而止於中指之中衝其臟在心之下有黃脂里心者是也其脈在右手尺中後世不知有此經者非靈樞本輸篇云心出於中衝云云邪客篇心主之脈出於中指之端云云又云手少陰之脈獨無輸何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無輸焉黃帝曰少陰獨無輸者不病乎岐伯曰其外經病而臟不病故獨取其經於掌後銳骨之端其餘出入屈折其行之疾徐皆如手少陰心主之脈行也故本輸者皆因其氣之虛實疾徐以取之附心包絡經諸穴歌手厥陰心包之絡計有九穴之奇自天池天泉而始逐曲澤郄門而馳間使通乎內失大陵近於勞宮既由掌握自是抵於中衝又分寸歌心包起自天池間乳後一寸腋下三腋下三寸乳後一寸天泉曲腋下二寸曲澤屈肘陷中央郄門去腕方五寸掌後去腕五寸間使腕後三寸量內關去腕止二寸大陵掌後兩筋間勞宮屈中名指取屈中指無名指兩者之間取之中指之末中衝良三焦手少陽之脈起於小捐次捐之端上出兩指之間循於表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心胞下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目銳眥痛頰腫耳後肩臑肘臂外皆痛小捐次指不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也焞音屯此言三焦經脈氣之行乃為第十經也臂骨盡處為腕臑盡處為肘膊下對腋處為臑目下為䪼手少陽起小指次指之端關衝穴即第四指也上出歷液門中渚四指之間循手表腕之陽池出臂外兩骨之間至天井穴從天井上行循臂臑之外歷清冷淵消濼行手太陽之裡手陽明之外上肩循臂臑會肩髎天髎交出足少陽之後過秉風肩井下入缺盆復由足陽明之外而交會於膻中之上焦散布絡繞於心包絡乃下膈入絡膀胱以約下焦附右腎而生其支行者從膻中而上出缺盆之外上項過大椎循天牖上耳後經翳風瘛脈顱息直上出耳上角至角孫過懸釐頷厭及過陽白睛明屈曲耳頰至䪼會顴髎之分其又支者從耳後翳風穴入耳中過聽宮歷耳門和髎卻出至目銳眥會童子髎循絲竹空而交於足少陽膽經也及其動穴驗病則為耳聾渾渾然焞焞然甚覺不聰也脈從耳後入耳中出走耳前為嗌腫為喉痹脈下交頰是皆氣分所生之病也然又有諸病之生或由本經或出別經為汗出汗為心液三焦為心包絡之表為目銳眥痛脈至目銳眥為頰腫脈交頰為耳後肩臑肘臂外皆痛脈所經處為手小指次指不能舉用故邪氣盛則當瀉之正氣虛則當補之熱則瀉者疾去其針寒則補者久留其針脈陷下者則用艾以灸之若不盛不虛則取之本經而不必求之手厥陰心包絡經也然所謂盛者何以驗之人迎較寸口之脈大者一倍而躁則三焦經為實如終始篇所謂瀉手少陽三焦而補手厥陰心包絡者是也虛者何以驗之人迎較寸口之脈小音一倍而不躁則三焦經為虛如終始篇所謂補手少陽三焦而瀉手厥陰心包絡者是也此經本有名有形其經絡起於物第四指之關衝而止於面部之目後絲竹空其府附於右腎後世以為有名無狀者非其禍始於秦越人而成於王叔和也其脈見於右手尺部與手厥陰心包絡經為表裡素問靈蘭秘典論云三焦者決瀆之官水道出焉本臟篇云腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也附三焦諸穴歌手少陽三焦之脈二十二穴之中關衝連開液門中渚陽池外關支溝會宗三陽絡四瀆天井清冷淵消濼臑會肩髎相聯天髎處天牖之下翳風讓瘛脈居先顱息定而角孫近耳絲竹空而和髎倒懸耳門既闢夏蚋聞焉又分寸歌無名之外端關衝液門小次指陷中中渚液下去一寸陽池腕上之陷中外關腕後方二寸腕後三寸開支溝臂外三寸兩骨間腕後三寸內會宗空中有穴細心求腕後四寸三陽絡四瀆肘前五寸著天井肘外大骨後骨罅中間一寸摸肘後二寸清冷淵消爍對腋臂外看臑會肩前三寸中肩前廉去肩頭三寸宛宛中肩髎臑上陷中央天髎缺盆陷處上天牖天容之後存天牖頸大筋外缺盆上天容後天柱前完骨下髮際上翳風耳後尖角陷耳後尖角陷中按之引耳中瘛脈耳後青脈現耳本後雞足青絡脈顱息亦在青絡脈角孫耳廓中間上耳門耳前起肉中耳前起肉當耳缺陷中和髎耳前動脈張欲知絲竹空何在眉後陷中仔細量愚按大凡周身之穴惟頭部最難徐氏以行分之誤矣計二十三穴左右共四十六穴膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻支出手少陽之後入缺盆其支者從耳後入耳中出走耳前至目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小捐次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主骨所生病者頭痛頷痛目銳眥痛缺盆中腫痛腋下腫馬刀俠癭汗出振寒瘧胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次捐不用為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者人迎大一倍於寸口虛者人迎反小於寸口也此言膽經脈氣之行乃為第十一經也腋下為脅脅又名胠曲骨之外為毛際毛際兩旁動脈為氣衝捷骨之下為髀厭即髀樞也脅骨之下為季脅屬肝經穴名章門䯒骨為輔骨外踝以上為絕骨足面為跗足大指本節後為歧骨大指爪甲後為三毛足少陽膽經起目銳眥之瞳子髎由聽會客主人上行頭角循頷厭下懸顱懸釐由懸釐外循耳上髮際至曲鬢率谷由率骨外折下耳後循天衝浮白竅陰完骨又自完骨外折循本神過曲差下至陽白會睛明復從睛明上行循臨泣目窗正營承靈腦空風池至頸過天牖行手少陽之脈前下至肩上循肩井卻左右交出手少陽之後過大椎大抒秉風當秉風前入缺盆之外其支者自耳後顳顬間過翳風之分入耳中過聽宮復自聽宮至目銳眥瞳子髎之分其支者別自目外瞳子髎而下大迎合手少陽於當顴髎之分下臨頰車下頸循本經之前與前之入缺盆者相合下胸中天池之外貫膈即期門之所絡肝下至日月之分屬於膽也自屬膽處循脅內章門之裡至氣衝繞毛際遂橫入髀厭者之環跳穴其直行者從缺盆下腋循胸歷淵液輒筋日月過季脅循京門帶脈五樞維道居髎入上髎中髎長強而下與前之入髀厭者相合乃下循髀外行太陽陽明之間歷中瀆陽關出膝外廉抵陽陵泉又自陽陵泉下於輔骨前歷陽交外丘光明直下抵絕骨之端循陽輔懸鐘而下出外踝之前至丘墟循足面之臨泣五會俠谿乃上入小指次指之間至竅陰而終其支別者自足跗面臨泣別行入大指循歧骨內出大指端還貫入爪甲出三毛以交於足厥陰肝經也及其動穴驗病則為口苦膽汁味苦為善太息膽氣不舒為心脅痛不能轉側脈循脅裡出氣街甚則面微有塵體無膏澤脈所歷處少陽氣鬱為病足外反熱脈循髀陽出膝外廉下外輔骨抵絕骨下外踝是膽本屬少陽而陽氣上厥使然也凡此皆主骨所生病耳又有諸病之生或出本經或由合經為頭痛脈行於頭為頷痛脈加頰車為目銳眥痛脈起於目為缺盆中腫痛脈入缺盆支合缺盆為腋下腫脈從缺盆下腋過脅為馬刀俠癭皆頸項腋脅所生瘡名為汗出少陽有火為振寒瘧少陽為一陽居陽之裡內有三陰乃為半表半裡故為振寒瘧為胸脅肋髀膝外至脛絕骨外踝及諸節皆痛皆脈所經歷處為足小指之次指即第四指也不能舉用然邪氣盛則當瀉之正氣虛則當補之熱則瀉者疾去其針寒則溫者久留其針脈陷下者則用艾以灸之若不盛不虛則以本經取之而不必求之足厥陰肝經也所謂盛者何以驗之人迎較寸口之脈大者一倍則膽經為實如終始篇所謂瀉足少陽膽而補足厥陰肝者是也虛者何以驗之人迎較寸口之脈小者一倍則膽經為虛如終始篇所謂補足少陽膽而瀉足厥陰肝者是也膽重三兩三銖長三寸在肝之短葉間盛精汗三合素問靈蘭秘典論云膽者中正之官決斷出焉本臟篇云肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也附膽經諸穴歌足少陽兮四十三瞳子髎近聽會間客主人在頷厭集懸顱懸釐曲與鬢同前由率谷天衝而下見浮白竅陰之妍完骨露兮本神陽白臨泣見兮目窗與連正營承靈居其後腦空穴繼靈而安風池肩井兮淵液輒筋日月兮京門闢帶脈五樞由維道居髎而續環跳風市抵中瀆飲陽關之陽陵泉至陽交之外丘間光明陽輔懸鐘可瞻丘墟臨泣地五會俠谿竅陰而膽經全又分寸歌足少陽兮四十三頭上甘穴分三折起自瞳子至風池積數陳之依次第瞳子髎近眥五分耳前陷中尋聽會耳徵前陷中上關下一寸客主人名上關同耳前起骨開口空頷厭懸顱之二穴腦空上廉曲角下腦空即顳顬頷厭懸顱二穴在曲角之下腦空之上懸釐之穴異於茲腦空下廉曲角上曲鬢耳上髮際隅耳上髮際曲隅陷中率谷耳上寸半安此穴在耳上些天衝耳後人發二耳後入髮際二寸浮白人發一寸間亦耳後些竅陰即是枕骨穴完骨之上有空連在完骨上枕骨下動搖有空完骨耳後入髮際量得四分須用記本神神庭旁三寸入發一寸目上系陽白眉上方一寸發上五分臨泣用目上直入髮際五分陷中發上一寸當陽穴發上寸半目窗貢正營發上二寸半承靈發上四寸擁腦空發上五寸半風池耳後發陷中耳後顳顬後腦空下發際陷中至此計二十穴分作三折向外而行始自瞳子髎至完骨是一折又自完骨外折上至陽白會睛明是一折又自睛明上行循臨泣風池是一折緣其穴曲折多難以科索故此作歌二十次第言之歌曰一瞳子髎二聽會三主人兮頷厭四五懸顱兮六懸釐第七數兮曲鬢隨八率谷兮九天衝十浮白兮之穴從十一竅陰亦相繼十二完穀一折終又自十三本神始十四陽白二折隨十五臨泣目上穴十六目窗之穴宜十七正營十八靈十九腦空廿風池依次細心量取之膽經頭上穴吾知肩井肩上陷中求大骨之前一寸半肩上陷中缺盆上大骨前維道章下五寸三居髎章下八寸三章門緣是肝經穴下脘之旁九寸舍環跳髀樞宛宛中髀樞中側臥屈上足伸下足以右手摸穴左搖撼取之屈上伸下取穴同風市垂手中指盡膝上五寸中瀆論髀外膝上五寸肉間陷中陽關陽陵上三寸陽陵膝下一寸從陽交外踝上七寸踝上六寸外丘用踝上五寸光明穴踝上四寸陽輔分踝上三寸懸鐘在丘墟踝前之陷中此去俠谿四寸五卻是膽經原穴動臨泣俠谿後寸半地五會去溪一寸俠谿在指歧骨間竅陰四五二指端按手足少陽之穴在頭者最難覓若不知慎禍不旋踵計四十三穴左右共八十六穴肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸支出太陰之後上膕內廉循股陰入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇內其支者復從肝別貫膈上注肺是動則病腰痛不可以俯仰丈夫㿉疝婦人少腹腫甚則溢干面塵脫色是肝所生病者胸滿嘔逆飧瀉狐疝遺溺閉癃為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之盛者寸口大一倍於人迎虛者反小於人迎也見素問脈解篇此言肝經脈氣之行乃為第十二經也三毛後橫紋為叢毛髀內為股臍下為小腹目內深處為系頏顙咽顙也足厥陰起於大指叢毛之大敦循足跗上廉歷行間太衝抵內踝前一寸之中封自中封上踝過三陰交歷蠡溝中都復上一寸交出太陰之後上膕內廉至膝關曲泉循股內之陰包五里陰廉遂當衝門府舍之分入陰毛中左右相交環繞陰器抵小腹而上會曲骨中極關元復循章門至期門之所挾胃屬肝下日月之分絡於膽也又自期門上貫膈行食竇之外大包之裡散布脅肋上雲門淵液之間人迎之外循喉嚨之後上入頏顙行大迎地倉四白陽白之外連目系上出額行臨泣之裡與督脈相會於巔頂之百會其支行者從目系下行任脈之外本經之裡下頰裡交環於唇口之內其又支者從期門屬肝處別貫膈行食竇之外本經之裡上注肺下行至中焦挾中脘之分以交於手太陰肺經也及其動穴驗病則為腰痛不可以俯仰肝與腎通則膂筋之脈通於肝為丈夫㿉疝睪丸屬肝為婦人少腹腫脈抵小腹為甚則嗌乾脈循喉嚨為面塵脫色膽病面有微塵肝為之裡主病同是主肝經所生之病也又有諸病之生或出本經或由合經為胸滿脈上貫膈為嘔逆脈挾胃為飧泄脈抵小腹為狐疝脈過陰器上睪結莖為遺溺上同為閉癃上同然邪氣盛則當瀉之正氣虛則當補之熱則瀉者疾去其針寒則溫者久留其針脈陷下者則用艾以灸之若不盛不虛則止取之本經而不必求之足少陽膽經也所謂盛者何以驗之寸口較人迎之脈大者一倍則肝經為實如終始篇所謂瀉足厥陰肝而補足少陽膽者是也虛者何以驗之寸口較人迎之脈小者一倍則肝經為虛如終始篇所謂補足厥陰肝而瀉足少陽膽者是也肝重四斤四兩左三葉右四葉共七葉附著於脊之第九椎下素問刺禁論云肝生於左後世以為其臟在右其脈在左者非素問靈蘭秘典論云肝者將軍之官謀慮出焉本臟篇云肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅惋為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消癉易傷肝端正則和利難傷肝偏傾則脅下痛也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也附肝經諸穴歌足厥陰一十三穴終起大敦於行間循太衝於中封蠡溝中都之會膝關曲泉之宮襲陰包於五里陰廉乃發尋羊矢於章門期門可攻又分寸歌足太指端名大敦內側為隱白外側為大敦行間大指縫中存太衝本節後二寸踝前一寸號中封足內踝骨前一寸筋里宛宛中蠡溝踝上五寸是內踝骨前上五寸中都踝上七寸中內踝上七寸䯒骨中膝關犢鼻下二寸曲泉曲膝盡橫紋陰包膝上方四寸股內廉兩筋間踡足取之看膝內側必有槽中氣衝三寸下五里氣衝下三寸陰股中動脈應手陰廉衝下有二寸羊矢衝下一寸許氣衝卻是胃經穴鼠鼷之上一寸主鼠鼷橫骨端盡處相去中行四寸止章門下脘旁九寸肘尖盡處側臥取期門又在巨闕旁四寸五分無差矣巨闕任脈穴臍上六寸五分計十三穴左右共二十六穴附督脈經圖本篇此處無督脈任脈之說止下文有督脈任脈之別蓋指絡穴言也今附二圖於此則十四經始全有穴名無臟腑所以統一身之陽附督脈諸穴歌督脈在背之中行二十七穴始長強舞腰俞兮歌陽關入命門兮懸樞間脊中筋縮乃造至陽靈臺上神道身柱陶道以大椎而駐啞門風府兮腦戶強間後頂百會兮前頂在前囟會近上星之照神庭見素髎之妙水溝至兌端而元差斷交居唇內而病療又分寸歌督脈斷交唇內鄉兌端正在唇端央水溝鼻下溝中索素髎宜向鼻端詳頭形北高面南下先以前後髮際量分為一尺有二寸發上五分神庭當發上一寸上星位發上二寸囟會良發上前頂三寸半發上百會五寸央在頂中央旋毛中可容豆兩耳尖性理北溪陳氏曰略近些子猶天之極星居北夫言一尺有二而其數止一尺一寸者何也蓋前後髮際穴而必以前後髮際量起則有一寸在也會後寸半即後頂會後三寸強間明會後腦戶四寸半後發入寸風府行項後髮際入一寸大筋內宛宛中疾言其肉立起言休立止即百會後五寸半也發上五分啞門在後髮際上五分項中央宛宛中抑頭取之入系舌本神庭至此十穴真自此項骨下脊骶分為二十有四項大椎上有項骨在約有三椎莫算之尾有長強亦不算中間付一可排推大椎大骨為第一二椎節內陶道知第三椎間身柱在第五神道不須疑第六靈臺至陽七第九身內筋縮思十一脊中之穴在十二懸樞之穴奇十四命門腎俞並十六陽關自此知二十一椎即腰俞脊尾骨端長強隨共二十七穴附任脈經圖有穴名無臟腑所以統一身之陰附任脈諸穴歌任脈二十四穴行腹與胸會陰始兮曲骨從中極關元石門可通氣海陰交神闕水分下脘建里兮中脘上脘巨闕鳩尾兮中庭膻中玉堂上紫宮華蓋璇璣上天突之尊飲彼廉泉承漿味融又分寸歌任脈會陰兩陰間曲骨毛際陷中安中極臍下四寸取關元臍下三寸連臍下二寸名石門臍下寸半氣海全臍下一寸陰交穴臍之中央即神闕臍上一寸為水分臍上二寸下脘列臍上三寸名建里臍上四寸中脘許臍上五寸上脘在巨闕臍上六寸五鳩尾蔽骨下五分中庭膻下寸六取膻中卻在兩乳間膻上寸六玉堂主膻上紫宮三寸二膻上華蓋四八舉四寸八分膻上璇璣五寸八璣上一寸天突起天突喉下約四寸廉泉頷下骨尖已承漿頤前唇敧下任脈中央行腹裡行腹中央共二十四穴手太陰氣絕則皮毛焦太陰者行氣溫於皮毛者也故氣不榮則皮毛焦皮毛焦則津液去皮節津液去皮節者則爪枯毛折毛折者則毛先死丙篤丁死火勝金也此下五節與素問診要經終論大同此言肺絕之證候死期也肺經之榮在毛合在皮正以肺主氣行氣以溫於皮毛惟氣絕而不榮則皮毛焦者宜也是皮節之津液亦去而爪枯毛折不特皮毛之焦而已故病至毛折其毛已死火日剋金死可必矣手少陰氣絕則脈不通脈不通則血不流血不流則髦色不澤故其面黑如漆柴者血先死壬篤癸死水勝火也此言心絕之證候死期也心主脈又生血惟心氣絕則血脈俱枯髦色不澤面色如漆柴然水所刑也此則血已先死水日剋火死可必矣足太陰氣絕者則脈不榮肌肉唇舌者肌肉之本也脈不榮則肌肉軟肌肉軟則舌萎人中滿人中滿則唇反唇反者肉先死甲篤乙死木勝土也此言脾絕之證候死期也脾主肌肉唇舌為肌肉之本故脾氣不榮則肌肉軟其舌萎其人中滿其唇反斯則肉已先死木日剋土死可必矣足少陰氣絕則骨枯少陰者冬脈也伏行而濡骨髓者也故骨不濡則肉不能著也骨肉不相親則肉軟卻肉軟卻故齒長而垢發無澤發無澤者骨先死戊篤己死土勝水也此言腎絕之證候死期也腎主骨其脈行於冬而濡骨髓惟腎氣絕則骨枯肉脫齒槁發焦其骨已死土日剋水死可必矣足厥陰氣絕則筋絕厥陰者肝脈也肝者筋之合也筋者聚於陰氣當作器而脈絡於舌本也故脈弗榮則筋急筋急則引舌與卵故唇青舌卷卵縮則筋先死庚篤辛死金勝木也此言肝絕之證候死期也肝之合在筋其筋下聚於陰器而上絡於舌本故氣絕則筋急引舌與卵其筋已先死金日剋木死可必矣五陰氣俱絕則目系轉轉則目運目運者為志先死志先死則遠一日半死矣此言手足陰經之絕者而有病證死期也五陰者心肝脾肺腎皆屬陰經也不言心包絡經者以手少陰心經統之耳目為五臟之精故五臟絕則目系轉而運此乃志已先死所以死在一日半也曰一日半者蓋周五臟之表裡而半日則余之耳六陽氣絕則陰與陽相離離則腠理發泄絕汗乃出故旦占夕死夕占旦死此言手足陽經之絕者而有病證死期也六陽者膽胃大小腸膀胱三焦也六陽經氣絕則陰經與陽經相離而不相運致腠理開泄絕汗如珠其死在旦夕間也經脈十二者伏行分肉之間深而不見其常見者足太陰過於外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起於五指間上合肘中飲酒者工氣先行皮膚先充絡脈絡脈先盛故衛氣已平營氣乃滿而經脈大盛脈之卒然動者皆邪氣居之留於本末不動則熱不堅則陷旦空不與眾同是以知其何脈之動也雷公曰何以知經脈之與絡脈異也黃帝曰經脈者常不可見也其虛實也以氣口知之脈之見者皆絡脈也此詳言經脈不可見而絡脈則可見也經脈者如肺經自中府以至少商是也絡脈者如肺經之列缺旁行偏歷是也然十二經者伏行於各經分肉之間深而不可見其常見者僅有脾經之脈過於外踝之上與胃脈相通無所隱焉故耳凡諸脈之浮而常見者皆絡脈也又有經絡皆盛其唯飲酒之時即如手之六經皆有絡脈其手陽明大腸經之絡名曰偏歷手少陽三焦之絡名曰外關雖在臂腕之間然皆起於手之五指手陽明則起於食指手少陽則起於無名指上則合於肘中唯飲酒時則衛氣先行於皮膚絡脈先盛至衛氣已平營氣亦滿而經脈亦大盛凡經絡之脈卒然動者皆邪氣居之邪氣者酒氣也留於手之本末臂指間留即上之居義設脈不動則其熱實不免若脈不堅則其人必虛脈當陷且空也大抵飲酒之脈斷宜動而且堅與不飲酒之眾人其脈不相同也是以即飲酒時便可以知其脈起於何指者系何脈之動也及雷公又以經絡之異何法知之為問蓋欲於不飲酒時而知之也帝言經脈之虛實當診氣口脈以知之然而隱不可見者其常也絡脈則其脈常見不必於氣口知之矣雷公曰細子無以明其然也黃帝曰諸絡脈皆不能經大節之間必行絕道而出入復合於皮中其會皆見於外故諸刺絡脈者必刺其結上甚血者雖無結急取之以瀉其邪而出其血留之發為痹也凡診絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者留久痹也其有赤有黑有青者寒熱氣也其青短者少氣也凡刺寒熱者皆多血絡必間日而一取之血盡乃止乃調其虛實其青而短者少氣甚者瀉之則悶悶則僕不得言悶甚則急坐之也此言刺絡脈者必出其血診絡脈者必別其色也凡諸絡脈皆不能經歷於大節之間一如經脈之行也必行於阻絕之道而出入之復合於皮中如肺經列缺為絡別行於大腸經之偏歷直行似阻而旁行之也其所會處皆見於外故諸經刺絡脈者必即其絡脈之上結而甚有血者以刺之其間雖然有結亦當急取之以瀉其邪而出其血若將此血留之必發之而為痹疾所以不可留也然欲診絡脈有色可據某經絡脈之色青者則寒且痛某經絡脈之色赤者內必有熱若胃中有寒則魚際之絡多青若胃中有熱則魚際之絡多赤若手魚之絡暴黑則留之必為久痹故上文曰當瀉其邪而出其血也若魚際之脈赤黑青之兼見者必為寒熱氣若魚際之脈青而且短者必正氣之衰少但此寒熱氣者理當刺之刺之者以其血絡之多故也必間日而一取之候其血盡而止針隨即調其虛實虛則補而實則瀉也至於色青而短為元氣衰少者病勢若甚切不可瀉瀉之則必悶悶甚則必僕須於初悶時不得言語急靜坐之即可以不至於僕矣手太陰之別名曰列缺起於腕上分間並太陰之經直入掌中散入於魚際其病實則手銳掌熱虛則欠小便遺數取之去腕半寸別走陽明也腕音碗呿同數音朔去腕半寸當作寸半此下十二節詳言十二絡穴而此先以肺經言之也夫不曰絡而曰別者以此穴由本經而別走鄰經也手太陰肺經之別穴名曰列缺去腕側上一寸半針二分留三呼瀉五吸灸三壯起於腕上分肉之間並本經太陰之經入手陽明大腸經以直入掌中而散入於魚際其病如邪氣盛而實則手之銳掌當熱如正氣衰而虛則小便必遺而且數呿之凡取此穴者必覓之去手脘寸半間即列缺穴乃別走陽明之穴正以肺與大腸為表裡也手少陰之別名曰通里去腕一寸半別而上行循經入於心中系舌本屬目系其實則支膈虛則不能言取之掌後一寸別走太陽也去腕一寸半其半字衍觀下掌後一寸可見此言心經之絡穴也通里穴為絡去腕一寸針三分灸三壯別而上行循本經入於心中系舌本屬目系其邪氣有餘而實則膈間若有所支而不暢正氣不足而虛則不能言以言為心之聲也取此穴者當覓之掌後一寸乃別走太陽小腸經之穴即通里穴正以心與小腸為表裡也手心主之別名曰內關去腕二寸出於兩筋之閻循經以上繫於心包絡心系實則心痛虛則為頭強取之兩筋間也此言心包絡經之絡穴也夫手厥陰心包絡經而謂之手心主者以其代心經以行事也本經邪客篇云心者五臟六腑之大主諸邪之在心者皆在心之包絡包絡者心主之脈也皆如手少陰心主之脈行也其別名曰內關雲手腕上廉二寸之兩筋間循本經以上繫於心包絡如心系間邪氣盛而實則心必痛正氣衰而虛則頭必強取此穴者覓之兩筋間耳手太陽之別名曰支正上腕五寸內注少陰其別者上走肘絡肩髃實則節弛肘廢虛則生肬小者如捐痂疥取之所別也髃音偶肬音尤痂音加疥音介此言小腸經之絡穴也支正上手腕外廉五寸針三分灸三壯內注於手少陰心經以心與小腸為表裡也其別行者上走於肘絡手陽明大腸經之肩髃穴如邪氣有餘而實則節弛而肘廢正氣不足而虛則大者為肬海篇釋為贅蓋贅瘤之類小者為指間痂疥之類凡此疾者取此別穴而已手陽明之別名曰偏歷去腕三寸別入太陰其別者上循臂乘肩髃上曲頰遍齒其別者入耳合於宗脈實則齲聾虛則齒寒痹隔取之所別也齲丘禹切此言大腸經之絡穴也偏歷去手腕後三寸別走入於手太陰肺經其支別者上循臂之溫溜下廉上廉三里曲池以乘肩愬上曲頰入上齒縫中又其支別者入耳合於宗脈玩各節皆腑合於臟臟合於腑則此宗脈宜是肺經之大脈猶言大氣為宗氣也本經口問篇有云目者宗脈之所聚如邪氣有餘而實則為齲而齒痛為耳聾正氣不足而虛則止為齒寒為內痹為隔塞不便皆當取此穴以治之耳手少陽之別名曰外關去腕二寸外繞臂注胸中合心主病實則肘攣虛則不收取之所別也此言三焦經之絡穴也外關去手腕外廉二寸外繞於臂注於胸中以合手厥陰心主之脈以三焦與心包絡為表裡也邪氣有餘而實則為肘攣正氣不足而虛則手不能收皆取以穴以治之耳足太陽之別名曰飛揚去踝七寸別走少陰實則鼽窒頭背痛虛則鼽衄取之所別也此言膀胱經之絡穴也飛揚去足外踝上七寸別走少陰腎經以膀胱與腎為表裡也邪氣有餘而實則為鼽出於鼻而窒為頭與背痛正氣不足而虛則為鼽為衄皆當取此穴以治之耳足少陽之別名曰光明去踝五寸別走厥陰下絡足跗實則厥虛則痿躄坐不能起取之所別也此言膽經之絡穴也光明穴去外踝上五寸別走足厥陰肝經以膽與肝為表裡也下絡足之跗面即俠谿地五會臨泣等處也邪氣有餘而實則氣逆而為厥以肝脈在下也正氣不足而虛則為痿為痹雖坐亦不能起以肝主於筋也皆取此穴以治之耳足陽明之別名曰豐隆去踝八寸別走太陰其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹瘁喑實則狂顛虛則足不收脛桔取之所別也瘁當作猝此言胃經之絡穴也豐隆去外踝上八寸別走足太陰脾經以胃與脾為表裡也循脛骨外廉之上下巨虛等穴上至頭項而絡之以合於諸經之氣蓋胃為五臟六腑之大海也其頭項之下則絡於喉嗌故胃氣一逆則為喉痹為卒喑也邪氣有餘而實則為狂顛正氣不足而虛則足不能收而脛亦枯槁皆當取此穴以治之也足太陰之別名曰公孫去本節之後一寸別走陽明其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛虛則鼓脹取之所別也此言脾經之絡穴也公孫去足大指本節後一寸別走足陽明胃經以脾胃為表裡也其別者入絡於腸胃之中脾氣上逆而厥則為霍亂霍亂者揮霍擾亂也邪氣有餘而實則為腸中切痛正氣不足而虛則為鼓脹皆取此穴以治之耳足少陰之別名曰大鐘當踝後繞跟別走太陽其別者並經上走於心包下外貫腰脊其病氣逆則煩悶實則閉癃虛則腰痛取之所別也此言腎經之絡穴也大鐘穴當內踝後繞跟處別走足太陽膀胱經以腎與膀胱為表裡也又其別者並本經脈氣之行以上走於手厥陰心包絡經之下而外則貫於腰脊間其病氣逆則為煩心邪氣有餘而實則為閉癃以腎通竅於二便也正氣不足而虛則為腰痛皆取此穴以治之耳足厥陰之別名曰蠡溝去內踝五寸別走少陽其別者經脛上睪結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也此言肝經之絡穴也蠡溝去內踝上五寸陷中別走足少陽膽經以肝與膽為表裡也經於足脛以上於睪丸陰丸俗云陰子結於莖垂見邪客篇有莖垂其病氣逆則睪丸腫脹而卒成疝氣邪氣有餘而實則睪為挺長正氣不足而虛則為暴癢皆當取此穴以治之也任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取之所別也此言任脈經之絡穴也尾翳下於鳩尾散於腹中邪氣有餘而實則腹皮必痛正氣不足而虛則癢而搔之皆當取此穴以治之耳督脈之別名曰長強挾膂上項散頭上下當肩胛左右別走太陽入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也此言督脈經之有絡穴也長強脊骶骨端挾膂上項散於頭上下則當於肩胛之左右其別者則走於足太陽膀胱經以入貫於膂筋之間邪氣有餘而實則脊必強正氣不足而虛則頭必重且頭重難支必從高而搖之此皆挾脊之有病所致也皆取此穴以治之耳脾之大絡名曰大包出淵液上三寸布胸脅實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也此言脾經又有大絡穴也脾固有公孫穴為絡又有大絡名曰大包出足少陽膽經淵液下之三寸淵液腋下三寸宛宛中舉臂取之布於胸脅之中邪氣有餘而實則一身盡痛正氣不足而虛則百節盡皆縱弛此脈若羅紋之絡其絡中必有血皆當取此穴以治之凡此十五絡者實則必見虛則必下視之不見求之上下人經不同絡脈異所別也此結言取絡穴之有法也凡此十五絡者邪氣實則其脈必見正氣虛則其脈陷下若陷下而視之不見則求之上下諸穴即其不陷下者而知此穴之為陷也蓋人之經脈不見有十二經之分故絡脈之異而別行者亦有十五絡耳夫以十二經而謂之十五絡者以督任有二脾有大包故謂之十五也按此篇以督之長強任之尾翳為十五絡難經以陽蹺陰蹺之絡為十五絡殊不知督脈所以統諸陽任脈所以統諸陰還以靈樞為的也經別第十一內論十二經為六合經脈絡脈之別也故名篇黃帝問於岐伯曰余聞人之合於天道也內有五臟以應五音五色五時五味五位也外有六腑以應六律六律建陰陽諸經而合之十二月十二辰十二節十二經水十二時十二經脈者此五臟六腑之所以應天道夫十二經脈者人之所以主病之所以成人之所以治病之所以起學之所始工之所止也粗之所易上之所難也清問其離合出入奈何岐伯稽首再拜曰明乎哉問也此粗之所過上之所息也請卒言之此帝問十二經之離合出入而伯欲盡言之也足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陰之正至膕中別走太陽而合上至腎當十四顀出屬帶脈直者系舌本復出於項臺於太陽此為一合成以諸陰之別皆為正也尻枯尾切肛胡公切顀椎同此言膀胱與腎經之為一合也足太陽膀胱經自有正經之脈支別入於膕中央之委中穴其一道下尻五寸計承扶穴之處也別絡之脈入於肛門內屬於膀胱循脊膂當心而入散之直者從膂即中膂內俞膀胱俞等穴以上出於項後至前睛明穴乃屬於足太陽經此為一經也足少陰腎經之正由湧泉至內踝下至於膕中別走足太陽膀胱經而合上至腎當十四椎旁有腎俞穴出連帶脈直行者上系舌本復出於項合於足太陽膀胱經此與膀胱經為一合也有陽經必有陰經成以諸陰經之別皆為正經之合耳足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於外眥也足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合也此言肝與膽經為一合也足少陽膽經之正脈循脅裡出氣街入髀厭中繞毛際合於足厥陰肝經其別者入季脅之間循胸裡屬膽散之上肝貫心俠咽出頤頷中抵䪼下加頰車散於面系目系合足少陽於目之外眥也足厥陰之正別足跗上上至毛際合於足少陽膽經以二經相為表裡與膽經之別脈俱行此肝膽之為一合即上節而次第之故曰二合下文可仿此推之足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額顱還系目系合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也此言胃與脾經為一合也前篇論胃經脈氣之行起於鼻之迎香穴而下至厲兌此節所論則自下井滎輸經合而上行也故言足陽明之正由足次指上足跗循䯒外廉入膝臏抵伏兔以上髀關至氣衝入腹裡屬胃絡脾上通於心入缺盆上循喉嚨出於口上額顱還系目系合於足陽明之經隧也足太陰脾經與胃經為表裡亦上至髀關合於足陽明胃經與胃之別穴豐隆偕行上胸挾咽連舌本散舌中此胃與脾之為第三合也手太陽之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵液兩筋之間屬於心上走喉嚨出於面合目內眥此為四合也此言小腸與心經為一合也手太陽小腸經之正脈起於手小指之端循手外側上腕出踝中直上循臂骨下廉出肘內側兩骨之間上循臑外後廉出肩解繞肩腫交肩上故別於肩解入缺盆絡心循咽下膈抵胃屬小腸故入腋走心系小腸也其曰指地者以其脈之自上而下行也手少陰心經之正脈與小腸為表裡也起於心中出屬心系下膈絡小腸其直者從心系卻上肺別入於腋下之淵液穴屬於心上走喉嚨出於面合目內眥此為四合也手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵液三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也此言手三焦與心包絡之為一合也手少陽三焦經之正脈起於手四指之端循手表腕上貫肘循臑外上肩入缺盆下走三焦散於胸中以其脈上別於巔故曰指天也手厥陰心包絡經乃手心主之脈也別於腋下之天池穴去乳後一寸著脅直腋厥肋間乃本經穴也入胸中歷絡三焦出循喉嚨出耳後合於少陽完骨之下此為五合也手陽明之正從手循膺乳別於肩顒入柱骨下走大腸屬於肺上循喉嚨出缺盆合於陽明也手太陰之正別人淵液少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也此言大腸與肺經為一合也手陽明大腸經之正脈起手次指之端出合谷兩骨之間循臂入肘循臑上肩別循髃骨之前廉上出柱骨下人缺盆絡肺下膈屬大腸與肺為表裡上循喉嚨出缺盆合於手陽明之經隧也手太陰肺經之正脈別於心包絡經之淵液穴少陰心經之前入走於肺相合散之本經太陰之脈上出缺盆循喉嚨復合於陽明此其為六合也按此各經皆名曰正則正者正經也宜與經脈篇其直行者相合別者絡也宜與經脈篇其支者其別者相合今此篇之所謂正較之經脈篇甚略且非盡出正行之經是其意之所重者在合而與經脈之行不必及其詳耳經水第十二內論十二經脈合於十二經水故名篇黃帝問於岐伯曰經脈十二者外合於十二經水而內屬於五臟六腑夫十二經水者其有大小深淺廣狹遠近各不同五臟六腑之高下小大受谷之多少亦不等相應奈何夫經水者受水而行之五臟者合神氣魂魄而藏之六腑者受谷而行之受氣而揚之經脈者受血而營之合而以治奈何刺之淺深灸之壯數可得聞乎岐伯答曰善哉問也天至高不可度地至廣不可量此之謂也且夫人生於天地之間六合之內此天之高地之廣也非人力之所能度量而至也若夫八尺之士皮肉在此外可度量切循而得之其死可解剖而視之其臟之堅脆腑之大小谷之多少脈之長短血之清濁氣之多少十二經之多血少氣與其少血多氣與其皆多血氣與真皆少血氣皆有大數其治以針艾備調其經氣固其常有合乎此言十二經合十二水而刺灸之數亦相合也帝問人與天地本相參也天地有十二經水人身有十二經脈十二經水者有大小深淺遠近廣狹之異十二經脈者有高下小大受谷多少之殊其相應者必有故也且是五臟者合神氣魂魄而藏之者也本經本臟篇云五臟者所以藏精神魂魄者也六腑者受五穀而行化之又受谷所化精微之氣而揚之於臟腑者也本臟篇云六腑者所以化水穀而行津液者也經脈者受血而營之營衛生會篇云中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身今以臟腑經脈而合之於十二經脈以治其病刺有淺深灸有多寡無不吻合此其故又何也伯言天地難以度量人身猶可剖視臟之堅脆本藏篇有肝堅則臟安難傷肝脆則善病消癉易傷等語腑之大小平人絕谷篇有胃大二尺五寸等語腸胃篇有胃長一尺五寸等語谷之多少平人絕谷篇有胃受水穀三斗五升等語脈之長短脈度篇有脈長一十六丈二尺之數血之清濁根結篇有布衣匹夫之士王公大人血食之君血氣澀滑之異十二經之氣血多少皆有大數素問血氣形志篇云太陽常多血少氣少陽常少血多氣陽明多氣多血少陰常少血多氣厥陰常多血少氣太陰常多氣少血其治以針艾淺深多寡宜其盡與十二經水相合也即下文刺陽明深六分等義黃帝曰余聞之快於耳不解於心願卒聞之岐伯答曰此人之所以參天地而應陰陽也不可不察足太陽外合於清水內屬於膀胱而通水道焉足少陽外合於渭水內屬於膽足陽明外合於海水內屬於胃足太陰外合於湖水內屬於脾足少陰外合於汝水內屬於腎足厥陰外合於湧水內屬於肝手太陽外合於淮水內屬於小腸而水道出焉手少陽外合於漯水內屬於三焦手陽明外合於江水內屬於大腸手太陰外合於河水內屬於肺手少陰外合於濟水內屬於心手心主外合於漳水內屬於心包凡此五臟六腑十二經水者外有源泉而內有所稟此皆內外相貫如環無端人經亦然故天為陽地為陰腰以上為天腰以下為地故海以北者為陰湖以北者為陰不之陰漳以南者為陽河以北至漳者為陽中之陰漯以南至江者為陽中之太陽此一隅之陰陽也所以人與天地相參也澠彌善切漯通合切以與已同此承上文而言十二經脈合十二經水之數也伯以人身臟腑而合十二經水者蓋天位乎上為陽地位乎下為陰而人之腰以上象天腰以下象地故經水以東西南北而分陰陽及陰陽中之陰陽則人之臟腑亦以東西南北而合十二經水也所謂人與天地相參固如此按古今輿地圖清水遺籍無之黃河合淮處謂之清河今有清河縣疑是清水也渭水源出謂州原縣鳥鼠山至同州馮翊縣入河海水天地四方皆海水相通而地在其中蓋無幾也又四海之外皆復有海東曰渤海南曰漲海西曰青海北曰瀚海今曰海北為陰乃瀚海也湖水凡洞庭彭澤震澤之類皆曰湖水今曰湖以北為陰中之陰疑似彭澤也汝水源出南陽魯陽縣天息山東北至河南梁縣東南經襄城穎川汝南至汝陽褒信縣入淮澠水在今汝南府澠池縣淮水源出南陽桐柏山圍繞徐揚之界東入於海漯水古漯受河而東入海故禹貢浮漯可以入河自漢以後河漸南徙而瘰亦不復存江水源出西蜀之岷山至吳地入海其長萬里天固所以限南北也河水河有兩源一出蔥嶺一出於闐合流東注蒲昌海潛行地中南出積石為中國河又云河出崑崙千里一曲九曲入海千年一清聖人出焉故為四瀆之宗濟水即沇水源出河北王屋山濟河而南故又曰濟載河而流水不混其清故又曰清濟潛流屢絕狀雖微而獨尊故居四瀆之一漳水源出西山由磁洛州南入冀州新河鎮與河盧河合其後變徙入於河黃帝曰夫經水之應經脈也其遠近淺深水血之多少各不同合而以刺之奈何岐伯答曰足陽明五臟六腑之海也其脈大血多氣盛壯熱刺此者不深弗散不留不瀉也足陽明刺深六分留十呼足太陽深五分留七呼足少陽深四分留五呼足太陰深三分留四呼足少陰深二分圖三呼足厥陰深一分留二呼手之陰陽其受氣之道近其氣之來疾其刺深者皆無過二分其留皆無過一呼其少長大小肥瘦以心撩之命曰法天之常灸之亦然灸而過此者得惡火則骨枯脈澀刺而過此者則脫氣撩料同此言灸刺有多少之數也足陽明胃經多血其脈大其熱壯刺之者必深六分留十呼凡瀉者必先吸入針又吸轉針候呼出針凡補者必先呼入針又呼轉針又吸出針後世令病人咳嗽以代呼口中收氣以代吸氣有出入亦與呼吸相同今曰深六分則入之至深者也曰留十呼是言瀉法有十呼之久蓋入針必吸轉針必吸至十呼出針但補法不言吸數以理論之其吸與呼同數也後世凡針灸聚英等書言吸若干者皆言補法先呼後吸呼若干者皆言瀉法先吸後呼故針賦有云補者先呼後吸瀉者先吸後呼正此義也足太陽膀胱經多血少氣故刺之者深五分較足陽明減一分也瀉之者留七呼則呼後出針其呼數較足陽明減三呼矣足少陽膽經少血多氣刺之者止深四分較足太陽減一分也瀉之者留五呼則呼後出針其呼數較足太陽亦減二呼矣此乃足三陽經之針數也足太陰脾經多氣少血止深三分較足少陽減一分也留四呼則又減一呼矣足少陰腎經少血多氣止深二分較足太陰減一分也留三呼則又減一呼矣足厥陰肝經多血少氣止深一分較足少陰減一分也留二呼則又減一呼矣此乃足三陰經之刺數也凡手之陰陽六經與足經不殊而針法必異正以手之六經在上近於肺故肺受胃之穀氣而行諸經諸經受肺之大氣而行各經其受氣之道近故其氣之來也甚疾所以刺之者皆無過二分其留之者皆無過一呼也凡人之少長大小肥瘦皆當以心料之命曰法大之常道也其灸數之多寡亦然若灸之而過此數者則非善火乃惡火也其骨當枯其脈當澀刺之而過此數者其氣當脫矣黃帝曰夫經脈之小大血之多少膚之厚薄肉之堅脆及膕之大小可為度量乎岐伯答曰其可為度量者取其中度也不甚脫肉而血氣不衰也若失度之人痟瘦而形肉脫者惡可以度量刺乎審切循捫按視其寒溫盛衰而調之是謂因適而為之真也度量俱去聲此言人之肉不脫血氣不衰者可以度量而針灸之反此者則不可度量而止可調治也經筋第十三各經皆有筋而筋又有病及各有治法故名篇足太陽之筋起於足小指上結於踝邪斜上結於膝其下循足外踝結於踵上循跟結於膕其別者結於踹外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下顏結於鼻其支者為目上網下結於頄其支者從腋後外廉結於肩髃其支者入腋下上出缺盆上結於完骨其支者出缺盆邪上出於頄其病小指支跟腫痛膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為腧名曰仲春痹也此詳言膀胱經之筋其病為仲春痹而刺之有法也足太陽之筋起於足小指外側之至陰穴由通谷束骨京骨金門申脈結於踵跟之僕參崑崙又上循跟出於外踝由附陽飛揚承山承筋合陽結於膕中央之委中穴其別者從飛揚絡穴與膕中相併而行委陽浮郄殷門等穴以上結於臀上會陽下中次上四髎白環俞直至大椎計二十一穴開中行一寸五分挾脊上於項之天柱玉枕等穴其直者則結於玉枕之下枕骨上由是而上於頭以至前下於顏結於鼻又其支者自睛明為目上網下結於目下之頄又其支者從腋後外廉結於手陽明經之肩髃又其支者入於腋下上出於缺盆上結於完骨又其支者出於缺盆斜上出於目下之頄及其為病則足小指支跟當為腫為痛為膕中筋攣為脊中反折為項筋急為肩不舉為腋支缺盆中痛不可左右搖治之者當以燔針劫刺之刺之而已知則准其刺之之數其所取之腧穴即痛處是也俗雲天應穴者是也此證當發於二月之時故名之曰仲春痹也足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘眇季脅上走腋前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次相支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘眇季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為腧名曰孟春痹也此言膽經之筋其病為孟春痹而刺之有法也足少陽之筋起於足小指之次指即第四指之竅陰穴由俠谿地五會臨泣結於外踝下之丘墟上循脛外廉懸鐘陽輔光明外丘陽交結於膝外廉之陽陵泉其支者別起外輔骨上走於闢其在前則結於足陽明胃經伏兔之上其在後則結於督脈經之尻尾上其直者上乘䏚之季脅上走於腋之前廉繫於膺乳間上結於缺盆中又其直者上出於腋貫於缺盆出太陽之前循耳後上額角交巔上下走於頷上結於頄又其支者結於目支為外維論疾診尺篇診目痛脈從外走內者少陽病及其為病則小指之次指當為轉筋引於膝外轉筋其膝不可屈伸其膕中之筋甚急前引於髀前云上走髀前走結於伏兔之上後引於尻前後云者結於尻即上乘眇之季脅而痛前云上乘䏚季脅上引缺盆膺乳頸維之筋皆急從左以之於右其右目必不能開正以甲木在東也上過右角並蹺脈而行左絡於右故傷左角皆自左而右其右足不能舉用為左所傷命曰維筋相交治之者當以燔針劫刺之以知病為刺之數以痛處為腧穴此證當發於正月之時故名之曰孟春痹也足陽明之筋起於中三指結於跗上邪斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅屬脊其直者上循骭結於缺盆其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上網陽明為目下網其支者從頰結於耳前其病足中指支脛轉筋腳跳堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以青熨急頰且飲美酒噉美炙肉不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為腧名曰季春痹也本經論疾診尺篇云診目痛赤脈從上下者太陽病從下上者陽明病此言胃經之筋其病為季春痹而治之有法也足陽明之筋起於足之中三指蓋厲兌穴起於次指而其筋則自次指以連三指結於足跗上衝陽解谿等穴斜外而上加於輔骨下巨虛條口上巨虛三里上結於膝之外廉三里以直上結於髀樞上循脅屬於脊其直行者又上循骭結於缺盆其支行者結於外輔骨合於足之少陽其直行者上循本經之伏兔上結於本經之髀關而聚於陰器又上於腹中而布之以上至於缺盆復結於上頸挾於口合於目下之頄結顧下之鼻中其上合於足太陽經故彼太陽為目之上網此陽明為目之下網又其支者從頰結於耳前及其為病則足之中指支脛當為轉筋其腳之筋跳而且堅其伏兔亦為轉筋其髀前為腫為㿉疝為腹筋急上引缺盆及頰為猝然口歪而僻其目當不合而開然熱則筋脈縱緩當不開而合以緩不能收故為僻如此寒則頰筋急引其頰以移於口治之者以馬膏熬膏其寒而急者用白酒和桂末以塗之其熱而緩者用桑木為鉤鉤而架之即以桑炭置之地坎之中不拘高卑而人坐於其上以守等之亦以前膏熨其急頰且飲美酒噉美炙肉雖不善飲亦自強之又為之三拊其急頰而止又用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於三月之時故名之曰季春痹也足太陰之筋起於大捐之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大指支內踝痛轉筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為腧命曰孟秋痹也此詳言脾經之筋其病為孟秋痹而刺之有法也足太陰之筋起於大指之端內側隱白穴上結於內踝骨下之商丘其直行者絡於膝內輔骨之地機陰陵泉上循陰股結於髀而聚於陰器又上腹結之於臍循腹裡之腹結大橫腹哀等穴以結於肋散之於胸中其在內者則著之於脊及其為病則足大指內踝痛其痛乃轉筋也為膝之內輔骨痛為陰股引髀而痛為陰器之紐痛為下引於臍及兩脅作痛為引膺中及脊內痛治之者以燔針劫刺之以知病為刺數以痛處為腧穴此證當發於七月之時故名之曰孟秋痹也足少陰之筋起於小指之下並足太陰之筋邪斜走內踝之下結於踵與太陽之筋臺而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為腧在內者熨引飲藥此筋折紐紐發數甚者死不治名曰仲秋痹也此言腎經之筋其病為仲秋痹而刺之有法也足少陰之筋起於小指之下湧泉穴出於內踝下並足太陰脾經之筋斜趨內踝之下然谷太谿而結於踵之照海復溜水泉又與太陽膀胱之筋合而上結於內輔骨之下又並太陰脾之筋以上循陰股結於陰器循脊內挾膂以上至於項結於枕骨又與太陽之筋合其病當為足下轉筋及所過之處而凡有結者皆痛及為轉筋之病凡此所過之處又主癇瘛及痙疾等證病在於外主不能俯病在於內主不能仰蓋在外不能俯者正以陽病之腰反折故不能俯其病在後也在內不能仰者以陰病之腹不舒故不能仰其病在前也治之者用燔針以劫刺之以知病為刺數以痛處為腧穴且其在內有病者當熨之導引之飲之以藥若此筋折紐而紐痛病發數數加甚者當死不治此證當發於八月之時故名之曰仲秋痹也足厥陰之筋起於大捐之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰器不用傷於內則不起傷於寒則陰縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為腧命曰季秋痹也此詳言肝經之筋其病為季秋痹而刺之有法也足厥陰之筋起於大指之上大敦穴上結於內踝之前中封上循於脛上結內輔骨之曲泉以上循陰股之陰包等穴結於陰器以絡諸筋其病當為足大指支內踝之前痛為內輔骨痛為陰股痛或轉筋為陰器不用若傷於內則陰器不起若傷於寒則陰器縮入若傷於熱則陰器縱挺不收治在行其水以清陰氣其病為轉筋者治在用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於九月之時故名之曰季秋痹也手太陽之筋起於小指之上結於腕上循臂內廉結於肘內銳骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肘內銳骨後廉痛循臂陰入腋下腋下痛腋後廉痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針劫刺之以知為數以痛為腧其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結於角其痛當所過者支轉筋治在燔針劫刺以知為數以痛為腧名曰仲夏痹也此詳言小腸經之筋其病為仲夏痹而治之有法也手太陽之筋起於手小指之上少澤穴結於手外側之腕骨陽谷養老等穴以上循臂內廉結於肘內銳骨後之小海穴以手而彈之則應在手小指之上入結於腋下其支行者後走腋之後廉上繞肩腫蓋由肩貞臑俞天宗秉風曲垣肩外俞以人肩中俞循頸以出走手太陽之前結於耳後之完骨又其支者入於耳中又其直行者出於耳上下結於頷上屬於目之外眥及其為病則為手小指支肘內銳骨後廉痛又其筋循臂陰入腋下故為腋下痛又為腋後廉痛又為繞肩胛引頸而痛其頸痛應耳中鳴而痛其頸痛又引於頷而痛且其痛時目瞑良久乃得開視其頸筋加急則為筋瘻為頸腫其頸筋如有寒熱則治之者當用燔針以劫刺之以知病為刺數以痛處為腧穴若頸腫者刺而又刺曰復用銳針以刺之凡筋之為本支者上曲牙又循其耳前屬於目外眥上頷以結於耳角其痛當所過之處則為支轉筋治之者亦用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於五月之時故名之曰仲夏痹也手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為腧名曰季夏痹也此詳言三焦經之筋其病為季夏痹而刺之有法也手少陽之筋起於手小指之次指即第四指之端關衝穴由液門中渚結於手表腕上之陽池上循臂之外關支溝會宗三陽絡以結於肘之四瀆天井上繞臑之外廉即臑會穴以上於肩端之肩髎天髎走於頸之天牖以合於手經之太陽又其支者當曲頰前以入繫於舌本又其支者上於曲牙循於耳前之角孫耳門和髎以屬目外眥之絲竹空且上乘於頷結於角及其為病則凡筋所經過者即為支之轉筋為舌卷治之者用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於六月之時故名之曰季夏痹也手陽明之筋起於大捐次捐之端結於腕上循臂上結於肘外上臑結於髃莫支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治在燔針劫刺以知為數以痛為腧名曰孟夏痹也此詳言大腸經之筋其病為孟夏痹而刺之有法也手陽明之筋起於食指之端商陽穴由二間三間合谷以結於腕上之陽谿穴循臂上結於肘外之肘髎又上臑以結於肩之憇骨其支者繞於肩胛挾脊其直者循肩髃以上頸之天鼎穴又其支者上頰結於頄又其直者上出於太陽之前上於左角以絡於頭下於右頷凡其病所過者為支痛及為轉筋為肩不舉為頸不可左右以視治之者用燔針以刺之以知病為刺數以痛處為腧穴此證當發於四月之時故名之曰孟夏痹也手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為腧名曰仲冬痹也此詳言肺經之筋其病為仲冬痹而刺之有法也手太陽之筋起於手大指端之少商穴循指上行結魚際之後行寸口之外側上循臂以結於肘中之尺澤上臑之內廉入於腋下三寸之天府以出於缺盆結於肩前之髃骨又上結於缺盆下結胸裡散貫於賁難經四十四難有胃為賁門楊玄操云賁者鬲也胃氣之所出胃出穀氣以傳於肺肺在鬲上故胃為賁門合賁下抵季脅凡其病當所經過者為支轉筋痛甚則成為息賁本經邪氣臟腑病形篇有肺脈滑甚為息賁又為脅急為吐血治之者用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於十一月之時故名之曰仲冬痹也手心主之筋起於中捐與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於臂其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為腧名曰孟冬痹也此詳言心包絡之筋其病為孟冬痹而刺之有法也手心主之筋起於手中指之中衝與手太陰之筋井行結於肘之內廉曲澤上臂陰以結於腋下之天泉天池下散於在前在後之挾脅處其支者則入於腋散於胸中結於臂及其為病凡筋所經過者為支轉筋其筋及於前為胸痛為息賁治之者用燔針以劫刺之以知病為刺數以痛處為腧穴此證當發於十月之時故名之曰孟冬痹也手少陰之筋起於小捐之內側結於銳骨上結肘內廉上入腋交太陰挾乳里結於胸中循臂下繫於臍其病內急心承伏梁下為肘網其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為腧其成伏梁唾血膿者死不治經筋之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也此詳言心經之筋其病為季冬痹而刺之有法也手少陰之筋起於手小指之內側少衝穴結於掌後銳骨端之神門上結肘內廉之青靈上入腋間以交於手太陰挾乳里結於胸中循臂下繫於臍其病當為內急及心承伏梁下為肘網凡筋所經過者為支轉筋而筋則痛治之者用燔針以劫刺之以知病為刺數以痛處為腧穴如其已成伏梁而吐血不止當死不治大凡經筋之病寒則反折筋急熱則筋必弛縱不收陰痿不用且寒急用陰陽之分背為陽陽急則反折腹為陰陰急則俯不伸故製為焠刺者正為寒也焠刺即燔針彼熱則筋縱不收不得用此燔針此證當發於十二月之時故名曰季冬痹也足之陽明手之太陽筋急則口目為噼眥急不能卒視治皆如上方也噼僻同口僻之義此申言胃與小腸二經之筋其有病當治法如前也足之陽明胃經手之太陽小腸經其筋若急則口與目皆為喎噼其目眥亦急不能猝然視物治之者用燔針以劫刺之以知病為刺數以痛處為腧穴故曰治法如上方也前俱詳言而又申言之叮嚀之意也骨度第十四此言人身之骨皆有度數故名篇黃帝問於伯高曰脈度言經脈之長短何以立之伯高曰先度其骨節之大小廣狹長短而脈度定矣脈度之度度字如字先度之度音鐸此言人身之脈度則骨度而定也脈度脈有度數亦本經篇名下文將言骨有度數而先以是啟之耳黃帝曰願聞眾人之度人長七尺五寸者其骨節之大小長短各幾何伯高曰頭之大骨圍二尺六寸度如字此言頭之大骨有度也胸圍四尺五寸腰圍四尺二寸此言胸圍腰圍各有其度也發所覆者顱至項尺二寸發以下至頤長一尺君子終折結喉以下至缺盆中長四寸缺盆以下至𩩲骬長九寸過則肺大不滿則肺小𩩲骬以下至天樞長八寸過則胃大不及則胃小天樞以下至橫骨長六寸半過則迴腸廣長不滿則狹短橫骨長六寸半橫骨上廉以下至內輔之上廉長一尺八寸內輔之上廉以下至下廉長三寸半內輔下廉下至內踝長一尺三寸內踝以下至地長三寸膝膕以下至跗屬長一尺六寸跗屬以下至地長三寸故骨圍大則太過小則不及顱音盧𩩲音結骬音於此言仰人之骨度蓋縱而數之也顱頭顱也顱之皮生髮發所覆者即顱也顱至項長一尺二寸頷下為頤髮際以下至頤長一尺君子終折言士君子之面部三停齊等可以始中終而三折之也眾人未必然耳巨骨上陷中為缺盆亦穴名即足陽明胃經穴也結喉以下至缺盆中長四寸𩩲骬骨名一名尾翳一名鳩尾蔽骨之端在臆前蔽骨下五分人無蔽骨者從岐骨際下行一寸本經本臟篇云無𩩲骬者心高𩩲骬小短舉者心下𩩲骬長者心下堅𩩲骬弱小以薄者心脆𩩲骬直下不舉者心端正𩩲骬倚一方者心偏傾也缺盆以下至𩩲骬長九寸若過於九寸而始至𩩲骬則其肺必大若不滿九寸而即是𩩲骬則其肺必小天樞在臍旁二寸足陽明胃經穴也素問六微旨大論岐伯曰天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之𩩲骬以下至天樞長八寸若過於八寸而始至天樞則其胃必大若不及八寸而即是天樞則其胃必小然天樞無形以臍之高下為驗也橫骨即曲骨下蓋臍下四寸為中極中極下一寸為曲骨曲骨之分為毛際毛際下乃橫骨也天樞以下至橫骨長六寸半若過於六寸半而始至橫骨則迴腸廣闊而長若不滿六寸而即是橫骨則迴腸狹而且短且橫骨之橫長當有六寸半耳內輔者膝內輔骨也橫骨之上廉以下至內輔骨之上廉長一尺八寸內輔骨之上廉以下至外輔骨之下廉僅長三寸半內踝者足跟前兩旁起骨為踝在外為外踝骨而在內為內踝骨也內輔骨之下廉以下至內踝骨長一尺三寸內踝骨以下至地僅長三寸腓腸上膝後曲處為膕膝在前膕在後因至下之長相同故並及之足面為跗跗屬者自內踝以前而統之以跗去內踝骨不遠故膝膕以下至跗屬則長一尺六寸跗屬以下至地僅長三寸上節頭之大骨為圍此節腰骨為圍者大則以下之數皆太過小則以下之數皆不及自發所覆者至此皆仰人之骨度也頭之大骨圍二尺六寸發所覆者顱至項一尺二寸發以下至頤一尺唇至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸見腸胃篇角以下至柱骨長一尺行腋中不見者長四寸腋以下至季脅長一尺二寸季脅以下至髀樞長六寸髀樞以下至膝中長一尺九寸膝以下至外踝長一尺六寸外踝以下至京骨長三寸京骨以下至地長一寸此言側人之度亦縱而數之也耳上之旁為骨角肩胛上際會處為柱骨挾項後髮際大筋外廉陷中自角以下至柱骨長一尺肩下脅上為腋自柱骨行於腋下之隱處長四寸脅骨之下為季脅腋以下至季脅長一尺二寸捷骨之下為髀樞一名髀厭股外為髀季脅以下至髀樞長六寸髀樞以下至膝之中長一尺九寸膝以下至外踝骨長一尺六寸京骨足太陽膀胱經穴名在足外側大骨下赤白肉際陷中外踝骨以下至京骨長三寸京骨以下至地長一寸自角以下至此皆側人之骨度也耳後當完骨者廣九寸此言左右完骨之相去約有九寸蓋橫而言之也耳後高骨曰完骨入髮際四分蓋亦承上文側人之狀而備言之耳耳前當耳門者廣一尺三寸兩顴之間相去七寸兩乳之間廣九寸半此又言仰人之骨度蓋橫而數之也左右耳前之耳門相去一尺三寸目下高骨為顴兩顴之間相去七寸兩乳之間相去九寸半兩髀之間廣六寸半此又言側人之兩髀其度數各廣六寸半也足長一尺二寸廣四寸半肩至肘長一尺七寸肘至腕長一尺二寸半腕至中指本節長四寸本節至其末長四寸半此言手足之度數也自足而言其長一尺二寸廣則四寸半自手而言肩至肘長一尺七寸肘至於腕長一尺二寸半腕至中指之本節長四寸本節至指之末長四寸半項發以下至背骨長二寸半膂骨以下至尾骶二十一節長三尺上節長一寸四分分之一奇分在下故上七節至於膂骨九寸八分分之七骶音氏此言伏人之骨度也項發以下至脊骨之端長二寸半脊骨為膂書曰為股肱心膂膂骨以下至尾骶共二十一節計長三尺上節每節長一寸四分一釐也其奇分當在下節故膂骨以上計有七節乃項發以下至膂骨之數也每節長一寸四分一釐則七得七寸四七二寸八分共九寸八分又每節一釐共計九寸八分七釐故曰九寸八分分之七也此眾人骨之度也所以立經脈之長短也是故視其經脈之在於身也其見浮而堅其見明而大者多血細而沉著多氣也此結言骨度可以定脈度之長短而遂言視經脈血氣之法也顯者多血微者多氣多則可瀉而少則可補矣五十營第十五營者運也脈之營行有五十度故名篇黃帝曰余願聞五十營奈何岐伯答曰天周二十八宿宿三十六分人氣行一周千八分日行二十八宿人經脈上下左右前後二十八脈周身十六丈二尺以應二十八宿漏水下百刻以分晝夜故人一呼脈再動氣行三寸一吸脈亦再動氣行三寸呼吸定息氣行六寸十息氣行六尺日行二分二百七十息氣行十六丈二尺氣行交通於中一周於身下水二刻日行二十五分五百四十息氣行再周於身下水四刻日行四十分二千七百息氣行十周於身下水二十刻日行五宿二十分一萬三千五百息氣行五十營於身水下百刻日行二十八宿漏水皆盡脈終矣所謂交通者並行一數也故五十營備得盡無地之壽矣凡行八百一十丈也此篇詳言經脈之行晝夜有五十度之數也營者運也五十營者謂五十度也經脈之行於晝者二十五度行於夜者二十五度故日五十營伯言人身經脈之行上合於天星之度下合於漏水之下者也天周二十八宿即角亢氐房心尾箕鬥牛女虛危室壁奎婁胃昂畢嘴參井鬼柳星張翼軫也按本經衛氣行篇云歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八宿房昂為緯虛張為經是故房至畢為陽昂至心為陰陽主晝陰主夜者是也每宿析為三十六分積而推之十宿得三百六十分二十宿得七百二十分八宿三八得二百四十分六八得四十八分共得一千八分人之脈氣其晝夜一周亦合此一千八分之數而日之所行者已周二十八宿義詳下文正以人之經脈上下升降凡左右前後共二十八脈蓋十二經有十二脈而左右相同則為二十四脈加以陽蹺陰蹺督脈任脈其計二十八脈其脈總計長短之數凡手之三陰三陽足之三陰三陽兩蹺督任周身共有一十六丈二尺見後脈度篇上應天之二十八宿下應漏水百刻以分為晝夜運行之度也故人一呼脈再動其脈氣行三寸一吸脈亦再動其脈氣行三寸呼吸總為一息則其脈氣行六寸積至十息則其脈氣行六尺而天之日其行為七釐五毫按正文本云二分今細推之其所謂二分者誤也假如曰二分則百息當行二十分千息當行二百分萬息當行二千分加三千五百息又當行七百分原數止得一千八分今反多得一千六百九十二分想此經向無明注遂致誤傳未正今考其數當云日行七釐半則一萬三千五百息正合日行一千八分之數詳見下文由是而悉推之則一百三十五息脈行八丈一尺下水一刻日行十分六釐二百七十息脈行十六丈二尺氣行交通於中而一周於身其下水計二刻日行二十分一釐二毫按正文曰二十五分者蓋誤寫一釐二毫為五分也若據此數則下文五百四十息水下四刻當云五十分不應曰四十分且據二十五而推之則一萬三千五百息水下百刻當得一千二百五十分比原數多得二百四十二分五百四十息其脈氣當再周於身下水四刻日行四十分二釐二毫正文缺二釐二毫二千七百息其脈氣十周於身下水二十刻日行五宿二十一分六釐正文缺一分六釐自此以下當云五千四百息氣行二十周於身下水四十刻日行十一宿七分二釐又當云八千一百息氣行三十周於身下水六十刻日行十六宿二十八分八釐又當云一萬八百息氣行四十周於身下水八十刻日行二十二宿一十四分四釐積至一萬三千五百息氣行五十營於身下水百刻日又行五宿二十一分六釐則共行二十八宿其漏水皆盡而脈氣終矣吾前所謂氣行交通於中一周於身者並五十營而皆如始時一周之數也故五十營備者必無病而得以盡天地所賦之壽矣否則如根結篇之所謂不應數者名曰狂生也營氣第十六此篇論營氣運行故名篇黃帝曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中布散於外精專者行於經隧常營無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大指間與太陰合上行抵髀從脾注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小捐之端循足心注足少陰上行注腎從腎注心外散於胸中循心主脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行注膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也此言營氣之運行一如宗氣之所行也宗氣所行之次盡見於經脈篇此篇論營氣所行與宗氣無異辭雖不同而其次同也宗氣者大氣也大氣積於胸中出喉嚨司呼吸以行經隧始於手太陰肺經終於肝經積至一萬三千五百息脈行八百一十丈如前篇五十營之所論者是也營氣者陰氣也由中焦之氣中有陰者隨中焦之氣以降於下焦而生此陰氣故謂之清者為營又謂之營氣出於中焦者是也然此營氣者必成於水穀所化精微之氣故曰營氣之道穀氣為寶非穀氣不能生此營氣非營氣不能生血也道者脈氣所由行之經隧也正以谷入於胃則精微之氣即升之而為宗氣者由中焦傳肺經之中府以上雲門而行手太陰肺經遂行手陽明大腸經足陽明胃經足少陰脾經手少陰心經手太陽小腸經足太陽膀胱經足少陰腎經手厥陰心包絡經手少陽三焦經足少陽膽經足厥陰肝經流溢於臟腑之中布散於經脈之外此營氣者陰性精專必隨宗氣以運行於經隧之中始於手太陰肺經終於足厥陰肝經終而復始是謂天地之紀亙萬古而不易者也試以其脈氣之行一如宗氣所行者言之故氣從太陰肺經出注手陽明大腸經上行注足陽明胃經下行至跗足面為跗即衝陽陷谷內庭厲兌等處皆胃經穴上注大指間隱白脾經穴與太陰合即足太陰脾經上行抵髀即陰陵泉血海箕門等穴俱在髀之內廉屬脾經穴注心中心經循手少陰出腋下臂即極泉青靈等處皆屬手少陰心經注小指少澤穴屬心經合手太陽即小指外側屬小腸經上行乘腋臑俞等處小腸經穴出䪼目下為䪼顴髎等處小腸經穴內注目內眥睛明足太陽膀胱經穴上巔曲差五處通天絡郄等處足太陽膀胱經穴下項天柱大杼等穴亦膀胱經穴合足太陽膀胱經循脊自背中脊開一寸五分有大杼至八憇等穴開三寸有附分至秩邊等穴皆屬足太陽膀胱經下尻下行注足小指之端即膀胱經至陰穴循足心斜趨足心之湧泉穴屬足少陰腎經注足少陰即腎經上行注腎從腎注心即手厥陰心包絡經外散於胸中循心主脈即心包絡經出腋天池天水等穴屬心包經下臂曲澤郄門間使內關等穴屬心包經出兩筋之間大陵穴屬心包經入掌中勞宮出中指之端中衝穴亦屬心包經還注手小指次指之端即四指端關衝穴屬手少陽三焦經合手少陽此手少陽三焦經乃手厥陰心包絡經之府與右腎為合者上行至膻中散於三焦經脈篇云循臑外上肩交出足少陽之後入缺盆交膻中散絡心包下膈循屬三焦此三焦乃前三焦非上文手少陽之三焦即營衛生會篇所謂宗氣出於上焦營氣出於中焦衛氣出於下焦之三焦也從此三焦注於膽經出脅注足少陽京門帶脈五樞等處下行至跗丘墟臨泣地五會等處皆膽經穴復從跗上注大指間合足厥陰大指大敦穴上行至肝從肝上注肺復行肺經上循喉嚨入頏顙之後究於畜門按素問評熱病論注啟玄子有氣衝突於畜門句其新校正以為疑是賁門即畜門難經四十四難有胃為賁門楊玄操釋云賁者鬲也胃氣之所出胃出穀氣以傳於肺肺在鬲上故胃為賁門未知的否其支別者上額督脈經神庭處循巔上星囟會前頂百會後頂等處下項中由強間腦戶下風府啞門等處循脊入骶由大椎至長強是督脈也又絡前之陰器上過毛中入臍中任脈經自會陰至神闕上循腹裡入缺盆自水分至天突皆任脈也下注肺中復出於手太陰肺經此營氣之所行或逆數或順數皆合常脈其運行之次無相失也脈度第十七此言脈有度數故名篇黃帝曰願聞脈度岐伯答曰手之六陽從手至頭長五尺五六三丈手之六陰從手至胸中三尺五寸三六一丈八尺五六三尺合二丈一尺足之六陽從足上至頭八尺六八四丈八尺足之六陰從足至胸中六尺五寸六六三丈六尺五六三尺合三丈九尺蹺脈從足至目七尺五寸二七一丈四尺二五一尺合一丈五尺督脈任脈各四尺五寸二四八尺二五一尺合九尺凡都合一十六丈二尺此氣之大經隧也此言脈有度數也夫手止有三陽而今曰六陽者以左右手各有三陽故謂之六陽下文稱手之六陰及足之六陽六陰皆仿此雖經指為三陰三陽者以一手言也從手至頭者太陽自小指少澤至頭之聽宮陽明自手次指商陽至頭迎香少陽自手四指關衝至頭和憇也各長五尺則五六共有三丈也手之六陰太陰自手大指少商至胸中中府少陰自手小指少衝至胸中極泉厥陰自手中指中衝至胸中天池各長三尺五寸三六計一丈八尺五六得三尺共有二丈一尺也足之六陽太陽自足小指至陰至頭睛明陽明自足次指厲兌至頭頭維少陽自足四指竅陰至頭瞳子髎各長八尺六八計四丈八尺也足之六陰太陰自足大指隱白至胸中大包少陰自足心湧泉至胸中俞府厥陰自足大指大敦至胸中期門各長六尺五寸六六計三丈六尺五六得三尺共有二丈九尺也蹺脈從足至目長七尺五寸二七計一丈四尺二五得一尺共有一丈五尺也按蹺脈有陽蹺陰蹺陽蹺自足申脈行於目陰蹺自足照海行於目然陽蹺左右相同陰蹺亦左右相同則蹺脈宜乎有四今曰二七一丈四尺二五一尺則止於二脈者何也觀本篇末云蹺脈有陰陽何脈當其數岐伯答曰男子數其陽女子數其陰則知男子之所數者左右陽蹺女子之所數者左右陰蹺也督脈在後任脈在前各長四尺五寸二四得八尺二五得一尺共有九尺也由上十二經及蹺脈督任大都共有一十六丈二尺此乃脈氣之大經隧也經脈為里支而橫者為絡絡之別者為孫盛而血者疾誅之盛而瀉之虛者飲藥以補之內經曰經曰絡曰孫絡三義本此此承上文而言經絡孫絡之義及有用針用藥之法也經脈為里者如手太陰肺經自中府至少商乃直行之經在於里里者即上文之所謂經隧也其支而橫者即如肺經有列缺穴橫行手陽明大腸經者為絡也其絡之別者為孫猶有子而又生孫較之正絡為尤盛電但曰絡曰孫而血脈盛者急責之急責云者正以邪氣盛者當瀉之也若正氣虛者則止飲藥以補之耳五臟常內閱於上七竅也故肺氣通於鼻肺和則鼻能知臭香矣心氣通於舌心和則舌能知五味矣肝氣通於目肝和則目能辨五色矣脾氣通於口脾和則口能知五穀矣腎氣通於耳腎和則耳能聞五音矣五臟不和則七竅不通六腑不和則留為癰故邪在腑則陽脈不和陽脈不和則氣留之氣留之則陽氣盛矣陽氣太盛則陰脈不利陰脈不利則血留之血留之則陽氣盛矣陰氣太盛則陽氣不能營也故曰關陽氣太盛則陰氣弗能營也故曰格陰陽俱盛不得相營故曰關格關格者不得盡期而死也此言五臟上通於七竅遂即臟腑不和者以決其脈之至於關格而死上七竅者陽竅也陽竅在於面部目二鼻二耳二口舌一若陰竅二則前陰後陰乃在下部者也總名曰九竅五臟雖在內而上通於七竅故鼻為肺之竅必肺和而後鼻能知香臭也舌為心之竅必心和而後舌能知五味也目為肝之竅必肝和而後目能辨五色也口為脾之竅必脾和而後口能知五穀也口知五穀即舌知五味故分之雖有二而此共為一竅腎氣通於耳必腎和而後能聞五音也若五臟不和則五臟主內不能通此七竅矣彼六腑不和則六腑主表當留結為癰故邪在六腑則陽經之脈不和而氣留於表者陽氣太盛陽氣太盛則陰經不能相和而陰脈不利陰脈不利則血在於內者亦已留滯而陰氣太盛夫此陰經之氣太盛則足手六陰俱病而氣口之脈一盛二盛三盛四盛其病正在厥陰少陰太陰也致使六陽經之脈氣不能運而入於內矣其名曰關關者關六陽在外而使之不得入於內也陽經之氣太盛則足手六陽經俱病而人迎之脈一盛二盛三盛四盛其病正在少陽太陽陽明也致使六陰經之脈氣不能運而出外矣其名曰格格者拒六陰在內而使之不得出於外也陰脈陽脈俱盛不得相營其名曰關格關格者不得盡其壽期而死難經三十七難誤以六陰脈盛為格六陽脈盛為關致後世不曰脈體而指曰鬲證尤誤之誤也黃帝曰蹺脈安起安止何氣營水岐伯答曰蹺脈者少陰之別起於然骨之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出入迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相坯則為濡目氣不營則目不合此言陰蹺之起止也帝問蹺脈起止者陽蹺陰蹺而伯只以陰蹺答之未及於陽蹺也人身氣血如水之流帝遂以蹺脈起止何氣營水為問伯言陰蹺脈者乃足少陰腎經之別脈也起於然骨之下照海穴出內踝上又直上之循陰股以入於陰上循胸裡入於缺盆上出人迎之前入於目下之頄屬於目內眥睛明穴合於足太陽膀胱經之陽蹺而上行惟此陰陽二蹺之氣相井而周旋之則能潤澤於目否則目氣不營而目不能合矣黃帝曰氣獨行五臟不營六腑何也岐伯答曰氣之不得無行也如水之流如日月之行不休故陰脈營其臟陽脈營其腑如環之無端莫知其紀終而復始其流溢之氣內溉臟腑外濡腠理此言臟腑之氣流行而不息也陰脈者即足手六陰經之脈也所以運之於五臟也陽脈者即足手六陽經之脈也所以運之於六腑也陰出之陽如肺經行於大腸也陽入之陰如胃行於脾也如環無端流行不已內溉於臟腑外濡於腠理豈曰獨行於五臟而不營於六腑者哉黃帝曰蹺脈有陰陽何脈當其數岐伯答曰男子數其陽女子數其陰當數者為經其不當數者為絡也其數之數去聲余上聲此承首節而言男子數其陽蹺女子數其陰蹺故謂之蹺脈有二也然男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡其有經絡之分者如此營衛生會第十八論營衛所由生會故名篇難經將篇內與營俱行之營字下多一衛字故後世不知營在脈中衛在脈外又不分前後三焦及不知清者為營濁者為衛之義惜哉黃帝問於岐伯曰人焉受氣陰陽焉會何氣為營何氣為衛營安從生衛於焉會老壯不同氣陰陽異位願聞真會岐伯答曰人受氣於谷谷入於胃以傳與肺五臟六腑皆以受氣其清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隴為重陽夜半而陰隴為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隴夜半後而為陰衰平旦陰盡而陽受氣矣日中為陽隴日西而陽衰日入陽盡而陰受氣矣夜半而大會萬民皆臥命曰合陰平旦陰盡而陽受氣如是無已與天地同紀隴當作隆素問生氣通天論有日中而陽隆蓋古以隆隴通用重俱平聲此詳言營衛之生會與大地之行同其度也帝問人身之氣必有所由受陰升陽降必有所由會曰營曰衛各以何氣成之又生於何所而會於何所且老壯之氣不同男女之位必異果何自而知其所會伯言人身之氣受之於穀氣者也始焉谷入於胃而後能生精微之氣此氣出於中焦以傳與肺而肺傳之五臟六腑則五臟六腑皆得以受此精微之氣矣其大氣積於胸中者為上焦所謂宗氣流於海者是也上焦即任脈經膻中穴又名上氣海臍上四寸曰中脘穴為中焦臍下一寸曰陰交穴為下焦此三焦者上焦降於中焦而中焦降之下焦下焦升於中焦而中焦升之上焦猶天道下濟地道上行之象也上焦為陽中焦則上半為陽下半為陰下焦則為陰然中焦之下半為陰者由上焦之氣降於中焦而中焦之氣隨上焦之氣以降於下焦而生此營氣營氣者陰氣也故曰清者為營言由上中二焦之清氣降而生之者也下焦之為陰者陰極陽生升於中焦隨中焦之上半為陽者以升於上焦而生此衛氣衛氣者陽氣也始時陽氣甚微而至此則陽氣甚盛故曰陽受氣於上焦見素問調經論然此衛氣者乃下焦之濁氣升而生之故曰濁者為衛宗氣積於胸中出喉嚨以司呼吸而行於十二經隧之中營則陰性精專隨宗氣以行於經隧之中所以營之行者在於經脈之中也衛則陽性剽悍滑利不能入於經脈之隧故不隨宗氣而行而自行於各經皮膚分肉之間所以衛之行者在於經脈之外也營氣之隨宗氣而行者一呼脈行三寸一吸脈行三寸呼吸定息則脈行六寸而一刻之中計一百三十五息脈行八丈一尺二刻之中計二百七十息脈行十六丈二尺為一周身積至一晝一夜為百刻則一萬三千五百息脈行八百一十丈矣是行於晝者二十五度行於夜者二十五度始於手太陰肺經而終於足厥陰肝經至五十度而復大會於肺經也陰經行盡而陽經繼之陽經行盡而陰經繼之陰陽相貫真如環之無端也如肺經行大腸胃行脾經之類是營氣之行者如此彼衛氣於平旦之時遂出於目之睛明穴以行於足太陽膀胱經遂行於手太陽小腸經又行於足少陽膽經手少陽三焦經足陽明胃經手陽明大腸經行於陽經者二十五度至日西而陽盡則行於足少陰腎經手少陰心經手太陰肺經足厥陰肝經足太陰脾經行於陰經者亦二十五度故衛氣自足太陽膀胱經而起至足太陰脾經而止者如此故曰平旦者天之陽也至日中則為陽之陽乃陽氣之隆盛也謂之曰重陽夜者陰也至夜半則為陰之陰乃陰氣之隆盛也謂之曰重陰故營氣隨宗氣以行於經隧之中始於手太陰而復大會於手太陰此太陰之所以主內也衛氣不隨宗氣而行而自行於各經皮膚分肉之間始於足太陽而復會於足太陽此太陽之所主外也營氣衛氣各行於晝二十五度各行於夜二十五度分為晝夜各為五十度也且所謂夜半而陰隆為重陰者寧無陽以繼之須知夜半後而為陰衰則至平旦之時陰氣已盡而陽復受氣矣所謂日中而陽隆為重陽者寧無陰以繼之須知日已西而為陽衰則日入陽盡而陰復受氣矣此乃天地運行之紀萬古不磨者也故至於夜半之時陰氣已盡陽氣方生陰陽大會萬民正於此而皆臥命曰合陰合陰者皆靜而臥真陰勝之候也然至於平旦則陰氣已盡陽復受氣營衛之行如是無已真與天地同其運行之紀也按李東垣此事難知集釋清者為營二句非經旨也黃帝曰老人之不夜瞑者何氣使然少壯之人不晝瞑者何氣使然岐伯答曰壯者之氣血盛其肌肉滑氣道通營衛之行不失其常故晝精而夜瞑老者之氣血衰其肌肉桔氣道澀五臟之氣相搏其營氣衰少而衛氣內伐故晝不精夜不瞑按上文有萬民皆臥一語故此遂以老壯寤寐問之上節言老壯不同氣故此復以老人之夜不瞑少壯之晝不瞑者問之氣道通者脈氣之道也營衛之行不失其常者如上節之論營衛是也黃帝曰願聞營衛之所行皆何道從來岐伯答曰營出於中焦衛出於下焦此言營衛之所由生也文義見上節注中黃帝曰願聞三焦之所出岐伯答曰上焦出於胃上口並咽以上貫膈而布胸中走腋循太陰之分而行還至陽明上至舌下足陽明常與營俱行於陽二十五度行於陰亦二十五度一周也故五十度而復大會於手太陰矣此言上焦乃宗氣之所出與營氣同行於經隧之中也帝問三焦之所出而伯先以上焦答之上焦者即膻中也胸中宗氣積焉其宗氣受水穀精微之氣出於胃之上口即上脘也並咽以上貫膈出喉嚨司呼吸一呼脈行三寸一吸脈行三寸而布於胸中即肺經之中府雲門也走腋之俠白尺澤下臂之孔最列缺經渠魚際又下大指之少商此正循手太陰經之分而行還至手陽明大腸經上至舌又下足陽明胃經又行脾行心行小腸行膀胱行腎行心包行三焦行膽行肝常與營氣俱行於晝二十五度行於夜二十五度故五十度而復大會於太陰肺經矣難經營字下誤多一衛字黃帝曰人有熱飲食下胃其氣未定汗則出或出於面或出於背或出於身半其不循衛氣之道而出何也岐伯曰此外傷於風內開腠理毛蒸理泄衛氣走之固不得循其道此氣剽悍滑疾見開而出故不得從其道故命曰漏泄此言人用熱飲食而汗出者以感風邪而開腠理也飲食之熱者下於胃中氣尚未定汗遂外出或面或背或於半身並無定所彼衛氣之行於分肉者自有所行之路而此汗之出不循衛氣之道者正以外傷於風得熱飲食以致內開腠理毛蒸理泄衛氣已循分肉而走之此熱飲食之氣剽悍滑疾見腠理之開而遂出為汗不得從衛氣之道也名之曰漏泄耳按上節間三焦之所出伯所答者止以上焦未及中下二焦而帝遂以熱飲食之汗者間之蓋承胃上口而問耳黃帝曰願聞中焦之所出岐伯和答曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣泌音必此言營氣出於中焦乃化血而行經隧者也營氣者陰氣也本屬下焦而由中焦之氣降以生之故曰營氣出於中焦是中焦之氣亦並胃之中脘出於上焦之下此乃營氣之所受也營氣泌別糟粕蒸其津液化其精微隨宗氣以上注於肺而行於十二經之中凡心中所生之血賴此營氣而化以奉養生活之身乃至貴而無以尚焉者也但陰性精專故獨得以行於經隧耳此以衛氣之在外者而較之則營氣在內如將之守營故名之曰營氣者以此素問生氣通天論云陰在內陽之守也正謂此耳黃帝曰夫血之與氣異名同類何謂也岐伯答曰營衛者精氣也血者神氣也故血之與氣異名同類焉故奪血者無汗奪汗者無血故人生有兩死而無兩生此言血氣本為同類而人不可以兩傷之也承上文而言營氣化血則血之與氣其名雖異而其類則同故古經有是言而帝乃援以間之此氣字似承上文單指營氣言然古經所言與岐伯下文所答則氣兼營衛言蓋營衛雖分陰陽皆出於穀氣所化之精氣也伯言營為水穀之精氣衛為水穀之悍氣此二語出素問痹論雖有陰陽之殊而均之為水穀之精氣也血則由營氣所生乃氣之神化者也有精氣然後有神氣故謂之異名同類也惟其異名同類則邪在氣者可傷氣而不可傷血邪在血者可傷血而不可傷氣不可以兩傷之也試觀上文言營氣泌糟粕蒸津液化其精微上注於肺脈化而為血則血以營氣而化以液而成汗即心之液是血與汗亦一物而異名也故奪血而瀉之者無得再發其汗奪汗而發之者無得再去其血若奪血者又奪汗奪汗者又奪血則兩者受傷人必有死而無生故謂之有兩死而無兩生者此也按此節岐伯不言下焦而以血氣異名同類為言者蓋帝承上節而問則伯不得不答之也猶第四節之意亦重第三節也黃帝曰願聞下焦之所出岐伯答曰下焦者別迴腸注於膀胱而滲入焉故水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入膀胱焉此言下焦之所司見衛氣之所生也下焦者在臍下一寸陰交之處由上焦在膻中中焦在中脘較之而此則為下焦也胃納水穀脾乃化之化已入於小腸小腸之下口在左則膀胱相著但膀胱無上口而有下口在右則大腸接之按針灸聚英言迴腸即大腸當臍右本經腸胃篇言迴腸當臍左以義推之應當臍右其左字疑誤此下焦之氣渣滓則別入於迴腸而在後以出之水液注滲於膀胱而在前以出之故知水穀者常並居於胃中入小腸成糟粕以俱下於大腸其精微之氣由上中二焦以降於此而成下焦若水液則滲而俱下濟當作泲泌泲之聲別汁別行水液之汁循此下焦之氣而滲入膀胱焉但此下焦之氣陰中有陽者升於中上二焦以生陽氣乃謂之衛氣也故命之曰衛氣出於下焦耳黃帝曰人飲酒酒亦入胃谷未熟而小便獨先下何也岐伯答曰酒者熟谷之液也其氣悍以清故後谷而入先谷而液出焉按上節有滲入膀胱一語故此節遂以酒之先下者問之猶第二五七節皆承上文之意也此言酒之所以先穀氣而出也承上文有滲入膀胱之語故遂以酒之先谷而下者問之正以酒為熟谷之液其氣至悍而清故雖後谷而入必先谷而下也熟者腐也黃帝曰善余聞上焦如霧中焦如漚下焦如瀆此之謂也此帝述素所聞者而證之也宗氣積於上焦出喉嚨以司呼吸而行於十二經隧之中彌淪布濩如天之有霧也營氣並胃中出上焦之下泌別糟粕蒸為精微之氣而心中之血賴之以生凝聚浮沉如水中之有漚也胃納水穀脾實化之糟粕入於大腸水液滲入膀胱故三焦為決瀆之官膀胱為州都之官正以下焦如瀆之畜泄乎水也然下焦之陰中有陽者從是升中上二焦而衛氣生矣嗟呼此篇清者為營濁者為衛營在脈中衛在脈外一十六字乃神聖之宗旨猶堯舜相傳道統不外人心惟危云云一十六字也人之病否生死從是而決醫之用藥升降表裡陰陽補瀉從是而分其禍始於秦越人難經第一難將此第四節與營俱行之營字下增一衛字致使三焦升降二氣所生之義不明於後世而用藥多謬安能有起死回生之功也噫自張仲景而下如孫王劉張李朱輩尚未有識此義者況其他乎
