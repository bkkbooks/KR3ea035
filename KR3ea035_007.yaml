body:
  text: 卷之七逆順第五十五內論氣有逆順用針者當順治不可逆治故名篇黃帝問於伯高曰余聞氣有逆順脈有盛衰刺有大約可得聞乎伯高曰氣之逆順者所以應天地陰陽四時五行也脈之盛衰者所以候血氣之虛實有餘不足也刺之大約者必明知病之可刺與其未可刺與其已不可刺也此言氣有逆順脈有盛衰刺有大約也與其已不可刺者言病既已而不必刺也黃帝曰候之奈何伯高曰兵法曰無迎逢逢之氣無擊堂堂之陳刺法曰無刺熇熇之熱無刺漉漉之汗無刺渾渾之脈無刺病與脈相逆者黃帝曰候其可刺奈何伯高曰上工刺其未生者也其次刺其未盛者也其次刺其已衰者也下工刺其方襲者也與其形之盛者也與其病之與脈相逆者也故曰方其成也勿敢毀傷刺其已衰事必大昌故曰上工治未病不治已病此之謂也按史記軒轅之時神農氏世衰諸侯相侵伐軒轅乃習用於戈以徵不享又按龍魚河圖云蚩尤兄弟八十一人獸身人語銅鐵頭食沙威振天下黃帝以仁不能禁止乃仰天而嘆天遣玄女下授黃帝兵符山海經云黃帝令應龍攻蚩尤請風伯雨師以從大風雨黃帝乃下天女曰越以止雨遂殺蚩尤二書似渺然殺蚩尤則真宜此時亦有兵法刺法曰三句及下方其盛也四句又見素問瘧論上古治未病二句又見素問四氣調神論逢蒲蒙切熇音靠詩板篇多將熇熇朱注云熾盛也此承上文而言病有不可刺之義也上文有與其未可刺一句故此節乃詳明之自上工以至下工有此四等正以見不可刺而刺者之為下工也逢逢之氣勢來迫而其盛者也堂堂之陳陳方整而甚衆者也故無迎者當避其來鋭耳無擊者當擊其情歸耳熇熇者熱之甚盛也漉漉者汗之甚多也渾渾者脈之未清也此皆邪盛之時病勢與脈氣相逆所以皆不可刺也上工方病之未生而刺之其次則雖生而未盛亦刺之其次則雖盛而已衰亦刺之惟邪氣方襲或病形正盛或病勢脈氣相逆皆不可刺者也不可刺而刺之是之謂下工耳按此篇與瘧論皆言邪氣甚盛發為甚寒甚熱之際不可輕刺正以病勢與脈氣相逆然則用藥者亦當先用藥於寒熱未至之先不分外感內傷之寒熱皆當如此若邪氣方盛而用藥則寒藥反助其寒熱藥反助其熱不能解病而適以增病矣醫者不可不知也惜乎東垣丹溪諸君皆未言此所以後之醫者止有常山止瘧等藥則露宿早服而其餘後時而用者誤矣愚用藥必於邪已衰未盛之時每獲效為甚速云五味第五十六篇內詳論五臟所用五味之義故名篇黃帝曰願聞穀氣有五味其入五臟分別奈何伯高曰胃者五臟六腑之海也水穀皆入於胃五臟六腑皆稟氣於胃五味各走其所喜穀味酸先走肝穀味苦先走心穀味甘先走脾穀味辛先走肺穀味咸先走腎穀氣津液已行營衛大通乃化糟粕以次傳下別彼劣切下俱同此言五味各先走其所喜也肝喜酸心喜苦脾喜甘肺喜辛腎喜咸故穀氣之五味各先走之也其曰水穀皆入於胃五臟六腑皆稟氣於胃即營衛生會篇所謂人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣也其曰穀氣津液已行營衛大通乃化糟粕以次傳下即營衛生會篇所謂水穀者常並居於胃中成糟粕而俱下於大腸而成下焦滲而俱下濟泌別汁循下焦而滲入於膀胱也黃帝曰營衛之行奈何伯高曰谷始入於胃其精微者先出於胃之兩焦以溉五臟別出兩行營衛之道其大氣之挎而不行者積於胸中命曰氣海出於肺循喉咽故呼則出吸則入天地之精氣其大數常出三入一故谷不入半日則氣衰一日則氣少矣別音鱉行音杭摶音團周禮矢人凡相笴欲生而摶咽音煙此節與本經邪客篇首節大義相同此言谷化精微之氣者為營氣衛氣大氣以主三焦而氣乃出多入少故谷不得不續用也胃納穀氣脾乃化之其精微之氣先出於中焦升則行於上焦由肺而行五臟六腑所以灌溉五臟也其降則中焦行於下焦而營氣生其升則下焦至於上焦而衛氣生別出兩行營衛之道其大氣即宗氣之傳而不行者積於上焦即胸中又名膻中命曰氣海上氣海主出於肺循咽喉而出入之鼻中出氣為呼則氣從是出入氣為吸則氣從是入一呼脈行三寸一吸脈行三寸呼吸定息脈行六寸積至一晝一夜計有一萬三千五百息則脈之一十六丈二尺者亦積行八百十丈矣但谷化之精氣呼則出之天地之精氣吸則入之其大數谷化之精氣出之者三分則天地之精氣入之者一分惟其出多入少故人半日不再用谷則谷化之精氣衰至一日則氣少故朝錯曰民生一日不再食則飢者正此意也黃帝曰谷之五味可得聞乎伯高曰請盡言之五穀粳米甘麻酸大豆咸麥苦黃黍辛五果棗甘李酸栗咸杏苦桃辛五畜牛甘犬酸豬咸羊苦雞辛五菜葵甘韭酸藿咸薤苦蔥辛粳粳米此言五穀五果五畜五菜各有五味也五色黃色宜甘青色宜酸黑色宜咸赤色宜苦白色宜辛凡此五者各有所宜所謂五色者脾病者宜食粳米飯牛肉棗葵心病者宜食麥羊肉杏薤腎病者宜食大豆黃卷豬肉栗藿肝病者宜食麻犬肉李韭肺病者宜食黃黍雞肉桃蔥此育五色與五味相宜而五臟之病各有所當用也黃色屬土甘味屬土脾亦屬土故色之黃者宜甘而脾病者主脾氣不主宜食谷果畜菜之甘者以益之赤色屬火苦味屬火心亦屬火故色之赤者宜苦而心病者主心氣不足宜食谷果畜菜之苦者以益之黑色屬水鹹味屬水腎亦屬水故色之黑者宜咸而腎病者主腎氣不足宜食谷果畜菜之咸者以益之青色屬木酸味屬木肝亦屬木故色之青者宜酸而肝病者主肝氣不足宜食谷果畜菜之酸者以益之白色屬金辛味屬金肺亦屬金故色之白者宜辛而肺病者主肺氣不足宜食谷果畜菜之辛者以益之此即宣明五氣篇之所謂五入也五禁肝病禁辛心病禁咸脾病禁酸腎病禁甘肺病禁苦此言五臟之味有五禁皆五行之相剋者也金剋木故肝病禁辛水剋火故心病禁咸木剋土故脾病禁酸土剋水故腎病禁甘火剋金故肺病禁苦此節當與素問宣明五氣篇之五禁本經九針論之五裁參看按宣明五氣篇云辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁又按九針論云病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘肝色青宜食甘粳米飯牛肉棗葵皆甘心色赤宜食酸犬肉麻李韭皆酸脾色黃宜食鹹大豆琢肉栗藿皆咸肺色白宜食苦麥羊肉杏薤皆苦腎色黑宜食辛黃黍雞肉桃蔥皆辛此文言五臟有宜食之味皆自其所苦者而治之也素問臟氣法時論云肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之至末又云肝色青宜食甘粳米牛肉棗葵皆甘心色赤宜食酸小豆本經作麻大肉李韭皆酸肺色白宜食苦麥羊肉杏薤皆苦脾色黃宜食鹹大豆豕肉栗藿皆咸腎色黑宜食辛黃黍雞肉桃蔥皆辛夫前既日脾苦濕急食苦以燥之而後乃云脾色黃宜食鹹啓玄子云究斯宜食乃調利機關之義也腎為胃關脾與胃合故假咸柔軟以利其關關利而胃氣乃行胃行而穀氣方化故脾之宜味與各臟不同也此節與素問同水脹第五十七內有水與膚脹字義故名篇黃帝問於岐伯曰水與膚脹鼓脹腸覃石瘕石水何以別之此帝欲明諸證之義而問之也蓋諸證病異而形相似故宜有以別之耳岐伯答曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃大其水已成矣以手按其腹隨手面起如里水之狀此其候也此言水之證也病方起時目之下為窠俗云臥蠶其微有所腫如新臥起之狀大抵人之臥起者其目窠上必腫也頸脈即人迎穴也此脈動於頸而咳動於內在陰股則冷在足頸則腫在上腹則大以手按其腹則隨手而起如里水狀此水病已成而可驗者也按素問陰陽別論云三陰結謂之水啓玄子云三陰結謂脾肺之脈俱寒結也脾肺寒結則氣化為水又按本經五癃津液別篇有云五穀之津液和合而為膏者內滲入於骨空補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛酸陰陽氣道不通四海閉塞三焦不泄津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹又按論疾診尺篇言風水膚脹視人之目窠上微腫如新臥起狀其頸脈動時咳按其手足窅而不起則當知隨手而起為有水無風窅而不起為有風有水也黃帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也此言膚脹之證也寒氣客於皮膚之間其聲𪔣𪔣然而不堅其腹大其身盡腫其皮厚但按其腹則窅而不起其腹色亦不變此膚脹之為候也按論疾診尺篇之風水膚脹當為感風而成此膚脹者乃曰寒氣所客似宜有風寒之異且彼言按其手足窅而不起此曰按其腹窅而不起則當知窅而不起相同特有手足與腹之異宜詳辨之鼓脹何如岐伯曰腹脹身皆大大與膚脹等也色蒼黃腹筋起此其候也此言鼓脹之候也腹脹而周身皆大大與膚脹相等但其色蒼黃腹中筋起為候耳按鼓脹與膚脹等不言按之起與不起當亦是不起者惟其腹筋起者為辨又按素問腹中論黃帝曰有病心腹滿旦食則不能暮食名為何病岐伯曰名為鼓脹治之以雞矢醋一劑知二劑已此方果有奇驗云腸覃何如岐伯曰寒氣客於腸外與衛氣相搏氣不得營因有所繫癖而內著惡氣乃起瘜肉乃主其始生也大如雞卵稍以益大至其成如杯子之狀久者離歲按之則堅推之則移月事以時下此其候也此言腸覃之證也寒氣客於腸之外衛氣有時而入寒氣與衛氣相搏衛氣不得營運彼此相系癖而內著於腸致使惡氣從茲而起瘜肉乃生其始生也大如雞卵及其成也如杯子之狀久者歲以度歲非止一歲用手按之則堅推之則移附於腸外而不在胞中故月事以時而下此腸覃之為候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如杯子月事不以時下皆生於女子可導而下此言石瘕之證也石瘕必生於胞中正以寒氣客於子門子門閉塞氣不得通於外惡血之在內者當瀉不瀉惡血者名為衃血留止於胞中日以益大其狀亦如杯子惟石瘕生於胞中而不在腸外故月事不以時下此其所以為候也然腸覃石瘕皆生於女子治之者可導而下之按腸覃由寒氣客於腸外而始石瘕由寒氣客於子門而始元時羅謙夫著衛生寶鑑有唏露丸見睍丸等法以治二病黃帝曰膚脹鼓脹可刺耶岐伯曰先瀉其脹之血絡後調其經刺去其血絡也此言刺膚脹鼓脹之法也二脹皆有血絡須先瀉之後當分經以調之其有血絡又當再刺去之可也按帝有石水之問而伯無所答素問陰陽別論多陰少陽曰石水少腹腫與此同但本篇所謂水則即陰陽別論之所謂三陰結謂之水與石水不同賊風第五十八內有賊風故名篇黃帝曰夫子言賊風邪氣之傷人也令人病焉今有其不離屏蔽不出室穴之中卒然病者非不離賊邪氣其故何也岐伯曰此皆嘗有所傷於濕氣藏於血脈之中分肉之間久留而不去若有所墮墜惡血在內而不去卒然喜怒不節飲食不適寒溫不時腠理閉而不通其開而遇風寒則血氣凝結與故邪相襲則為寒痹其有熱則汗出汗出則受鳳雖不遇賊風邪氣必有因加而發焉此言人有故邪而又有新感雖不必有賊風邪氣之甚而亦足以病也賊風即上古天真論等篇之所謂虛邪賊風也夫以賊風邪氣傷人而至於病者固其常也今有處於屏蔽室穴中而卒然有病則本離於賊風邪氣而復有此病帝之所以疑也伯言雖非賊風邪氣之甚然亦必有故邪與新感也蓋嘗有所傷於濕氣或因墮墜或有惡血在其中又猝然有喜怒飲食寒溫各失其常所以腠理閉而不通也及其腠理開而或遇風寒則血氣凝結與濕氣惡血等之故邪相襲如春秋齊師襲莒之襲則為寒痹即痹論之所謂寒氣勝者為痛痹也斯時也正以有熱則汗出汗出則受風雖不遇賊風邪氣必因有所加而病由此發也黃帝曰夫子之所言者皆病人之所自知也其毋所遇邪氣又毋怵惕之所志卒然而病者其故何也惟有因鬼神之事平岐伯曰此亦有故邪留而未發因而志有所惡及有所慕血氣內亂兩氣相搏其所從來者微視之不見聽而不聞故似鬼神毋無同惡去聲此言有故邪而復動於情故病似鬼神而非鬼神也帝疑上文所言為病皆病人之所自知有等不遇邪氣無所怵惕即卒然為病此必有因於鬼神之事伯曰人有濕氣惡血等之故邪留而未發因病人素所不知因而偶有所觸或好或惡則血氣內亂故邪與新志相搏遂爾為病此其所從來者甚微非見聞之所能及故人不知其故而以鬼神為疑乃似鬼神而非鬼神也黃帝曰其祝而已者其故何也岐伯曰先巫者因知百病之勝先知其病之所從生者可祝而已也此承上文而言病之所以祝由而已者非病之由於鬼神也夫病既非鬼神有等祝之而可已者正以先巫者因知百病之勝如運氣及臟腑相剋之勝氣為病又知此人病所從生左傳史囂曰神聰明正直而一者也今即其病有祝之遂祐其素善鑑其誠心而病斯已矣衛氣失常第五十九黃帝曰衛氣之留於腹中稸積不行菀蘊不得常所使人肢脅胃中滿喘呼逆息者何以去之伯高曰其氣積於胸中者上取之積於腹中者下取之上下皆滿者傍取之黃帝曰取之奈何伯高對曰積於上瀉大迎天突喉中積於下者瀉三里與氣街上下皆滿者上下取之與季脅之下一寸一本云季脅之下深一寸重者雞足取之診視其脈大而弦急及絶不至者及腹皮急甚者不可刺也黃帝曰善菀音郁此言衛氣之積於內者有所當刺之處及有不可刺之時也素問痹論有云衛者水穀之悍氣也其氣剽悍滑利不能入於脈也故循皮膚之中分肉之間熏於肓膜散於胸腹今衛氣不能行於皮膚肓膜而乃留於腹中稸積不行郁蘊不得常所使人在旁病於肢脅在中病於胃中則為胸為腹在其中矣其病䐜滿發為喘呼逆息者此皆何以去之伯高言凡衛氣之積於胸中當取之於上如足陽明胃經之大迎穴任脈經之天突廉泉穴積於在下之腹中對胸中而言故謂腹為下當取之於下瀉足陽明胃經三里氣街穴胸中與腹中俱滿則為上下皆滿當取之於旁及上下皆取之即大迎天突廉泉三里氣街皆是也與季脅下一寸即足厥陰肝經章門穴其積重者即攢針以刺之如雞足之狀然又診視其脈大而弦急乃邪氣正盛宜避其來鋭若脈絶不至則正氣極衰宜防其過泄及腹皮急甚亦邪盛正衰所致皆不可輕刺之也黃帝問於伯高曰何以知皮肉氣血筋骨之病也伯高曰色起兩眉薄澤者病在皮唇魚青黃赤白黑者病在肌肉營氣濡然者病在血氣目色青黃赤白黑者病在筋耳焦枯受塵垢病在骨此言皮肉氣血筋骨之病皆有可驗之處也欲知皮病當驗兩眉蓋兩眉間即闕中為肺之部而肺合於皮故觀兩眉間色起薄澤者則知病之在皮也欲知肌肉之病當驗之唇蓋唇主於脾而脾主肌肉故觀唇色有青黃赤白黑者則知病之在肌肉也欲知血氣有病當觀之於營氣但營氣無形而濡然多汗則知病之在血氣也欲知筋之有病當驗之於目蓋肝主筋而目為肝之竅故觀目色有青黃赤白黑者則知病之在筋也欲知骨之有病當驗之於耳蓋腎主骨而耳為腎之竅故觀其耳之焦枯受垢者則知病之在骨也黃帝曰病形何如取之奈何伯高曰夫百病變化不可勝數然皮有部肉有柱血氣有輸骨有屬黃帝曰願聞其故伯高曰皮之部輸於四末肉之柱在臂脛諸陽分肉之間與足少陰分間血氣之輸輸於諸絡氣血留居則盛而起筋部無陰無陽無左無右候病所在骨之屬者骨空之所以受益而益腦髓者也黃帝曰取之奈何伯高曰夫病變化浮沉深淺不可勝窮各在其處病間者淺之甚者深之間者少之甚者衆之隨變而調氣故曰上工數上聲勝平聲間去聲此承上文而言皮肉氣血筋骨之病各有病所及有治法也欲知皮之有病者必有其部蓋皮之為部輸運於四支欲知肉之有病者必有其柱蓋肉之為柱上則為臂下則為脛乃手足六陽經與足少陰腎經分肉之間也欲知氣血之有病者必有其輸蓋血氣之為輸在於諸經之絡穴若氣血留居則盛而筋起但以筋為主不必分陰經陽經或左或右而止候其筋之為病耳欲知骨之有病者必有其屬蓋骨之為屬凡一身之骨空其所受益者皆是也而骨又與腦通又皆所以益其腦髓耳故取穴以刺之者亦惟於皮肉氣血筋骨各視其處病間者則淺刺之而針少病甚者則深刺之而針多隨其變化而調之是之謂上工也黃帝問於伯高曰人之肥瘦大小寒溫有老壯少小別之奈何少別俱去聲此帝即人之肥瘦寒溫老壯少小而欲分別之也大小者身之大小也寒溫者身寒暖也伯高對曰人年五十以上為老二十以上為壯十人以上當作下為少六歲以上當作下為小此伯高言人之老壯少小以年而別之也黃帝曰何以度知其肥瘦伯高曰人有肥有膏有肉黃帝曰別此奈何伯高曰膕肉堅一本云膕內皮滿者肥膕肉不堅皮緩者膏皮肉不相離者肉膕音國此言人之有肥有膏有肉者之分也肥者猶言壯也膝後曲處為膕膏者油也脂者骨中髓也黃帝曰身之寒溫何如伯高曰膏者其肉淖而粗理者身寒細理者身熱脂者其肉堅細理者熱粗理者寒此言人身之有冷熱也大凡人之多膏者其肉必淖但腠理粗則其身寒若細則身熱也人之多脂者其肉必堅但腠理粗則其身寒若細則身熱也黃帝曰其肥瘦大小奈何伯高曰膏者多氣而皮縱緩故能縱腹垂腴肉者身體容大脂者其身收小此言人身有肥瘦大小也大凡人之有膏者其氣必多而皮自縱緩故能縱腹垂腴此之謂肥也反是則為瘦矣人之有肉者其身體自然容大此之為大也人之有脂者其身必收小此之謂小也上文帝問肥瘦而伯高止以肥膏肉三義為對其肥瘦猶未分也故帝於此並問之耳黃帝曰三者之氣血多少何如伯高曰膏者多氣多氣者熱熱者耐寒肉者多血多血則充形充形則平脂者其血清氣滑少故不能大此別於衆人者也此言人之有膏有肉有脂者其氣血各有多少而身之冷熱遂別也膏者其氣必多多氣則身必熱故能耐寒也肉者其血必多多血則形充而不寒不熱也脂者其血必清而氣必滑且少故其身形不大而必能耐寒也此三者必異於衆而不能多也黃帝曰衆人奈何伯高曰衆人皮肉脂膏不能相加也血與氣不能相多故其形不小不大各自稱其身命曰衆人稱去聲此言人之衆者其形不大不小必其皮肉脂膏血氣之不加多也黃帝曰善治之奈何伯高曰必先別其三形血之多少氣之清濁而後調之治無失常經是故膏人縱腹垂腴肉人者上下容大脂人者雖脂不能大也此言治三形者必別其氣血之多少清濁也三形者即膏人肉人脂人也玉版第六十末有著之玉版以為重寶故名篇素問有玉版論要亦著之玉版也黃帝曰余以小針為細物也夫子乃言上合之於天下合之於地中合之於人余以為過針之意矣願聞其故岐伯曰何物大於天乎夫大於針者惟五兵者焉五兵者死之備也非生之具且夫人者天地之鎮也其不可不參乎夫治民者亦惟針焉夫針之與五兵其孰小乎按管子曰蚩尤受盧山之銅而作五兵則黃帝時即有五兵一弓二殳三矛四戈五乾一云東方矛南方弩中央劍西方戈北方鎩也此言小針合於三才者以其較之五兵而其功用為尤大也五兵雖大乃所以備死而非平日治生之具小針雖小乃所以治民之生而不待備死而後用也較之五兵其功用合於三才而非可以小補言者宜矣黃帝曰病之生時有喜怒不測飲食不節陰氣不足陽氣有餘營氣不行乃發為癰疽陰陽不通兩熱相搏乃化為膿小針能取之乎岐伯曰聖人不能使化者為其邪不可圖也故兩軍相當旗幟相望白刃陳於中野者此非一日之謀也能使其民令行禁止士卒無白刃之難去聲者非一日之教也須臾之得也夫至使身被癰疽之病膿血之聚者不亦離道遠乎夫癰疽之生膿血之成也不從天下不從地出積微之所主也故聖人自治於未有形也愚者遭其已成也黃帝曰其已形不豫遭膿已成不豫見為之奈何岐伯曰膿已成十死一生故聖人弗使已成而明為良方著之竹帛使能者踵而傳之後世無有終時者為其不豫遭也按史記云軒轅之時神農世衰諸候相侵伐軒轅習用於戈以徵不享炎帝侵陵諸候黃帝與戰於阪泉之野蚩尤作亂又與戰於涿鹿之野則旗幟白刃陳於中野者信有之也此言癰疽生於積微其已成而難化者為其失候養之道而聖人憫之故必遣之以良方也陰氣者營氣也陽氣者衛氣也惟營氣不足衛氣有餘故營氣不足癰疽乃發膿隨熱聚小針難取正以邪盛難化猶用兵者其謀非止於一日其遠難正在於須臾誠不可不慎也況生此癰疽之人使身被癰疽而膿血已聚惟其遠修養之道耳詎知癰疽由微而積聖人自治於未有成形之始愚者則遭於既已成形之後所以治之失其時也然而不得與聖人相遭相見而聖人慮其膿血已成多死少生乃著為良方以傳之彼小針者雖可以治民而非可以治癰疽也亦明矣黃帝曰其已有膿血而後遭乎不道之以小針治乎岐伯曰以小治小者其功小以大治大者多害故其已成膿血者其惟砭石鈹鋒之所取也此言癰疽已成膿血者惟治之以砭石鈹針鋒針而已以小治小者其功小故不可用小針也以大治大者多害故鈹鋒之外不可輕用也唯砭石者以石為針及鈹針鋒針皆可以取之耳本經九針論四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血五曰鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱爭者也又見本經第一篇九針十二原中黃帝曰多害者其不可全乎岐伯曰其在逆順焉黃帝曰願聞逆順岐伯曰以為傷者其白眼青黑眼小是一逆也內納同藥而嘔者是二逆也腹痛渴甚是三逆也肩項中不便是四逆也音嘶色脫是五逆也除此五者為順矣便去聲此言癰疽之難全者唯驗其病勢之五逆而五順可反推矣人之目雖為肝之外候然又分屬於五臟其白眼屬肺今反青是肝邪侮所不勝當為肺氣衰也黑眼者即眼之睛也屬於肝今反小乃肝氣衰也後世眼科以兩眥屬心眼白屬肺眼珠屬肝上下泡屬脾瞳子屬腎為五輪非一逆而何納藥而嘔乃脾氣衰也非二逆而何腹痛者邪甚渴甚者火盛非三逆而何肩屬手之三陽項屬手足六陽及督脈經今肩項不便是陽盛陰虛也非四逆而何音嘶者肺衰也色脫者五臟衰也非五逆而何若除此五者則為順矣黃帝曰諸病皆有逆順可得聞乎岐伯曰腹脹身熱脈大是一逆也腹鳴而滿四肢清泄其脈大是二逆也衄而不止脈大是三逆也咳且溲血脫形其脈小徑是四逆也咳脫形身熱脈小以疾是謂五逆也如是者不過十五日而死矣其腹大脹四末清脫形泄甚是一逆也腹脹便血其脈大時絶是二逆也咳溲血形肉脫脈搏是三逆也嘔血胸滿引背脈小而疾是四逆也咳嘔腹脹且飧泄其脈絶是五逆也如是者不過一時而死矣工不察此者而刺之是謂逆治此言諸病皆有逆順有五逆之半月而死者有五逆之一時而死者醫工不可以逆治之也腹滿身熱而其脈亦大是邪正盛也非一逆而何腹鳴而滿四肢清冷後又下泄陰證也而其脈又大是陰證得陽脈也非二逆而何衄血不止陰證也而其脈又大亦陰證得陽脈也非三逆而何在上為咳在下溲血又且脫形正氣已衰也而其脈之小者帶徑是邪猶未衰非四逆而何其聲咳其形脫其身熱正衰火盛也而脈之小者帶疾是邪亦未衰非五逆而何此其所以半月而死也又有腹大而脹四肢則冷而其形既脫其泄又甚非一逆而何腹脹於中便血於下乃陰證也而其脈又大且時絶是大為陽脈絶為死脈非二逆而何在上為咳在下溲血其形已脫火盛水虧也而脈又搏擊非三逆而何嘔血而胸滿引背脈固宜小而小中帶疾虛而火盛也非四逆而何上為咳嘔中為腹脹下為飧泄病已虛也而其脈則絶非五逆而何此其所以不及一時而死也夫曰一時者一周時也乃一日之意五逆不可刺而刺之是謂逆治之耳黃帝曰夫子之言針甚駿以配夭地上數天文下度地紀內別五臟外次六腑經脈二十八會盡有周紀能殺生人不能起死者子能反之於岐伯曰能殺生人不能起死者也黃帝曰余聞之則為不仁然願聞其道弗行於人岐伯曰是明道也其必然也其如刀劍之可以殺人如飲酒使人醉也雖勿診猶可知矣黃帝曰願卒聞之岐伯曰人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也迎而奪之而已矣黃帝曰上下有數乎岐伯曰迎之五里中道而止五至而已五往而臟之氣盡矣故五五二十五而竭其輸矣此所謂奪其天氣者也非能絶其命而傾其壽者也黃帝曰願卒聞之岐伯曰窺門而刺之者死於家中入門而刺之者死於堂上黃帝曰善平方明哉道請著之玉版以為重寶傳之後世以為刺禁令民勿敢犯也窺窺同此言針之能殺生人者在於奪其五里以竭經隧之氣此其所以為刺禁也二十八會者手足十二經左右相同共有二十四脈加以兩蹺督任共為二十八會也世有能於生人則殺之死人則不能起之此問之者固為不仁而聞之而弗行正所以明道也故能殺生人之繆真如刀劍之殺人如酒之醉人雖勿診視之而可以預知也何也試觀海之行雲氣者本於地氣上為云而後雲氣行於天之下也胃之有氣血本於穀氣所化而後血氣行於十二經之隧也是經隧者誠為五臟六腑之大脈絡耳迎其氣之來而有以奪之針能殺生人矣故究其上下各經之數上下手足也不必盡臟腑之穴以刺之止即五里穴以奪其氣按五里系手陽明大腸經穴肘上三寸向里大脈中央前本輸篇云尺動脈在五里五輸之禁也素問氣穴論云大禁二十五在天府下五寸約至中道而止針候其氣之來者五至而已針凡五往以奪之而此臟之氣盡矣及奪至二十五次而五臟輸穴之氣皆已竭矣此乃奪其天氣非由命之自絶壽之自傾實所以殺此生人也又何也吾窺門而見其刺其人當死於家中吾入門而見其刺其人當死於堂上死之最易又如是耶五禁第六十一內有五禁五奪五過五逆九宜等法然以五禁為首故名篇黃帝問於岐伯曰余聞刺有五禁何謂五禁岐伯曰禁其不可刺也黃帝曰余聞刺有五奪岐伯曰無瀉其不可奪者也黃帝曰余聞刺有五過岐伯曰補瀉無過其度黃帝曰余聞刺有五逆岐伯曰病與脈相逆命曰五逆黃帝曰余聞刺有九宜岐伯曰明知九針之論是謂九宜此言刺家有五禁五奪五過五逆九宜之分也黃帝曰何謂五禁願聞其不可刺之時岐伯曰甲乙日自乘無刺頭無發蒙於耳內丙丁日自乘無振埃於肩喉廉泉戊己日自乘四季無刺腹去爪瀉水庚辛日自乘無刺關節於股膝壬癸日自乘無刺足脛是謂五禁此詳言五禁之實也天干應於人身頭為甲乙肩喉為丙丁戊己為手足四肢合辰戌丑未之四季庚辛應股膝壬癸應足脛故凡天干自乘之日皆無刺之發蒙振埃俱刺法名目見本經刺節真邪篇黃帝曰何謂五奪岐伯曰形肉已奪是一奪也大奪血之後是二奪也大汗出之後是三奪也大泄之後是四奪也新産及大血之後是五守也此皆不可瀉此詳言五奪之實也瀉者針之瀉去也然用藥亦猶是矣黃帝曰何謂五逆岐伯曰熱病脈靜汗已出脈盛躁是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下血衃血衃篤重是謂四逆也寒熱奪形脈堅搏是渭五逆也著著同此詳言五逆之實也凡熱病者脈宜洪今反靜是邪盛正衰也汗已出脈宜靜今反盛躁是邪氣猶盛也是一逆也凡病瀉者脈宜靜今反洪大是邪氣猶盛也是二逆也著痹不能轉移其䐃肉已破其身熱脈宜洪盛今已偏絶蓋偏則一手全無絶則二手全無也是三逆也人有好淫而形肉已奪其身發熱其色夭然而白又乃去後復有衃血其血之凝黑者且多而篤重是四逆也人有久發寒熱而形體已奪脈軟則邪散今堅而且搏是謂五逆也動輸第六十二內論手太陰足少陰足陽明之輸穴獨動不休故名篇黃帝曰經脈十二而手太陰足少陰陽明獨動不休何也岐伯曰是明胃脈也胃為五臟六腑之海其清氣上注於肺肺氣從太陰而行之其行也以息往來故人一呼脈再動一吸脈亦再動呼吸不已故動而不止黃帝曰氣之過於寸口也上十焉息下八焉伏何道從還不知其極岐伯曰氣之離臟也卒然如弓弩之發如水之下岸上於魚以已同反衰其餘氣衰散以已同逆上故其行微此因帝問肺腎胃經之脈獨動不休而先以肺言之也手足經脈共有十二唯手太陰肺經足少陰腎經足陽明胃經其脈獨動不休即如肺之太淵腎之太溪胃之衝陽誠動之不休也他經之脈行之甚微似有所休故問耳伯乃以肺經言之蓋肺脈雖行於肺而實始之於胃是必明之於胃脈而後可以知肺脈也胃為五臟六腑之海受水穀之氣以生精微之氣其積於上焦者名曰宗氣又名大氣其由中焦以降於下焦而生者名曰營氣所謂清者為營是也故此篇遂名之曰清氣出下焦以升於中上二焦而生者名曰衛氣所謂濁者為衛是也故下節名曰悍氣是清氣隨宗氣以行於經脈之中始從中焦注於肺從太陰經而行之由是而行於手陽明大腸經足陽明胃經足太陰脾經手少陰心經手太陽小腸經足太陽膀胱經足少陰腎經手厥陰心包絡經手少陽三焦經足少陽膽經足厥陰肝經又自肝經以行於肺經其行也以息往來蓋一呼一吸總為一息惟其一呼脈乃再動一吸脈亦再動一呼一吸脈乃四動閏以太息脈乃五動呼吸不已故動而不止良由寸口者即手太陰經之太淵穴十二經脈必會於此此脈之所動而不休也然脈之過於寸口也上之從息而行者可擬十分下之伏於臟內者可擬八分但不知其何道而來何道而還罔有抵極帝之所以復問也大義見本經經脈篇本帝所言而此又問者豈明而欲復明耶抑亦此問在經脈篇前耶伯言脈氣之離於各臟也如矢之離於弓彎如水之下於岸矢發則往水下則流及其會於寸口上於魚際則會於肺經矣又從肺經而行之一晝一夜共五十度但其上魚之際十焉在息下魚之後八焉伏臟故上魚既已則氣似反衰及其餘氣衰散既已則又逆而上之於魚是以各經上魚之後行之甚微惟肺則為百脈所朝而獨動不休者非他經之可同也黃帝曰足之陽明何因而動岐伯曰胃氣上注於肺其悍氣上衝頭者循咽上走空竅循眼系入絡腦出顑下客主人循牙車合陽明並下人迎此胃氣別走於陽明者也故陰陽上下其動也若一故陽病而陽脈小者為逆陰病而陰脈大者為逆故陰陽俱靜俱動若引繩相傾者病顑玉篇海篇音坎皆釋云飢黃起行今曰出顑及本經癲狂等篇皆有顑痛此必有定所疑是顑頷通用當讀顑為頷此言胃脈動之不休也三焦之氣皆從胃氣而生營氣隨宗氣以上注於肺而行之其悍氣者衛氣也衛氣受氣於上焦為純陽之氣剽悍滑利天明目張則上衝於頭循內咽喉上走空竅循於眼系以出於足太陽膀胱經之睛明穴歷攢竹曲差五處承光通天絡郤等穴人絡於腦復出於頷下足少陽膽經之客主人一名上關耳前起骨上廉開口有空張口取之乃得循胃經之牙車一名機關一名曲牙耳下曲頰端耳前陷中開口有空今牙車當是頰車合於陽明之經隧並下胃經之人迎一名五會頸大脈動應手夾結喉兩旁一寸半仰而取之以候五臟氣此雖衛氣所行實內之胃氣出而別走於陽明之經隧者也故其晝行於陽經夜行於陰經然陰陽升降其動也若一故人有陽病脈宜洪大其胃脈反小者為逆以陽病宜見陽脈也人有陰病脈宜沉細其胃脈反大者為逆以陰病宜見陰脈也故陽病而俱靜陰病而俱動若引繩以相傾者必病此胃脈所以動之不休而亦可以驗諸病也以衛氣之行即胃氣以為之主耳黃帝曰足少陰何因而動岐伯曰衝脈者十二經之海也與少陰之大絡起於腎下出於氣街循陰股內廉邪斜入膕中循脛骨內廉並少陰之經下入內踝之後入足下其別者邪入踝出屬附上入大指之間注諸絡以溫足脛此脈之常動者也此言腎脈動之不休也脈有奇經者八其衝脈者為十二經之海與足少陰腎經之大絡起於腎下出於足陽明胃經之氣街即氣衝歸來下二寸夾臍相去四寸鼠鼷上一寸動脈應手宛宛中復循陰股內廉斜入膝後曲處之膕中循脛骨內廉並本經少陰之經下入內踝之後經復溜水泉照海大鐘等穴入於足下之湧泉其別支者方其斜入內踝之時出而屬於足面之跗上入大指之間注諸絡以溫足脛此腎脈之所以常動不休也由此觀之則肺脈動之不休者以營氣隨宗氣而行諸經其諸經之脈朝於肺也胃脈動之不休者以衛氣出於胃而行之不已也腎脈動之不休者以衝脈與腎脈並行而行之不已也此其所以異於諸經也歟黃帝曰營衛之行也上下相貫如環之無端今有其卒然遇邪氣及逢大寒手足懈惰其脈陰陽之道相輸之會行相失也氣何由還岐伯曰夫四末陰陽之會者此氣之大絡也四街者氣之徑路也故絡絶則徑通四末解則氣從臺相輸如環黃帝曰善此所謂如環無端莫知其紀此之謂也此言營衛之行相輸如環非邪氣大寒之所能失也帝問營氣隨宗氣以行於經隧之中始於手太陰而終於足厥陰衛氣行於各經皮膚分肉之間始於足太陽而終於足太陰陰陽諸經相貫而行如環無端但卒然遇邪氣大寒則手足懈惰其脈氣所行陰陽之道輸運之會宜乎其相失也則營氣何由而還復欲始於手太陰以終於足厥陰衛氣亦何由而還復欲始於足太陽以終於足太陰者難矣伯言四肢為四末如謂末才為末乃陰陽諸經所會而為營衛二氣之大絡也四街者即本經衛氣篇之所謂胸氣有街腹氣有街頭氣有街脛氣有街者是也此四街為營衛二氣之徑路故大絡雖或阻絶而徑路則自相通彼逢邪氣大寒之時手足固嘗懈惰及懈惰已畢而少解則二氣復從而合相輸如環尚何相失之有哉五味論篇第六十三內論五味各有所走故名篇黃帝問於少俞曰五味入於口也各有所走各有所病酸走筋多食之令人癃咸走血多食之令人渴辛走氣多食之令人洞心苦走骨多食之令人變嘔甘走肉多食之令人悗心余知其然也不知其何由願聞其故悗悶同此帝即五味各有所走而多食各有所病者問之也癃小便不通也洞心者心內空也悗心者心內悶也少俞答曰酸入於胃其氣澀以收上之兩焦弗能出入也不出即留於胃中胃中和溫則下注膀胱膀胱之胞薄以懦得酸則縮綣約而不通水道不行故癃陰者積筋之所終也故酸入而走筋矣宣明五氣篇云酸走筋筋病無多食酸此答言酸之多食令人癃也蓋酸之氣味澀滯而收斂既入於胃之中脘則上兩焦即上中二焦也凡篇內言三焦者俱營衛生會篇之三焦非後三焦其氣味弗速能出入乃留於胃中久則胃中和溫而下注膀胱膀胱為胞之室胞在其中其體薄其氣懦得此酸味則縮而且綣所以約而不通水道不行而為癃也至於外而為陰器者乃一身之筋於此而終彼肝既主筋又主於酸故酸入則走筋其陰器亦有所約而小便不利矣豈特膀胱之在內者為然哉黃帝曰咸走血多食之令人渴何也少俞曰鹹入於胃其氣上走中焦注於脈則血氣走之血與咸相得則凝凝則胃中汁注之注之則胃中竭竭則咽路焦故舌本干而善渴血脈者中焦之道也故鹹入而走血矣又見宣明五氣篇此言多食鹹之令人渴也蓋鹹入於胃其氣上走於中焦入之為脈必由中焦而始今咸走中焦則必注於脈脈行而血氣隨之以走惟血與鹹味相得則凝世俗宰牲加鹽以凝血者為此凝則血燥而胃中之汁注以潤之由是胃中之汁竭竭則咽路枯焦故舌根干而善渴也血脈為中焦之路故鹹入而走於血耳黃帝曰辛走氣多食之令人洞心何也少俞曰辛入於胃其氣走於上焦上焦者受氣而營諸陽者也薑韭之氣熏之營衛之氣不時受之久留心下故洞心辛與氣俱行故辛入而與汗俱出宣明五氣篇云辛走氣氣病無多食辛此言多食辛者令人洞心也蓋辛入於胃其氣必走於上焦上焦者受氣而運諸陽者也故辛味既走於上焦則不得不走於氣耳即如薑韭者氣味之辛者也營氣由中焦而生必上隨宗氣以行於經隧之中衛氣由下焦而生亦必出而行於分肉之間所以不時受此辛味之氣也惟此薑韭之氣久留心下則物在心下而氣熏於上焦上焦氣揍心內似空故多食辛者必洞心也且此辛氣與心中之氣相得而俱行辛入則汗必出汗之出者以氣之出也其心安得而不洞黃帝曰苦走骨多食之令人變嘔何也少俞曰苦入於胃五穀之氣皆不能勝苦苦入下脘三焦之道皆閉而不通故變嘔齒者骨之所終也故苦入而走骨故入而復出知其走骨也宣明五氣篇云苦走骨骨病無多食苦此言多食苦者令人嘔也蓋苦入於胃而胃中五穀之氣皆不能勝此苦味故苦入下脘則上中下焦之氣皆閉而不通遂使五穀在胃者氣味不和所以變而為嘔也況齒者乃骨之所終故苦入則走骨走骨則走齒今入而復出者即從齒出也此可以知苦之必走骨矣黃帝曰甘走肉多食之令人悗心何也少俞曰甘入於胃其氣弱小不能上至於上焦而與谷留於胃中青專人柔潤者也胃柔則緩緩則蠱動蠱動則令人悗心其氣外通於肉故甘走肉蠱作蟲宣明五氣篇云甘走肉肉病無多食甘此言多食甘者令人悗心也蓋甘入於胃則甘本屬土其性主柔故甘味之氣最弱而小不能上至於上焦而與五穀留於中脘所以胃氣亦柔潤也胃柔則氣緩氣緩則蟲因味甘食在而動蟲動則心自悶耳且所謂甘走肉者甘既屬土土主於肉肉在於外甘味之氣必走而聚之也內與外不相通其心安得而不悶乎
