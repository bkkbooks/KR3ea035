body:
  text: 卷之五五閲五使第三十七內有五閲以觀五氣及五氣為五臟之使故名篇黃帝問於岐伯曰余聞刺有五官五閲以觀五氣五氣者五臟之使也五時之副也願聞其五使當安出岐伯曰五官者五臟之閲也黃帝曰願聞其所出令可為常岐伯曰脈出於氣口色見於明堂五色更出以應五時各如其常經氣入臟必當治里按本紀云帝命俞跗岐伯雷公察明堂究息脈此言五官為五臟之外閲而五色尤驗於明堂也夫刺法有五官如下文鼻為肺之官目為肝之官口唇為脾之官舌為心之官耳為腎之官者是也此五官者可五閲以觀青黃赤白黑之五氣正以五氣者乃五臟之所使如肝青心赤脾黃肺白腎黑是也又五時之所別如春肝夏心至陰脾秋肺冬腎是也但五氣所出可以常驗五臟者正以脈雖出於氣口而五色必見於明堂其五色迭出以應五時各如其常惟外經邪氣入臟必當從里以治之蓋由外固可以知內而病在於里不得以治外也帝曰善五色獨決於明堂乎岐伯曰五官已辨闕庭必張乃立明堂明堂廣大蕃蔽見外方壁高基引垂居外五色乃治平博廣大壽中百歲見此者刺之必已如是之人者血氣有餘肌肉堅至故可苦以針此言五色雖決於明堂而凡諸部博大者壽必高而病易已也按本經五色篇雷公曰五色獨決於明堂乎黃帝曰明堂者鼻也闕者眉間也庭者顏也即首面也蕃者頰側也蔽者耳門也其問欲方大去之十步皆見於外如是者壽必中百歲雷公曰五官之辨奈何黃帝曰明堂骨高以起平以直五臟次於中央六腑夾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官安得無辨乎帝以五色獨決於明堂為疑伯言五官在外曉然可辨其闕上者咽喉也闕中者肺也即兩眉之間也庭者額中也即首面也顏也必開而張乃立明堂以閲之明堂者鼻也其明堂廣大而為蕃為蔽者又見於外蓋頰側謂之蕃耳門謂之蔽耳四周之壁既方地角之基又高引垂向外五色又順平博廣大壽當中百歲也設有病時見此五色則刺之而病必已蓋如是之人血氣有餘肌肉堅緻故可苦之以針而刺之也黃帝曰願聞五官岐伯曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也此言五官之所在也肺在內而鼻為之竅所以司呼吸也故為肺之官肝在內而目為之竅所以別五色也故為肝之官脾在內而口唇為之竅所以納五穀也故為脾之官心在內而舌為之竅所以辨五味也故為心之官腎在內而耳為之竅所以聽五聲也故為腎之官黃帝曰以官何候岐伯曰以候五臟故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑卷上聲此言五官可以候五臟之病也鼻為肺之官故肺病者當病喘息其鼻乃張目為肝之官故肝病者其目眥必青唇為脾之官故脾病者其唇必黃舌為心之官故心病者其舌必卷而短顴亦必赤耳為腎之官故腎病者顴與顏皆黑也黃帝曰五脈安出五色安見其常色殆者如何岐伯曰五官不辨闕庭不張小其明堂蕃蔽不見又埤其牆牆下無基垂角去外如是者雖平常殆況加疾哉坤音神卑也此言諸部狹小者必殆也五臟之脈安所從出五臟之色安所從見其常色見者而又至於危皆帝之所疑也伯言人之五官不可明辨闕庭又不張明堂狹小蕃蔽不可見其牆又卑牆下無基垂角在外如是者雖無病而平常尚有殆者況加之以有病哉黃帝曰五色之見於明堂以觀五臟之氣左右高下各有形乎岐伯曰臟俯之在中也各以次舍左右上下各如其度也此言面部之左右上下各如腑臟在中之次舍所以可觀五色於明堂也帝問五色見於明堂者可以觀五臟之氣然左右上下各有形可驗而一如其在中之度乎伯言腑臟之在中也各有次舍而面部之左右上下悉如其在中之度耳故可以觀而知也按本經五色篇曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑之部分也此節當與五色篇圖形參看逆順肥瘦第三十八首節有行之逆順後分肥瘦壯幼等刺法故名篇黃帝問於岐伯曰余聞針道於夫子衆多畢悉矣夫子之道應若失而據未有堅然者也夫子之問學熟乎將審察於物而心生之乎岐伯曰聖人之為道者上合於天下合於地中合於人事必有明法以起度數法式檢押乃後可傳焉故匠人不能釋尺寸而意長短廢繩墨而起平水也工人不能置規而為圓去矩而為方知用此者固自然之物易用之教逆順之常也黃帝曰願聞自然奈何岐伯曰臨深決水不用功力而水可竭也循掘決沖而經可通也此言氣之滑澀血之清濁行之逆順也此言針道一本於自然之妙也帝問針道畢陳若有所失而據守難堅未知由學問而熟抑亦由心而生伯言聖人之為針道者合於三才必有明法以起度數其法式檢押乃可傳之後世也譬之工匠必用尺寸繩墨規矩以為長短平水萬物之平莫過於水故曰平水方圓此乃自然之道其為教易行其行之逆順有常能循其法譬之臨深決水循掘決沖而水易竭經可通也何也正以人之氣有滑澀血有清濁行有逆順皆有自然之妙故耳黃帝曰願聞人之白黑肥瘦小長各有數乎岐伯曰年質壯大血氣充盈膚革堅固因加以邪刺此者深而留之此肥人也廣肩腋項肉薄厚皮而黑色唇臨臨然其血黑以濁其氣澀以遲其為人也貪於取與刺此者深而留之多益其數也此言刺肥人之有法也各有數者各有刺針之數也深而留之者深入其針而久留之也此乃刺肥人之數而下所言貪夫體色氣血其法宜同故並及之且其數又加益也黃帝曰刺瘦人奈何岐伯曰皮薄色少肉廉廉然薄唇輕言其血清氣滑易脫於血易損於血刺此者淺而疾之少去聲此言刺瘦人之有法也廉薄也疾速也言此等瘦人若深而留之則氣易脫而血易損故必淺入其針而速去之也黃帝曰刺常人奈何岐伯曰視其自黑各為調之其端正敦厚者其血氣和調刺此者無失常數也此言刺常人之有法也常人者不肥不瘦之人也視其人之白者當調以瘦人之數黑者則用肥人之數有等端正敦厚與上貪於取與者異其血氣必和調也刺之者固不如肥人之久以留之亦不如瘦人之淺以疾之但無失其常數而已黃帝曰刺壯士真骨者奈何岐伯曰刺壯士真骨堅肉緩節堅堅然此人重則氣澀血濁刺此者深而留之多益其數徑則氣滑血清刺此者淺而疾之此言刺壯士真骨之有法也有等壯士肉少而骨粗者其肉堅其節緩堅堅然其勢難動此人者其體若重則氣必澀而血必濁刺此者當深其針而久留之如肥人之數其體若輕而徑則氣必滑而血必清刺此者當淺其針而疾去之如瘦人之數也黃帝曰刺嬰兒奈何岐伯曰嬰兒者其肉脆血少氣弱刺此者以毫針淺刺而疾髮針日再可也此言刺嬰兒之有法也毫針者九針論七曰毫針取法於毫毛其針宜淺其髮針宜速日再者寧一日之內復再刺之不可久留其針也黃帝曰臨深決水奈何岐伯曰血清氣濁疾瀉之則氣竭焉黃帝曰循掘決沖奈何岐伯曰血濁氣澀疾瀉之則經可通也氣濁之濁當作滑此承首節而言臨深決水循掘決沖之意也所謂臨深決水者正以此人之血清氣滑者疾瀉之而邪氣遂竭猶之臨深淵以決放其水不用功力而水可竭也所謂循掘決沖者正以此人之血濁氣澀者疾瀉之而經脈可通猶之循其所掘之處仍用力以並掘之而水可通也皆指瀉法而言而自然之妙寓其中矣黃帝曰脈行之逆順奈何岐伯曰手之三陰從臟走手手之三陽從手走頭足之三陽從頭走足足之三陰從足走腹此承首節而言脈之逆順以各經之所行者有自上而下或自下而上也手之三陰從臟走手者太陰肺經從中府而走大指之少商少陰心經從極泉而走小指之少衝厥陰心包絡經從天池而走中指之中衝也手之三陽從手走頭者陽明大腸經從次指商陽而走頭之迎香太陽小腸經從小指少澤而走頭之聽宮少陽三焦經從四指之關衝而走頭之絲竹空也足之三陽從頭走足者太陽膀胱經從頭睛明而走足小指之至陰陽明胃經從頭頭維而走足次指之厲兌少陽膽經從頭上關而走足四指之竅陰也足之三陰從足走腹者太陰脾經從足大指內側隱白而走腹之大包少陰腎經從足心湧泉而走腹之俞府厥陰肝經從足大指外側大敦而走腹之期門也夫手之陰經自臟而走手為順則自手而走臟為逆手之陽經自手而走頭為順則自頭而走手為逆足之陰經自足而走腹為順則自腹而走足為逆足之陽經自頭而走足為順則自足而走頭為逆所謂脈有逆順者如此黃帝曰少陰之脈獨下行何也岐伯曰不然夫衝脈者五臟六腑之海也五臟六腑皆稟焉其上者出於頏顙滲諸陽灌諸精其下者注少陰之大絡出於氣街循陰股內廉入膕中伏行䯒骨內下至內踝之後屬而別其下者並於少陰之經滲三陰其前者伏行出跗屬下循跗入大指間滲諸絡而溫肌肉故別絡結則跗上不動不動則厥厥則寒矣黃帝曰何以明之岐伯曰以言導之切而驗之其非必動然後乃可明逆順之行也黃帝曰窘乎哉聖人之為道也明於日月微於毫釐其非夫子孰能道之也此言腎脈之下行者以衝脈入腎之絡而與之並行也夫足之三陰從足走腹而獨有足少陰腎經之脈繞而下行與什脾直行者別何也正以衝脈與之並行故耳蓋衝脈者起於足陽明胃經之氣衝穴為五臟六腑之海而臟腑之氣皆稟焉其上則出於頏顙滲諸陽經以灌諸經之精下注於少陰腎經之大絡曰大鐘者以出於氣衝又循陰踝之內廉以入於膕中伏行䯒骨之內下至內踝之後凡所屬之別於下者並由少陰之經滲其脾腎肝之三經此則在後廉者然也其在前者伏行出於足面之跗上屬於下之湧泉入循跗以入大指間滲諸絡而溫肌肉故別絡有邪相結則跗上之脈不動不動則氣厥逆而中冷矣然何以知之導病者以言切病者以脈其跗上果非必動乃可以明不動之為逆動之為順而其有邪與否明矣血絡論第三十九內論邪在血絡及刺法異應故名篇黃帝曰願聞其奇邪而不在經者岐伯曰血絡是也黃帝曰刺血絡而僕者何也血出而射者何也血少黑而濁者何也血出清而半為汁者何也髮針而腫者何也血出若多若少而面色蒼蒼者何也髮針而面色不變而煩悗者何也多出血而不動搖者何也願聞其故岐伯曰脈氣盛而血虛者刺之則脫氣脫氣則僕血氣俱盛而陰氣多者其血滑刺之則射陽氣畜積久留而不瀉者其血黑以濁故不能射新飲而液滲於絡而未合和於血也故血出而汁別焉其不新飲者身中有水久則為腫陰氣積於陽其氣因於絡故刺之血未出而氣先行故腫陰陽之氣其新相得而未和合因而瀉之則陰陽俱脫表裡相離故脫色而蒼蒼然刺之血出多色不變而煩悗者刺絡而虛經虛經之屬於陰者陰脫故煩悶陰陽相得而合為痹者此為內溢於經外注於絡如是者陰陽俱有餘雖多出血而弗能虛也此詳言刺血絡而其應異者之義也奇邪不正之邪也奇邪在各篇不一本經口問篇亦有奇邪二字但口問言奇邪走於空竅而此則奇邪走於血絡也奇邪不在於經故在於血絡也然有刺血絡而僕者何也正以脈有所盛而血虛者必瀉其氣以補其血故刺之則脫氣脫氣則僕也有刺血絡而血出漂射者何也正以血氣俱盛而內焉陰氣多者其血必滑故刺之則射也有刺血絡而血出甚少且黑色而濁者何也正以陽氣畜積久留不瀉其血黑以濁故不能射也有刺血絡而血出最清內有半清汁者何也正以新飲之際而液滲血絡未得合和於血故血出而半為汁也有刺血絡而髮針乃腫者何也正以不新飲者身中有水久則為腫陰氣積於陽分其氣聚於血絡之中故刺之時血尚未出而氣乃先行所以髮針而腫也有血出若多若少而面色蒼蒼然似有脫色者何也正以營衛二氣暫時相得尚未和合因而瀉之則陰陽俱脫表裡相離故其色脫而蒼蒼然也有刺血絡而血出多色不變然內焉煩悶者何也正以刺絡而經虛其經之屬於陰者陰脫故煩悗也有刺血絡出血已多而其身不動搖者何也正以營衛相得合成痹病者此其邪氣內溢於經外注於絡則陰陽俱以邪氣而有餘雖血多出而弗能虛所以不至動搖也黃帝曰相之奈何岐伯曰血脈者盛堅橫以赤上下無常處小者如針大者如筋則而瀉之萬全也故無失數矣失數而反各如其度則側同此言視血絡之法也相視也血絡者必盛且堅及橫以赤其上下無有常處小如針而大如筋必側其針以迎而瀉之可以萬全故無失上文刺血絡之術數也若夫其術數而與法相反則凡或僕或射等證各如其度以相應矣黃帝曰針入而肉著何也岐伯曰熱氣因於針則針熱熱則肉著於針故堅焉著著同此言針入而肉之所以著也蓋以針入於內肉中熱氣溫之於針則針熱針熱則肉著於針故不惟熱而又堅不可拔也陰陽清濁第四十陰陽者陰經陽經也陰經受清氣陽經受濁氣故名篇黃帝曰余聞十二經脈以應十二經水著其五色各異清濁不同人之血氣若一應之奈何岐伯曰人之血氣苟能若一則天下為一矣惡有亂者乎黃帝曰余問一人非問天下之衆岐伯曰夫一人者亦有亂氣天下之衆亦有亂人其合為一耳惡去聲夫音扶此言人之血氣不能為一所以有亂氣也經水篇曰人手足各有三陰三陽合為十二經脈以應十二經水如足太陽外合於清水而內屬於膀胱足少陽外合於渭水而內屬於膽之類是也所以十二經合於五行五行別為五色今與十二經水而相應則五色各異清濁必不相同矣倘其間有人之氣血如一無清無濁則欲分而應彼十二經水也奈何伯曰人身之氣血必不能合之而為一也苟人之氣血可以為一則推之天下皆可以為一矣惡有氣血之亂者乎帝遂言余之所問止就一人之身耳非問天下之衆也伯言自一人之身而言必有亂氣猶天下之衆必有亂人也其理可合之為一耳故知天下必有亂人則一人之身必有亂氣也焉得謂氣血為一哉所以必與經水之清濁不同者而相應也黃帝曰願聞人氣之清濁岐伯曰受谷者濁受氣者清清者注陰濁者注陽濁而清者上出於咽清而濁者則下行清濁相干命曰亂氣此承上文而言亂氣之義自其清濁相干者成之也大凡人身之氣始時受穀氣者六腑也六腑為濁繼而穀氣化為精微之氣從上而出則受此精微之氣者五臟也其臟為清惟清者注之於陰經正所謂精微之氣也惟濁者注之於陽經正所謂渣穢之物也然清濁本非二物而陰陽互相為用其陽經之濁中有清者上出於咽喉本經憂恚無言篇言咽喉者水穀之道路也人之後喉通於六腑俗謂之食喉其陰經之清中有濁者則其氣下憂恚無言篇言喉嚨者氣之所以上下者也人之前喉通於五臟俗謂之氣喉此喉嚨所以出清氣而濁者則下降也由下節觀之則喉嚨為上而十二經皆為下耳惟陰與陽不升降則清與濁始相犯而氣之所以有亂者也黃帝曰夫陰清而陽濁濁者有清清者有濁清濁別之奈何岐伯曰氣之大別清者上注於肺濁者下走於胃胃之清氣上出於口肺之濁氣下注於經內積於海首別字音鱉次別字如字此承上文而明陰經清而陽經濁濁中有清而清中有濁之義也蓋氣之大別而分者受氣者清故清者上注於肺肺為陰所以曰受氣者清而清者注陰也受谷者濁故濁者下走於胃所以曰受谷者濁而濁者注陽也且胃之清氣上出於口即咽喉為水穀之道路所以曰濁而清者上出於咽也肺之濁氣下注於十二經而內積於膻中之氣海即喉嚨為氣之上下所以曰清而濁者則下行也焉得謂清濁為無別耶黃帝曰諸陽皆濁何陽獨甚乎岐伯曰手太陽獨受陽之濁手太陰獨受陰之清其清者上走空竅其濁者下行諸經諸陰皆清足太陰獨受其濁此言陽經受濁而小腸為尤濁陰經受清而肺經為尤清然陰經雖皆受清而脾則獨受其濁也帝問諸陽經皆受濁氣何陽經獨受濁氣之甚伯言手太陽小腸經者則上承胃之所受脾之所化其水穀尚未及分而穢汙俱存此所以獨受陽經之最濁者也其為濁之濁乎且諸陰經皆受清氣何陰經獨受清氣之甚唯手太陰肺經則為五臟之華蓋獨受陰經之最清者也故肺金之清氣上走於空竅之中而其濁氣下行於十二經及內積於膻中之氣海則肺最居上所以獨受陰經之清也其為清之清乎然諸陰皆受清氣唯足太陰脾經則胃中濁氣賴以運化所謂獨受其濁也其為清中之濁乎黃帝曰治之奈何岐伯曰清者其氣滑濁者其氣澀此氣之常也故刺陰者深而留之刺陽者淺而疾之清濁相干者以數調之也此言刺清濁者必分陰陽諸經而刺清濁相干則以術數而調之也清氣屬陰故陰經必清其氣必滑濁氣屬陽故陽經必濁其氣必澀此乃氣之常也然陰者主裡既曰清而濁者則下行又曰肺之濁氣下行諸經故凡刺陰經者必深其針而久留之陽者主表既曰濁而清者上出於咽又曰胃之清氣上出於口故凡刺陽經者必淺其針而疾去之其或清者不升而濁者不降乃清濁相干也當以術數而調之陰經或淺而疾之陽經或深而留之不可以為常也乃一時權變之宜耳陰陽系日月第四十一日者即曆書之十日也月者即曆書之一月也天與人之陰陽相合而足經應月手經應日故名篇黃帝曰余聞天為陽地為陰日為陽月為陰其合之於人奈何岐伯曰腰以上為天腰以下為地故天為陽地為陰故足之十二經脈以應十二月月主於水故在下者為陰手之十指以應十日日主火故在上者為陽此言人身之陰陽合於大之陰陽也積陽為天故天為陽積陰為地故地為陰日為陽之精而歷家紀日者以之月為陰之精而歷家紀月者以之其以人之身而合之日月者奈何伯言人身腰以上為天腰以下為地素問六微旨大論云天樞之上天氣主之天樞之下地氣主之氣交之分人氣從之王注云天樞穴在臍之兩旁天樞正當身之中上分應大下分應地中分應氣交天地之氣交合之際謂之氣交唯腰以上為天而體在腰之上者為天屬陽也唯腰以下為地則體在腰之下者為地屬陰也故足者腰之下也足有三陽三陰左右共十二經則與月而相應正以十二月者十二支為陰也蓋月生於水水與月皆為陰宜足之在下為陰者應之也手者腰之上也手有十指則與十日而相應每月之內有三旬每旬計十日正以每旬者乃十干為陽也蓋日主於火火與日皆為陽宜手之在上為陽者應之也黃帝曰合之於脈奈何岐伯曰寅者正月之生陽也主左足之少陽未者六月主右足之少陽卵者二月主左足之太陽午者五月主右足之太陽辰者三月主左足之陽明巳者四月主右足之陽明此兩陽合於前故曰陽明申者七月之生陰也主右足之少陰醜者十二月主左足之少陰酉者八月主右足之太陰子者十一月主左足之太陰戌者九月主右足之厥陰亥者十月主左足之厥陰此兩陰交盡故曰厥陰此言足之十二經合十二月之十二支者以其皆為陰也夫十二月固以其屬十二支而為陰矣然自正月以至六月為陰中之陽自七月以至十二月為陰中之陰但前六月之正二三月又為陰中之少陽故屬左足之三陽四五六月為陰中之太陽故屬右足之三陽是以正月建寅為陽之生主左足之少陽乃膽經脈氣所屬也六月建未則為右足之少陽兩足第四指以上脈氣所行二月建卯主左足之太陽蓋自少而之太乃膀胱經脈氣所屬也五月建午則為右足之太陽兩足小指外側脈氣所行三月建辰主左足之陽明乃胃經脈氣所屬也四月建已則為右足之陽明兩足次指脈氣所行且陽明之義渭何正以正二月五月六月為少陽太陽而三月四月居於其中則被兩陽合明於其前故曰陽明也其後七月八月九月為陰中之陰故屬右足之三陰十月十一月十二月為陰盡陽生故屬左足之三陰是以七月建申為陰之生主右足之少陰乃腎經脈氣所行也十二月建醜則為左足之少陰兩足心出內踝以上脈氣所行八月建酉主右足之太陰乃脾經脈氣所行也十一月建子則為左足之太陰兩足大指內側以上脈氣所行九月建戍主右足之厥陰乃肝經脈氣所行也十月建亥則為左足之厥陰兩足大指外側以上脈氣所行且厥陰之義謂何正以七月八月為陰之初生而十一月十二月為陽之初生惟九月十月則為陰之盡故曰厥陰也厥者盡也甲主左手之少陽己主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明此兩火併合故為陽明庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰此言手之十指合十日之十干者以其皆為陽也夫十日固以其屬十干而為陽矣然自甲至己為陽中之陽而自庚至癸為陽中之陰是以甲日主左手之少陽乃三焦經脈氣所行也而已日則屬右手之少陽兩手第四指外側以上脈氣所行乙日主左手之太陽以自少之太乃小腸經脈氣所行也而戊日則屬右手之太陽兩手小指外側以上脈氣所行丙日主左手之陽明乃大腸經脈氣所行也而丁日則屬右手之陽明兩手次指以上脈氣所行所謂陽明者以少太二陽之火併合也庚日主右手之少陰乃心經脈氣所行也而癸日則屬左手之少陰兩手小指內廉以上脈氣所行辛日主右手之太陰乃肺經脈氣所行也而壬日則屬左手之太陰兩手大指內側以上脈氣所行自壬至丙皆屬左手自丁至辛皆屬右手手之十指所屬者如此故足之陽者陰中之少陽也足之陰者陰中之太陰也手之陽者陽中之太陽也手之陰者陽中之少陰也腰以上者為陽腰以下者為陰其於五臟也心為陽中之太陽肺為陽中之少陰肝為陰中之少陽脾為陰中之至陰腎為陰中之太陰此結上文手足所屬之干支左右各有陰陽少大之義而至於五臟在人亦有陰陽少太之義也夫由足之十二經脈應十二月之十二支音觀之則正月左足少陽二月左足太陽三月左足陽明四月右足陽明五月右足太陽六月右足少陽則是足之屬陽經者正以足本為陰而陽經屬焉乃陰中之少陽也七月右足少陰八月右足太陰九月右足厥陰十月左足厥陰十一月左足太陰十二月左足少陰則是足之屬陰經者正以足本為陰而陰經屬焉乃陰中之太陰也由上文手之十指應十日之十干者觀之則甲主左手之少陽己主右手之少陽乙主左手之太陽戊主右手之太陽丙主左手之陽明丁主右手之陽明則是手之屬陽經者正以手本為陽而陽經屬焉乃陽中之太陽也庚主右手之少陰癸主左手之少陰辛主右手之太陰壬主左手之太陰則是手之屬陰經者正以手本為陽而陰經屬焉乃陽中之少陰也夫曰手者雖腰以上而凡腰以上者不止於手皆為陽也夫曰足者雖腰以下而凡腰以下者不止於足皆為陰也其在內之五臟亦然心肺居膈之上本為陽也然心為牡臟為陽中之太陽肺為牝臟為陽中之少陰脾肝腎居膈之下本為陰也然肝為牝臟為陰中之少陽脾為牝臟為陰中之至陰腎為牝臟為陰中之太陰蓋以陰陽之大義陰中有陽陽中有陰陰中有太有少陽中有太有少故分之為陰陽者其妙有如是夫黃帝曰以治奈何岐伯曰正月二月三月人氣在左無刺左足之陽四月五月六月人氣在右無刺右足之陽七月八月九月人氣在右無刺右足之陰十月十一月十二月人氣在左無刺左足之陰此言足之十二經應十二月其左右足各有陰陽所屬刺之者當知所慎也正月二月三月人氣在左足之少陽太陽陽明故用針者無刺左足之三陽經也四月五月六月人氣在右足之陽明太陽少陽故用針者無刺右足之三陽經也七月八月九月人氣在右足之少陰太陰厥陰故用針者無刺右足之三陰經也十月十一月十二月人氣在左足之厥陰太陰少陰故用針者無刺左足之三陰經也夫足之十二經當知慎刺於十二月者如此則甲乙丙日不可以刺左手之少陽太陽陽明丁戊己日不可以刺右手之陽明太陽少陽庚辛日不可以刺右手之少陰太陰壬癸日不可以刺左手之太陰少陰者可類推矣黃帝曰五行以東方為甲乙木主春春者蒼色主肝肝者足厥陰也今乃以甲為在手之少陽不合於數何也岐伯曰此天地之陰陽也非四時五行之以次行也且夫陰陽者有名而無形故數之可十推之可百散之可千推之可萬此之謂也按數之可十四句又見素問陰陽離合論五運行大論此承上文而言手經之屬十干者乃天地之陰陽而非四時所次之陰陽正以陰陽之義至噴而不可窮也帝問五行以東方甲乙木屬主於時則為春其色為蒼其臟主肝肝者屬足厥陰也今乃以甲日屬左手之少陽乃三焦經而不以屬之肝經則是數有不合也伯言臣之所列陰陽者乃大地之陰陽也非四時五行之次相列之陰陽也由此觀之則陰陽者在四時五行固甲乙屬肝而在天地之陰陽則又可以三焦屬甲甲與三焦皆少陽故陰陽各有名色所屬而無形體可泥數之可十者此陰陽也推之而倍十為百亦不外是散之而可千者此陰陽也推之而倍千為萬亦不外是變化無窮真妙矣哉病傳第四十二篇內大氣入臟先發於何臟何日傳何臟即素問病傳論之所謂病傳也故以病傳名篇然素問以論標本病傳為一篇本經以病本論標本以病傳論病之所傳分為二篇黃帝曰余受九針於夫子而私覽於諸方或有導引行氣喬摩灸尉刺焫飲藥之一者可獨守耶將盡行之乎岐伯曰諸方者衆人之方也非一人之所盡行也黃帝曰此乃所謂守一勿失萬物畢者也喬蹻同素問移精變氣論治之極於一得神者昌此同旨此言諸方可行於衆病非行於一人然守一可以御萬也諸方者或導引行氣或蹻足或按摩或用灸或用尉或用刺或用焫或飲藥為醫工者可獨守一法而行之抑亦盡識而行之伯言諸方者所以治衆人之病病有不同故治之亦異也豈必於一人之病而盡用之哉故帝悟諸方雖行於衆病而醫工當知乎守一守一者合諸方而盡明之各守其一而勿失也庶乎萬物之病可以畢治而無誤矣然守一之理帝能言之而其要在於生神妙哉神之為一也下文伯始及之今余聞陰陽之要虛實之理傾移之過可治之屬願聞病之變化淫傳絶敗而不可治者可得聞乎岐伯曰要乎哉問道昭乎其如日醒窘乎其如夜瞑能被而服之神與俱成畢將服之神自得之生神之理可著於竹帛不可傳於子孫黃帝曰何謂日醒岐伯曰明於陰陽如感之解如醉之醒黃帝曰何謂夜瞑岐伯曰瘖乎其無聲漠乎其無形折毛髮理正氣橫傾淫邪泮衍血脈傳溜大氣入臟腹痛下淫可以致死不可以致生此言守一之旨在於守道以生神故明暗異狀而夭病當知也按神之為義有指人身之血氣言者如素問八正神明論所謂血氣者人之神不可不謹養也有指人身自有神氣而言者如上古天真論所謂形與神俱積精全神調經論所謂神有餘有不足本經九針十二原所謂所言節者神氣之所遊行出入也本神篇所謂兩神相搏謂之神怵惕思慮則傷神也有指醫工之針法言者如八正神明論所謂請言神神乎神則指上工之心法有如是也有自醫工本身神氣言者如終始篇所謂專意一神寶命全形篇所謂一曰治神皆指未針之時而言又如九針十二原所謂神在秋毫神屬勿去寶命全形篇針解篇所謂神無營於衆物皆指用針之時而言也有自病人神氣言者如九針十二原所謂上守神終始篇所謂以移其神八正神明論所謂善養神者必知形之肥瘦營衛血氣之盛衰針解篇所謂正其神制其神也有自贊揚醫工言者如邪氣臟腑病形篇所謂知其病命曰神也又自道之神妙而言如天元紀大論所謂陰陽不測謂之神然亦可以指讚揚神聖而言也若此篇所謂神與俱成神自得之生神之理乃就醫工之精神心法針法而統言之也必神之生然後可以行諸方故謂之曰守一帝問病有陰陽虛實及傾移之過大抵內經謂病為有過可治之屬凡病有可治之類余皆聞之然有變化不測浸淫相傳以至於絶敗而不可治者乃余之未聞也是帝本以大病難知為疑而伯乃以上文守一之旨為答遂嘆道之有要明者為醒而暗者為瞑果能佩而服之則神自生而與道俱成又能終身服之則神自生而與法俱得然此生神之理可著於竹帛以傳之天下後世蓋上達必由心悟可以待其人而後行也雖子孫亦不可傳之猶梓匠輪輿能使人規矩不能使人巧故父不得以私諸子也凡明此道者如惑之解如醉之醒是謂昭乎如日醒也惟惑與醉二端可著得醒字故借言之昧此道者如病之瘖無聲難聞如雲之漠無形可據是謂窘乎其如夜瞑也何也凡病之變化淫傳絶敗而不可治者其毫毛折腠理開正氣橫傾邪氣泮衍大邪入臟而腹痛下傳誠有易死難生者非有守一之神烏能治若病哉黃帝曰大氣入臟奈何岐伯曰病先發於心一日而之肺三日而之肝五日而之脾三日不已死冬夜半夏日中按素問標本病傳論云夫病傳者心病先心痛一日而咳三日脅支痛五日閉塞不通身體重三日不已死冬夜半夏日中此承上文而言大氣入臟者即五臟之相剋為傳遂以心之病傳者而先言之也大氣入臟者即素問標本病傳論之所謂病傳也夫病傳者病若先發於心其證先心痛以臟真通於心也故火來乘金一日即傳之於肺其證當為咳以肺之變動為咳也又三日則四日矣金來乘木傳之於肝其證當脅支痛以肝脈循脅肋也又五日則九日矣本來乘土傳之於脾其證當閉塞不通身痛體重以脾主肉而肉重也又三日則十二日矣其病不已則死但冬屬水而冬之夜半其水尤勝惟水剋火故冬夜死於夜半夏屬火而夏之日中其火尤勝今心火已絶火不能持故夏死於日中也按素問言病靈樞言臟其實病即臟之病也蓋素問承上文甚者獨行而言耳病先發於肺三日而之肝一日而之脾五日而之胃十日不已死冬日入夏日出標本病傳論云肺病喘咳三日而脅支滿痛一日身重體痛五日而脹十日不已死冬日入夏日出此言邪氣入肺而有相傳之死期也病先發於肺其證當為喘為咳過三日則金來乘木傳之於肝其證當脅支滿痛又一日則四日矣木來乘土傳之於脾其證當身重體痛又五日則九日矣脾邪乘胃其證當為脹又十日則十九日矣其病不已則死但冬之日入在申時雖屬金金衰不能扶也故冬死於日入夏之日出在寅木旺火生肺氣己絶非火盛而死故夏死於日出也病先發於肝三日而之脾五日而之胃三日而之腎三日不已死冬日入夏蚤食標本病傳論云肝病頭目眩脅支滿三日體重身痛五日而脹三日腰脊小腹痛脛痠三日不已死冬日入夏蚤食蚤當從早此言邪氣入肝而有相傳之死期也病先發於肝其證當頭目眩而脅支滿過三日則木來乘土傳之於脾其證當體重身痛又五日則八日矣脾傳於胃腑其證當為脹又三日則十一日矣則土來乘水傳之於腎其證當腰脊小腹俱痛脛中覺痠正以腎脈起於足循腨內出膕內廉貫脊屬腎絡膀胱又腰為腎之府故病如是也又三日則十四日矣其病不已則死但冬之日入在申以金旺木衰故冬死於日人夏之早食在卯以木旺亦不能扶故夏死於早食也病先發於脾一日而之胃二日而之腎三日而之膂膀胱十日不已死冬人定夏晏食標本病傳論云脾病身痛體重一日而脹二日少腹腰脊痛脛痠三日背𦛗筋痛小便閉十日不已死冬人定夏晏食此言邪氣入脾而有相傳之死期也病先發於脾其證當身痛體重一日而自傳於胃腑其證當為脹又二日則三日矣土來乘水乃傳於腎其證當少腹腰脊痛而脛痠也又三日則六日矣腎自傳於伏膂之脈膀胱之腑其證當背𦛗筋痛而小便亦閉也又十日則十六日矣其病不已死但冬之人定在亥以土不勝水故冬死於人定夏之晏食在寅以木來剋土故夏死於晏食也病先發於胃五日而之腎三日而之膂膀胱五日而上之心二日不已死冬夜半夏日昳標本病傳論云胃病脹滿五日少腹腰脊痛䯒痠三日背𦛗筋痛小便閉五日身體重六日不已死冬夜半夏日昳昳徒結切此言邪氣入胃而有相傳之死期也胃病者其證當脹滿五日則胃傳於腎其證當少腹腰脊痛而䯒痠也又三日則八日矣腎病自傳於腑其證當背𦛗筋痛而小便自閉也又五日則十三日矣又上而傳之於心其證當心痛也又二日則十五日矣其病不已則死但冬之半夜屬子土不勝水故冬死於夜半夏之日昃在未土氣正衰故夏死於日昳也按標本病傳論云五日身體重與此五日而上之心者不同又六日不已死與此二日不已死亦不同下節大抵皆然病先發於腎三日而之膂膀胱三日而上之心三日而之小腸三日不已死冬大晨夏晏晡標本病傳論云腎病者少腹腰脊痛䯒痠三日背𦛗筋痛小便閉三日腹脹三日兩脅支痛二日不已死冬大晨夏晏晡此言邪氣入腎而有相傳之死期也腎病者其證當少腹腰脊痛䯒痠三日則自傳於膀胱之腑其證當背𦛗筋痛而小便亦閉也又三日則六日矣水來乘火膀胱上而之心其證當心痛也又三日則九日矣心自傳小腸之腑其證當小腹脹也又二日則十一日矣其病不已則死但冬之大明在寅末夏之晏晡以向昏土能剋水故冬死於大晨而夏死於晏晡也病先發於膀胱五日而之腎一日而之小腸一日而之心二日不已死冬雞鳴夏下晡標本病傳論云膀胱病小便閉五日少腹脹腰脊痛䯒痠一日腹脹一日身體痛二日不已死冬雞鳴夏下晡此言邪入膀胱而有相傳之死期也膀胱病者其證當小便閉五日則自傳於腎其證當少腹脹腰脊痛而䯒痠也又一日則六日矣水來乘火腎傳之小腸其證當小腹脹也又一日則七日矣又傳之於心其證當心痛也又二日則九日矣其病不已死但冬之雞鳴在醜土剋水故冬死於雞鳴夏之下晡在申金衰不能生水故夏死於下晡也諸病以次相傳如是者皆有死期不可刺也間一臟及二三四臟者乃可刺也按難經五十三難七傳者死間臟者生與此篇大義同此結言相傳而為甚者死不可刺間臟而為生者可刺之也諸經之病皆有相剋之次是相傳為病之甚甚者獨行故有死期不可刺若間傳而為相生則間一臟為始及三四臟是乃相生之次所謂間者並行乃可刺以治之也淫邪發夢第四十三內有淫邪泮衍使人臥不得安而發夢故名篇黃帝曰願聞淫邪泮衍奈何岐伯曰正邪從外襲內而未有定舍反淫於臟不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫於腑則有餘於外不足於內氣淫於臟則有餘於內不足於外黃帝曰有餘不足有形乎岐伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔焫陰陽俱盛則夢相殺上盛則夢飛下甚當作盛則夢墮盛當作甚飢則夢取甚飽則夢豫與同肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而瀉之立己按陰氣盛至肺氣盛又見素問脈要精微論外方盛衰論亦有諸夢此承前篇而明淫邪泮衍之義先以臟腑十二盛之發夢者言之也淫邪者非另有其邪即後篇燥濕寒暑風雨之正邪從外襲內而未有定舍及淫於臟腑即前篇之大氣入臟也與營為陰氣衛為陽氣者俱行而與魂魄飛揚使人臥不得安而多發為夢此邪淫之於腑則腑主外其外為有餘而內則不足此邪淫之於臟則臟主內其內當有餘而外則不足試以有餘者觀之陰氣者營氣也營氣盛則夢涉大水而有恐懼之狀蓋大水屬陰故也陽氣者衛氣也衛氣盛則夢見大火而有燔焫之勢蓋大火屬陽故也若陰陽俱盛則營衛二氣皆盛也內外有餘陰陽相爭其夢主於相殺有手部屬陽故上部邪盛則夢飛揚足部屬陰故下部邪盛則夢墮墜如飢至太甚則夢有所取如飽至太甚夢有所與肝之邪盛則夢多怒以肝之志為怒也肺之邪盛則夢恐懼哭泣而飛揚以肺之聲為哭也心之邪盛則夢善笑而恐畏以心之聲為笑而其志主於優也脾之邪盛則夢歌樂及體重不能舉以脾之聲為歌而其體主肉也腎之邪盛則夢腰脊兩解不相連屬以腰為腎之府也凡此十二盛者在腑則有餘於外在臟則有餘於內凡有夢至時即知其邪之在何臟腑遂用針以瀉之其邪可立已矣蓋腑夢瀉腑臟夢瀉臟也厥氣客於心則夢見丘山煙火客於肺則夢飛揚見金鐵之奇物客於肝則夢山林樹木客於脾則夢見丘陵大澤壞屋風雨客於腎則夢臨淵沒居水中客於膀胱則夢遊行客於胃則夢飲食客於大腸則夢田野客於小腸則夢聚邑沖衢客於膽則夢鬥訟自刳客於陰器則夢接內客於項則夢斬首客於脛則夢行走而不能前及居深地窖苑中客於股肱則夢禮節拜起客於胞膻則夢泄便凡此十五不足者至而補之立已也窖力交切此舉臟腑之十五不足而發之為夢者言之也厥氣者即下篇之陰陽喜怒飲食居處凡臟腑內傷之邪也其邪氣客於心則夢見山林煙火以心屬火也邪氣客於肺則夢飛揚及金鐵之奇物以肺屬金也邪氣客於肝則夢見山林樹木以肝屬木也邪氣客於脾則夢見丘陵大澤壞屋風雨以脾屬土也邪氣客於腎則夢臨於深淵或沒居於水中以腎屬水也邪氣客於膀胱則夢出遊行以膀胱經遍行頭項背腰䯒足也邪氣客於胃則夢飲食以胃主納食也邪氣客於大腸則夢田野以大腸為傳道之官其曲折廣大似田野也邪氣客於小腸則夢會聚之邑居或衝要之道衢以小腸為受盛之官其物之所聚似邑衢也邪氣客於膽則夢鬥訟自刳以膽屬木脾主土與肉木能剋土而肉傷也邪氣客於陰器則夢接內以陰器為作強之官也邪氣客於項則夢斬首以項為邪所傷也邪氣客於足脛則夢行走不能前及居深地懨苑中以脛為邪所傷行走不能也邪氣客於股肱則夢禮節拜起以拜起主於股肱也邪氣客於胞䐈以膀胱為胞䐈之室而胞䐈在膀胱之內故邪客之則泄便也凡此十五不足者在腑則不足於內在臟則不足於外凡有夢至時即知其邪之在何臟俯遂用針以補之其邪可立已矣蓋腑夢補臟臟夢補腑也順氣一日分為四時第四十四內有一日分為四時故名篇黃帝曰夫百病之所始生者必起於燥濕寒暑風雨陰陽喜怒飲食居處氣合而有形得臟而有名余知其然也夫百病者多以旦慧晝安夕加夜甚何也岐伯曰四時之氣使然黃帝曰願聞四時之氣岐伯曰春生夏長秋收冬藏是氣之常也人以應之以一日分為四時朝則為春日中為夏日入為秋夜半為冬朝則人氣始生病氣衰故旦慧日中人氣長長則勝邪故安夕則入氣始衰邪氣始生故加夜半人氣入臟邪氣獨居於身故甚也長上聲此言百病皆旦慧晝安夕加夜甚之由也夫百病必始於外感內傷故燥濕寒暑風雨者外感也陰陽喜怒飲食居處者內傷也邪氣相合於臟而病形成得其分臟而病名別然病雖不同大抵旦慧晝安夕加夜甚帝之所以疑也伯言一日之間合於四時之氣朝則為春日中為夏日入為秋半夜為冬故人氣者衛氣也衛氣為陽氣朝則出於目自足太陽經之睛明穴以行於足手陽經其氣始生於朝故病氣者邪氣也邪氣不能敵人衛氣而旦時乃爽慧焉日中則衛氣漸長而猶能勝邪故能安夕則衛氣行於陽經者周而將入於陰經其氣始衰彼邪氣勝衛氣而始生故病加夜半則衛氣行於陰經全入於臟彼邪氣獨居於身故身不能支而病甚也人氣為衛氣之義見素問生氣通天論及本經衛氣行篇黃帝曰其時有反者何也岐伯曰是不應四時之氣臟獨主其病者是必以臟氣之所不勝時者甚以其所勝時者起也黃帝曰治之奈何岐伯曰順天之時而病可與期順者為工逆者為粗此言病有不應旦慧晝安夕加夜甚之由而惟上工則能順其時也帝疑病有旦晝或加或甚而夕夜或慧或安者故伯言此乃臟氣獨主其病而不應一日分為四時之氣也如脾病不能勝旦之木肺病不能勝晝之火肝病不能勝夕之金心病不能勝夜之水故為加為甚也若人之臟氣能勝時之氣如肺氣能勝旦之木腎氣能勝晝之火心氣能勝夕之金脾氣能勝夜之水故至於慧且安也治之者能順其時如脾病不能勝旦之木則補脾而瀉肝肺病不能勝晝之火則補肺而瀉心肝病不能勝夕之金則補肝而瀉肺心病不能勝夜之水則補心而瀉腎斯病可與期也彼粗工者則逆之而已惡足以知此黃帝曰善余聞刺有五變以主五輸願聞其數岐伯曰人有五臟五臟有五變五變有五輸故五五二十五輸以應五時黃帝曰願聞五變岐伯曰肝為牡臟其色青其時春其音角其味酸其日甲乙心為牡臟其色赤其時夏其日丙丁其音徵其味苦脾為牝臟其色黃其時長夏其日戊己其音宮其味甘肺為牝臟其色白其音商其時秋其日庚辛其味辛腎為牝臟其色黑其時冬其日壬癸其音羽其味鹹是謂五變黃帝曰以主五輸奈何缺岐伯曰臟主冬冬刺井色主春春刺滎時主夏夏刺輸音主長夏長夏刺經味主秋秋刺合是謂五變以主五輸此詳言刺五臟者有五變五變主於五輸也法有不同之謂變五輸者即井滎輸經合也刺五臟而有五變者以五臟有不同也肝為陰中之陽心為陽中之陽故皆稱曰牡臟脾為陰中之至陰肺為陽中之陰腎為陰中之陰故皆稱曰牝臟其各臟之曰色曰時曰音曰味曰日不同如此是之謂五變也然五變主於五輸者何也蓋五臟主於冬故凡病在於臟者必取五臟之井如肝取大敦心取少衝之類色主於春故凡病在於色者必取五臟之滎如肝取行間心取少府之類時主於夏故凡病時間時甚者必取五臟之輸如肝取太衝心取神門之類音主於長夏故凡病在於音者必取五臟之經如肝取中封心取靈道之類味主於秋故凡病在於胃及飲食不節得病者必取五臟之合如肝取曲泉心取少海之類是之謂五變以主五輸所謂五五二十五輸以應五時者如此黃帝曰諸原安合以致六輸岐伯曰原獨不應五時以經合之以應其數故六六三十六輸按後世針灸書言陽經之輸即為原陰經輸並於原故治原即所以治輸今考此節當以經穴治之可以代原則後世以輸穴代之者非經旨也此言六腑之原穴不應五時而以經合之遂成三十六輸之數也帝疑五臟無原穴六腑有原穴今治之者乃刺五輸而不及原則諸原與五時何合而何以足六輸之數伯言井滎輸經合合於五時唯六腑之原獨不應於五時故治病者以經穴合之如大腸取合谷之類以應六輸之數故六六三十六輸而治腑之法在是矣黃帝曰何謂臟主冬時主夏音主長夏味主秋色主春願聞其故岐伯曰病在臟者取之井病變於色者取之滎病時間時甚者取之輸病變於音者取之經經滿而血者病在胃及以飲食不節得病者取之於臺故命曰味主臺是謂五變也此申言五變治五輸之義也本節釋義已具上第三節中外揣第四十五內有司內揣外故名篇黃帝曰余聞九針九篇余親授其調頗得其意夫九針者始於一而終於九然未得其要道也夫九針者小之則無內大之則無外深不可為下高不可為蓋恍惚無窮流溢無極余知其合於天道人事四時之變也然余聞雜之毫毛渾束為一可乎岐伯曰明乎哉問也非獨針道焉夫治國亦然黃帝曰余願聞針道非國事也岐伯曰夫治國者夫惟道焉非道何可小大深淺雜合而為一乎黃帝曰願卒聞之岐伯曰日與月焉水與鏡焉鼓與響焉夫日月之明不失其影水鏡之察不失其形鼓響之應不後其聲動搖則應和盡得其情黃帝曰窘乎哉昭昭之明不可蔽其不可蔽不失陰陽也合而察之切而驗之見而得之若清水明鏡之不失其形也五音不彰五色不明五臟波蕩若是則內外相襲若鼓之應桴響之應聲影之似形故遠者司外揣內近者司內揣外是渭陰陽之極無地之蓋請藏之靈蘭之室弗敢使泄也刺節真邪論及素問靈蘭祕典論皆藏此室此言九針之要欲渾束為一者唯至明而已夫九針者其小無內其大無外其深不可以為下其高不可以為蓋惚惚恍恍其妙無窮泛溢漫散其流無極上合天道四時中合人事然而未得其要道茲欲雜如毫毛之繁者而渾束為一帝之所以問也伯言針道固然治國亦然皆有要道務使小大深淺合之而為一焉可也觀之日月之明不失其影水鏡之察不失其形鼓響之應不失其聲故一動搖之間則相應相和而盡得其情矣帝知伯之所言不過至明以察陰陽而已乃人身之陰陽雖昭昭小明亦不可蔽正以其不失陰陽之義也惟合陰陽而察之切陰陽而驗之見陰陽而得之若清水明鏡之不失其形則據五音五色而五臟盡明矣設使五音不能彰五色不能明則陰陽不明而五臟在人身者如水波蕩然紊亂無紀故必知內外有相襲之妙真若桴鼓聲響形影之相合則人身之音與色是之謂遠可以言外也而即外可以揣五臟之在內者人身之五臟是之謂近可以言內也而即內可以揣音與色之在外者此乃陰陽之極天地之蓋不可以輕泄之乎
