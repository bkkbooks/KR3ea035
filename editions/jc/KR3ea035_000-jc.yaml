body:
  text: 刻馬玄臺先生內經靈樞注證發微引門人金一龍云間庠生原名丹睹靈樞注證發微書一旦告成而浩然長嘆曰嗟呼自六經孔孟而下百家子史道經佛卷孰書無注何靈樞迄今五千餘年獨為未注之書哉吾以為大義深奧有志者稀故寥寥未聞於後世也奧稽黃帝與岐伯鬼臾區等六臣間答作為內經內有素問八十一篇靈樞八十一篇凡素問所引經曰皆出靈樞則靈樞為先而素問為後唐寶應年間啟玄子王冰曾注素問隨句解釋逢疑則默章節不分前後混淆凡司天在泉南北政等義闕而不解吾師既以更詳圖注梓行於世獨念靈樞無注殫精研慮寒暑屢更遂成斯編縱軒岐復起當以吾師為獨得宗旨矣嗚呼六經不明千載無真儒內經不明千載無真醫自古稱有著述者秦越人難經張仲景傷寒論王叔和脈訣脈經張子和劉守真李東垣朱丹溪諸書皆翹然為世所宗今即靈素以印正之則諸書皆未合經旨而況於他哉何也大凡為醫者先明脈體次分經絡乃定病名然後用藥餌針灸按摩導引熨治等法今質三者於諸書繆盭居多按靈素六節藏象論終始四時氣禁服等篇分明以左手寸部為人迎凡一倍二借三倍四倍以上為格脈可以知足手六陽經之病右手寸部為氣口凡一倍二借三倍四倍以上為關脈可以知足手六陰經之病故黃帝與雷公歃血定盟傳以大術數者不過此法而已諸書以尺寸分關格又以關格為膈證是脈體病名兩誤矣按靈樞營衛生會營氣衛氣衛氣行等篇分明以百病皆生於宗營衛三氣偏衰偏勝三氣必生於前之上中下三焦諸書皆以後之三焦有名有形者寄在胸中與膈相應而以前三焦有名無形者混而為一不知後三焦止為決瀆之官水道所出前三焦升降上下宗營衛三氣從是而出營氣隨宗氣以行經隧之中衛氣不隨宗氣而行而自行於各經皮膚分肉之間故清者為營濁者為衛營在脈中衛在脈外一十六字乃醫家所以分脈體別病名決死生用藥餌之根本諸書於宗營衛三氣大義絕無分析則平日之別疾用藥者何法也按素問評熱論刺熱論瘧論咳論刺腰痛論風論痹論痿論厥論水熱穴論靈樞癲狂篇熱病篇厥病篇脹論篇淫邪發夢篇凡病必分五臟六腑諸書皆不分臟腑漫用成方臟腑受傷夭枉多矣他如病名奇僻諸書絕不及載令後人罔獲聞知按素問陰陽別論有風消證素問玉機真臟論有肺痹傳為肝痹傳為脾風發癉傳腎為疝瘕傳心為瘛心復傳肺發寒熱三年而死之證素問氣厥論有寒熱相移證及食亦證素問評熱論有勞風證素問水熱穴論有風水證靈樞熱病篇有風痙證靈樞水脹論有石瘕腸覃膚脹證素問陰陽別論大奇論靈樞邪氣臟腑病形篇水脹論有石水證素問大奇論四時刺逆從論五臟生成篇脈解篇靈樞邪氣臟腑病形篇經脈篇載有肝疝心疝肺疝脾汕腎疝證素問脈解篇靈樞經脈篇有婦人㿗疝證素問五臟生成論有厥疝女子同法證素問平人氣象論刺要論靈樞論疾診尺篇有解俯證靈樞厥病篇有蟲瘕蛟蛔心痛證素問痹論有肝痹心痹脾痹肺痹腎痹腸痹胞痹證靈樞壽夭剛柔篇有寒痹證素問痹論四時刺逆從論有熱痹證素問四時刺逆從論宣明五氣論靈樞五邪篇有陰痹證靈樞周痹篇有周痹眾痹證靈樞厥病篇有風痹證素問陰陽別論評熱論靈樞五變篇有風厥證靈樞寒熱病篇有厥痹證素問繆刺論有屍厥證靈樞邪氣臟腑病形篇有維厥證素問奇病論靈樞五亂癲狂篇有厥逆證靈樞癲狂篇有風逆證靈樞口問篇有嚲證靈樞癰疽篇有猛疽夭疽腦爍疵癰米疽井疽甘疽敗疵股脛疽銳疽赤施疵癰兔齧走緩四淫厲癰脫癰諸證此皆後人之所未知者也又如靈樞種種大義悉不見於諸書使後世視神聖經典僅同覆瓿按靈樞有陰陽系日月順氣一日分為四時經水海論邪客九宮八風等篇則知人身與天地相參者如此也有經脈經別根結經筋等篇則知人身經脈運行起止皆有自然之度數者如此也有脈度骨度腸胃平人絕谷本臟師傳等篇則知人身骨脈腸胃臟腑皆有長短廣狹輕重大小堅脆高下偏正之分者如此也素問有標本病傳論靈樞有病本病傳篇則知人身病體有本有標者如此也靈樞有陰陽二十五人五音五味五閱五使順逆肥瘦等篇則知人身合於陰陽五行五音五味等義者如此也有口問篇則知人身有曰欠曰噦曰唏曰嚏曰嚲曰淚曰太息曰涎下曰耳鳴曰齧舌等病悉由經絡者如此也有本神決氣篇則知入身有精神魂魄思慮意智者如此也有本輸動輸等篇則知人身空穴分井滎輸經合其穴有動脈者如此也又如靈素每病必分經絡用針法以行補瀉諸書絕不明此大義概用煎方致病體綿久終不可復生按素問寶命全形論八正神明論離合真邪論靈樞九針十二原官針等篇分明有瀉法補法靈樞終始官針等篇刺有三刺靈樞壽夭剛柔篇刺有三變靈樞順氣一日分為四時篇刺有五變靈樞邪氣臟腑病形篇刺有六變靈樞官針篇刺有九變靈樞刺節真邪篇刺有五節靈樞官針篇刺有十二節靈樞刺節真邪篇刺有五邪靈樞五禁篇刺有五禁五逆五奪素問刺禁論靈樞終始篇有刺禁素問八正神明論靈樞九針論刺有天忌素問診要經終論刺避五臟靈樞官針篇刺應五臟素問血氣形志論靈樞九針論五音五味篇刺分血氣多少靈樞逆順肥瘦篇刺分肥瘦常人壯士嬰兒靈樞根結篇刺分貴賤靈樞經水篇刺有淺深素問診要經終論水熱穴論四時刺逆從論靈樞終始本輸四時氣寒熱病順氣一日分為四時等篇刺必按時班班可考後世不宗經典巧立名色如燒山火透天涼蒼龍擺尾白虎搖頭蒼龜探穴赤鳳迎源子午搗臼飛騰八法皆非根於經典者也噫自諸書出而內經之旨晦自針法繁而神聖之針亡自後學宗諸書不宗內經而內經之書不行吾師朝夕啟迪吾輩者唯此內經靈素而已後世醫學淺陋我嘗推其故焉蓋凡習醫學必明於儒理而後可明於醫理況人之臟腑經絡合男女內外大小一耳未有不明於男而可偏明於女者未有不明於內而可偏明於外者未有不明於大而可偏明於小者後世不明儒理偏門就學信聽諸書遺棄內經逐未說而失本原是猶適越裳而亡指南也安得發神聖之蘊如吾師哉
