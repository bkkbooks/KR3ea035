body:
  text: 卷之四口問第二十八黃帝間居闢左右而問於岐伯曰余已聞九針之經論陰陽逆順六經已畢願得口問岐伯避席再拜曰善於哉問也此先師之所口傳也黃帝曰願聞口傳岐伯答曰夫百病之始生也皆生於風雨寒暑陰陽喜怒飲食居處大驚卒恐則血氣分離陰陽破散經絡厥絶脈道不通陰陽相逆衛生稽留經脈虛空血氣不次乃失其常論不在經者請道其方闢闢同孟子云闢土地卒音猝此言有所當口傳者以其論之不著於經中也黃帝曰人之欠者何氣使然岐伯答曰衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數欠陽氣盡陰氣盛則目瞑陰氣盡而陽氣盛則寤矣瀉足少陰補足少陽欠音牽去聲江左謂之呵欠數音束此言人之所以欠及所以寐與寤而有刺之之法也欠氣相引也素問宣明五氣論本經九針論皆曰腎主欠人之所以欠者正以衛氣晝日行於陽經足手六陽經夜半則行於陰經足手六陰經陰經專主於夜而行之夜之時則必臥惟衛氣之為陽者主於上行營氣之為陰者主於下行此陰陽二字主營衛言茲以陰氣積於下陽氣以夜半之時亦在於下而未得盡上故陽氣乘夜半之後乃相引而上陰氣則相引而下陰陽相引故數數為欠也至人之所以寐寤者以夜半之時萬民皆臥命曰合陰斯時衛氣已盡營氣方盛故目瞑而寐至夜半之後則陰氣已盡陽氣方盛當從此而寤矣彼不寐而多為欠者以足少陰腎經有邪故不能寐宜瀉其照海穴陽蹺虛故多欠宜補足太陽膀胱經之申脈穴也黃帝曰人之噦者何氣使然岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦補手太陰瀉足少陰噦於月切此言人之所以噦而有刺之之法也人之穀氣入於胃胃得穀氣而化之遂成精微之氣以上注於肺而行之五臟六腑如經脈篇之次今有寒氣之故者在於胃中而又有穀氣之新者以入於胃則新故相亂真氣與邪氣相攻真氣即胃氣邪氣即寒氣彼此之氣井而相逆所以復出於胃而為噦也當補手太陰肺經及瀉足少陰腎經可也黃帝曰人之味者何氣使然岐伯曰此陰氣盛而陽氣虛陰氣疾而陽氣徐陰氣盛而陽氣絶故為唏補足太陽瀉足少陰唏許幾切此言人之所以唏而有刺之之法也釋文言哀痛不泣曰唏人之所以唏者以陰氣反盛且疾陽氣反虛且徐且絶故為唏耳治之者宜補陽而瀉陰當於足太陽膀胱經陽蹺脈氣所出者補之足少陰腎經陰蹺脈氣所出者瀉之黃帝曰人之振寒者何氣使然岐伯曰寒氣客於皮膚陰氣盛陽氣虛故為振寒寒栗補諸陽此言人之所以振寒而有刺之之法也振寒者身寒而振動也蓋以寒氣客於皮膚其陰氣盛陽氣虛故陰盛則為寒且寒而戰栗當補諸陽經以溫之則陽勝而陰衰矣黃帝曰人之噫者何氣使然岐伯曰寒氣客於胃厥逆從下上散復出於胃故為噫補足太陰陽明一曰補眉本也此言人之所以噫而有刺之之法也噫不平聲也蓋以寒氣客於胃中厥逆之氣從下而上其氣之散也復出於胃故為噫當補足太陰脾經足陽明胃經以溫之一曰取足太陽膀胱經之在眉本名攢竹者以刺之黃帝曰人之嚏者何氣使然岐伯曰陽氣和利滿於心出於鼻故為嚏補足太陽滎眉本一曰眉上也此言人之所以嚏而有刺之之法也嚏噴嚏也蓋以人之陽氣平和順利滿溢於心故上升於鼻而為嚏當補足太陽膀胱經曰攢竹者以刺之一曰在眉近於上者是也兩眉頭少陷宛宛中針三分留六呼灸三壯針灸聚英云主風眩嚏黃帝曰人之嚲者何氣使然岐伯曰胃不實則諸脈虛諸脈虛則筋脈懈惰筋脈懈惰則行陰用力氣不能復故為嚲因其所在補分肉間嚲音妥釋云下垂貌則是首身下垂而不能舉也觀本經下文有因其所在補分肉間則嚲必有定所且有分部彼以避為釋者是乃以讀之為躲而遂釋之為避也義甚不通此言人之所以嚲而有刺之之法也蓋以胃者五臟六腑之海也胃虛則諸脈虛而筋脈懈惰復乃強力入房所以氣不能復而為嚲也當因其所在以補其分肉間耳黃帝曰人之哀而泣涕出者何氣使然岐伯曰心者五臟六腑之主也目者宗脈之所聚也上液之道也口鼻者氣之門戶也故悲哀愁憂則心動心動則五臟六腑皆搖搖則宗脈感宗脈感則液道開液道開故泣涕出焉液者所以灌精濡空竅者也故上液之道開則泣泣不止則液竭液竭則精不灌精不灌則目無所見矣故命曰奪精補天柱經挾頸此節可與素問解精微論參看此言人之所以泣涕而有刺之之法也蓋人泣涕出於目本於心形於口鼻正以心為五臟六腑之主目為宗脈之所聚又為液氣上升之道路口鼻為氣之門戶故凡悲哀愁憂者則心主動而五臟六腑隨之以搖搖則宗脈動而液道開泣涕之所以出也且此液者所以灌精濡空竅者也故上液之道一開則泣不止而液竭精不灌而目盲其名曰奪精當補足太陽膀胱經之天柱穴此經乃挾於後之項頸者是也挾項後髮際大筋外廉陷中針二分留六呼灸七壯黃帝曰人之太息者何氣使然岐伯曰憂思則心系急心系急則氣道約約則不利故太息以伸出之補手少陰心主足少陽留之也此言人之所以太息而有刺之之法也人之心皆有系唯憂思則心系緊急而氣道斂約約則出氣不利故太息以伸出之當補手少陰心經手厥陰心包絡經及足少陽膽經皆留其針以補之也黃帝曰人之涎下者何氣使然岐伯曰飲食者皆入於胃胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下補足少陰此言人之所以涎下而有刺之之法也人之涎何自而下正以飲食入胃則胃暖而蟲動胃氣之在上脘者勢緩而不下降所以在上之廉泉開而涎下也當取足少陰腎經以補之蓋補陰則任脈下盛而上之廉泉通廉泉通而涎下於內不下於外矣黃帝曰入之耳中鳴者何氣使然岐伯曰耳者宗脈所聚也故胃中空則宗脈虛虛則下溜脈有所竭者故耳鳴補客主人手大指爪甲上與肉交者也此言人之所以耳鳴而有刺之之法也耳為宗脈之所聚胃為宗脈之所生唯胃中空則宗脈虛而下流其在上之脈氣遂竭耳遂為之鳴也當補足少陽膽經之客主人穴耳一名上關耳前起骨上廉開口有空張口取之乃得禁深針針一分留七呼灸三壯及手大指爪甲上曰少商者乃手太陰肺經穴也大指端內側去爪甲如韭葉白肉際宛宛陷中針一分留三呼不宜灸黃帝曰人之自齧舌者何氣使然缺岐伯曰此厥逆走上脈氣輩至也少陰氣至則齧舌少陽氣至則齧頰陽明氣至則齧唇矣視主病者則補之此言人之所以齧舌而遂及齧頰齧唇者各有刺之之法也凡人之齧舌者皆氣逆走上所致也且各經脈氣以輩而至故手少陰心經之氣至則齧舌以舌為心經之竅也手少陽三焦之氣至則齧頰以頰為三焦經之脈絡也手陽明大腸經之氣至則齧唇以唇為大腸經之脈路也各視主病之經以補之耳凡此十二邪者皆奇邪之走空竅者也故邪之所在皆為不足故上氣不足腦為之不滿耳為之苦鳴頭為之苦傾目為之眩中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗補足外踝下留之此承上文而言十二邪之走空竅者以正氣不足而然也由上文十二項觀之皆不正之邪走於空竅者也故邪之所在皆由正氣不足而邪得以乘之惟上氣不足則腦空耳鳴頭傾目眩矣中氣不足則便變腸鳴矣下氣不足則為痿為厥而心為之悗矣皆當補足外踝下留之即足太陽膀胱經崑崙穴是也黃帝曰治之奈何岐伯曰腎主為欠取足少陰肺主為噦取手太陰足少陰唏者陰與陽絶故補足太陽瀉足少陰振寒者補諸陽噫者補足太陰陽明嚏者補足太陽眉本嚲因其所在補分肉間泣出補天柱經俠頸俠頸者頭中分也頭之中部分之而下覓太息補手少陰心主足少陽留之涎下補足少陰耳鳴補客主人手大指爪甲上與肉交者自齧舌視主病者則補之目眩頭傾補足外踝下留之痿厥心悗刺足大捐間上二寸留之肝之太衝脾之大白一曰足外踝下留之上文各項所治之經既條答矣而此復因帝問治法遂重言以申之也師傳第二十九黃帝曰余聞先師有所心藏弗著於方余願聞而藏之則而行之上以治民下以治身使百姓無病上下和親德澤下流子孫無憂傳於後世無有終時可得聞乎岐伯曰遠於哉問也夫治民與自治治彼與治此治大與治小治國與治家未有逆而能治之也夫惟順而已矣順者非獨陰陽脈論氣之逆順也百姓人民皆欲順其志也黃帝曰順之奈何岐伯曰入國問俗入家問諱上堂問禮臨病人問所便黃帝曰便病人奈何岐伯曰夫中熱消疸則便寒寒中之屬則便熱胃中熱則消穀令人懸心善飢臍以上皮熱腸中熱則出黃如糜臍以下皮寒胃中寒則腹脹腸中寒則腸鳴飧泄胃中寒腸中熱則脹而且泄胃中熱腸中寒則疾飢小腹痛脹黃帝曰胃欲寒飲腸欲熱飲兩者相逆便之奈何且夫王公大人血食之君驕恣縱欲輕人而無能禁之禁之則逆其志順之則加其病便之奈何治之何先岐伯曰人之情莫不惡去聲死而樂去聲生告之以其敗語之以其善導之以其所便開之以其所苦雖有無道之人惡平聲有不聽者乎黃帝曰治之奪何岐伯曰春夏先冶其標後治其本秋冬先治其本後治其標黃帝曰便其相逆者奈何岐伯曰便此者飲食衣服亦欲適寒溫寒無悽愴暑無出汗食飲者熱無灼灼寒無滄滄寒溫中去聲適故氣將持乃不致邪僻也此詳言便病人之法也病有中熱消疸則以寒為便中寒之屬則以熱為便如胃中熱則消穀令人懸心而善飢其臍以上之皮當熱若腸中有熱則後出黃色如糜而臍以下之皮則冷也如胃中寒則腹當為脹若腸中寒則腸中鳴而為飧泄也如胃中寒而腸中熱則胃中寒者當脹而腸中熱者必泄也如胃中熱而腸中寒則胃中熱者當速飢而腸中寒者小腹必痛且脹也此腸胃之寒熱不同似為難便帝之所以有胃欲寒飲腸欲熱飲為問則胃有寒時當飲之以熱而熱奈非其性腸有熱時當飲之以寒而寒奈非其性兩者相逆便之甚難況王公大人血食之君禁其欲則其志逆順其欲則其病加固難於便而治法難於先也殊不知人情惡死而樂生凡致死之事告之以其敗開之以其所苦凡致生之事語之以其善導之以其所便則逆之者未有不樂從者也且治有所先法不容貶春夏陽氣在外病亦在外故先治其後病之標而後治其先病之本秋冬陽氣在內病亦在內故先治其先病之本而後治其後病之標此治之者必有所先不得以順其志而可舍法以徇之也至於飲食衣服之類則彼固有所便而吾亦可以曲全之耳故飲食衣服必欲其適乎寒溫彼之衣服欲寒而法不可寒但使之寒而不至於悽愴欲熱而法不可熱但使之熱不至於出汗可也又彼食飲欲熱而法不可熱但使之熱無灼灼欲寒而法不可寒但使之寒無滄滄可也寒溫中適則正氣自持乃不致有邪僻矣凡此者皆所以便病人也否則治民與自治治彼與治此治小與治大治國與治家入國則問俗入家則問諱上堂則問禮未有可以逆而治之者而獨於臨病人之際可不問其所便也哉黃帝曰本臟以身形支節膕肉候五臟六腑之小大焉今夫王公大人臨朝即位之君而問焉誰可捫循之而後答乎岐伯曰身形支節者臟腑之蓋也非面部之閲也黃帝曰五臟之氣閲於面者余已知之矣以支節知而閲之奈何岐伯曰五臟六腑者肺為之蓋巨肩陷咽候見其外黃帝曰善岐伯曰五臟六腑心為之主缺盆為之道䯏骨有餘以候𩩲骬黃帝曰善岐伯曰肝者主為將使之候外欲知堅固視目小大黃帝曰善岐伯曰脾者主為衛使之迎糧視唇舌好惡以知吉凶黃帝曰善岐伯曰腎者主為外使之遠聽視耳好惡以知其性䯏音括𩩲音結骬音於此言身形支節可以候五臟也本臟本經篇名帝問本臟以身形支節膕肉候五臟六腑之小大則王公大人臨朝即位之君分至尊也從而問之誰敢捫循其支節膕肉而後答之捫之固難答之無據伯言支節為臟腑之蓋非比面部易閲故五臟之氣閲於面帝雖知之然支節亦有可閲而知不必於捫循之也肺為臟腑之蓋凡巨肩陷咽者肺之小大高下堅脆偏正可候矣大義見本臟篇余仿此心為臟腑之主而氣之升降其道在於缺盆即其𩩲骬之骨端曰䯏骨者有餘以形於外則可以驗𩩲骬而知其心之堅脆小大高下偏正矣肝為將軍之官使之候視乎外故欲知肝之小大高下堅脆偏正當視其目之小大耳脾主為衛使之在外以迎糧故視唇舌好惡而知脾之小大高下堅脆偏正矣腎主為外使之遠聽故視耳之好惡而知腎之小大高下堅脆偏正矣黃帝曰善願聞六腑之候岐伯曰六腑者胃為之海廣骸大頸張胸五穀乃容鼻隧以長以候大腸唇厚人中長以候小腸目下果大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約此所以候六腑者也上下三等臟安且良矣骸音諧左傳曰析骸而此言身形可以候六腑也三焦乃約三焦為決瀆之官者約而不漏也身形上中下三停相等則臟腑在內者安且善矣決氣第三十決論一氣六名之義故名篇黃帝曰余聞人有精氣津液血脈余意以為一氣耳今乃辨為六名余不知其所以然岐伯曰兩神相搏合而成形常先身生是謂精何謂氣岐伯曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣何謂津岐伯曰腠理發泄汗出溱溱是謂津何謂液岐伯曰谷入氣滿淖澤注於骨骨屬屈伸泄澤補益腦髓皮膚潤澤是渭液何謂血岐伯曰中焦受氣取汁變化而赤是渭血何謂脈岐伯曰壅遏營氣令無所避是謂脈此詳言曰氣之義也精氣津液血脈分而言之則有六總而言之則曰氣故此謂之曰一氣而下則曰六氣易曰男女構精萬物化生蓋當男女相媾之時兩神相合而成所生男女之形此精常先其身而生有其精斯有其形夫是之謂精也宗氣即大氣積於上焦上焦開發於臟腑而宣布五穀精微之氣味此氣熏於皮膚充其身形澤其毫毛誠若霧露之灌溉萬物也營衛生會篇云上焦如霧夫是之謂氣也津生於內而腠理發泄於外其汗出似溱溱然夫是之謂津也穀氣入於胃化為精微之氣充滿淖澤分注於骨骨屬屈伸泄澤其骨上通於腦腦為髓海從茲補益外而皮膚從此潤澤夫是之謂液也營衛生會篇曰中焦亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化其精微上注於肺脈乃化而為血以奉生身故中焦受氣取汁變化而赤夫是之謂血也宗氣行於經脈之中其脈流布諸經而營氣從之以行無所避匿夫是之謂脈也黃帝曰六氣者有餘不足氣之多少腦髓之虛實血脈之清濁何以知之岐伯曰精脫者耳聾氣脫者目不明津脫者腠理開汗大泄液脫者骨屬屈伸不利色夭腦髓消脛痠耳數鳴血脫者色白夭然不澤其脈空虛此其候也此言六氣之脫者各有其候也黃帝曰貴賤何如岐伯曰六氣者各有部主也其貴賤善惡可為常主然五穀與胃為大海也此言各部為六氣之主而胃又為之大海也帝問六氣者可較其貴賤否伯言各部皆有主氣故六氣各有部主如陽明多氣多血太陽多血少氣五精五液五津五脈之類各部皆有之也然本部所重者為貴為善別部所有者為賤為惡其本部各為常主也但此六氣者成於五穀精微之氣而胃則納五穀而成之故胃又為六氣之大海耳腸胃第三十一內言腸胃之數故名篇黃帝問於伯高曰余願聞六腑傳谷者腸胃之小大長矩受谷之多少奈何伯高曰請盡言之谷所從出入淺深遠近長短之度唇至齒長九分口廣二寸半齒以後至會厭深三寸半大容五合舌重十兩長七寸廣二寸半咽門重十兩廣二寸半至胃長一尺六寸胃纖曲屈伸之長二尺六寸大一尺五寸徑五寸大客三斗五升小腸後附脊左環回周疊積其注於回腸者外附於臍上回運環十六曲大二寸半徑八分分之少半長三丈三尺回腸當臍左環回周葉積而下回運環反十六曲大四寸徑一寸寸之少半長二丈一尺廣腸傅脊以受回腸左環葉脊上下闢大八寸徑二寸寸之大半長二尺八寸腸胃所入至所出長六丈四對四分回曲環反三十二曲也此言腸胃自所入至所出之度數也小腸上口胃之下口小腸後附於脊從左環回周疊積其所注之物以入於回腸者外附於臍上回運計環十六曲大四寸徑口八分分之少半即半分也其長三丈三尺回腸者大腸也大腸上口即小腸下口也大腸當臍左環回周葉積而下回其運環反十六曲大四寸徑口一寸寸之少半即五分也長二丈一尺廣腸者直腸也廣腸附脊以受回腸之物左環葉在脊之上下盤闢大八寸徑二寸寸之大半則是二寸七八分也其長計二尺八寸平人絶谷第三十二內論平人絶谷七日則死故名篇黃帝曰願聞入之不食七日而死何也伯高曰臣請言其故胃大一尺五寸徑五寸長二尺六寸橫屈受水穀三斗五升其中之谷常留二斗水一斗五升而滿上焦泄氣出其精微剽悍滑疾下焦下溉諸腸小腸大二寸半徑八分分之少半長三丈二尺受谷二斗四升水六升三合合之大半回腸大四寸徑一寸寸之少半長二丈一尺受谷一斗水七升半廣腸大八寸徑二寸寸之大半長二尺八寸受谷九升三合八分合之一腸胃之長凡五丈八尺四寸受水穀九斗二升一合合之大半此腸胃所受水穀之數也平人則不然胃滿則腸虛腸滿則胃虛更虛更滿故氣得上下五臟安定血脈和利精神乃居故神者水穀之精氣也故腸胃之中常留谷二斗水一斗五升故平人日再後後二升半一日中五升七日五七三斗五升而留水穀盡矣故平人不食飲七日而死者水穀精氣津液皆盡故也此詳言平人皆不食而死之故也平人者無病之人也海論第三十三內論人有四海故名篇黃帝問於岐伯曰余聞刺法於夫子夫子之所言不離於營衛血氣夫十二經脈者內屬於臟腑外絡於肢節夫子乃合之於四海乎岐伯答曰人亦有四海十二經水經水者皆注於海海有東西南北命曰四海黃帝曰以人應之奈何岐伯曰人有髓海有血海有氣海有水穀之海凡此四者以應四海也黃帝曰遠乎哉夫子之合人天地四海也願聞應之奈何岐伯答曰必先明知陰陽表裡滎輸所在四海定矣黃帝曰定之奈何岐伯曰胃者水穀之海其輸上在氣街下至三里衝脈者為十二經之海其輸上在於大杼下出於巨虛之上下廉膻中者為氣之海其輸上在柱骨之上下前在於人迎腦為髓之海其輸上在於其蓋下在風府此言人之有四海也人有四海者即下髓海血海氣海水穀之海也十二經水者即清水渭水海水湖水汝水澠水淮水漯水江水河水濟水漳水也夫天下經常之水固有十二而此水皆注於海海有東西南北之四方故不曰十二而曰四海也惟胃為水穀之海其輸穴上在氣街即氣街天樞下八寸腹下夾臍相去四寸在鼠鼷上一寸動脈應手宛宛中乃衝脈所起也針三分留七呼氣至即瀉灸三壯下至三里膝下三寸䯒骨外廉大筋內宛宛中兩筋肉分間針八分留十呼瀉七吸灸可至百壯惟衝脈為十二經之血海其輸穴上在於足太陽膀胱經之大抒項後第一椎下相去脊中各一寸半陷中針三分留七呼禁灸下出於足陽明胃經之巨虛上廉與巨虛下廉上巨虛三里下三寸舉足取之針三分灸七壯下巨虛上廉下三寸蹲地舉足取之針三分灸可至七七壯惟膻中為氣之海其輸穴在於督脈經天柱骨之上下挾項後髮際大筋外廉陷中針三分留六呼灸七壯前在於足陽明胃經之人迎頸大脈應手結喉兩旁一寸半禁針灸惟腦為髓之海其輸穴在於其蓋即督脈經之百會前頂後一寸半中夾針二分灸七壯下在於督脈經之風府一名舌本項後入髮際一寸大筋內宛宛中疾言其肉立起言休立已禁灸令人失音針三分黃帝曰凡此四海者何利何害何生何敗岐伯曰得順者生得逆者敗知調者利不知調者害此言四海之得生且利者以其順而善調之否則敗與害至矣黃帝曰四海之逆順奈何岐伯曰氣海有餘者氣滿胸中悗息面赤氣海不足則氣少不足以言此言四海之逆順先舉氣海之偏勝者以言之見其所以為逆反此則為順也有餘者邪氣有餘而實也不足者正氣不足而虛也下文仿此血海有條則常想其身大怫然不知其所病血海不足亦常想其身小狹然不知其所病此言血海之偏勝而病者見其所以為逆反此則為順也蓋承上文衝脈為十二經之海者而言耳水穀之海有餘則腹滿水穀之海不足則飢不受穀食此言水穀之海偏勝則病見其所以為逆反此則為順也髓海有餘則輕徑多力自過其度髓海不足則腦轉耳鳴脛痠眩冒目無所見懈怠安臥此言髓海之偏勝而病者見其所以為逆反此則為順也黃帝曰余已聞逆順調之奈何岐伯曰審守其輸而調真虛實無犯其害順者得復逆者必敗黃帝曰善此言善守四海之輸穴以善調之則有利無害得順而不得逆也審四海之穴而善守之以行補瀉之法虛則補之實則瀉之則有利無害其順者可復否則逆而為敗矣五亂第三十四內言氣有五亂故名篇黃帝曰經脈十二者別為五行分為四時何失而亂何得而治岐伯曰五行有序四時有分相順則治相逆則亂黃帝曰何謂相順岐伯曰經脈十二者以應十二月十二月者分為四時四時者春秋冬夏其氣各異營衛相隨陰陽已和清濁不相干如是則順之而治黃帝曰何謂逆而亂岐伯曰清氣在陰濁氣在陽營氣順脈衛氣逆行清濁相干亂於胸中是謂大悗故氣亂於心則煩心密默俯首靜伏亂於肺則俯仰喘喝接手以呼亂於腸胃則為霍亂亂於臂脛則為四厥亂於頭則為厥遞頭重眩僕悗音悶此言人有五亂而諸證各有所見也夫脈與四時而相合夫是之為順也惟清氣宜升當在於陽反在於陰濁氣宜降當在於陰而反在於陽營氣陰性精專固順宗氣以行於經隧之中衛生陽性剽悍滑利宜行於分肉之間今晝未必行於陽經夜未必行於陰經其氣逆行乃清濁相干亂在胸中是之謂大悶也故氣亂於心或亂於肺或亂於腸胃或亂於臂脛或亂於頭各有其證候者如此黃帝曰五亂者刺之有道乎岐伯曰有道以來有道以去審知其道是謂身寶黃帝曰善願聞其道岐伯曰氣在於心者取之手少陰心主之輸氣在於肺者取之手太陰滎足少陰輸氣在於腸胃者取之足太陰陽明不下者取之三里氣在於頭者取之無柱大杼不知取足太陽滎輸氣在於臂足取之先去血脈後取其陽明少陽之滎輸此言治五亂者而各有刺之之穴也道者脈路也邪之來也必有其道則邪之去也亦必有其道審知其道而善去之斯謂養身之寶此四語雖為刺病而發凡醫工能熟玩之則治病必覓標本用藥必覓經絡真邪必審補瀉不妄乃為醫家切要之法也故氣亂於心者當取之手少陰心經之輸穴神門掌後鋭骨端陷中針三分留七呼灸七壯手心主即厥陰心包絡經之輸穴大陵掌後骨下兩筋間陷中針五分留七呼灸三壯氣亂於肺者取手太陰肺經滎穴魚際大指本節後內側陷中針一分留三呼灸三壯足少陰腎經之輸穴太溪足內踝後跟骨上動脈陷中人有脈則生針三分留七呼灸三壯氣在於腸胃者取之足太陰脾經之輸穴太白足大指內側內踝前核骨下針一分留三呼灸三壯足陽明胃經之輸穴陷谷足次指外間本節後陷中去內庭二寸針五分留七呼灸三壯如刺之而邪氣不下當取足陽明胃經之三里氣在於頭者取之足太陽膀胱經之天柱挾項後髮際大筋外廉陷中針二分留三呼瀉五吸灸不及針日七壯至百壯又取於本經之大杼如取之而病尚不知又當取本經之滎穴通谷輸穴束骨通谷足小指外側本節前陷中針二分留五呼灸三壯束骨足小指外側本節後赤白肉際陷中針三分留三呼灸三壯氣在於臂足者當先去其臂足之血脈然後在臂則取手陽明大腸經之滎穴二間食指本節前內側陷中針三分留六呼灸三壯輸穴三間食指本節後內側針三分留三呼灸三壯手少陽三焦經之滎穴液門手四指間陷中握拳取之針二分留三呼灸三壯輸穴中渚手四指本節後陷中即液門下一寸針二分留三呼灸三壯在足則取足陽明滎穴內庭足次指外間內側陷中灸三壯針三分輸穴陷谷足次指本節後陷中去內庭二寸針一分留七呼灸三壯足少陽膽經之滎穴俠溪足四指岐骨間本節前陷中針三分留三呼灸三壯輸穴臨泣足四指本節後間陷中去俠溪一寸半針二分留五呼灸三壯黃帝曰補瀉奈何岐伯曰徐入徐出謂之導氣補瀉無形謂之同精是非有餘不足也亂氣之相逆也黃帝曰允乎哉道明乎哉論請著之玉版命曰治亂也此言治五亂者惟以導氣不與補瀉有餘不足者同法也凡有餘者則行瀉法不足者則行補法今治五亂者則其針徐入徐出導氣復故而已不必泥定補瀉之形以其精氣相同非真有餘不與不足也不過亂氣之相逆耳何必以補瀉為哉脹論第三十五內詳論臟腑脹由脹形治法故名篇黃帝曰脈之應於寸口如何而脹岐伯曰其脈大堅以澀者脹也黃帝曰何以知臟腑之脹也岐伯曰陰為臟陽為腑此言據脈可以知脹陰脈屬臟而陽脈屬腑也脈見寸口其脈大者以邪氣有餘也其脈堅者以邪氣不散也其脈澀者以氣血澀滯也故為脹然脈大而堅者為陽脈其脹在六腑脈澀而堅者為陰脈其脹在五臟也黃帝曰夫氣之令人脹也在於血脈之中耶臟俯之內乎岐伯曰三者一云二者皆存焉然非脹之舍也黃帝曰願聞脹之舍岐伯曰夫脹者皆在於臟俯之外排臟俯而郭胸脅脹皮膚故命曰脹黃帝曰臟腑之在胸脅腹裡之內也若匣匱之藏禁器也各有次舍異名而同處一域之中其氣各異願聞其故此處必缺乃岐伯言黃帝曰未解其意再問岐伯曰夫胸腹臟腑之郭也膻中者心主之宮城也胃者太倉也咽喉小腸者傳送也胃之五竅者閭里門戶也廉泉玉英者津液之道也故五臟六腑者各有畔界其病各有形狀營氣循脈衛氣逆為脈脹衛氣並脈循分為膚脹三里而瀉近者一下遠者三下無問虛實工在疾瀉按黃帝時本記記其民不習偽官不懷私市不預價城廓不閉則此時有宮城矣此明言脹之所舍而脹則成於衛氣之逆其法在於急瀉三里也無脹不在於血脈之中亦不在於臟腑之內乃在於臟腑之外胸脅之內腓其臟俯而以胸脅為郭其皮膚亦為之脹此則脹之所舍也且臟俯在胸脅腹裡之內雖同處於一域然其病各有所異者以其各有畔界也故胸脅為臟俯之郭膻中為心主之官城胃為太倉咽喉小腸為傳送水穀之道胃有五竅為閭里門戶廉泉玉英即玉堂俱任脈經穴為津液之道所以臟腑各有畔界而病亦各有形狀也然其所以脹者不在於營氣而在於衛氣蓋營氣陰性精專隨宗氣行不能為脹唯衛氣逆行則井脈循分肉者始為脈脹而成為膚脹耳是以胃為臟腑之海而三里為胃經之合當瀉其三里病近者一次瀉之病久者三次瀉之不必拘其虛實而工在於急瀉之也黃帝曰願聞脹形岐伯曰夫心脹者煩心短氣臥不安肺脹者虛滿而喘咳肝脹者脅下滿而痛引小腹脾脹者善噦四肢煩悗體重不能勝衣臥不安腎脹者腹滿引背央央然腰髀痛此下二節明上節之病各有形狀而此節以五臟之脹形言之也六腑脹胃脹者腹滿胃脘痛鼻聞焦臭妨於食大便難大腸脹者腸鳴而痛濯濯冬日重感於寒則飧泄不化小腸脹者少腹縝脹引腰而痛膀胱脹者少腹滿而氣癃三焦脹者氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息此以六俯之脹形言之也按邪氣臟腑病形篇有大腸者諸證與此同凡此諸脹者其道在一明知逆順針數不失瀉虛補實神去其室致邪失正真不可定粗之所敗謂之天命補虛瀉實神歸其室久塞其空謂之良工久塞其空虛則補之其穴空皆正氣充塞此言治脹之法補瀉有得有失而醫工分高下也黃帝曰脹者焉生何因而有岐伯曰衛氣之在身也常然並脈循分肉行有逆順陰陽相隨乃得天和五臟更始四時有序五穀乃化然後厥氣在下營衛留止寒氣逆上真邪相攻兩氣相搏乃合為脹也此言脹之所由生也衛氣之行於人身晝行於陽經夜行於陰經井脈循分肉而行出入之間自有逆順陰陽相隨乃得天和故五臟隨時以更始五穀自化惟厥氣從下而逆則營衛遂失其常而留止不行寒邪隨厥氣以上行真邪相攻兩氣相搏乃合而為脹耳上文言衛氣逆為脈脹又並脈循分肉為膚脹者此可見矣黃帝曰善何以解惑岐伯曰合之於真三合而得帝曰善黃帝問於岐伯曰脹論言無問虛實工在疾瀉近者一下遠者三下今有其三而不下者其過焉在岐伯對曰此言陷於肉肓而中氣穴者也不中氣穴則氣內閉針不陷肓則氣不行上越中肉則衛氣相亂陰陽相逐其於脹也當瀉不瀉氣故不下三而不下必更其道氣下乃止不下復始可以萬全烏有殆者乎其於脹也必審其疹當瀉則瀉當補則補如鼓應桴惡有不下者乎此言脹之愈與不愈在於針之有得失也上文言脹貴於急瀉近者一下遠者三下今下之者三而病有不下者正以邪之陷於肉肓而中於氣穴故針之者必當中於氣穴肉盲可也蓋不中氣穴則邪氣必閉於內針不陷肉肓則邪氣不行於外致使此邪上越所刺之肌肉間則衛氣相亂陰陽諸經相乘而逐其脹當瀉不瀉邪故不下三而不下必更其道務使氣下而止針設若不下又復始針庶可以萬全也且驗脹之退否疹脹則脹脹則瀉之疹退則退退則補之其法有如此者五癃津液別第三十六別彼劣切內論五液而病為水脹則必為癃故名篇黃帝問於岐伯曰水穀入於口輸於腸胃其液別為五天寒衣薄則為溺與氣夭熱衣厚則為汗悲哀氣並則為泣中熱胃緩則為唾邪氣內遞則氣為之閉塞而不行不行則為水脹余知其然也不知其所由生願聞其道岐伯曰水穀皆入於口其味有五各注其海津液各走其道故三焦出氣以溫肌肉充皮膚為其津其流而不行者為液天暑衣厚則腠理開故汗出寒留於分肉間聚沫則為痛天寒則腠理閉氣濕不行水下流於膀胱則為溺與氣五臟六腑心為之主耳為之聽目為之候肺為之相肝為之將脾為之衛腎為之主外故五臟六腑之津液盡上滲於目心悲氣並則心系急心系急則肺舉肺舉則液上溢夫心系與肺不能盡舉乍上乍下故咳而泣出矣中熱則胃中消穀消穀則蟲上下作腸胃充郭故胃緩胃緩則氣逆故唾出此言五液之所由生也伯言人之所以有津與液者正以水穀皆入於口其味有五各上注其氣於氣海之中積為宗氣津液各走其道故三焦者上焦為宗氣之所出中焦為營氣之所出下焦為衛氣之所出共出其氣以溫外之肌肉充外之皮膚者為津其在內之流而不行者為液人之所以有汗者正以天暑衣厚則人之腠理開故汗出若有寒氣留於分肉之間則沫聚而為痛也人之所以有溺與氣者正以天寒則腠理閉內之氣與濕俱不行其水下留於膀胱則為前溺與後氣耳人之所以有泣者正以五臟六腑心為之大主而耳目肺肝脾腎皆所以輔相此心者也大義見素問靈蘭祕典論十二官相使中故五臟六腑之津液盡上於目如心悲氣並故心系急肺葉舉液隨之而上溢此泣之所由出也蓋心系與肺不能盡舉本乍上而乍下者今心系急而肺葉舉所以咳而泣出也人之所以有唾者正以胃中熱則消穀消穀之時蟲必上下交作谷既消盡腸胃亦已充郭故胃亦寬緩胃寬則氣得上逆而升唾斯隨氣而上出也五穀之精液和合而為高者內滲入於骨室補益腦髓而下流於陰股陰陽不和則使液溢而下流於陰髓液皆減而下下過度則虛虛故腰背痛而脛礧陰陽氣道不通四海閉塞三焦不瀉津液不化水穀並於腸胃之中別於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹此津液五別之逆順也高當作膏上別如字下別彼劣切水脹又見本經水脹論又當與前篇參看此原水脹之所由成也五穀精液合而成膏者滲入於骨空之中及補益腦髓以下流於陰股惟陰陽各經之氣不和則液溢而下流於陰器矣其髓液皆減而下行下行過多則必虛致腰背痛而脛痠斯時也陰陽之氣道不通四海閉塞即海論之四海三焦不能輸瀉其精液無自而化其水穀並居於腸胃之中別於回腸大腸而不入留於下焦而不行不得滲入膀胱故下焦脹而水溢遂使水脹之病所由成也此乃津液五別之逆順如此
