body:
  text: 卷之八陰陽二十五人第六十四內有陰陽二十五人之別故名篇黃帝曰余聞陰陽之人何如伯高曰天地之間六合之內不離於五人亦應之故五五二十五人之政而陰陽之人不與去聲焉其態又不合於眾者五余已知之矣願聞二十五人之形血氣之所生別去聲而以候從外知內何如岐伯曰悉乎哉問也此先師之秘也雖伯高猶不能明之也黃帝避席遵循而卻曰余聞之得其人弗教是謂重失得而泄之天將厭之余願得而明之金櫃藏之素問有金匱真言論其匱不從本義蓋同也書經蔡註釋金膝亦以為金膝之匱不敢揚之岐伯曰先立五形金木水火土別去聲其五色異其五形之人而二十五人具矣黃帝曰願卒如字盡也聞之岐伯曰慎之慎之臣請言之此帝述伯高之言以問五行之人而岐伯遂舉其端以言之也帝以天地之道曰陰與陽而人身應之故嘗以人之為陰為陽者問之於伯高彼謂天地之間太極分為陰陽陰陽分為五行故五行一陰陽陰陽一太極所以天地人之理舉不外乎五行而人身與之相應五行之中各有其五即如屬木者為主而木分左之上下右之上下則為五矣五行各五計有二十五人之式而彼陰陽和平之人不與也大凡五行各有體態眾人不能相合但其形之所以異血氣之所以生別而欲由外知內此伯高之所未及而帝之所以復問也伯言先立五形有金木水火土之異而別其五色異其五等則二十五等之人可知矣木形之人比於上角似於蒼帝其為人蒼色小頭長面大肩背直身小手足好有才勞心少力多憂勞於事能音耐下同禮禮運聖人耐以天下為一家其耐讀為能古蓋能耐通用春夏不能秋冬感而病主足厥陰佗佗然太角之人比於左足少陽少陽之上遺遺然左角之人比於右足少陽少陽之下隨隨然一日少角釱角之人比於右足少陽少陽之上推推然一曰右角判角之人比於左足少陽少陽之下栝栝然釱音大猶杭之俗人語大為惰判義同半此言木形人有五有全偏之分也自木形之人對下四者則曰全若較本經通夭篇所謂陰陽和平之人則是陰陽合德之聖人此又非其所較也觀火形之不壽暴死水形之欺紿戮死可知其為偏矣下四形仿此木形之人木氣之全者也下文四股則偏矣木主東方其音角其色蒼故木形之人當比之上角似於上天之蒼帝色蒼者木之色蒼也頭小者木之巔小也面長者木之體長也肩背大者木之枝葉繁生其近肩之所闊大也身直者木之體直也小手足者木之枝細而根之分生者小也此自其體而言耳好有才者木隨用而可以成材也力少者木必易搖也言多憂而外勞於事者木不能靜也耐春夏者木以春夏適當盛也不耐秋冬者木以秋冬而雕落也此自其時而言耳故秋冬有感於邪則病易生肝經屬足厥陰為根干故足厥陰肝之分肉形體佗佗然有安重之義按詩經國風君子偕老篇云委委佗佗朱注云雍容自得貌此以臟言主也全也下以腑言用也偏也蓋足少陽膽經與足厥陰肝經為表裡此以上文言音之全故曰上角下言太角少角釱角判角乃陰陽之生為大少四象也足少陽者膽經之分肉腑脈也後有足少陽之上氣血盛則通髯美長血多氣少則通髯美短血少氣多則少須血氣皆少則無須等語也此足少陽之上者正指膽經之脈凡經脈穴道之行於上體者是也其曰左足少陽之上者蓋太角為左之上耳下文以判角為左足少陽之下則又以左之上下而分之下比者擬議之謂蓋以人而擬角故謂之曰比曰遺遺然者如有所遺失然行之不驟而馴也少角之人者以右比左故謂之少後言足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦元肉等語則此足少陽之下者正指膽經之脈凡經脈穴道之行於下體者是也夫在上則曰鬚髯發在下則曰脛胻毛踝此上下之所由辨也隨隨然者言相隨以行而亦有安重之義也釱角者即少角之右生者也一本謂之右角者是也推推然者比之隨隨然者似有向前之義耳判角者太角之下也左足少陽之下即膽之經脈穴道行於下體者是也栝栝然者其體有度也火形之入比於上徵音支似於赤帝其為入赤色廣䏖音引去聲銳面小頭好肩背髀腹小手足行安地疾心行搖肩背肉滿有氣輕財少信多慮見事明好顏急心不壽暴死能春夏不能秋冬秋冬感而病生手少陰核核然質徵之人比於左手太陽太陽之上肌肌然一曰太徵少徵之人比於右手太陽太陽之下慆慆然音滔詩經東山篇有慆慆不歸朱注以慆慆為久意今此言之慆慆固無為宜右徵之人比於右手太陽太陽之上鮫鮫然一曰熊熊然質判之人比於左手太陽太陽之下支支頤頤然一曰質徵此言火形之人有全偏之分也火主南方其音徵其色赤故火形之人似於上天之赤帝色赤者火之色赤也䏖者脊肉也廣䏖者火之中勢熾而廣大也面銳頭小者火之炎上者必銳且小也好肩背髀腹者火之自下而上漸大而狹故謂之好也手足小者火之旁及者勢小也行安地者火必著地而起也疾心者火勢猛也行搖肩背火之勢搖也背肉滿者即廣䏖之義也有氣者火有氣勢也此自其體而言耳輕財者火性義發而不聚也少信者火性不常也多慮而見事明者火性明通而旁燭也好顏者火色光明也急心者火性急也不壽暴死者火勢不久也耐春夏者火令行於暑時也不耐秋冬者火畏水也此自其性而言耳故秋冬有感於邪則病易生手少陰心經屬火其經脈穴道之行於分部者若核核然有真實之義下文言手太陽小腸經者以心與小腸為表裡耳質徵之人者一本之所謂太徵之人者是也後有手太陽之上血氣盛則多須面多肉以平血氣皆少則面瘦惡色等語則此手太陽之上即指小腸經之脈凡經脈穴道之行於上體者是也肌肌然者此經分部有肌肉充滿之義也少徵之人者生為太徵而此當為少徵也後有手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒等語則此手太陽之下即小腸經之脈凡經脈穴道之行於下體者是也滔滔者饒治之義也右徵之人者以其居右之上也鮫鮫者踴躍之義也質判之人者以其居質徵之下故曰質判判亦半之義也支支者支持之義頤頤者垂下之義也土形之人比於上宮似於上古黃帝其為人黃色圓面大頭美肩背大腹美股脛小手足多肉上下相稱去聲行安地舉足浮安心好去聲利人不喜權勢善附人也能秋冬不能春夏春夏感而病生足太陰敦敦然太富之人比於左足陽明陽明之上婉婉然加宮之人比於左足陽明陽明之下坎坎然少富之人比於右足陽明陽明之上樞樞然左宮之人比於右足陽明陽明之下兀兀然此言土形之人有全偏之分也中央主土其音宮其色黃故土形之人比於上宮似於上古之黃帝曰上古者以別於本帝也色黃者土之色黃也面圓者土之體圓也頭大者土之體平也肩背美者土之體厚也腹大者土之體闊大也股脛色者土之體肥也小手足者土本大亦可以小也多肉者土主肉也上下相稱者土自上而下其體如一也行安地者土體安重也舉足浮者土揚之則浮也此自其體而言耳安心者土不輕動也好利人者土以生物為德也不喜權勢善附人者土能容垢納汙不棄賤趨貴也耐秋冬者土喜滋潤也不耐春夏者土畏亢燥也故春夏有感於邪則病易生此自其性而言耳足太陰者脾經也其經脈穴道所行之分部皆敦敦然有敦重之義猶素問五常政大論篇之所謂敦阜也下文言足陽明胃經者以脾與胃為表裡耳太宮之人者居左之上當為太宮也後有足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫等語則此足陽明之上乃胃經之脈凡經脈穴道之行於上體者是也婉婉者有委曲之義也加官者居左太官之下也後有足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍血少氣多則肉而善瘃血氣皆少則無毛有則稀枯悴善痿厥足痹等語則此足陽明之下乃胃經之脈凡經脈穴道之行於下體者是也坎坎者亦持重之義也少官居於右故曰少樞樞者有拘守之義也左官之人當為右官之人兀兀者獨立不搖之義也金形之人比於上商似於白帝其為人方面白色小頭小肩背小腹小手足如骨發踵外骨輕身清廉急心靜悍善為吏能秋冬不能春夏春夏感而病主手太陰敦敦然釱商之人比於左手陽明陽明之上廉廉然右商之人比於左手陽明陽明之下脫脫然左商之人比於右手陽明陽明之上監監然少商之人比於右手陽明陽明之下嚴嚴然此言金形之人有全篇之分也西方主金其音商其色白故金形之人比於上商似於上天之白帝面方者金之體方也色白者金之色白也曰頭曰肩背曰腹俱小者金體沉重而不浮大也手足小如骨發踵外者金之旁生者必小而其足跟之外如另有小骨發於踵外也骨輕者金無骨故其骨則輕也身清廉者金之體冷而廉靜不染他汙也此自其體而言耳急心者金性至急也靜悍者金之性不動則靜動之則悍也善為吏者金主肅殺有威也耐秋冬者金令王於涼寒之候也不耐春夏者金畏火也故春夏有感於邪則病易生此自其性而言耳手太陰肺經屬金凡其經脈穴道所行之分部當敦敦然有敦重之義也足手太陰皆曰敦敦然下文言手陽明大腸經者以肺與大腸相表裡耳釱商之人上文以釱角屬右則此當云大商之人也後有手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭等語則此手陽明之上凡經脈穴道之行於上體者是也廉廉然者有稜角之義也右商之人疑是左商之人也後有手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒等語則此手陽明之下乃大腸經之經脈穴道行於下體者是也脫脫然者無累之義也左商之人當是右商之人也監監然者有所制也嚴嚴然者不敢肆也水形之人比於上羽似於黑帝其為人黑色面不平大頭廉頤小肩大腹動手足發行搖身下尻長背延延然不敬畏善欺紿人戮死能秋冬不能春夏春夏感而病生足少陰汗汗然大羽之人比於右足太陽太陽之上頰頰然小羽之人比於左足太陽太陽之下紆紆然眾之為人比於右足太陽太陽之下潔潔然桎之為人比於左足太陽太陽之上安安然此言水形之人有全偏之分也北方主水其音羽其色黑故水形之人比於上羽似於上天之黑帝色黑者水之色黑也面不平者水上有波也頭大者水面不銳也頤廉有角者水流四達也肩小者水之自高而瀉下者其高處不大也腹大者水之腹大而善藏物也手足動及發行必搖身者水流而達也下尻長者水流必長也背延延然者亦長意也此自其體而言耳不敬畏者水決而不可遏也善欺給者水性不實也戮死者水滅體消也耐秋冬者水以秋冬不虧也不耐春夏者水以火而沸也此自其性而言耳故春夏有感於邪則病易生足少陰腎經屬水故其經脈分部皆汗汗然如有所依著也下文言足太陽膀胱經者以腎與膀胱為表裡耳大羽之人比於右足太陽者當為左足太陽也後有足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色等語則此足太陽之上者凡膀胱經經脈穴道之行於上體者是也頰頰然者其盈滿如兩頰也小羽者少羽也比於左足太陽後有足太陽之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛等語則此足太陽之下凡膀胱經經脈穴道之行於下體者是也紆紆然者有周旋之義也眾之為人桎之為人未詳意水形之人為戮死則此曰眾者常人也曰桎者受桎梏之人也潔潔然者獨行之義也安安然者自如之義也是故五行之人二十五變者眾之所以相欺者是也此總結上文五行之人有二十五等之異者乃眾人之難辨而易欺者也黃帝曰得其形不得其色何如岐伯曰形勝色色勝形者至其勝時年加感則病行失則憂矣形色相得者富貴大樂黃帝曰其形色相勝之時年加可知乎岐伯曰凡年忌下上之人大忌常加六歲十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆人之大忌不可不自安也感則病行失則忱矣當此之時無為奸事是謂年忌此言形色貴於相得或有相勝者而復加年忌則輕者病而重者憂也上文言五行之形則已得其形也但形與色必有相得若得其形而猶未得其色帝之所以疑也怕言人有形勝色者如木形人而黃色現也有色勝形者如木形人而白色現也但此等之人不以本形之本色相見而有他色來見至其形色相勝之時值有年忌相加則感之而病行倘有疏失則甚可憂矣如得本形本色相得者其年當富貴大樂也帝又以形色相勝之時年忌相加者為問伯言凡所謂年忌者乃各經下上之人大忌其常加也如太角之人比於左足少陽之上判角之人比於左足少陽之下是屬木之人也遇下文所值之年而其色青是謂形色相得者富貴大樂其色黃者是謂形勝色其色白者是謂色勝形而復有年忌相加此感則病行而失則可憂也年忌何如大凡人方七歲是陽之少也再加九歲乃十六歲再加九歲乃二十五歲再加九歲乃三十四歲再加九歲乃四十三歲再加九歲乃五十二歲再加九歲乃六十一歲蓋九為老陽而陽極必變故此皆為人之大忌不可不自安其分也當此各年之時毋為姦淫之事猶可自免否則形色不相得而相勝值此年忌加之斯感則病行而失則憂矣黃帝曰夫子之言脈之上下血氣之候以知形氣奈何岐伯曰足陽明之上血氣盛則髯美長血少氣多則髯短故氣少血多則髯少血氣皆少則無髯兩吻多畫足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足捐少肉足善寒血少氣多則肉而善瘃血氣皆少則無毛有則稀桔瘁善痿厥足痹瘃音祝釋文云手足中寒瘡也吻音刎悴瘁同此言足陽明之體有上下而氣血多少必見於外形也足陽明者胃經也足陽明之上凡經脈穴道之行於上體者如巨茹穴挾鼻旁地倉穴挾口吻皆謂之上而髯之所生者也上唇之所生者為髯故血氣皆盛則髯美且長如血少氣多則髯雖有而必短若氣少血多則髯雖有而必少至於血氣皆少則其髯全無止兩吻多畫耳吻者口旁也足陽明之下凡經脈穴道之行於下體者如歸來穴在水道之下氣衝穴在鼠鼷之上乃下毛之所生也故血氣皆盛則下毛必美而且長至胸亦有之如血多氣少則下毛雖美而必短僅生至於臍耳且行則舉足必高其足指少肉且多冷而不溫若血少氣多則其分肉善生寒瘡至於血氣皆少則下毛全無雖或有之亦稀少枯瘁而善成痿厥痹之三證也足少陽之上氣血盛則通髯美長多氣少則通髯美短血少氣多則少須血氣皆少則無須感於寒濕則善痹骨痛爪枯也足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉胻骭同此言足少陽之體有上下而血氣多少必見於外形也足少陽者膽經也足少陽之上凡經脈穴道之行於上者如風池腦空正靈之類皆行於耳後者今曰通髯有關於膽經則所謂通髯者乃連鬢而生者也其氣脈本相貫耳故氣血盛則通髯美而且長血多氣少則通髯雖美而短若血少氣多則雖有須而少至於血氣皆少則其須全無下唇所生者為須但少陽所生止可言髯而此曰須者疑誤也而感於寒濕則善成痹病其骨必痛而爪必枯也足少陽之下如陽陵泉以至下之絕骨者是也故血氣盛則足脛之毛美而且長外踝必肥蓋膽經之脈行於外踝也若血多氣少則足脛之毛美而必短其外踝之皮必堅而厚若血少氣多則足胻之毛必少其外踝之皮薄而且軟至於血氣皆少則脛肪必皆無毛其外踝亦瘦而無肉也足太陽之上血氣盛則美眉眉有毫毛血多氣少則惡眉面多少理血少氣多則面多肉血氣和則美色足太陽之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛此言足太陽之體有上下而氣血多少必見於外形也足太陽者膀胱經也足太陽之上凡經脈穴道之行於上體者如睛明攢竹乃眉之所生也故血氣盛則其眉必美且有毫毛若血多氣少則其眉雖有而必惡其面少紋理若血少氣多則面肉必多若血氣和則面色必美也足太陽之下凡經脈穴道之行於下體者如崑崙僕參皆在於下跟者也故血氣盛則足跟之肉必滿而其唾必堅若氣少血多則跟必瘦而無肉則空至於血氣皆少則常有轉筋之疾而踵下必多痛也手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒此言手陽明之體有上下而血氣多少必見於外形也手陽明者大腸經也手陽明之上如禾髎穴在鼻空之旁迎香穴在水溝之旁皆穴道之行於上而髭之所生者也承漿穴以下所生者為髭故血氣盛則其髭必美若血少氣多則有髭必惡若血氣皆少則其髭全無矣手陽明之下如肩髃臂臑近臑於腋合谷三間二間商陽行於指故血氣盛則腋下之毛必美其手魚際之肉必溫若氣血皆少則其手必瘦而冷也手少陽之上血氣盛則眉美以長耳色美血氣皆少則耳焦惡色手少陽之下血氣盛則手卷多肉以溫血氣皆少則寒以瘦氣少血多則瘦以多脈此言手少陽之體有上下而氣血多少必見於外形也手少陽者三焦經也三焦之脈行於上者如翳風瘛脈顱囟角孫皆近於耳絲竹空則近於眉故血氣盛則其眉必美而且長其耳之色必美若血氣皆少則其耳必焦而色必惡也手少陽之脈行於下者如外關陽池中渚液門皆行於手背也故血氣多則卷手而視之多肉以溫若血氣皆少則手必冷而且瘦至於氣少血多則筋脈雖多而亦瘦矣手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒此言手太陽之體有上下而氣血多少必見於外形也手太陽者小腸經也手太陽之上如天容在曲頰之後顴髎在鼽骨之下故血氣盛則其須多面肉且多而平血氣皆少則其面瘦而其色惡也手太陽之下如腕骨後谿前谷少澤之類皆行於手故血氣盛則掌肉充滿血氣皆少則掌瘦而冷也黃帝曰二十五人者刺之有約乎岐伯曰美眉者足太陽之脈氣血多惡眉者氣血少真肥而澤者血氣有餘肥而不澤者氣有條血不足瘦而無澤者氣血俱不足審察其形氣有餘不足而調之可以知逆順矣此即膀胱經一部之外形以驗血氣之盛衰是乃行刺之約法也足太陽膀胱經之脈自頭行背以至於足周一身之長左右共一百二十六穴故即此一經而一身之氣血可驗矣在上見於眉在下見千身故眉之美者則足太陽之氣血俱多也眉之惡者則足太陽之氣血必少也其體肥而且澤是血氣皆有餘也若肥而不澤則氣盛而血少耳若瘦而無澤則氣血俱不足耳審察其形氣之有餘不足而盛則瀉之虛則補之可以知當補而補當瀉而瀉之為順而反此則為逆矣黃帝曰刺其諸陰陽奈何岐伯曰按其寸口人迎以調陰陽切循其以絡之凝澀結而不通者此於身皆為痛痹甚則不行故凝濇濇澀者致氣以溫之血和乃止其結絡者脈結血不行訣之乃行故曰氣有餘於上者導而下之氣不足於上者推而休之其稽留不至者因而迎之必明於經隧乃能持之寒與熱爭者導而行之其宛陳血不結者則而予之必先明知二十五人則血氣之所在左右上下刺約畢矣宛陳素問湯液醪醴論有去宛陳莝自水積言本經首篇有宛陳則除之自結血言本篇此節有宛陳血不結者指積氣言則而予之則側同予與同此言刺各經之有約法也上文止以膀胱一經為言故帝以刺諸經為問伯言按其寸口可以調陰經即經脈終始禁服等篇所謂寸口一盛病在足厥陰一盛而躁病在手厥陰寸口二盛病在足少陰二盛而躁病在手少陰寸口三盛病在足太陰三盛而躁病在手太陰按其人迎可以調陽經即諸篇所謂人迎一盛病在足少陽二盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明切循其各經絡之有凝澀否內有結而不通者此於身當為痛痹甚則不能起而行也當留針以補而致其氣以溫之候至血和乃止針耳及有結於絡脈者惟其脈結則血不行必決之以出血則血乃行也大凡病之氣有餘於上者則病在上求之下當針其穴之在下者以導而下之氣不足於上者則乃刺其上穴乃推其針而久留以休息之候其氣至可也如針已稽留而氣尚未至必因而迎之隨即有以推之耳凡此者必先明於各經經脈之隧然後可持針以刺之其間有寒熱相爭者則導而行之有氣鬱陳而血未結者必側其針以刺之側針即臥針然又必先明於二十五人之形則血氣之多少有無病之左右上下皆能悉知無遺而後可以施針耳此則刺法之約所以畢也五音五味篇第六十五內論人身合五音五穀五果五畜等義故名篇右徵與少徵調右手太陽上按前篇右徵之人比於右手太陽太陽之上鮫鮫釘又云手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色故此曰右徵之人當調右手太陽上蓋言小腸經脈氣穴道之行於上者是也正以火人而調火部耳前篇言少徵之人比於右手太陽太陽之下慆慆然又云手太陽之下血氣盛則掌肉充滿血氣皆少則掌瘦以寒然則少徵之人當調右手太陽之下而此亦與右徵之人同調右手太陽之上則以下為上其上下字必有缺也左商與右徵調在手陽明上前篇云左商之人比於右手陽明陽明之上監監然又云手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭故此曰左商之人當調左手陽明上蓋言大腸經脈氣穴道之行於上者是也正以金人而調金部耳前篇比於右手陽明之右字當作左即此節可證前篇以質微之人比於左手太陽上而此以左徵調左手陽明上者則以火人而調金部未知其所謂也少徵與太宮調在手陽明上前篇以少徵之人比於右手太陽太陽之下慆慆然而此以少徵調左手陽明上是以火人而調金部也上下字必訛耳前篇太宮之人比於左足陽明陽明之上婉婉然蓋以陽明胃經屬土宜以太宮屬之也此以太宮調左手陽明上是以上人而調金部未知其所謂也右角與太角調右足少陽下前篇少角之人比於右足少陽少陽之下隨隨然又云足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉此以右角之人而調右足少陽之下者宜也蓋以木人而調木部耳前篇太角之人比於左足少陽少陽之上遺遺然而此以右代左以下代上者必有訛耳太徵與少徵調在手太陽上前篇云質徵之入比於左手太陽太陽之上肌肌然又云手太陽之上血氣盛則有多須面多肉以平血氣皆少則面瘦惡色今以太徵之人而調左手太陽之上者是也蓋以火人而調火部耳前篇以少徵之人比於右手太陽太陽之下慆慆然而此以左代右以上代下必有誤耳眾羽與少羽調右足太陽下前篇云眾之為人比於右足太陽太陽之下潔潔然又曰足太陽之下血氣盛跟肉滿踵堅氣少血多則瘦跟空血氣皆少則喜轉筋跟下痛此以眾羽之人而調右足太陽之下蓋言膀胱經脈氣穴道之行於下者是也是以水人而調水部耳前篇少羽之人比於左足太陽太陽之下紆紆然今以右代左者必有訛耳少商與右商調右手太陽下前篇以少商之人比於右手陽明右商之人比於左手陽明而此乃調右手太陽之下是以金人而調火部未知其所謂也桎羽與眾羽調右足太陽下前篇以桎之為人比於左足太陽太陽之上安安然又云足太陽之下血氣盛則跟肉滿踵堅氣少血多則瘦跟空血氣皆少則善轉筋踵下痛此以桎羽之人而調足太陽者是也蓋以水人而調水部耳其以右代左必有訛耳前篇眾羽之人比於右足太陽太陽之下潔潔然此以眾羽之人而調右足太陽之下者是也少宮與太宮調右足陽明下前篇以少宮之人比於右足陽明陽明之下樞樞然又云足陽明之下血氣盛則下毛美長至胸血多氣少則下毛美短至臍行則善高舉足足指少肉足善寒血少氣多則肉而善嫁血氣皆少則無毛有則稀枯悴善痿厥足痹此以少宮之人而調足陽明是以土人而調土部者是也但以下代上則異耳前篇以太宮之人比於左足陽明陽明之上婉婉然今乃以右代左亦為異耳判角與少角調右足少陽下前篇以判角之人比於左足少陽少陽之下栝栝然又云足少陽之下血氣盛則脛毛美長外踝肥血多氣少則脛毛美短外踝皮堅而厚血少氣多則胻毛少外踝皮薄而軟血氣皆少則無毛外踝瘦無肉此以判角之人而調足少陽者是也蓋以木人而調木部耳但以右代左則異耳前篇少角之人比於右足少陽少陽之下隨隨然此以少角之人而調右足少陽之下者是也釱商與上商調右足陽明下前篇云釱商之人比於左手陽明陽明之上廉廉然又云手陽明之上血氣盛則髭美血少氣多則髭惡血氣皆少則無髭此以釱商之人而調左足陽明者是以金人而調土部也其足字當作手字蓋手陽明則屬金矣前篇以少商之人比於右手陽明陽明之下嚴嚴然又云手陽明之下血氣盛則腋下毛美手魚肉以溫氣血皆少則手瘦以寒此以上商而調右手陽明之下者是也但前止有釱商少商右商左商並無上商非此之上為誤則彼之少為誤也釱商與上角調左足太陽下前篇以釱商之人比於左手陽明陽明之上廉廉然而此以釱商之人調左足太陽者是以金人而調水部未知其所謂也按據前所屬五音而調各部正承前篇末節言先明二十五人之形然後可以明經隧而調陰陽故此即二十五人之屬於五音者而指其當調之所在也但有以別音而互屬則是太少左右上下陰陽等字非前篇則此篇必有訛處正以此書向無明注而讀者不曉錄者不慎故不得改正之愚欲據五行生剋大義悉改正之其說自明但此經非比尋常不敢妄更姑俟後之君子上徵與右徵同穀麥畜羊果杏手少陰髒心色赤味苦時夏上徵右徵者火音之人也故五穀五畜五果之內其麥羊杏皆屬火宜火音之人用此以調之也上羽與太羽同谷大豆畜彘果慄足少陰臟腎色黑味鹹時冬上羽太羽者水音之人也故五穀五畜五果之內其大豆彘慄屬水宜水音之人用此以調之也上宮與太宮同谷稷畜牛果棗足太陰臟脾色黃味甘時季夏上宮太宮者土音之人也故五穀五畜五果之內其稷牛棗皆屬土宜土音之人用此以調之也上商與右商同谷黍畜雞果桃手太陰臟肺色白味辛時秋上商右商者金音之人也故五穀五畜五果之內其黍雞桃皆屬金宜金音之人用此以調之也上角與大角同谷麻畜犬果李足厥陰臟肝色青味酸時春上角大角者木音之人也故五穀五畜五果之內其麻犬李皆屬木宜木音之人用此以調之也前言調其六腑而此又言五音之人合於五臟宜有以善調之也太宮與上角同右足陽明上太宮屬土宜調足陽明胃土而此又以上角之人義不可曉左角與太角同左盡陽明上角乃木音宜調木部今足陽明屬土而乃調之義不可曉少羽與太羽同右足太陽下少羽太羽屬水宜調足太陽膀胱水左商與右商同左手陽明上左商右商屬金宜調左陽明大腸金加宮與太宮同左足少陽上加宮太宮屬土而調足少陽之木義不可曉然太宮又重出矣質判與太宮同左手太陽下質判屬火宜調手太陽小腸經火而太宮又附之義不可曉且重出判角與太角同左足少陽下判角太角屬木宜調足少陽膽經木太羽與太角同右足太陽上太羽屬水宜調右足太陽膀胱經水而太角屬木附之義不可曉太角與太宮同右足少陽上太角為木宜調足少陽膽經木而太宮屬土附之義不可曉上按以宮調胃土以羽調膀胱水等義固以五行相屬其間以別音之人互入必是手足左右上下陰陽字面多訛今以此九項而與前十二項相配有重者如左手陽明上右足太陽下右足陽明下左手陽明上有缺者如右足少陽上左足少陽下右手陽明上左足太陽上右足太陽上右足陽明上此必由重者差訛故致有缺者不全也俟後之君子正之右徵少徵質徵上徵判徵右角釱角上角太角判角右商少商釱商上商左商少宮上宮太宮加宮左宮眾羽桎羽上羽大羽少羽此總承上文而復審記之五音之各分為五計二十有五之數也黃帝曰婦人無須者無血氣乎岐伯曰衝脈任脈皆起於胞中上循背裡為經絡之海其浮而外者循腹右上行會於咽喉別而絡唇口血氣盛則充膚熱肉血獨盛則滔滲皮膚主毫毛今婦人之主有餘於氣不足於血以其數脫血也衝任之脈不榮口唇故須不主焉此言婦人之所以無須也前篇言氣血盛則須美長今婦人無須豈無氣血乎伯曰婦人之所以無須者以其數脫血也蓋婦人衝任二脈皆起於受胎之胞絡宮中上循背之裡而行為經絡之海其浮而外行者循腹右上行會於咽喉其別而行者絡於唇口惟血氣盛則膚充而肉熱血獨盛則皮膚滲而毫毛生今婦人之生氣有餘而血不足以其月事以時下而數脫血也故衝任之脈不榮口唇須之所以不生也黃帝曰士人有傷於陰陰氣絕而不起陰不用然其須不去其故何也宦者獨去何也願聞其故岐伯曰宦者去其宗筋傷其衝脈血瀉不復皮膚內結唇口不榮故須不生此言宦者之所以無須也士人有傷於陰器而陰器絕而不起亦不能復有所用其須之生者自若惟宦者陰器既傷而須獨不生帝之所以疑也伯言士人雖有傷於陰器其宗筋未嘗去而衝脈未嘗傷也彼宦者不然所以血一瀉而不復其所傷之處皮膚內結衝任之脈不榮於上之口唇故須焉得而生也黃帝曰其有天宦者未嘗被傷不脫於血然其須不生其故何也岐伯曰此天之所不足也其任沖不盛宗筋不成有氣無血唇口不榮故須不生此言天宦之所以無須也天宦其貌天生如宦者也天宦未嘗如宦者之被傷亦未嘗如婦人之脫血其須不生帝之所以疑也伯言此天之所以不足之也其任沖不盛宗筋不成止有氣而無血唇口不榮故須亦不生也黃帝曰善乎哉聖人之通萬物也若日月之光影音聲鼓響聞其聲而知其形其非夫子孰能明萬物之精是故聖人視其顏色黃赤者多熱氣青白者少熱氣黑色者多血少氣美眉者太陽多血通髯極須者少陽多血美須者陽明多血此其時然也此帝贊伯能通萬物之精故能驗顏色而明經絡也夫人之常數太陽常多血少氣少陽常多氣少血陽明常多血多氣厥陰常多氣少血少陰常多氣少血太陰常多血少氣此天之常數也此結言手足六經之氣血各有多少見調之者常視其氣血以為主也太陽者手太陽小腸足太陽膀胱也少陽者手少陽三焦足少陽膽也陽明者手陽明大腸足陽明胃也太陽太陰俱多血少氣少陽厥陰俱多氣少血陽明氣血皆多少陰多氣少血知其氣血多少則可以辨二十五人之形而調之也按此又見素問血氣形志篇本經九針論但厥陰常多血少氣太陰常多氣少血有不同耳大義當以素問為的百病始生第六十六內有百病始生故名篇黃帝問於岐伯曰夫百病之始生也皆主於風雨寒暑清濕喜怒喜怒不節則傷臟風雨則傷上清濕則傷下三部之氣所傷異類願聞其會岐伯曰三部之氣各不同或起於陰或起於陽請言其方喜怒不節則傷臟臟傷則病起於陰也清濕裘虛則病起於下風雨襲虛則病起於上是謂三部至於其淫泆不可勝數數上聲勝平聲此言外感內傷約為三部而淫泆有不可勝數也百病始生皆由於風雨寒暑清濕喜怒然喜怒不節則傷臟傷臟則病起於陰經而名之為內傷也清濕襲虛則病起於下蓋足陽經感之則病起於陽足陰經感之則病起於陰風雨襲虛則病起於上此亦病起於陽而名之為外感也是謂三部之氣所傷異類至其浸淫流泆則病有不可勝數者也黃帝曰余固不能數故問先師願卒間其道岐伯曰風雨寒熱不得虛邪不能獨傷人卒然逢疾風暴雨而不病者蓋無虛故邪不能獨傷人此必因虛邪之風與其身形兩虛相得乃客其形兩買相逢眾人肉堅其中於虛邪也因於天時與其身形參以虛實大病乃成氣有定舍因處為名上下中外分為三員是故虛邪之中人也始於皮膚皮膚緩則腠理開開則邪從毛髮入入則抵深深則毛髮立毛髮立則淅然故皮膚痛留而不去則傳舍於絡脈在絡之時痛於肌肉其痛之時息大經乃代留而不去傳舍於經在經之時灑淅喜驚留而不去傳舍於輸在輸之時六經不通四肢則肢節痛腰脊乃強留而不去傳舍於伏沖之脈在伏沖之時體重身痛留而不去傳舍於腸胃在腸胃之時賁響腹脹多寒則腸鳴飧泄食不化多熱則溏出糜留而不去傳舍於腸胃之外募原之間留著於脈稽留而不去息而成積或著孫脈或著絡脈或著經脈或著輸脈或著於伏沖之脈或著於霄筋或著於腸胃之募原上連於緩筋邪氣淫泆不可勝數此言邪氣之淫泆始於虛以感之而以次傳舍則為積也上文言風雨寒暑清濕而此曰風雨寒熱又曰疾風暴雨辭不同而均之為外感也然此諸外感者不得天之虛邪則不能傷人也虛邪見上古天真論本經九宮八風等篇又不得人之本虛亦不能傷人也此以天之虛人身形之虛兩虛相得所以諸邪得以客其形耳若天有實風九宮八風篇以從其所居之鄉來為實風主生長養萬物人有實氣則兩實相逢眾人肉堅必不客其形矣此可以見人之中於虛邪由於天時之虛與其身形之虛故參以虛實之法則知大病之所由成也又由其邪氣之有定舍而命其病體之有定名當為上下中外之三員猶言三部也蓋人身大體自縱而言之則以上中下為三部自橫而言之則以在表在裡半表半裡為二部故謂之上下中外之三員也是故虛邪之中人也始於皮膚正以皮膚緩則腠理開開則邪從毛髮入入則至深深則毛髮立立則皮膚淅然而寒遂因之而為痛其始之於皮膚者如此及留而不去則傳舍於絡脈如足太陽膀胱經在飛揚之謂蓋浮而易見者為絡深而不見者為經凡各部分肉之絡脈皆是也此其肌肉盡痛則深於皮膚矣其痛之時呼吸之際大經之脈不能流通而間有脈之代而中止不能自還者其繼而在絡脈者如此留而不去傳舍於經如凡各經之脈其直行者是也如足太陽膀胱在崑崙之謂此則灑淅惡寒喜於多驚其在經者如此留而不去傳舍於輸穴如足太陽膀胱經在束骨之謂時則六經不通於四肢肢節皆痛腰脊乃強其在輸者又如此留而不去傳舍於伏沖之脈時則身體重而且痛也其在於伏沖之脈者如此按素問瘧論有伏膂之脈今曰伏沖然下文有或著於伏沖之脈或著於膂筋則膂筋當與伏沖為二然此處不曰留而不去傳舍於膂筋而下文乃有或著於膂筋則膂筋與伏沖亦相近可以為二又可以為一者也大義又見本經歲露論篇留而不去傳舍於在上之胃在下之腸時在腸胃之間其聲為奔響且為腹脹內而寒氣或多則腸鳴而飧泄其食不化內而熱氣或多則後之所去者必溏溏者穢之不堅而雜水者也且所出者為糜糜者谷之不化者也其在腸胃者又如此留而不去傳舍於腸胃之外募原之間募原之間者即皮裡膜外也時則留著於脈若稽留而不去則息而成積矣其在於腸胃之外者又如此由上文觀之或著於孫脈或著絡脈或著輸脈或著於伏沖之脈或著於膂筋或著於腸胃之募原上連於緩筋此乃邪氣之所淫泆其不可勝數者又如此黃帝曰願盡聞其所由然岐伯曰其著孫絡之脈而成積者其積往來上下臂手孫絡之居也浮而緩不能句積而止之故往來移行腸胃之間水湊滲注灌濯濯有音有寒則腹滿雷引故時切痛其著於陰陽之經則挾臍而居飽食則益大飢則益小其著於緩筋也似陽明之積飽食則痛飢則安其著於腸胃之募原也痛而外連於緩筋飽食則安飢則痛其著於伏沖之脈者揣之應手而動發手則熱氣下於兩股如湯沃之狀其著於膂筋在腸後者飢則積見飽則積不見按之不得其著於輸之脈者閉塞不通津液不下孔竅乾壅此邪氣之從外入內從上下也此承上文而詳言積之在於各所者其狀有不同而病有所由積也夫所謂邪之在孫絡而成積者其積往來上下於臂手孫絡之居浮而不沉緩而不急不能據積而止之故往來相移其內而腸胃之間有水湊聚注灌濯濯有音且有寒氣則䐜滿如雷有聲而相引時常為切痛也其著於陽明經者即胃經也其積當挾臍而居如飽食時則積益大飢時則積益小也其著於緩筋也似前陽明之積飽食則痛如益大之謂飢則安則如益小之謂也其著於腸胃之募原積痛則外連於緩筋如飽食則稍安飢則必痛矣其著於伏沖之脈以手揣摸其積應手而動舉手則熱氣下於兩股間如有以湯沃之之狀也其著於膂筋膂筋在腸之後故積亦在腸後方其飢時則積反見飽則積不見按之又不可得也其著於輸之脈而為積者當閉塞不通津液不下於故孔竅皆干壅也凡所謂積之成者皆邪氣之從外而入內從上而之下者也黃帝曰積之始生至其已成奈何岐伯曰積之始生得寒乃生厥乃成積也此原積之始生者必由於寒而其所成則由於氣之逆也厥者氣逆也下文正詳言之黃帝曰其成積奈何岐伯曰厥氣生足悗悗主脛寒脛寒則血脈凝澀血脈凝澀則寒氣上入於腸胃入於腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多食飲則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血陰絡傷則血內溢血內溢則後血腸胃之絡傷則血溢於腸外腸外有寒汁誅與血相搏則併合凝聚不得散而積成矣卒然外中於寒若內傷於憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血蘊里而不散津液澀滲著而不去而積皆成矣此承上文而詳言積之始生至其所以成也足之六經氣有厥逆則足悶然不得清利由是而脛寒由是而血脈凝澀由是而寒氣入於腸胃內為䐜脹外則汁沫迫聚不得散聚日漸成積又或卒多食飲則腸中益滿又或起居用力不慎則絡脈傷如陽經之絡脈受傷則血當外溢而為衄如陰經之絡脈受傷則血當內溢而去後有血如腸胃之絡脈受傷則血當溢於腸外其腸外有寒汁沫與此血相搏所以併合凝聚不得散釋而積已成矣又或卒然外中於寒或內傷於憂有時而怒則氣上逆以致六經之輸脈不通熱氣不行凝結蘊里而不釋散津液凝澀著而不去而積之所由成也故曰積之始生得寒乃生厥乃成積者其大義如此黃帝曰其生於陰者奈何岐伯曰憂思傷心重寒傷肺忿怒傷肝醉以入房汗出當風傷脾用力過度若入房汗出浴則傷腎此內外三部之所生病者也此節大義與本經邪氣臟腑病形篇第二節同此言積之生於陰者以五臟各有所傷也前篇言積所生之處皆非生之於五臟者也故帝以生於陰經者為問伯言五臟各有所傷故積之所由生也憂思則必傷其心重寒傷肺即本經邪氣臟腑病形篇云形寒寒飲是也忿怒則傷肝方醉之時乃入於房以致汗出而復當於風則風又從而入之則傷脾用力過度乃入於房以致稈出而復往浴體則傷腎此乃或內或外或上中下三部隨各臟之經絡而積之所生者也黃帝曰善治之奈何岐伯答曰察其所痛以知其應有餘不足當補則補當瀉則瀉毋逆天時是謂至治此言治積之法也毋逆天時如春氣在肝及月廓空滿之類皆是也行針第六十七黃帝問於岐伯曰余聞九針於夫子而行之於百姓百姓之氣血各不同形或神動而氣先針行或氣與針相逢或針已出氣獨行或數刺乃知或髮針而氣逆或數刺病益劇凡此六者各不同形願聞其方此帝以受針之人有六者之異而問之也岐伯曰重陽之人其神易動其氣易往也黃帝曰何謂重陽之人岐伯曰重陽之人熇熇高高言語善疾舉足善高心肺之臟氣有餘陽氣滑盛而揚故神動而氣先行黃帝曰重陽之人而神不先行者何也岐伯曰此人頗有陰者也黃帝曰何以知其頗有陰也岐伯曰多陽者多喜多陰者多怒數怒者易解故曰頗有陰其陰陽之離合難故其神不能先行也此承上文而言神動而氣先針以行者必其為重陽之人也夫重陽之人神易動而氣易往者何哉正以熇熇而有上炎之勢高高而無卑屈之心以言語則善急以舉足凡甚高其心肺在上之臟氣更為有餘而陽氣者衛氣也滑盛而揚故用針之際其神易動而氣先針而行也然有重陽之人而神不先行者陽中頗有陰也凡多陽之人必多喜多陰之人必多怒惟此重陽之人而怒亦數有但比重陰之人則易解耳故曰頗有陰也蓋以陽中有陰則陽為陰滯初雖針入而與陽合又因陰滯而復相離其神氣不能易動而先針以行也以此黃帝曰其氣與針相逢奈何岐伯曰陰陽和調而血氣淖澤滑利故針入而氣出疾而相逢也此承上文而言受針之氣有與針相逢者以其氣之出速而相逢也正以此人者陰陽各經相為和調而血氣淖澤故耳黃帝曰針已出而氣獨行者何氣使然岐伯曰其陰氣多而陽氣少陰氣沉而陽氣浮沉者內藏故針己出氣乃隨其後故獨行也此言有針已出而氣獨行者正以陰氣多而內藏故針雖出而氣乃隨後以獨行也陰氣者營氣也陽氣者衛氣也下文同黃帝曰數刺乃知何氣使然岐伯曰此人之多陰而少陽其氣沉而氣往難故數刺乃知也此言人有數刺而始知者以其陰氣多而沉也蓋比上節之沉則又沉之甚矣黃帝曰針入而氣逆者何氣使然岐伯曰其氣逆與其數刺病益甚者非陰陽之氣浮沉之勢也此皆粗之所敗工之所失其形氣無過焉此言有針入而氣逆者乃醫工之失其針法也凡針入而氣逆與數針而病益甚非陰陽之氣有浮沉之勢也特以營氣主沉衛氣主浮故刺衛當淺刺營當深今針入而氣逆者特以宜淺而反深之宜深而反淺之所以針入而氣逆也故凡用針者皆當視其形氣而弗使過焉可也上膈第六十八首句有氣為上膈故名篇黃帝曰氣為上膈者食飲入而還出余已知之矣蟲為下膈下膈者食晬時乃出余未得其意願卒聞之岐伯曰喜怒不適食飲不節寒溫不時則寒汁流於腸中流於腸中則蟲寒蟲寒則積聚守於下管則腸胃充郭衛氣不營邪氣居之人食則蟲上食蟲上食則下管虛下管虛則邪氣勝之積聚已留留則癰成癰成則下管約其癰在營內者即而痛深其癰在外者則癰外而痛浮癰上皮熱還音旋晬音粹管後世作脘癰壅同據後論疾診尺篇第三節可比此言膈證有上下之分而尤詳下膈之義也膈者膈膜也前齊鳩尾後齊十一椎所以遮隔濁氣不使上熏心肺也然有力膈上之病者乃氣使然食飲一入即時還出有力膈下之證者乃蟲使然食飲周時始復外出但帝明於上膈而昧於下膈伯言下膈之始由於喜怒食飲寒暖不能善調以致寒汁流於腸中則蟲因寒而聚於下脘臍上二寸為下脘惟其聚於下脘故在上之胃在下之腸皆已充郭衛氣不得上營邪氣同居於腸胃之中及其人食則蟲上食而下脘始虛隨致邪氣入於下脘而積聚已留矣由是壅成而下脘約也其壅在下脘之內者即而按之其痛深其壅在下脘之外者即而按之其痛乃浮壅上之皮亦熱此下膈之病所以食飲晬時而還出也按百病惟膈為難愈後世之治膈者並不能分上膈下膈有氣與蟲之異乃遵仲景東垣丹溪書以關格為膈證按本經終始經脈禁服篇明是脈體非格證也豈不誤哉黃帝曰刺之奈何岐伯曰微按其癰視氣所行先淺刺其傍稍內益深還而刺之毋過三行察其沉浮以為深淺已刺必熨令熱入中日使熱內邪氣益衰大癰乃潰伍以參禁以除其內恬澹無為乃能行氣後以鹹苦化谷乃下矣二內字納同毋無同伍互同澹憺同此言刺下脘之癰者必有其法也輕按其癰視其氣之所行先淺刺其癰之旁稍納其針而益深之又旋而刺之至於其三則不必復刺矣察其癰之浮者淺刺之癰之深者深刺之及已刺之後必以火熨之使熱入於其中日使內之必熱則邪氣漸衰大癰乃潰又互參禁守之法除其入內之事專一恬澹無為乃能行氣然後用鹹苦等味以化其谷庶食飲從茲下矣憂恚無言第六十九人有憂與怒以致無言蓋有其由故名篇黃帝問於少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師答曰咽喉者水穀之道也喉嚨者氣之所以上下者也會厭者音聲之戶也口唇者音聲之扇也舌者音聲之機也懸壅垂者音聲之關也頏顙者分聲之所泄也橫骨者神氣所使主發舌者也敵人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客於厭則厭不能發發不能下至其開闔不致故無音厭上聲此詳言人之憂恚而無言者以寒氣之客於會厭也人有二喉其一曰咽喉乃水穀之道也生於後其管通於六腑其一曰喉嚨氣之所以上下者也生於前其管通於五臟會厭者凡人用飲食必由會厭以掩喉嚨而後飲食可過耳故喉嚨既為氣之上下則會厭為音聲之戶口唇為音聲之扇舌為音聲之機猶弩之有機懸壅為音聲之關頏顙為分氣之所泄橫骨為神氣之所使舌之所發故人有鼻洞涕出不收者必其頏顙不開分氣相失從鼻而誤出故耳然人之言語所發實以會厭為主厭小而薄則發氣速以其開闔利而出氣易也若厭大而厚則發氣遲以其開闔難而出氣遲所以言語最重也今人卒然無音者由夫寒氣客於會厭則厭不能發縱發亦不能下其開闔頗難所以至於無音也黃帝曰刺之奈何岐伯曰足之少陰上繫於舌絡於橫骨終於會厭兩瀉其血脈濁氣乃闢會厭之脈上絡任脈取之天突其厭乃發也闢闢同此言即人之無音者而有刺之之法也足少陰腎經所行之脈上繫於舌復脈於橫骨以終於會厭必兩次瀉其血脈則濁氣乃闢除矣然欲瀉其血脈者正以此會厭之脈上絡於任脈天突之穴取此穴以刺之其厭乃可發也天突在頸結喉下四寸宛宛中針五分留三呼灸三壯寒熱第七十凡有瘰癧者其病必發寒熱故名篇黃帝問於岐伯曰寒熱瘰癧在於頸腋者皆何氣使生岐伯曰此皆鼠瘻寒熱之毒氣也留於脈而不去者也此言鼠瘻之所以發為寒熱者以其毒氣之留於脈也瘰癧者瘡名一名鼠瘻瘡生於頸腋兩脈間乃陽明少陽兩經之所屬也正以鼠瘻有寒熱之毒氣皆留於其脈而不去耳俗云鼠用飲食流涎於其中人誤用之所以毒氣感而生瘰癧今鼠之頸腋多塊其狀猶瘰癧然後世用貓製藥方者亦所以勝其毒耳大義又見後論疾診尺篇黃帝曰去之奈何岐伯曰鼠瘻之本皆在於臟其末上出於頸腋之間其浮於脈中而未內著於肌肉而外為膿血者易去也黃帝曰去之奈何岐伯曰請從其本引其末可使衰去而絕其寒熱審按其道以予之徐往徐來以去之其小如麥者一刺知三刺而已素問骨空論亦有刺寒熱法此言刺瘰癧之有法也鼠瘻之本皆在五臟其末上出於頸腋浮於脈中內未著於肌肉外尚未成膿血者斯易去也去之之法亦惟從其何臟之本以引其在外之末可使漸衰而絕其寒熱審按其脈道以取穴而與之針徐往徐來以去其病刺法內有小如麥粒者一刺則知其病之將去三刺則病自己矣黃帝曰決其生死奈何岐伯曰反其目視之其中有赤脈上下貫瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲而死赤脈不下結瞳子可治也此節大義與本經論疾診尺篇相同此言決瘰癧之生死有法也赤脈從上而下貫瞳子中凡死之遠近以脈之如線者多少為度如無赤脈下貫瞳子者其病可治也邪客第七十一客者感也首節論邪之所感故名篇末節八虛義同黃帝問於伯高曰夫邪氣之客人也或令人目不瞑不臥出者何氣使然伯高曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心脈而行呼吸焉營氣者泌其律液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之剽疾而先行於四末分肉皮膚之間而不休者也晝日行於陽夜行於陰常從足少陰之分間行於五臟六腑今厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽蹺陷不得入於陰陰虛故目不瞑此節與本經五味篇論三焦之義相同此伯高言人之目不瞑者以其陽氣獨行於外而內之陰氣亦虛也夫邪之感於人身令人目不得瞑或不臥而出於外者正以五穀入胃下焦為糟粕之隧中焦為津液之隧上焦為宗氣之隧故宗氣積於胸中者即上焦也出喉嚨以貫心脈而行呼吸一呼脈行三寸一吸脈行三寸呼吸總為一息則脈行六寸凡人一日一夜計有一萬三千五百息則脈行八百一十丈其營氣由中焦之氣降於下焦而生此陰氣者泌其津液注之於脈化以為血以榮四肢內隨宗氣以行於五臟六腑經脈之中而百刻之內其脈數與刻數相應也衛氣者由下焦之氣以升於中上二焦而生此陽氣但衛氣剽悍滑疾不隨宗氣以行而先行於四末分肉皮膚之間而不休者也晝行於陽經夜行於陰經然晝行陽經之時如行足太陽經已畢則必入於足少陰腎經而又出行於陽經行足陽明已畢則亦必入於足少陰腎經而又出於陽經諸陽皆然正以陽氣迅而陰氣弱故必一入而即出也所謂常從足少陰之分間行於五臟六腑者如此大義見衛氣行篇今邪氣厥逆客於五臟六腑則衛氣獨衛其外不得內入於陰惟其不得內入於陰則外之陽氣盛而陽蹺之脈不得入於陰致內之營氣虛而陰蹺之脈不得通於陽陽盛而陰虛此目之所以不瞑也黃帝曰善冶之奈何伯高曰補其不足瀉其有餘調其虛買以通其道而去其邪飲以半夏湯一劑陰陽已通其臥立至黃帝曰善此所謂決瀆壅塞經絡大通陰陽和得者也願聞其方伯高曰其湯方以流水千里已外者八升揚之萬遍取其清五升意之炊以葦薪火沸置秫米一升治半夏五合徐飲令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則臥汗出則己矣久者三飲而已也秫音術稷之黏者此言治目不瞑而不得臥者有調其虛實之刺法飲以湯劑之方法也陽蹺獨盛於外則衛氣有餘也不得入於陰而陰虛營氣不足也當補銳不足而瀉其有餘蓋不足為虛有餘為實所以調其虛實以通內外往來之道耳然又飲以半夏湯一劑則陰陽已通其臥立至其方以流水來自千里外者八升即今之三升余也揚之萬遍濾其清者五升煮之即今之二升余也炊以葦薪及火沸之時又置秫米一升即今之四合余也治半夏五合即今之二合余也徐徐飲之令竭之一升半即今之六合余也去其滓飲汁一小杯一日之內服之者三次稍有所益自有所覺則漸可瞑矣凡病新發者覆杯則臥汗出則已病久者飲三次而已耳黃帝問於伯高曰願聞人之肢節以應天地奈何伯高答曰天圓地方人頭圓足方以應之天有日月入有兩目地有九州人有九竅天有風雨人有喜怒天有雷電人有音聲天有四時人有四肢天有五音人有五臟天有六律人有六腑天有冬夏人有寒熱天有十日人有手十捐辰有十二人有足十捐莖垂以應之女子不足二節以抱人形天有陰陽人有夫妻歲有三百六十五日人有三百六十節地有高山人有肩膝地人深谷人有腋膕地有十二經水人有十二經脈地有泉脈人有衛氣地有草蓂人有毫毛天有晝夜人有臥起天有列星人有牙齒地有小山人有小節地有山石人有高骨地有林木人有募筋地有聚邑人有䐃肉歲有十二月人有十二節地有四時不生草人有無子此人與天地相應者也此伯高備言人與大地相應也女子不足二節缺莖垂與二睪也以抱人形故耳黃帝問於岐伯曰余願聞持針之數內針之理縱舍之意扦皮開腠理奈何脈之屈折出入之處焉至而出焉至而止焉至而徐焉至而疾焉至而入六腑之輸於身者余願盡聞少敘別離之處離而入陰別而入陽此何道而從行願盡聞其方岐伯曰帝之所問針道畢矣黃帝曰願卒聞之內納同舍捨同焉音煙此帝備問用針之義及經脈出入離合之處也針有所持之法所納之理或縱針而不必持或捨針而不復用扦人之皮以開其腠理此皆法之所當知也其經脈有屈折出入之處何所至而出針何所至而止針何所至而用針則徐何所至而用針則疾何所至而入針且六腑之運於人身者有別有離何者離陽而入於陰何者別陰而入於陽此必有脈道以為之行也故備問之岐伯曰手太陰之脈出於大指之端內屈循白肉際至本節之後太淵留以澹外屈上於本節之下內屈與陰諸絡會於魚際數脈並注其氣滑利伏行壅骨之下外屈出於寸口而行上至於肘內廉入於大筋之下內屈上行臑陰入腋下內屈走肺此順行逆數之屈折也屈讀為曲數上聲此伯言手太陰經之脈有曲折出入順逆之數也手太陰肺經之脈出於大指之端少商穴內屈之以循白肉之際蓋白肉屬陰經赤肉屬陽經陰陽之經以赤白肉際為界也至本指節後有太淵穴大凡脈會太淵而留止於此澹滲諸經從外而曲上於本節之下又從內而曲與陰經諸絡會於魚際但數經之脈並注於此其氣滑利伏行壅骨之下即掌後高骨也又外往少曲出於寸口之太淵穴而行故曰脈會太淵也上從經渠列缺孔最又至肘內之俠白穴入於大筋之上從內少曲上行臑之陰廉入腋下之雲門大府又內曲而走於肺此則從外而走內者為逆若自雲門中府以出少商則自內而出外者為順此乃順行逆數之屈折也心主之脈出於中捐之端內屈循中指內廉以上留於享中伏行兩骨之間外屈出兩筋之間骨肉之際其氣滑利上二寸外屈出行兩筋之間上至肘內廉入於小筋之下留兩骨之會上入於胸中內絡於心肺此伯言心主之脈有曲折出入順逆之數也心主之脈即手厥陰心包絡之脈也手少陰心經本為君主之官而此以包絡為心主者正以其脈之所行悉代君主而遂謂之心主之脈也大義見下文其脈行於中指之端中衝穴從內少曲循中指之內廉以上留於掌中之勞宮穴伏行於兩骨之間外曲而行出於兩筋之間正骨肉之際大陵穴之所在也其氣滑利上於二寸之內關穴又外屈出行兩筋之間上至肘之內廉曲澤穴入於小筋之下留於兩骨之會上入於胸之天泉天池而內絡於心肺兩經此乃心主順行逆數之屈折也大義見前本輸篇第三節黃帝曰手少陰之脈獨無輸何也岐伯曰少陰心脈也心者五臟六腑之大主也精神之所舍也其臟堅固邪弗能容也容之則心傷心傷則神去神去則死矣故諸邪之在於心者皆在於心之包絡包絡者心主之脈也故獨無輸焉此承上文而明手少陰心經不必有治病之輸也輸者穴也前本輸篇止言心出於中衝云云而不言心經者豈心經獨無治病之輸乎非謂心經無輸穴也伯言少陰者心之脈也心為五臟六腑之大主乃所以藏神者故為精神之所舍也其臟堅固而邪弗能容若邪容之則心傷而神去人至於死矣故凡諸邪之在心者皆不在於心而在於心之包絡此包絡者遂得以同於心主之脈而即以心主稱之也故治病者亦治心包絡之穴而已獨不取於心之輸者有以哉黃帝曰少陰獨無輸者不病於岐伯曰其外經病而臟不病故獨取其經於掌後銳骨之端其餘脈出入屈折其行之疾徐皆如手少陰心主之脈行也故本輸者皆因其氣之虛實疾徐以取之是謂因沖而瀉因衰而補如是者邪氣得去真氣堅固是謂因天之序此承上文而明心經之病在外經而不在內臟所以止取神門之穴而余病則取包絡而已夫諸邪之在心者皆治心之包絡則少陰心經獨不病乎伯言心經之病在於外經凡經脈之行於外者偶病耳其心之內臟則不容病者也故外經有病獨取其掌後銳骨之端神門穴耳其餘脈之出入曲折所行之徐疾皆如手厥陰心包絡之脈行也故本經本輸篇謂治手少陰者即治心包絡經皆調其氣之虛實疾徐以取之是謂因邪氣所沖而瀉之真氣衰而補之如是者則邪去而真固有以循天道四時之序矣黃帝曰持針縱舍奈何岐伯曰必先明知十二經脈之本末皮膚之寒熱脈之盛衰滑澀其脈滑而盛者病日進虛而細者久以持大以澀者為痛痹陰陽如一者病難治其本末尚熱者病尚在其熱已衰者其病亦去矣持其尺察其肉之堅脆小大滑澀寒溫燥濕因視目之五色以知五臟而決死生神其血脈察其色以知其寒熱痛痹此帝問持針縱舍之法而伯先以視病之法言之也第四節帝以持針之數納針之法縱舍之意問之而伯尚未言故此以持針縱舍為問伯言必先明知手足十二經脈之本末其各經何起何止也皮膚之寒熱各經之分肉孰寒而孰熱也及人迎氣口之脈盛衰滑澀其脈之滑而盛者病當日迸脈之虛而小者病久以持若大而帶澀當為痛痹加人迎氣口若一則脈為關格病當難治大義見四時氣禁服終始等篇胸腹為本四肢為末凡本末尚熱者其病尚在凡本末之熱已衰者其病亦去不惟是也又必持其尺部以察其肉之堅脆脈之小大滑澀體之寒溫燥濕即本經論疾診尺篇所謂獨調其尺以言其病也又以目為五臟六腑之精此語見本經大惑論視其目之五色以知其五臟而決其死生又視其血脈之陷下與否及血脈之五色以知其寒熱痛痹大義見本經經脈篇斯可以行持針縱舍之法矣黃帝曰持針縱舍余未得其意也岐伯曰持針之道欲端以正安以靜先知虛實而行疾徐左指執骨右手循之無與肉裡瀉欲端以正補必閉膚輔針導氣邪得淫泆真氣得居此伯始以持針縱舍之法言之也凡持針之道欲端以正安以靜先知病之虛實以知疾徐之法始用左指按其病人之骨右手循穴以施其針方針入時無與肉裡欲行瀉法必端以正欲行補法必閉其膚助針導氣斯邪氣可淫泆而散真氣得在內而居矣黃帝曰扦皮開腠理奈何岐伯曰因其分肉左別其膚微納而徐端之適神不散邪氣得去此同第四節扦皮開腠理之問而伯言其有法也所謂扦皮開腠理者因其分肉之在何經而扦分其皮以開其腠理而入刺之也先以左手別其皮膚然後右手微納其針而徐徐端正其針以入之斯乃扦皮開腠理之法其神氣自然不散而邪氣乃得以去矣黃帝問於岐伯曰人有八虛各何以候岐伯答曰以候五臟黃帝曰候之奈何岐伯曰肺心有邪其氣留於丙肘肝有邪其氣流於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕凡此八虛者皆機關之室真氣之所過血絡之所遊邪氣惡血固不得住留住留則傷經絡骨節機關不得屈伸故病攣也前四留字俱當作流惟流故留故下文住留之留准作流此明言八虛之可以候五臟也八虛者即下兩肘兩腋兩髀兩膕之間由五臟內虛以致虛邪客之而為病也肺之經脈自胸之中府以入兩肘之俠白等穴心之經脈自肘上極泉以行於少海等穴故肺心有邪其邪氣當流於兩肘也肝之經脈自足大指之大敦以行於腋下之期門等穴故肝有邪其邪氣當流於兩腋也脾之經脈自足大指之隱白以行於髀之血海等穴故脾有邪其邪氣當流於兩髀也腎之經脈自足心湧泉以行於膕之陰谷等穴故腎有邪其邪氣當流於兩膕也膝後曲處為膕凡此八者皆機關之室真氣之所過血脈之所遊非邪氣惡血可以住留之所若住留之則經絡傷而骨節機關不得屈伸其病當為拘攣矣其始也由五臟虛而邪氣流於八所其既也即八所而可以候五臟故曰八虛可以候五臟也通天第七十二內言人有五等皆稟氣於天故名篇黃帝問於少師曰余嘗聞人有陰陽何謂陰人何謂陽人少師曰天地之間六合之內不離於五人亦應之非徒一陰一陽而已也而略言耳口弗能遍明也黃帝曰願略聞其意有賢人聖人心能備而行之乎少師曰蓋有太陰之人少陰之人太陽之人少陽之人陰陽和平之人凡五人者其態不同其筋骨氣血各不等此舉五等之人而概言之非徒有陰人陽人而已也黃帝曰其不等者可得聞乎少師曰太陰之人貪而不仁下齊湛湛好內而惡出心和而不發不務於時動而後之此太陰之人也內納同惡去聲此即太陰之人而言之也下齊湛湛者內存陰險外假謙虛貌似下抑整齊湛然無私也好納而惡出者有所得則喜有所費則怒也心和而不發不務於時動而後之者心似和氣水即順應而或有舉動必已隨人後起覘人利害以為趨避也其深情厚貌奸狡虛詐之情如此少陰之人小貪而賊心見人有亡常若有得好傷好害見人有榮乃反慍怒心疾而無恩此少陰之人也好俱去聲此即少陰之人而言之也小貪者比太陰之人則小異耳其心以賊害為主則同於太陰之不仁也人有所失彼則喜之若己有得也人有所榮彼則怒之若已有失也好傷人好害人其心忌嫉而無恩者如此太陽之人居處於於好言大事無能而虛說志發於四野舉措不顧是非為事如常自用事雖敗而無常悔此太陽之人也此即太陽之人而言之也于于無爭之意好言大事無能而虛說即孔於之所謂其言之不怍則為之也難者是也志發於四野者事不畏人知也左傳云褲湛謀於野則獲謀於室則否此才性之蔽為事如常為事止庸常也自用者即中庸之所謂愚而好自用也少陽之人諟諦好自貴有小小官則高自宜好為外交而不內附此少陽之人也此即少陽之人而言之也諟諦者凡事自審也好自貴者妄自尊貴也陰陽和平之人居處安靜無為懼懼無為欣欣婉然從物或與不爭與時變化尊則謙謙譚而不治是謂至治此即陰陽和平之人而言之也無為懼懼欣欣者不因物感而遽有喜怒也尊則謙謙者位尊而愈自謙抑也易曰謙尊而光譚而不治無為而治也曰至治者不冶之治也古之善用針灸者視人五態乃治之盛者瀉之虛者補之此結上文而言善用針灸者必視其五態而治之也別五態之法見下第十四節至六十八節黃帝曰治人之五態奈何少師曰陰太之人多陰而無陽其陰血濁其衛氣澀陰陽不和緩筋而厚皮不之疾瀉不能移之此言治太陰之人之有法也多陰而無陽與少陰之人多陰而少陽者異矣惟陰多故陰血濁惟無陽故衛氣澀惟多陰而無陽故陰陽不和況筋緩而皮又厚必當疾瀉以移其病也少陰之人多陰少陽小胃而大腸六腑不調其陽明脈小而太陽脈大必審調之其血易脫其氣易敗也此言治少陰之人之有法也胃小故陽明之脈小也腸大故手太陽小腸之脈大也血易脫而氣易敗故當詳審以調之與疾瀉太陰之人者不同也太陽之人多陽而少陰必謹調之無脫其陰而瀉其陽陽重脫者易狂陰陽皆脫者暴死不知人也此言治太陽之人之有法也惟少陰故不可脫其陰惟多陽故當以瀉其陽若陽氣大瀉則陽至重脫其病為狂若陰陽皆瀉而至於脫則當暴死不知人也少陽之人多陽少陰經不而絡大血在中而氣外實陰而虛陽獨瀉其絡脈則強氣脫而疾中氣不足病不起也此言治少陽之人之有法也惟絡脈大故獨瀉其絡脈則身強若瀉之太過以致氣脫而出速則中氣不足病不能起也陰陽和平之人其陰陽之氣和血脈調謹診其陰陽視其邪正安容儀審有餘不足盛則瀉之虛則補之不盛不虛以經取之此所以調陰陽別五態之人者也邪斜同此言治陰陽和平之人之有法也黃帝曰夫五態之人者相與毋故卒然新會未知其行也何以別之少師答曰眾人之屬不知五態之人者故五五二十五人而五態之人不與焉五態之人尤不合於眾者也毋無同卒音猝別音鱉此帝以難知五態之人為慮而少師言常人不能知也下文乃詳言之黃帝曰別五態之人奈何少師曰太陰之人其狀黮黮然黑色念然下意臨臨然長大膕然未僂此太陰之人也此言太陰之人之態也黮黮甚黑念然下意即上文下齊湛湛之意也臨臨然長大之貌也其膕雖長大然直身而非傴僂之狀也少陰之人其狀清然竊然固以陰賊立而躁嶮行而似伏此少陰之人也此言少陰之人之態也清然者言貌似清也竊然者消沮閉藏之貌雖曰清然竅然實以陰險賊害為心則上文所謂賊心者而始有此態也其立也躁則不靜嶮則覘望其行也伏如傴僂此其內藏沉思反側之心故耳較之太陰之人長大其膕然未傴僂此狀可以辨耳太陽之人其狀軒軒儲儲反身折膕此太陽之人也此言太陽之人之狀也車之向前曰軒軒軒然者猶俗云軒昂也儲儲者挺然之意若反其身而在後視之則其膕似折亦不檢之態也少陽之人其狀立則好仰行則好搖其兩臂兩肘則常出於背此少陽之人也此言少陽之人之態也據其態乃多動少靜非檢身若不及之道也陰陽和平之人其狀委委然隨隨然顒顒然愉愉然㼐㼐然豆豆然眾人皆曰君子此陰陽和平之人也此言陰陽和平之人之態也委委然安重貌詩君子偕老章有委委佗佗隨隨然不急遽也顒顒然尊嚴貌詩卷阿篇顒顒昂昂愉愉然和悅也論語云愉愉如也㼐㼐然周旋貌禮云周旋中規折旋中矩豆豆然不亂貌君子者自聖人以至成德之士皆可以君子稱也禮運云此六君子者未有不謹於禮者也蓋指出湯文武成王周公又詩指文王為豈弟君子則聖人亦可以君子稱也
