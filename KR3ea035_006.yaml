body:
  text: 卷之六五變第四十六本節有五變之紀故名篇大義見末節也黃帝問於少俞曰余聞百疾之始期也必主於風雨寒者循毫毛而入腠理或復還或留止或為風腫汗出或為消疸或為寒熱成為留痹或為積聚奇邪淫溢不可勝數上聲願聞其故夫同時得病或病此或病彼意者天之為去聲人生風乎何其異也少俞曰夫天之主風者非以私百姓也其行公平正直犯者得之避者得無殆非求人而人自犯之此言入之感邪同而病否異者非天之有私而人有避不避之異也黃帝曰一時遇風同時得病其病各異願聞其故少俞曰善乎哉問請論以比匠人匠人磨斧斤礪刀削斫材木木之陰陽尚有堅脆堅者不入脆者皮弛至其交節而缺斤斧焉夫一木之中堅脆不同堅者則剛脆者易傷況其材本之不同皮之厚簿汁之多少而各異耶夫木之蚤花先生葉者遇春霜烈風則花落而葉萎久曝大旱則脆木簿皮者枝條汁少而葉萎久陰淫雨則簿皮多汁者皮潰而漉卒音猝風暴起則剛脆之木枝折杌傷秋霜疾風則剛脆之木根搖而葉落凡此五者各有所傷況於人乎黃帝曰以人應木奈何少俞答曰木之所傷也旨傷其枝枝之剛脆而堅未成傷也人之有常病也亦因其骨節皮膚腠理之不堅固者邪之所舍也故常為病也此總言人之感邪成病者以骨節皮膚腠理之不堅固也帝問一時遇風同時得病而病有各異除不病者言也少俞言人之所以感於邪者亦因其骨節皮膚腠理之不堅固耳試觀一木之中尚有堅脆故匠人斫削者有斧斤之所不能入蓋以堅者必剛也有斧斤所加而木皮即弛者蓋以弛者必脆也不惟一木堅脆不同凡木生之皮有厚薄汁有多少者寧能同哉是以木之有花與葉而蚤發先生者不惟四時之難歷也遇春霜烈風亦花落而葉萎矣木之質脆皮薄者遇久曝大旱亦枝枯而葉萎矣木之皮薄汁多者遇久陰淫雨亦皮潰而漉矣濕腐為漉時或有卒風暴起則不分剛脆之木亦枝折而杌傷矣時逢秋霜疾風則不分剛脆之木亦根搖而葉落矣凡此五者尚為風所傷況於人乎然以人應木者正以木之所傷皆傷其枝枝有堅脆而堅者不至於有傷蓋必先傷其枝而後皮汁漸傷也人有常病於風者亦因其骨節皮膚腠理之不堅固而後漸入於腑臟耳何以異於木之先傷其枝者哉黃帝曰人之善病風厥漉汗者何經候之少俞答曰肉不堅腠理疏則善病風黃帝曰何以候肉之不堅也少俞答曰膕肉不堅而無分理理者粗理粗理而皮不致者腠理疏此言其渾然者理者之理當作衍此承上文而言善病風厥者以其腠理之疏也素問陰陽別論評熱病論篇皆有風厥素問瘧論及本經逆順篇皆言無刺漉漉之汗則風厥者其汗必漉漉然也少俞言肉不堅則腠理必疏為能病風然所以驗其肉之不堅者唯腓腸之上膝後曲處為膕乃委中穴所在也其肉不堅而無分理者其理必粗粗理而皮不堅緻則一身之腠理必疏所以善病風厥也此乃言其肉之渾然者則皮必密理不疏尚何病風之有黃帝曰人之善病消疸者何以侯之少俞答曰五臟皆柔弱者善病消疸黃帝曰何以知五臟之柔弱也少俞答曰夫柔弱者必有剛強剛強多怒柔者易傷也黃帝曰何以候柔弱之與剛強少俞答曰此人簿皮膚而目堅固以深者長沖直揚其心剛剛則多怒怒則氣上逆胸中畜積血氣逆留髖皮充肌血脈不行轉而為熱熱則消肌膚故為消疸此言其人暴剛而肌肉弱者也此承首節而言善病消疸者以其心則剛強而五臟與肌肉則柔弱也消疸者多飢渴而肉瘦疸則內熱也少俞言此人者五臟柔弱心則剛強剛強多怒五臟柔弱則易傷耳何也正以其皮膚甚薄肌肉甚弱其目堅固以深其人甚剛有長沖直揚之勢故心剛則多怒怒則氣上逆血為之積素問生氣通天論云大怒則形氣絶而血菀於上氣為之留皮膚肌肉為之充塞而血脈不能通所以蒸而為熱熱則消肌膚而消疸之病成矣黃帝曰人之善病寒熱者何以候之少俞答曰小骨弱肉者善病寒熱黃帝曰何以候骨之小大肉之堅脆色之不一也少俞答曰顴骨者骨之本也顴大則骨大顴小則骨小皮膚簿而其肉無䐃其臂懦懦然其地色殆然不與其天同色汗然獨異此其候也然後臂薄者其髓不滿故善病寒熱也此承首節而言善病寒熱者以其骨小肉弱色濁髓枯也蓋欲知骨小必驗顴骨顴骨者目下高骨乃骨之本也即顴有大小而周身之骨大小可驗則骨小者所以易病寒熱也欲知肉弱必驗周身之肉與兩手之臂今皮膚既薄而其肉無䐃無䐃者肉無分理也其臂懦懦然而弱則肉弱者所以易病寒熱也面有天地人三部其地色殆然不與其天同色汗然甚濁獨異於上中二部則色濁者所以易病寒熱也欲知髓之虛滿又驗臂之厚薄故臂薄者其骨必小其髓不滿惟髓不滿則腦為髓之府凡風池風府內通於腦而邪易入之所以易病寒熱也黃帝曰何以候人之善病痹者少俞答曰粗理而肉不堅者善病痹黃帝曰痹之高下有處於少俞答曰欲知其高下者各視其部此承首節而言善病痹者其人理粗肉脆而痹之所成其高下各視乎分部也黃帝曰人之善病腸中積聚者何以候之少俞答曰皮膚簿而不澤肉不堅而淖澤如此則腸胃惡惡則邪氣留止積聚乃傷脾胃之間寒溫不次邪氣稍至稸積留止大聚乃起此承首節而言善病腸中積聚者以其腸胃之惡也惡者猶俗云不好也蓋欲知腸胃之惡必驗之皮膚之薄而不潤澤不潤澤者無血也其肉不堅而反為淖澤淖澤者推之則移也如此則其在內之腸胃必惡惡則風寒暑濕之邪氣留止積聚以傷腸胃其衣食寒暖又不以次所以邪氣漸至而稸積留止至於大聚從此而日成矣大義詳見百病始生篇第六十六黃帝曰余聞病形已知之矣願聞其時少俞答曰先立其年以知其時時高則起時下則殆雖不陷下當年有沖通其病必起是謂因形而生病五變之紀也此承上文而言所以成病之時當明五變之紀也按素問六元正紀大論曰先立其年以明其氣金木水火土運行之數寒暑燥濕風火臨御之化則天道可見民氣可調即如太陽之政乃辰戌之紀也其年為太陽司天太陰在泉有勝復民病其初主氣自厥陰以至太陽固無所易其客氣自少陽以至太陽加於其上民病隨時而生故時高則病起時下則病殆時高者方臨方復之時也時下者勝者復而復者又勝也蓋病始為起病危為殆耳雖脈不陷下當年有沖通其病必起且其因形而生病如木形之人而病於戌癸之年乃五運以為五變之紀也即辰戌之紀餘歲可推矣大義詳見六元正紀大論中本臟第四十七內論本臟腑吉凶善惡故名篇黃帝問於岐伯曰人之血氣精神者所以奉生而周於性命者也經脈者所以行血氣而營陰陽濡筋骨利關節者也衛氣者所以溫分肉充皮膚肥腠理司開闔者也志意者所以御精神收魂魄適寒溫和喜怒者也是故血和則經脈流行營覆陰陽筋骨徑強關節清利矣衛氣和則分肉解利皮膚調柔腠理至密矣志意和則精神專直魂魄不散悔怒不起五臟不受邪矣寒溫和則六腑化谷風痹不作經脈通利肢節得安矣此人之常平也五臟者所以藏精神血氣魂魄者也六腑者所以化水穀而行津液者也此人之所以具受於夭也無愚智賢不肖無以相倚也然有其獨盡天壽而無邪僻之病百年不衰雖犯風雨卒音猝寒大暑猶有弗能害也有其不離屏蔽室內無怵惕之恐然猶不免於病何也願聞其故岐伯曰窘乎哉問也五臟者所以參天地副陰陽而連四時化五節者也五臟者固有小大高下堅脆端正偏傾者六腑亦有小大長短厚簿結直緩急凡此二十五者各不同或善或惡或吉或凶請言其方此詳言人之易感於邪者以臟俯之有善惡吉凶也善惡以體言吉凶以病言下文正詳言之心小則安邪弗能傷易傷以憂心大則憂不能傷易傷於邪心高則滿於肺中悗而善忘難開以言心下則臟外易傷於寒易恐以言心堅則臟安守固心脆則善病消疸熱中心端正則和利難傷心偏傾則操持不一無守司也此言心有善惡吉凶也心之小者則安外邪弗之能傷但內有所憂則易傷耳蓋心小者必多憂所以憂易傷之也若心大則憂不能傷而外邪反易傷之矣心之高者則心上之為肺當滿於肺中肺與心相著乃多煩悶而心竅不通必為健忘及難以善言開之也若心下則易傷於寒及易以言恐之矣心之堅者則臟安守固凡外邪不能入內憂不能恐若心脆則善病消疸熱中多內傷之病矣心之端正者則和利難傷凡外邪人言皆不能傷若心偏傾則其人操守不一無所守司由此觀之則心宜不大不小不高不下堅而不脆正而不偏斯謂之善也而可以免凶病矣下文肺肝脾腎亦猶是耳肺小則少飲不病喘喘肺大則多飲善病胸痹喉痹逆氣肺高則上氣肩息咳肺下則居賁迫肺善脅下痛肺堅則不病咳上氣肺脆則苦病消疸易傷肺端正則和利難傷肺偏傾則胸偏痛也此言肺有善惡吉凶也肺之高者則病上氣竦肩而息及為咳嗽消疸者消渴而疸熱也肝小則臟安無脅下之病肝大則逼胃迫咽迫咽則苦膈中且脅下痛肝高則上支賁切脅悗為息賁肝下則逼胃脅下空脅下空則易受邪肝堅則臟安難傷肝脆則善病消疸易傷肝端正則和利難傷肝偏傾則脅下痛也悗悶同此言肝有善惡吉凶也肝之高者則其經脈所行及所謂支別者上奔迫切脅下多悶當為息賁之證按素問刺禁論云肝生於左至真要大論王注言肝居下左則肝生於下胃當在上何為能下逼於胃意者在左為肝在右為脾肝與脾並故可以言下逼於胃也則王氏言肝生下左者謬矣脾小則臟安難傷於邪也脾大則苦湊䏚而痛不能疾行脾高則䏚引季脅而痛脾下則下加於大腸下加於大腸則臟苦受邪脾堅則臟安難傷脾脆則善病消疸易傷脾端正則和利難傷脾偏傾則善滿善脹也䏚音眇此言脾有善惡吉凶也䏚脅下軟肉處也腎小則臟安難傷腎大則善病腰痛不可以俯仰易傷以邪腎高則苦背膂痛不可以俯仰腎下則腰尻痛不可以俯仰為狐疝腎堅則不病腰背痛腎脆則苦病消疸易傷腎端正則和利難傷腎偏傾則苦腰尻痛也尻音敲腰骨此言腎有善惡吉凶也凡此二十五變者人之所苦常病也此結言五臟二十五異者人之苦於常病也二十五異者曰小大曰高下曰堅脆日端正曰偏傾也五臟則為二十有五矣黃帝曰何以知其然也岐伯曰赤色小理者心小粗理者心大無𩩲骬者心高𩩲骬小短舉者心下𩩲骬長者心下堅𩩲骬弱小以薄者心脆𩩲骬直下不舉者心端正𩩲骬倚一方者心偏傾也𩩲音結骬音於此言欲知心之善惡吉凶當驗之色理與𩩲骬也𩩲骬者胸下蔽骨也白色小理者肺小粗理者肺大巨肩反膺陷喉者肺高合腋張脅者肺下好肩背厚者肺堅肩背薄者肺脆背膺厚者肺端正脅偏疏者肺偏傾也疏當作竦此言欲知肺之善惡吉凶當驗之色理肩背膺脅喉脅之類也青色小理者肝小粗理者肝大廣胸反骹者肝高合脅兔骹者肝下胸脅好者肝堅脅骨弱者肝脆膺腹好相得者肝端正脅骨偏舉者肝偏傾也骹音交此言欲知肝之善惡吉凶當驗之色理胸骹膺腹之類也黃色小理者脾小粗理者脾大揭唇者脾高唇下縱者脾下唇堅者脾堅唇大而不堅者脾脆唇上下好者脾端正唇偏舉者脾偏傾也此言欲知脾之善惡吉凶當驗之色理與唇也黑色小理者腎小粗理者腎大高耳者腎高耳後陷者腎下耳堅者腎堅耳薄不堅者腎脆耳好前居牙車者腎端正耳偏高者腎偏傾也好去聲此言欲知腎之善惡吉凶當驗之色理與耳也凡此諸變者持則安減則病也此結言上文二十五異者善於持守則安而持守之功減則不免於病也帝曰善然非余之所問也願聞入之有不可病者至盡天壽雖有深憂大恐怵惕之志猶不能減也甚寒大熱不能傷也其有不離屏蔽室內又無怵惕之恐然不免於病者何也願聞其故岐伯曰五臟六腑邪之舍也請言其故五臟皆小者少病苦燋心大愁猶五臟皆大者緩於事難使以憂五臟皆高者好高舉措五臟皆下者好出人下五臟皆堅者無病五臟皆脆者不離於病五臟皆端正者和利得人心五臟皆偏傾者邪心而善盜不可以為人平反復言語也此言人有病有不病者以五臟之有善惡吉凶也黃帝曰願聞六腑之應岐伯答曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應此言五臟與六腑相合而亦有知六腑之法也腎合三焦者左腎合膀胱右腎合三焦也黃帝曰應之奈何岐伯曰肺應皮皮厚者大腸厚皮薄者大腸薄皮緩腹裡大者大腸大而長皮急者大腸急而短皮滑者大腸直皮肉不相離者大腸結此言欲知大腸當驗之皮也心應脈皮厚者脈厚脈厚者小腸厚皮薄者脈薄脈薄者小腸薄皮緩者脈緩脈緩者小腸大而長皮薄而脈衝小者小腸小而短諸陽經脈皆多紆屈者小腸結此言欲知小腸當驗之脈而脈又當驗之於皮也脾應肉肉䐃堅大者胃厚肉䐃麼者胃薄肉䐃小而麼者胃不堅肉䐃不稱身者胃下胃下者下脘約不利肉䐃不堅者胃緩肉䐃無小果纍者胃急肉䐃多少果纍者胃結胃結者上脘約不利也䐃音閫稱去聲此言欲知胃者當驗之肉䐃也肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪濡色赤者膽緩爪直色白無約者膽直爪惡色黑多紋者膽結也此言欲知膽者當驗之爪也腎應骨密理厚皮者三焦膀胱厚粗理薄皮者三焦膀胱薄疏腠理者三焦膀胱緩皮急而無毫毛者三焦膀胱急毫毛美而粗者三焦膀胱直稀毫毛者三焦膀胱結也此言欲知三焦膀胱者當驗之皮毫腠理也三焦為右腎之腑膀胱為左腎之腑觀三焦有厚薄緩急直結則分明有形者也後世難經以為有名無形者蓋未考此故耳若營衛生會篇之三焦則居於前者果有名而無形也按三因方云三焦者有脂膜如手大正與膀胱相對有二白脈自中出夾脊而上貫於腦有形可見有一舉子徐遁少嘗醫療病有精思曰齊嘗大飢群丐相臠而食有一人皮肉盡而骨脈全見右腎之下有脂膜如手大正與膀胱相對有二白脈自其中出夾脊而上貫腦此正所謂三焦也觀此則三焦有形昭昭矣黃帝曰厚簿美惡皆有形願聞其所病岐伯答曰視其外應以知其內臟則知所病矣此言視其外之所應而可以知內之所病也禁服第四十八服事也詩大雅板篇有我言維服內論脈有關格宜用灸刺藥法故名篇雷公問於黃帝曰細子得受業通於九針六十篇旦暮勤服之近者編絶久者簡垢然尚諷誦弗置未盡解於意矣外揣言澤束為一未知所謂也夫大則無外小則無內大小無極高下無度束之奪何士之才力或有厚薄智慮褊淺不能博大深奧自強於學若細子細子恐其散於後世絶於子孫敢問約之奈何黃帝曰善乎哉問也此先師之所禁坐私傳之也割臂血之盟也子若欲得之何不齊乎雷公再拜而起曰請聞命於是也乃齊宿三日而請曰敢問今日正陽細子願以受盟黃帝乃與俱入齊室割臂血黃帝親祝曰今日正陽血傳方有敢背此言者反受其殃雷公再拜曰細子受之黃帝乃左握其手右授之書曰慎之慎之吾為子言之凡刺之理經脈為始營其所行知其度量內刺五臟外刺六腑審察衛氣為百病母調真虛實虛實乃止瀉其血絡血盡不殆矣凡刺之理六句見前經脈篇此言凡刺之理當有渾束為一之妙不過以經脈為始而已不惟用針用藥亦然編者所以貫簡故近則編絶孔子讀易韋編三絶久則簡垢古人無紙以竹簡灸汗去青書之故書之者簡而貫之者編外揣前卷篇名也帝嘗謂九針者小之則無內大之則無外深不可為下高不可為蓋大小高深以理言非針形也恍惚無窮流溢無極而欲渾束為一伯乃以至明為要進之今雷公述而問之亦欲得渾束為一之方耳帝念其齊宿之誠遂行割臂血之盟乃以書而授之曰凡刺之理其要道在於經脈為始而已經脈者本經第十篇名乃十二脈經氣運行之經隧也運其所行如上言分其度量本經有脈度篇五臟為里故內刺五臟六腑為表故外刺六腑彼營氣者陰氣也既隨宗氣以行運於經隧之中惟衛氣者陽氣也乃自行於皮膚分肉之間故必審察衛氣實為百病之母也衛氣為百病之母其大義見素問生氣通天論中其百病有虛有實即人迎寸口脈以知之而正氣之虛則補邪氣之實則瀉則虛者實實者虛而虛實自止矣又血絡者病之可見者也前有血絡論從而瀉之庶血去盡而病不殆矣雷公曰此皆細子之所以通未知其所約也黃帝曰夫約方者猶約囊也囊滿而弗約則輸泄方成弗約則神與弗俱雷公曰願為下材者弗滿而約之黃帝曰未滿而知約之以為工不可以為天下師此言方成宜約而當以天下師自期也蓋約方猶之約囊囊滿而弗約則輸泄於外方成而弗約之則法雖在而無所主持故吾之神弗能與俱不可以愈病也神之為義前詳病傳篇第三節之下彼雷公雖以下材下工自謙不知帝之所以望之者為天下師也所謂天下師者唯知經脈篇為始耳下文正詳言之雷公曰願聞其工黃帝曰寸口主中人迎主外兩者相應俱往俱來若引繩大小齊等春夏人迎微大秋冬寸口微大如是者名曰平人此言寸口人迎之脈各有所主而合四時者為無病也寸口者居右手寸部即太淵穴去魚際一寸故曰寸口以其為脈氣之所會故又曰脈口又曰氣口寸口主中乃足手六陰經脈所見也人迎者居左手寸部蓋人迎乃足陽明胃經之穴名而其脈則見於此故即以人迎稱之以胃為六腑之先也人迎主外故左關為東為春左寸為南為夏所以謂左寸為外凡足手六陽經之脈必見於此右寸為秋為西右關為中央為長夏其兩尺則為北為冬所以謂右寸為內凡足手六陰經之脈必見於此然寸口之脈在內而出於外人迎之脈在外而入於內即如人迎一動為足少陽膽經寸口一動為足厥陰肝經則肝與膽相為表裡而一出一人兩經本相應也余經表裡可以類推見下文故俱往俱來若引繩齊等而春夏之時則人迎比寸口之脈為微大秋冬之時則寸口比人迎之脈為微大乃為平和無病之人也蓋曰微大則是平和之脈耳人迎大一倍於寸口病在足少陽一倍而躁病在手少陽人迎二倍病在足太陽二倍而躁病在手太陽人迎三倍病在足陽明三倍而躁病在手陽明盛則為熱虛則為寒緊則為痛痹代則乍甚乍間盛則瀉之虛則補之緊痛則取之分肉代則取血絡且飲藥陷下則灸之不盛不虛以經取之名曰經刺人迎四倍者且大且數名曰溢陽溢陽為外格死不治必審按其本末察其寒熱以驗其臟腑之病間去聲數音朔此言人迎大於寸口之脈可以驗足手六陽經之病而有治之之法也人迎較寸口之脈大者一倍則病在足少陽膽經若一倍而躁乃手少陽三焦經有病也躁者一倍之中而有更躁之意下文二倍三倍四倍其躁可以意會較寸口之脈大者二倍則病在足太陽膀胱經若二借而躁乃手太陽小腸經有病也較寸口之脈大者三倍則病在足陽明胃經若三倍而躁乃手陽明大腸經有病也其各陽經之脈盛則為熱虛則為寒脈緊則為痛痹脈代則病為乍甚乍間即下文之乍痛乍止也然所以治之者脈盛則分經以瀉之脈虛則分經以補之脈緊為痛痹則取其分肉之病在何經脈代則取其血絡使之出血及飲食以調之脈陷下者則血結於中中有著血血寒故宜灸之若不盛不虛則止以本經取之如一盛瀉膽以補肝二盛瀉膀胱以補腎之類茲則取之於膽而不取之肝取之膀胱而不取之腎之類也或用針或用灸或用藥止在本經而不求之他經故名之曰經刺也夫治法固已如此及夫人迎之脈大於寸口者四倍且大且數則陽脈甚盛名曰溢陽溢陽者為外格蓋格者拒也拒六陰脈於內而使不得運於外也其證當為死不治凡此者必宜審按其本末蓋先病為本而後病為末及察其寒熱以驗其臟腑之病可也寸口大於人迎一倍病在足厥陰一倍而躁病在手心主寸口二倍病在足少陰二倍而躁病在手少陰寸口三倍病在足太陰三倍而躁病在手太陰盛則脹滿寒中食不化虛則熱中出糜少氣溺色變緊則痛痹代則乍痛乍止盛則瀉之虛則補之緊則先刺而後灸之代則取血絡而後調之陷下則徒灸之陷下者脈血結於中中有著血血寒故宜灸之不盛不虛以經取之名曰經刺寸口四倍者名曰內關內關者且大且數死不治必審察其本末之寒溫以驗其臟腑之病此言寸口大於人迎之脈可以驗足手六陰經之病而有治之之法也寸口較人迎之脈大者一倍則病在足厥陰肝經若一倍而躁乃手厥陰心包絡經有病也較人迎之脈大者二倍則病在足少陰腎經若二倍而躁乃手少陰心經有病也較人迎之脈大者三倍則病在足太陰脾經若三倍而躁乃手太陰肺經有病也其各陰經之脈盛則為脹滿其胃中必寒而食亦不化虛則其中必熱而所出之糜亦不化且氣亦少溺色亦必變也脈緊則為痛痹脈代則為乍痛乍止然所以治之者盛則分經以瀉之虛則分經以補之緊則取其痛痹之分肉在於何經先刺而後灸之代則取其血絡使之出血及飲藥以調之脈陷下者則徒灸之徒但也脈既陷下則血結於中中有著血血結故宜灸之若不盛不虛則以本經取之或用藥或用針或用灸名之曰經刺也義見上節夫治法固已如此及夫寸口之脈大於人迎者四倍且大且數則陰經甚盛名曰內關內關者閉六陽在外而使之不得以入於內也其證當為死不可治凡此者必宜審按其本末及察其寒熱以驗其臟腑之病可也通其營輸乃可傳於大數大數曰盛則徒瀉之虛則徒補之緊則灸刺且飲藥陷下則徒灸之不盛不虛以經取之所謂經治者飲藥亦曰灸刺脈急則引脈大以弱則欲安靜用力無勞也此承上文而申言以叮嚀之正約方之大術數也凡為醫工者固以明經脈篇為始然必先明本經本輸篇如井滎輸經合之義則經脈始可明也遂可傳以大數如上文盛則徒瀉之等云也大數大義具本經終始篇所謂盛則徒瀉之者但瀉而無補也虛則徒補之者但補而無瀉也緊則為痛痹或灸或刺或飲藥三者可兼行也脈陷下則但灸之而已不盛不虛以經取之則取陽經者不取陰經取陰經者不取陽經此之謂經治其飲藥灸刺三者亦可兼行也且其脈急者可加導引之功或脈大而弱者則當主於安靜雖有用力不至大勞也此乃大法之所在即約方之要者而外揣渾束為一之義盡矣庶可以為天下師若未滿而約之則是不知經脈而欲知術數也僅足以為工耳豈非以下材自限者哉嗚呼帝割臂敵血而所言大術數者如此則醫門祕旨真在是矣雖言用針之法而用藥補瀉亦猶是也然則本輸經脈終始禁服等篇乃醫籍中至寶惜乎後世廢而不講萬古如長夜然痛哉五色第四十九篇內有五色言病之義故名篇雷公問於黃帝曰五色獨決於明堂乎小子未知其所謂也黃帝曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽必中百歲此節大義與前五閲五使篇第二節相同此言五色雖決於明堂而諸部亦宜廣大也五色獨決於明堂五閲五使篇之言而公舉以問之也雷公曰五官之辨奈何黃帝曰明堂骨高以起乎以直五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極五臟安於胸中真色以致病色不見明堂潤澤以清五官惡得無辨乎惡音烏此承上文而言五官之有辨也五閲五使篇有五官已辨之言而公亦舉以問之電鼻為明堂其骨貴高以起平以直五臟次於中央詳見第十一節六腑挾其兩側詳下第十一節眉間為闕顏為庭故庭即首面所以上於闕庭也下極在兩目之間繫心之部故曰王者所居之官在於下極以心為君主之尊也惟五臟能安於胸中則其真色已致病色不見明堂之色自然清潤此五官之可辨者如此雷公曰其不辨者可得聞乎黃帝曰五色之見也各出其色部部骨陷者必不免於病矣其色部乘襲者雖病甚不死矣此承上文而言五官之色可以辨病之生死也公以五色有不可辨者為疑帝言五官之色未有不可辨者也故五者之色各出其部分其何部之骨陷者必不免於病其何部之骨不至陷下而僅有五色相乘襲者雖病甚亦不至於死也雷公曰官五色奈何黃帝曰青黑為痛黃赤為熱白為寒是為五官此正言五官之色見於何部可以知其在中之病也雷公曰病之益甚與其方衰如何黃帝曰外內皆在焉切其脈口滑小緊以沉者病益甚在中人迎氣大緊以浮者其病益甚在外其脈口浮滑者病日進人迎沉而滑者病日損其脈口滑以沉著病日進在內其人迎脈滑盛以浮者其病日進在外脈之浮沉及人迎與寸口氣小大等者病難已病之在臟沉而大者易己小為逆病在腑浮而大者其病易已人迎盛堅者傷於寒氣口盛堅者傷於食此言病之間甚內外可切人迎脈口以知之也公以病之益甚方衰難知為疑帝言人迎主外脈口主內外內皆在其病可得而知也切其脈口而滑脈兼小及緊以沉者其病當在中而為益甚也切其人迎而脈氣既大兼緊以浮者其病當在外而為益甚也然脈口不但脈滑兼小及緊以沉者為益甚雖滑而帶浮者亦病必日進也人迎不但脈大兼緊以浮者為益甚若沉而帶滑則病可日減也由此觀之則脈口浮而帶滑者病固日進雖滑而帶沉者亦然但其病在內所謂一盛二盛三盛乃六陰經之為病也義見前篇人迎必沉而帶滑者幸得日損若盛以浮者必不能損而為日進但其病在外所謂一盛二盛三盛乃六陽經之為病也義見前篇不寧唯是醫工用指以脈之傷寒論曰脈之者本此人迎與寸口其脈氣或小或大相等者則外感內傷俱未盡減其病為難已也然病在六陰謂之在五臟也必沉而大者其病易已蓋沉為在內大則有力也若沉而帶小則病之在臟者未已也病在六陽謂之在六腑也必浮而大者其病易己蓋浮為在外大為易散也何以知人迎之為外感也惟其脈之盛而且堅是必傷於寒者所致耳何以知脈口之為內傷也惟其脈亦盛而且堅是必傷於食者所致耳雷公曰以色言病之間甚奈何黃帝曰其色粗以明沉夭者為甚其色上行者病益甚其色下行如雲徹散者病方已五色各有臟腑有外部有內部也色從外部走內部者真病從外走內其色從內走外者其病從內走外病生於內者先治其陰後治其陽反者益甚其病生於陽者先治其外後治其內反者益甚其脈滑大以代而長者病從外來目有所見志有所惡此陽氣之並也可變而已此言病之間甚內外可即色以知之而有治病之法也上文言以脈知病而此則公欲以色知病故帝言病之益甚者其色本粗以明而忽然沉夭不明者是也又其色上行於面部之上則邪氣有升而無降病之方為益甚若其色乃降於面部之下如雲徹散則邪氣有降而無升病之所以方衰也且其色各有五臟之分部有外部有內部其色從外部走內部者病必從外走內其色從內部走外部者病必從內走外所謂從內走外者即病生於內也內為陰經外為陽經當先治其陰後治其陽若先治其陽而後治其陰則病反甚矣所謂從外走內者即病生於外也外為陽經內為陰經當先治其陽後治其陰若先治其陰而後治其陽則病反甚矣此二段與素問標本病傳論靈樞病傳篇先治其本同意除腹脹大小不利而言耳既觀其色又觀其脈方為詳審其脈滑而帶大帶代帶長者皆陽脈也乃為病從外來其外證目有所妄見志有所妄惡乃陽氣之並於外也即當先治其陽後治其陰使之變焉而病已矣即此而推則其脈澀而帶小帶代帶短者皆陰脈也乃為病從內來其內證而目有所見志有所獨處乃陰氣之並於內也即當先治其陰後治其陽使之變焉而病亦已矣雷公曰小子聞風者百病之始也厥逆者寒濕之起也別之奈何黃帝曰常侯闕中簿澤為風沖濁為痹在地為厥此其常也各以其色言其病此言病有風有厥有痹者候之面部可知其病審之五色可分其臟也公以風為百病之始病乃上部所感厥逆為寒濕之起病乃下部所感何以別之為問帝言欲知風與痹者常候闕中其色薄而潤澤病之感風者也若沖濁而不清則病之為痹者耳至於沖濁之色見於地部面部下停則厥之為病也蓋厥自足經而上逆者耳此皆其常色可驗者若夫欲知五臟之分病則又以青為肝以赤為心以黃為脾以白為肺以黑為腎各以其色而分五臟之風痹厥也雷公曰人不病卒死何以知之黃帝曰大氣入於臟腑者不病而卒死矣雷公曰病小愈而卒死者何以知之黃帝曰赤色出兩顴大如母指者病雖小愈必卒死黑色出於庭大如母指必不病而卒死卒猝同母拇同此言人有不病而卒死者有病雖小愈而卒死者有其由與其驗也蓋不病而卒死者以大邪之氣入於臟腑也病雖小愈而卒死者以赤色出於兩顴大如母指者此其驗也拇指足大指也然不病而卒死者有黑色見於首面大如母指此亦其所驗也雷公再拜曰善哉真死有期乎黃帝曰察色以言其時雷公曰善乎願卒聞之黃帝曰庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當能別左右是謂大道男女異位故曰陰陽此言五臟六腑肢節之各有部分也上文言庭者顏也顏為額中而此以庭為首面者正以顏為最上乃面之首耳上文言闕者兩眉間也而此曰闕上者咽喉也以咽喉之部在眉間之上耳又曰闕中者肺也以闕之中即眉之間正為肺之部耳下極鼻柱也在兩目之間五臟肺為最高而肺下即心故曰下極者心也其心之直下者即鼻柱而下也為肝之部肝之左即為膽則在鼻挾顴之間矣其肝之下為脾方者鼻隧也面王者鼻隧之端也鼻隧之上即迎香之上為胃胃之外為大腸乃正顴之下大腸之外為腎則大腸為中央而胃與腎所以挾大腸也當腎者臍也面王以上為小腸面王以下為膀胱子處此乃五臟六腑之部也至於肢節亦各有部顴者所以應肩顴之後所以應臂臂之下所以應手又推而上之其目內眥之上所以應膺與乳也又推而下之頰外為繩挾繩而上者所以應背循牙車以下所以應股其中央所以應膝膝之以下所以應脛當脛以下為足其巨分者所以應股之裡巨屈者所以應膝臏此又肢節之部分也故嘗統而論之自額而下闕上屬首咽喉之部分也自闕中循鼻而下鼻端屬肺心肝脾腎五臟之部分也自目內眥挾鼻而下至承漿屬膽胃大腸小腸膀胱六腑之部分也自顴而下頰屬肩臂手之部分也自牙車而斜下頤屬股膝脛足之部分也故第二節曰五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極者此也是以見於面者各有部分惟其有此部分則當知病在陽經陰為之裡所以宜用陰以和陽也病在陰經陽為之表所以宜用陽以和陰也如終始篇瀉膽補肝瀉肝補膽之意明此部分斯有萬舉萬當之妙矣又能別其左右是謂能知大道也又能分別男女是謂能識陰陽也如下文所謂男子色在於面王者為小腹痛女子色在於面王者為膀胱子處之病者是也庭者首面也闕上者咽喉也闕中者肺也下極者心也直下者肝也肝左者膽也下者脾也方上者胃也中央者大腸也挾大腸者腎也當腎者臍也面王以上者小腸也面王以下者膀胱子處也男子色在於面王為少腹痛下為卵痛其圜直為莖痛若女子當為膀胱子處之病五臟次於中央六腑挾其兩側首面上於闕庭王宮在於下極明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也其間欲方大去之十步皆見於外如是者壽明堂骨高以起平以直明堂潤澤以清顴者肩也顴後者臂也臂下者手也目內眥上者膺乳也挾繩而上者背也循牙車以下者股也中央者膝也膝以下者脛也當脛以下者足也巨分者股里也巨屈者膝臏也此五臟六腑肢節之部也審察澤夭謂之良工沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散摶以知遠近視色上下以知病處積神於心以知往今故相氣不微不知是非屬意勿去乃知新故色明不粗沉夭為甚不明不澤其病不甚夭夭同摶團同相去聲此承上文而言審察部分之澤夭者可以悉知其病也部分有潤澤者有夭衰者能審察之謂之良工其色為沉為濁病乃在臟故為在內其色為浮為澤病乃在腑故為在外黃與赤者為有風青與黑者為有痛白者為有寒黃色而如膏之澤者為有膿赤甚者為有血然青黑雖為痛而痛甚者又為攣白者雖為寒而寒甚者又為皮膚之不仁不仁者不知痛癢也此五色者各見於部分之中必察其色之浮而可以知病之淺察其色之沉而可以知病之深察其色之澤而可以知功之成若夭則衰敗矣察其色之散而可以知病之近若傳聚則久矣視其色在上而可以知病於上若在下則病在下矣積神氣於已心而病之為已往為今病者皆能知之故相視氣色不能至於精微者不知病之為是為非惟屬意專心而無所搖奪則凡病之為新為故者洞然也且何以知病之為甚其色貴於明若明不能粗大而反見沉夭者病之所以為甚也何以知病之不甚其色雖貴於明澤然不明不澤而不至沉夭病之所以不甚也若此則沉夭者誠可慮耳其色散駒駒然未有聚其病散而氣痛聚未成也此承上文而言五色之散者其氣雖痛而聚則未成也駒駒然者色散如駒馬之逸也蓋聚之成否可即色之散聚以為驗故知色散而未有所聚則其病尚散所痛者不過氣耳聚安得而成乎腎乘心心先病腎為應色皆如是此承上文而言病有先克之色所以受克者為必病也上文言下極者心也心之色主赤挾大腸者腎也腎之色主黑今下極之色黑乃腎之乘心也故心先受病以腎色來克為之應耳然不惟心被腎克者為然凡肝部見肺色脾部見肝色肺部見心色腎部見脾色及六腑之相剋者皆如是法以推之耳男子色在於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝㿉陰之屬也女子在於面王為膀胱子處之病散為痛摶為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔圜圓同此言部分之色當分男女以知其病也男子之色在於面王鼻端當為小腹痛其色見於面王之下當為陰卵痛其色見於面王之下圓而且直當為莖垂痛凡色見於面部高者為本以男子屬陽陽在上也下者為首其色從上而之下似物之有首者向下而行故病在於內即如其色當如狐疝㿉陰之屬也女子之色在於面王當為膀胱經及妊子處之有病即胞絡官也其氣色散者為痛而不至成聚若氣色摶聚不散則成聚而不止於痛然其聚之在內者或方或圓或左或右各如其外色之形耳若其色隨而下行至於尾骶則其病之在下者當有淫浸之物素問痿論謂之白淫潤澤如膏之狀者在也不然則為暴食間即出不潔之物耳何也其下行之勢內外一致也左為左右為右其色有邪聚散而不端面色所指者也此又言部分之色當分左右以知其邪也凡男女之色見於左者則病必在左見於右者則病必在右其色有邪氣或聚散而不端正一如其面色所指即可以知其病耳色者青黑赤白黃皆端滿有別鄉別鄉赤者其色赤大如榆莢在面王為不日此又言五色各有別名其色粗者其病久也別者異也別鄉者即分部也所謂色者即青黑赤白黃之色皆端正盈滿各有分部假如心色主赤小腸亦赤其色如榆莢之大在於面王之部則是小腸有病非止於一日也其色上鋭首空上向下鋭下向在左右如法此又言五色上鋭則上向下鋭則下向而左右亦然也色者即上節五色也鋭氣色端尖鋭也首空者即上文顏為庭庭者首面也今曰首空猶云腦空也以五色命臟表為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也此又言五色屬於五臟而五臟各有所合乃為視色之總訣也蓋青色屬肝而肝合於筋故見其色之青者即可以知其為筋之病也餘臟仿此論勇第五十內論勇怯之士忍痛不忍痛故名篇黃帝問於少俞曰有人於此並行並立其年之長少等也衣之厚薄均也卒然遇烈風暴雨或病或不病或皆病或皆不病其故何也少俞曰帝問何急黃帝曰願盡聞之少俞曰春青風夏陽風秋涼風冬寒風凡此四時之風者莫所病各不同形黃帝曰四時之風病人如何少俞曰黃色薄皮弱肉者不勝春之虛風白色薄皮弱肉者不勝夏之虛風青色薄皮弱肉不勝秋之虛風赤色薄皮弱肉不勝冬之虛風也黃帝曰黑色不病乎少俞曰黑色而皮厚肉堅固不傷於四時之風其皮簿而肉不堅色不一者長夏至而有虛風者病矣其皮厚而肌肉堅者長夏至而有虛風不病矣其皮厚而肌肉堅者必重感於寒外內皆然乃病黃帝曰善此言人之受邪而有病否者以其色有不一皮有厚薄肉有堅脆也少俞言四時各有虛邪賊風在春名為青風在夏名為陽風在秋名為涼風在冬名為寒風人之色黃皮薄肉弱者主脾氣不足不能勝春之青風而為病木來剋土也色白皮薄肉弱者主肺氣不足不能勝夏之陽風而為病火來剋金也色青皮薄肉弱者主肝氣不足不能勝秋之涼風而為病金來剋木也色赤皮薄肉弱者主心氣不足不能勝冬之寒風而為病水來剋火也其所以成病者如此至於有不病者正以色黑而皮厚肉堅者不傷於四時之虛風若色黑而皮薄肉脆者則傷於長夏之虛風耳長夏虛風者見於六月而與陽風同也亦土能剋水之義耳彼黑色而皮厚肉堅者雖長夏之虛風亦不能傷之也豈特不傷於四時之風哉但色黑而皮厚肉堅者亦有四時而為病必其既感於風又重感於寒既病於內又感於外始有所病不然則未必成病也其異於他色之易病者遠矣黃帝曰夫人之忍痛與不恐痛者非勇怯之分也夫勇士之不忍痛者見難則前見痛則止夫怯士之忍痛者聞難則恐遇痛不動夫勇士之忍痛者見難不恐遇痛不動夫怯士之不忍痛者見難與痛目轉面盼恐不能言失氣驚顏色變化乍死乍生余見其然也不知其何由願聞其故少俞曰夫忍痛與不忍痛者皮膚之簿厚肌肉之堅脆緩急之分也非勇怯之謂也難去聲此言人之忍痛不忍痛者以其皮肉有不同而非由於勇怯之故也勇士有不忍痛者見難雖能向前而見痛則止彼怯士有能忍痛者見難雖恐而遇痛則不動也勇士有忍痛者見難固不恐而遇痛亦不動彼怯士之不忍痛者不分見難與痛目轉而盻恐懼不敢出一言退然失氣恍然而驚顏色卒變甚至乍死乍生也殊不知忍痛者正以皮厚肉堅且緩也不忍痛者正以皮薄肉脆且急也豈關於勇怯之故哉黃帝曰願聞勇怯之所由然少俞曰勇士者目深以固長沖直揚三焦理橫其心端直其肝大以堅其膽滿以傍怒則氣盛而胸張肝舉而膽橫肌裂而目揚毛起而面蒼此勇士之由然者也黃帝曰願聞怯士之所由然少俞曰怯士者目大而不減陰陽相失其焦理縱𩩲骬短而小肝系緩其膽不滿而縱腸胃挺脅下空雖方大怒氣不能滿其胸肝肺雖舉氣衰復下故不能久怒此怯士之所由然者也此論勇怯之士所以有不同也夫所謂勇士者兩目至深且不轉睛逃避而甚固有長沖直揚之勢內之三焦紋理橫生心則端正而直肝則甚大而堅膽則汁滿而橫下怯士不滿而縱則此曰滿而傍者義當為滿而橫也及其怒也氣盛而胸張肝舉而膽橫眥裂而目揚毛起而面蒼此皆勇士之所以然也夫所謂怯士者外目雖大而不深開閉相失轉睛不常也內之三焦紋理則縱𩩲骬之骨乃短而小本經本臟云𩩲骬小短舉者心下肝之系則緩膽則不滿而縱腸胃則挺然而不曲脅下則空而不堅雖方大怒氣不能滿其胸中肝葉雖舉氣衰復下所以不能久怒此乃怯士之所以然也黃帝曰怯士之得酒怒不避勇士者何臟使然少俞曰酒者水穀之精熟谷之液也其氣剽悍其入於胃中則胃脹氣上逆滿於胸中肝浮膽橫當是之時固比於勇士氣衰則悔與勇士同類不知避之名曰酒悖也此言怯士得酒而不避勇士之故也蓋酒為水穀之精熟谷之液此語又見營衛生會篇其氣則剽悍故人於胃中則胃脹氣逆胸滿肝浮膽橫斯時方將自比於勇士而不知避之至於酒氣既衰則悔此之謂因酒而悖逆者耳背腧第五十一論五臟之腧在背故名篇黃帝問於岐伯曰願聞五臟之腧出於背者岐伯曰背中大俞在杼骨之端肺俞在三焦之間心俞在五焦之間膈俞在七焦之間肝俞在九焦之間脾俞在十一焦之間腎俞在十四焦之間皆挾脊相去三寸所則欲得而驗之按其處應在中而痛解乃其俞也灸之則可刺之則不可氣盛則瀉之虛則補之以火補者毋吹其火須自滅也以火瀉者疾吹其火傳其艾須其火滅也焦當作憔後世作脾俞俞腧通用毋無同此言五臟之腧可灸不可刺而有補瀉之法也五臟之俞皆在於背故背中大腧在抒骨之端大俞者大抒穴也去中行督脈經大椎穴左右各開一寸半其肺俞以中行三椎為主心俞以中行五椎為主膈俞以中行七椎為主肝俞以中行九椎為主脾俞以中行十一椎為主腎俞以中行十四椎為主左右各開中行一寸半挾中行脊骨而計之則相去三寸所故欲得驗諸穴者乃按其處其中必應之而內痛乃解是乃五臟之各俞穴也但灸之則可刺之則不可故邪氣盛則瀉之正氣虛則補之凡以灸火而補之者毋次其火必待其火之自滅可也以灸火而瀉之者當疾吹其火即傳遞其艾以繼之須其火之速滅可也衛氣第五十二內所論不止衛氣止有其浮氣之不循經者為衛氣一句今以名篇者揭衛氣之為要耳黃帝曰五臟者所以藏精神魂魄者也六腑者所以受水穀而行化物者也其氣內於五臟而外絡支節其浮氣之不循經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環之無端亭亭淳淳乎孰能窮之然其分別陰陽皆有標本虛實所離之處能別陰陽十二經者知病之所主候虛實之所在者能得病之高下知六腑之氣街者能知解結契紹於門戶能知虛石當作實之堅軟者知補瀉之所在能知六經標本著可以無惑於天下此言營衛臟腑標本之難窮而能窮之者可以盡病法而高天下也人有五臟精神魂魄賴之以藏人有六腑水穀等物賴之以化六腑為表其氣內連於五臟而外則絡於支節人有三焦宗氣積於上焦營氣出於中焦衛氣出於下焦下焦之氣升於中焦以達於上焦而生此衛氣衛氣陽性剽悍行於皮膚分肉之間乃浮而在外者也故曰其浮氣之不循經者為衛氣營衛生會篇云衛在脈外中焦之氣降於下焦而生此營氣營氣陰性精專隨宗氣以行於經隧之中故曰其精氣之行於經者為營氣營在脈中衛氣晝行於陽經夜行於陰經營氣由肺經以行於十二經陰陽相隨外內相貫如環無端運行不息亭亭乎何其理之高且虛也淳淳乎何其理之渾且微也孰能窮之然所以公別陰陽諸經者皆有標本虛實之處故能分別手足之十二經者必能知病之所生在何經也能候諸經虛實之所在必能知病之為高為下也能知六腑之氣往來有街氣有往來之街見下文於足陽明胃經之氣街必能知所解所結所契所紹之門戶也契者合也紹者繼也能知病虛之為軟病實之謂堅者必能知刺法補瀉之所在也凡此者皆以其能知手足六經之標本故耳真能洞察乎此而非天下之所能惑矣前禁服篇云可以為天下師者此也岐伯曰博哉聖帝之論臣請盡意悉言之足太陽之本在跟以上五寸中標在兩絡命門命門者目也足少陽之本在竅陰之間標在窗籠之前窗籠者耳也足少陰之本在內踝下上三寸中標在背腧與舌下兩脈也足厥陰之本在行間上五寸所標在背腧也足陽明之本在厲兌標在人迎頰挾頏顙也足太陰之本在中封前上四寸之中標在背腧與舌本也此先言足六經之標本也足太陽膀胱經之本在於足外跟以上五寸中即附陽穴附陽本在外踝上三寸今曰跟上五寸則踝下至跟有二寸而踝上又三寸則當是附陽穴也其標在於兩絡命門命門者目也即睛明穴晴明左右有二故曰兩絡按本經根結篇言太陽根於至陰結於命門命門者目也足少陽膽經之本在竅陰之間足第四指端去爪甲如韭葉標在窗籠之前窗籠者耳也即聽宮穴也根結篇同足少陰腎經之本在內踝下上三寸中即交信穴其標在於背腎俞穴與舌下兩脈據根結篇當是廉泉穴也根結篇云少陰起於湧泉結於廉泉足厥陰肝經之本在行間上五寸所疑是中封穴標在背之肝俞穴根結篇云厥陰根於大敦結於玉英足陽明胃經之本在厲兌標在人迎頰挾頏顙也根結篇云陽明根於厲兌結於顙大顙大者鉗耳也足太陰脾之本在中封前上四寸之中疑是三陰交穴標在背之脾俞與舌本廉泉穴也根結篇云太陰根於隱白結於太倉手太陽之本在外踝之後標在命門之上一寸也手少陽之本在小指次指之間上二寸標在耳後上角下外眥也手陽明之本在肘骨中上至別陽標在顏下合鉗上也手太陰之本在寸口之中標在腋內動也手少陰之本在說骨之端標在背腧也手心主之本在掌後兩筋之間二寸中標在腋下下三寸也此言手六經之標本也手太陽小腸經之本在手外踝之後疑養老穴標在命門之上一寸疑是督脈經命門上即十三椎懸樞手少陽三焦經之本在手小指之四指間上二寸當是腋門穴標在耳後之上角當是絲竹空手陽明大腸經之本在肘骨中當是曲池穴上至別陽標在顏下合於鉗上疑是胃經頭維穴手太陰肺經之本在寸口之中即太淵穴標在腋內動脈即中府穴手少陰心經之本在鋭骨之端即神門穴標在背之心俞穴手心主即手厥陰心包絡經之本在掌後兩筋之間即內關穴標在腋下三寸即天池穴凡候此者下虛則厥下盛則熱上虛則眩上盛則熱痛故石當作實者絶而止之虛者引而起之此言治前各經標本之法也凡候手足諸經者在下為本本虛則厥盛則熱在上為標標虛則眩盛則熱而且痛故盛者實也當瀉之所謂絶其邪氣而止之者是也虛者當補之所謂引其正氣而起之者是也請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之於腦氣在胸者止之膺與背腧氣在腹者止之背腧與衝脈於臍左右之動脈者氣在脛者止之於氣街與承山踝上以下取此者用毫針必先按而在久應於手乃刺而豫之所治者頭痛眩僕腹痛中滿暴脹及有新積痛可移者易已也積不痛難已也此言氣行有街其止有所而有所刺之法及所治之病也首節帝言知六腑之氣街者能知解結契紹於門戶故以四街言之本經動輸篇有四街即此是也街者路也凡氣之行於頭者止之於腦氣之行於胸者止之膺與背腧胸之兩旁為膺背腧系膀胱經凡五臟六腑皆有腧氣之行於腹者止之背俞蓋五臟六腑在於腹中而其俞穴則在於背也又在前與足陽明胃經衝脈穴及臍左右之動脈即足陽明胃經之天樞穴也氣之行於足脛者止之於氣街此即足陽明胃經之氣衝穴一穴而二名者也及足太陽膀胱經之承山穴在腨下一寸半及外踝上下諸穴然凡取此四街宜用以九針論第七之毫針必先按其處而為時既久其所應手乃以針刺之其所治者在頭則主頭痛眩僕在腹則主腹痛中滿暴脹及有新積但積痛而可以移之者其病易已若有積而不痛則雖治之亦難已也論痛第五十三內有針石火焫之痛耐與不耐等義故名篇黃帝問於少俞曰筋骨之強弱肌肉之堅脆皮膚之厚薄腠理之疏密各不同其於針石火焫之痛何如腸胃之厚薄堅脆亦不等其於毒藥何如願盡聞之少俞曰人之骨強筋弱肉緩皮膚厚者耐痛其於針石之痛人焫亦然黃帝曰其耐火焫者何以知之少俞答曰加以黑色而美骨者耐火焫黃帝曰其不耐針石之痛者何以知之少俞曰堅肉薄皮者不耐針石之痛於火焫亦然此言人於針石火焫有耐痛與不耐痛之異也毒藥之勝與不勝分見末節針石者古人以石為針也火焫者艾火也人之骨強筋弱肉緩皮膚厚者必耐於痛凡針石火焫皆然也然耐火焫者又加以黑色而其骨美耳人之肉堅皮薄者不耐於痛凡針石火焫皆然也黃帝曰人之病或同時而傷或易已或難已其故何如少俞曰同時而傷其身多熱者易已多寒者難已此言人有同病而有易已難已之分也蓋多熱則邪猶在表故易已多寒則邪入於裡故難已耳黃帝曰人之勝毒伺以知之少俞曰胃厚色黑大骨及肥者皆勝毒故其瘦而薄胃者皆不勝毒也勝平聲此承上文而言人於毒藥有勝與不勝之異也天年第五十四內以百歲為論故名篇黃帝問於岐伯曰願聞人之始生何氣築為基何立而為楯何失而死何得而主岐伯曰以母為基以父為楯失神者死得神者生也楯音盾素問移精變氣論云得神者昌失神者亡此言人之始終皆有所以然之故也方其始生賴母以為之基坤道成物也賴父以為之楯陽氣以為捍衛也故失父母之神氣則死若守神氣則生矣黃帝曰何者為神岐伯曰血氣己和營衛已通五臟已成神氣舍心魂魄畢具乃為成人此承上文而言人之所以得神則生也人有血氣皆已融和人有營衛皆己通和心之志為神皆舍於心肝之神為魂肺之神為魄皆已畢具此則人之所以為人而得此者則生也黃帝曰人之壽夭各不同或夭壽或卒死或病久願聞其道岐伯曰五臟堅固血脈和調肌肉解利皮膚緻密營衛之行不失其常呼吸微徐氣以度行六腑化谷津液布揚各如其常故能長久卒去聲此言人有壽夭生死之殊當觀其壽者而可以推夭者之反是也黃帝曰人之壽百歲而死何以致之岐伯曰使道隊以長基牆高以方通調營衛三部三里起骨高肉滿百歲乃得終隊隧同使去聲此言人之百歲而終者之由也使道者水溝也俗云人中其隊道以長面之地部為基耳為蔽為牆乃高以方營衛之氣皆已通調而面之三里即三部也俗云三亭皆已聳起其骨高其肉滿所以百歲乃得終也黃帝曰其氣之盛衰以至其死可得聞乎岐伯曰人生十歲五臟始定血氣己通其氣在下故好走二十歲血氣始盛肌肉方長故好趨三十歲五臟大定肌肉堅固血脈盛滿故好步四十歲五臟六俯十二經脈皆大盛以平定腠理始疏榮華頽落發頗斑白平盛不搖故好坐五十歲肝氣始衰肝葉始薄膽汁始滅目始不明六十歲心氣始衰善憂悲血氣懈惰故好臥七十歲脾氣虛皮膚枯八十歲肺氣衰魄離故言善誤九十歲腎氣焦四臟經脈空虛百歲五臟皆虛神氣皆去形骸獨居而終矣此言人之十歲至於三十以漸而盛四十至於百歲以漸而衰也其氣在下氣盛於足之六經也趨者較走更疾矣步者較趨更緩矣坐者較步似倦矣至五十歲以後則肝生心心生脾脾生肺肺生腎者每十歲而日衰故五十歲肝膽衰六十歲心氣衰七十歲脾氣衰八十歲肺氣衰九十歲腎氣衰百歲五臟俱衰善憂悲者以心主於憂也好臥者衛氣不精也魄離故以肺藏魄者失其故處也言善誤肺主言也腎氣焦者水竭則焦也黃帝曰其不能終壽而死者何如岐伯曰其五臟皆不堅使道不長空外以張喘息暴疾又卑基牆薄脈少血其肉不石數中風寒血氣虛脈不通真邪相攻亂而相引故中壽而盡也數音朔中去聲此言人之中壽而盡者以內虛而外盛也五臟皆脆較之五臟堅固者異也水溝不長較之使道隊以長者異也其鼻孔向外而張鼻為肺竅肺氣泄矣師傳篇云鼻孔在外膀胱漏泄又肺主氣今肺氣不足故喘息而為暴疾也基牆甚卑較之基牆高以方者異也脈薄血少而肉脆較之骨高肉滿者異也數中風寒者以其血氣虛脈道不通所以真邪相攻而相引也真為正氣邪為邪氣也
