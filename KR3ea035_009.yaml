而在足手太陽經水下十四刻則衛氣在足手少陽經水下十五刻則衛氣在足手陽明經水下十六刻則衛氣又間行足少陰腎經之分水下十七刻則衛氣又出而在足手太陽經水下十八刻則衛氣在足手少陽經水下十九刻則衛氣在足手陽明經水下二十刻則衛氣又間行於足少陰腎經之分水下二十一刻則衛氣又出而在足手太陽經水下二十二刻則衛氣在足手少陽經水下二十三刻則衛氣在足手陽明經水下二十四刻則衛氣又間行於足少陰腎經之分水下二十五刻則又出而在足手太陽經此乃半日之間所行之度也至於再行半日從房至畢行一十四舍則水下五十刻矣又日行半度轉行一舍則水下三刻與七分刻之四水下三刻一分二釐半大要曰常以日之加於宿上也人氣在太陽之字衍大要曰日加於各宿之上故日行一舍人氣行三陽行於陰分常如是無已日行一舍則氣行於三陽而又入於足少陰腎經之分常如是無已也與大地同紀紛紛然𤽉𤽉然氣雖似亂而似章終而復始一日一夜水下百刻而盡矣九宮八風第七十七內論九宮八風故名篇太乙常以冬至之日居葉蟄之宮四十六日明日居天留四十六日明日居倉門四十六日明日居陰洛四十五日明日居天宮四十六日明日居玄委四十六日明日居倉果四十六日明日居新洛四十五日明日復居葉蟄之宮日冬至矣太乙日遊以冬至之日居葉蟄之宮數所在日從一處至九日復反於一常如是無己終而復始太乙移日天必應之以風雨以其日風雨則吉歲美民安少病矣先之則多雨後之則多汗太乙在冬至之日有變占在君太乙在春分之日有變占在相太乙在中宮之日有變占在吏太乙在秋分之日有變占在將太乙在夏至之日有變占在百姓所謂有變者太乙居五宮之日病風折樹木揚沙石各以真所主占貴賤因視風所從來而占之風從其所居之鄉來為實風主主長養萬物從其沖後來為虛風傷人者也主殺主害者謹候虛風而避之故聖人日避虛邪之道如避矢石然邪弗能害此之謂也立夏四陰洛東南方夏至九上天南方立秋二玄委西南方春分三倉門東方招搖五中央秋分七倉果西方立春八天留東北方冬至一葉蟄北方立冬六新洛西北方此言太乙居九宮之日各有所忌也太乙者歲神也素問六微旨大論有太乙天符為貴人此則不止天符年常以冬至之日居於坎方葉蟄之官計有四十六日至次日乃第四十七日也則為立春而居於良方之天留宮亦計四十六日連前共計九十二日至次日乃第九十三日也則為春分而居於震方之倉門宮亦計四十六日連前共計一百三十八日至次日乃一百三十九日也則為立夏而居於巽方之陰洛宮亦計四十五日連前共計一百八十三日至次日乃一百八十四日也則為夏至而居於離方之上天宮亦計四十六日連前共計二百二十九日至次日乃二百三十日也則為立秋而居於坤方之玄委宮亦計四十六日連前共計二百七十四日至次日乃二百七十五日也則為秋分而居於兌方之倉果宮亦計四十六日連前共計三百二十一日至次日乃三百二十二日也則為立冬而居於乾方之新洛宮亦計四十五日連前共計三百六十五日至次日乃來歲之冬至又居坎方之葉蟄宮矣其太乙所遊之日假如冬至居葉蟄之宮照圖數所在之日從一處至九冬至為一立秋為二春分為三立夏為四中央為五立冬為六秋分為七立春為八夏至為九復反於冬至之一常如是輪之無已終而復始遇太乙移日天必應之以風雨此日有風雨則必歲美民安少病先於所移之日而有風雨則天必多雨後於所移之日而有風雨則民必多汗不唯是也太乙在冬至之日有變當占在君在春分之日有變當占在相在中官之日有變當占在吏在秋分之日有變當占在將在夏至之日有變當占在百姓所謂有變者太乙居五官之日曰五官者東南西北中央也所病者病猶惡也有大風折木揚沙石各以其所主之官與其分之貴賤如君相吏將民之謂也其風從所居之鄉來如冬至來自北方春分來自東方之謂是之謂實風也主生長以養萬物者或從其沖後而來如冬至從南西二方而來春分從西北二方而來夫是之謂虛風也主殺害以傷人者謹宜候此虛風而避之唯聖人避之如矢石所以邪弗能害也按本經歲露篇以太乙冬至居葉蟄宮而風雨從南方來者為虛風立春之日而風雨從西方來者為虛風則此篇所謂從後來者為虛風須知東以西與北為後南以北與東為後西以東與南為後北以南與西為後也是故太乙徙立於中宮乃朝八鳳以占吉凶也風從南方來名曰大弱風其傷人也內舍於心外在於脈氣主熱風從西南方來名曰謀風其傷人也內舍於脾外在於肌其氣主為弱風從西方來名曰剛風其傷人也風舍於肺外在於皮膚其氣主為燥風從西北方來名曰折風其傷人也內舍於小腸外在於手太陽脈脈絶則溢脈閉則結不通善暴死風從北方來名曰大剛風其傷人也內舍於腎外在於骨與肩背之膂筋其氣主為寒也風從東北方來名曰凶風其傷人也內舍於大腸外在於兩脅腋骨下及肢節風從東方來名曰嬰兒風其傷人也內舍於肝外在於筋紐其氣主為身濕風從東南方來名曰弱風其傷人也內舍於胃外在肌肉其氣主體重此八風皆從其虛之鄉來乃能病人三虛相搏則為暴病卒死兩實一虛病則為淋露寒熱犯其雨濕之地則為痿故聖人避風如避矢石焉其有三虛而偏中於邪風則為擊僕偏枯矣此又言朝八風可以占吉凶也南方屬火主於熱人之心應之通於脈故風從南方來者名曰大弱風其傷人內舍於心而外在於脈其氣主於為病之熱也西方屬金主於燥人之肺應之通於皮膚故風從西方來者名曰剛風其傷人內舍於肺而外在於皮膚其氣主於為病之燥也北方屬水主於寒人之腎應之通於骨故風從北方來者名曰大剛風其傷人內舍於腎而外在於骨及肩背內之膂筋膂筋之義詳歲露論中其氣主於為病之寒也東方屬木主於風濕人之肝應之通於筋紐其氣主於肝為病之風濕也夫東方主風而曰濕病者以風為嬰兒其氣尚柔不能勝濕故也其間西南方來者為謀風內傷於脾而外在於肌其氣主為弱東南方來者為弱風以未主於土也內傷於胃而外在肌肉其氣主體重戊辰亦主土也西北方來者為折風內傷於小腸而外在手太陽之脈東北方來者為凶風內傷於大腸而外在兩脅旁骨下及肢節以大腸與別腑不同皆能受傷者也此八風者皆從其沖後來為虛風即虛之鄉來也如立冬而風從南方西方來立春而風從北方西方來立夏而風從北方東方來立秋而風從南方東方來者是也三虛者據素問刺法本病二篇則以人憂愁思慮傷心及汗出於心驚而奪精為人二虛遇司天失守為天之虛為三虛據後歲露論以乘年之虛為一虛即司天失守是也逢月之虛為一虛即月郭空則海水東盛云云是也失時之和為一虛即春應暖而反寒之盛是也據此篇其人已虛其風又虛其歲又虛是謂三虛三虛相搏則為暴病卒死矣假如人實歲實而風虛則止為淋露寒熱蓋人為露所淋必發為寒熱也或犯其雨濕之地則為痿病故聖人避此虛邪之風如避矢石若有三慮而為邪風偏中之則又為擊僕為偏枯矣擊僕者如擊之而僕暈也偏枯者或左或右偏枯也九針論第七十八篇內第一節詳論九針故名篇自天忌至末皆用針者之當知故並及之凡內經全書之論針者皆不出此九針耳真萬言一律也黃帝曰余聞九針於夫子衆多博大矣余猶不能寤悟同敢問九針焉主何因而有名岐伯曰九針者天地之大數也始於一而終於九故曰一以法天二以法地三以法人四以法時五以法音六以法律七以法星八以法風九以法野黃帝曰以針應九之數奈何岐伯曰夫聖人之起無地之數也一而九之故以立九野九而九之九九八十一以起黃鐘數焉以針應數也一者無也天者陽也五臟之應天者肺肺者五臟六腑之蓋也皮者肺之合也人之陽也故為去聲之治針必以大其頭而鋭其末令平聲下同無得深入而陽氣出二者地也人之所以應土者肉也故為之治針必筒其身而圓其末令無得傷肉分傷則氣得竭三者人也人之所以成生者血脈也故為之治針必大其身而圓其末令可以按脈勿陷以至其氣令邪氣獨出四者時也時者四時八風之客於經絡之中為瘤病者也故為之治針必筒其身而鋒其末令可以瀉熱出血而痼病竭五者音也音者冬夏之分分於子午陰與陽別寒與熱爭兩勻相搏合為癰膿者也故為之治針必令其末如劍擇可以取大膿六者律也律者調陰陽四時而合十二經脈虛邪客於經絡而為暴痹者也故為之治針必令尖如犛毫同且圓且鋭中身微大以取暴氣七者星也星者人之七竅邪之所客於經而為痛痹舍於經絡者也故為之治針令尖如蚊虻喙靜以徐往微以久留正氣因之真邪俱往出針而養者也八者風也風者人之股肱八節也八正之虛風八風傷人內舍於骨解腰脊節腠理之間為深痹也故為之治針必長其身鋒其末可以取深邪遠痹九者野也野者人之節解皮膚之間也淫邪流溢於身如風水之狀而溜不能過於機關大節者也故為之治針令小大如挺其鋒微圓以取大氣之不能過於關節者也黃帝曰針之長短有數乎岐伯曰一曰鑱針者取法於巾針去末寸半卒鋭之長一寸六分主熱在頭身也二曰圓針取法於絮針筒其身而卵其鋒長一寸六分主治分肉間氣三曰匙音低針取法於黍粟之鋭長三寸半主按脈取氣令邪出四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血五曰鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱爭者也六曰圓利針取法於犛針微大其末反小其身令可深內納同也長一寸六分主取癰痹者也七曰毫針取法於毫毛長一寸六分主寒熱痛痹在絡者也八曰長針取法於綦針長七寸主取深邪遠痹者也九曰大針取法於鋒針其鋒微圓長四寸主取大氣不出關節者也針形畢矣此九針大小長短法也此節當與素問針解篇第二節參看此言九針所以應天地之數而詳其大小長短之法也夫九針者應天地之大數一以法天二以法地三以法人四以法四時五以法五音六以法六律七以法七星八以法八風九以法九野正以聖人起天地之數一以至九故分天下為九野若九而九之則為八十一乃黃鐘之數亦然也以針應數故制之為九針耳其針之曰第一者所以應天也天屬陽而五臟之應天者唯肺肺為五臟之華蓋皮則為肺之合乃人之陽也故為之治針者其頭大象天之陽也其末鋭令無得深入而使陽氣出也故下文一曰鑱針者取法於巾針其頭雖大其近末約寸半許而漸鋭之計長一寸六分主熱在頭身者用之正以出陽氣也其針之曰第二者所以應地也地為土而人之應土者唯肉故為之治針者其身雖筒筒以竹為之其體直故謂直為筒其末則圓令無得傷肉分則邪得竭故下文二曰圓針取法於絮針筒其身而卵其鋒長一寸六分主治分肉之氣也其針之曰第三者所以應人也人之所以成其身而得生者唯血脈故為之治針者其身則大其末必圓令可以按脈而勿陷以致復其正氣令邪氣獨出耳故下文三曰匙針取法於黍粟之鋭長三寸半主按脈取氣令邪氣之出也其針之曰第四者所以應四時也四時有八風而客於經絡之中乃為瘤病瘤者留也痼病也故為之治針者必筒其身而鋒其末令可以瀉其熱出其血而使痼病之得竭故下文四曰鋒針取法於絮針其身則簡其末則鋒長一寸六分主癰熱出血也其針之曰第五者所以應五音也夫五音主冬夏之分以子午而分所以為病者陰與陽別寒與熱爭兩氣相搏合為癰膿故為之治針者令其末如劍鋒可以取大膿也故下文五曰鈹針取法於劍鋒廣二分半長四寸主大癰膿兩熱相爭者也其針之曰第六者所以應六律也六律所以調陰陽四時而合於人身之十二經脈令虛邪客於經絡而為暴痹故為之治針者必令其尖如犛且圓且鋭其中身則微大所以取此暴氣也故下文六曰圓利針取法於犛針其末微大其身反小令可深納其針長一寸六分主取癰痹者也其針之曰第七者所以應七星也天有七星人有七竅為邪之所客則舍於經絡而為痛痹故為之治針者令尖如蚊虻之喙靜以徐往微以久留則正氣因之而復其真邪雖俱往以出針而可以養其正氣不使之外泄也故下文七曰毫針取法於毫毛長一寸六分主治寒熱痛痹在絡者也其針之曰第八者所以應八風也人之手足各有股肱關節計八今八正之虛風一至二分四立為八正合於東西南北東南西南西北東北之八風即八風以傷人則內於骨解腰脊節腠理之間為深痹故為之治針者必長其身鋒其末而可以取深遠之痹故下文八曰長針取法於綦針長七寸正主於取深遠之邪痹也其針之曰第九者所以應九野也人之節解皮膚之間似地之有九野而淫邪流洗於身如風水狀其流不能過於機關大節故為之治針者令其小狀可大如鋌其鋒微圓可以取大氣之不能過於關節故下文九曰大針者取法於鋒針其鋒微圓正以取大氣不能過關節者也按此九針本經九針十二原九針及此三篇相同後世不明此九針而又妄於用針穴不分經補瀉無法夭札多矣九針之圖一曰鑱針其頭大其末鋭取法於中針至末寸半漸鋭之長一寸六分主熱在頭身用之二曰圓針筒其身卵其鋒取法於絮針長一寸六分主治分肉間氣滿用之三曰匙針其身大其末圓取法於黍粟之鋭長三寸半主按脈取氣令邪氣出四曰鋒針筒其身鋒其末取法於絮針長一寸六分主癰熱出血用之五曰鈹針其末如劍鋒可以取大膿廣二分半長四寸主大癰膿用之六曰圓利針尖如犛且圓且鋭微大其末反小其身取法於毫針長一寸六分主取癰痹七曰毫針尖如蚊虻喙取法於毫毛長一寸六分主寒熱痛痹在絡八曰長針長其針鋒其末取法於綦針長七寸主取深邪遠痹九曰大針其鋒微圓取法於鋒針長四寸主取大氣不出關節黃帝曰願聞身形應九野奈何岐伯曰請言身形之應九野也左足應立春其日戊寅己丑左脅應春分其日乙卯在手應立夏其日戊辰己巳膺喉首頭應夏至其日丙午右手應立秋其日戊申己未右脅應秋分其日辛酉右足應立冬其日戊戌己亥腰尻下竅應冬至其日壬子六腑膈下三臟應中州其大禁大禁太乙所在之日及諸戊己凡此九者善候八正所在之處所主左右上下身體有癰腫者欲治之無以其所直之日潰治之是謂天忌日也天忌見素問八正神明論前官能篇此節當參前九宮八風圖看此言身形之應九野而天忌乃所當知也人之左脅應春分而乙卯日屬木居左故應之右脅應秋分而辛酉日屬金居右故應之膺喉首頭應夏至而丙丁日屬火居南故應之腰尻下竅應冬至而壬子日屬水居北故應之至於左足應立春戊寅己丑日應之蓋戊己主土兼四方而寅醜則居東北方也右足應立冬戊戌己亥日應之蓋戊己主土兼四方而戌亥則應西北方也左手應立夏戊辰己已日應之蓋戊己主土兼四方而辰已則應東南方也右手應立秋戊申己未應之蓋戊己主土兼四方而申未則居西南方也六腑與膈下之脾肝腎三臟應於中州乃大禁者也蓋大禁在諸戊己之日而太乙所在之日即如冬至居葉蟄立春居天留之類是也亦宜禁之凡此九者善候八正所在之處則主左右上下身體有癰腫者苟欲治之無以其所值之日治而潰之是乃天忌之日不可以輕犯也太乙神人身形應九野天忌歌按後世針灸法最忌九官尻神九部尻神十二部尻神此固當遵然前九宮八風篇內有太乙所在九宮及此篇身形應九野乃神聖所言尤合五行九宮八卦大義今舊有太乙神人歌凡針灸破癰者切宜忌之立春艮土起天留戊寅己丑左足求春分左脅倉門震乙卯日見定為仇立夏戊辰己巳巽陰洛宮中左手愁夏至上天丙午日正值膺喉離首頭立秋玄委宮右手戊申己未坤上游秋分倉果西方兌辛酉還從右脅謀立冬右足加新洛戊戌己亥乾位收冬至坎方臨葉蟄壬子腰尻下竅流五臟六腑並臍腹招搖諸戊己中州形樂志苦病主於脈治之以灸刺形苦志樂病生於筋治之以尉引形樂志樂病生於肉治之以針石形苦志苦病生於咽喝治之以甘藥形數驚恐筋脈不通病主於不仁治之以按摩醪藥是謂形喝當作嗌按素問血氣形志論與此節同但彼曰病生於咽嗌者為是彼曰治之以百藥此曰甘藥者是彼末句云是謂五形志也此節末句有缺此言病有形志之苦樂不同而治之者亦異也形在外志在內有等外形雖樂而內志則苦故志屬於心心合於脈所以病在於脈也當灸刺隨宜以治之有等外形雖苦而內志則樂則筋以勞而傷所以病生於筋也當以火尉導引治之有等外形既樂而內志亦樂則血氣凝滯病生於肉當以針石治之有等外形既苦而內志亦苦則血氣枯焦病生於咽嗌當以甘和之藥治之有等形受勞苦數被驚恐筋與血脈皆不相通則病生為不仁不仁者痛癢不知也當按摩酒藥兼用之是皆五形五志之受病者如此邪氣臟腑病形篇終始篇俱有調以甘藥五臟氣心主噫肺主咳肝主語脾主吞腎主缺此與素問宣明五氣篇同此言五臟之氣為病也按三部九候論曰心為噫脈解篇云所謂上走心為噫者陰盛而上走陽明陽明絡屬心故上走心為噫也本經口問篇黃帝曰人之噫者何氣使然岐伯曰寒氣客於胃厥逆從下上散復出於胃故為噫夫曰心為噫又曰寒氣轉於胃正以心氣主噫而胃又有寒故從之而轉耳至於本經經脈篇論脾之為病亦曰善噫蓋脾胃之病無以異也玉篇云噫飽出息也又曰氣轉也論語云噫半箕之人朱注云心不平聲海篇云痛聲也理以飽出息及氣轉為是朱注與海篇皆儒書義也素問陰陽應象大論言肺在變動為咳故肺主於咳也又陰陽應象大論言肝在聲為呼而此曰語者彼言聲而此言病也吞者海篇曰食咽也然病時氣亦能吞也缺者張口轉氣也口問篇黃帝曰人之缺者何氣使然岐伯曰衛氣晝日行於陽夜半則行於陰陰者主夜夜者臥陽者主上陰者主下故陰氣積於下陽氣未盡陽引而上陰引而下陰陽相引故數缺六腑氣膽為怒胃為氣逆噦大腸小腸為泄膀胱不約為遺溺下焦溢為水宣明五氣篇與此大同此言六腑之氣為病也陰陽應象大論曰肝在志為怒而此曰膽為怒者以肝與膽為表裡也胃力氣逆為噦者蓋胃為水穀之海惟胃氣不和則氣逆按靈樞口間篇岐伯曰谷入於胃胃氣上注於肺今有故寒氣與新穀氣俱還入於胃新故相亂真邪相攻氣並相逆復出於胃故為噦大腸小腸為泄者蓋大腸為傳道之腑小腸為受盛之腑今受盛之氣既虛傳道之司不禁故為泄利之證也膀胱不約為遺溺素問靈蘭祕典論曰膀胱者州都之官津液藏焉氣化乃能出矣又脈要精微論曰水泉不止者是膀胱不藏也今膀胱之氣不足而不能藏故為遺溺如此也下焦溢為水此下焦者即營衛生會篇上中下之下焦也下焦之氣不足故泛溢之為水病耳按水之為證見素問陰陽別論平人氣象論靈樞水脹論論病診尺等篇五味酸入肝辛入肺苦入心甘入脾鹹入腎淡入胃是謂五味此節與宣明五氣篇五味所入亦同但此多淡入胃一句此言五味之人五臟也五並精氣並肝則憂並心則喜並肺則悲並腎則恐井脾則畏是謂五精之氣並於臟也此與宣明五氣篇亦同但彼末有云虛而相併者也此言五臟之精氣並於所虛之臟也陰陽應象大論曰肝在志為怒心在志為喜腎在志為恐今肝虛而餘臟精氣得以並之則為憂夫在志為怒而此曰憂者以肺氣得以乘之也心虛而餘臟精氣得以並之則為喜蓋喜者固其所志而太過於喜則為病也肺虛而餘臟精氣得以並之則為悲夫在志為憂而此曰悲者憂甚則悲也腎虛而餘臟精氣得以並之則為恐脾虛而餘臟精氣得以並之則為畏夫在志為思而此曰畏以過思則畏勝也此乃五臟之氣虛而相併者也五惡肝惡風心惡熱肺惡寒腎惡燥脾惡濕此五臟氣所惡者也此與宣明五氣篇同此言五臟所惡之邪也肝屬厥陰木其性與風氣相通而感風則傷筋故惡風心屬少陰火其性與暑氣相通而受熱則傷脈故惡熱肺屬手太陰金其性本寒故惡寒腎屬足少陰水其性喜潤故惡燥脾屬足太陰土其性喜燥故惡濕五液心主汗肝主淚肺主涕腎主唾脾主涎此五液所出也此與宣明五氣篇同此言五臟各有液也五勞久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋此五久勞所病也此與宣明五氣篇同此言五臟久勞各有所傷也久視者必勞心故傷血久臥者必勞肺故傷氣久坐者必勞脾故傷肉久立者必勞腎故傷骨久行者必勞肝故傷筋五走酸走筋辛走氣苦走血咸走骨甘走肉是謂五走也此節宣明五氣篇之五味所禁較此更詳此言五味各有所走也宣明五氣篇曰辛走氣氣病無多食辛咸走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是謂五禁無令多食五裁病在筋無食酸病在氣無食辛病在骨無食鹹病在血無食苦病在肉無食甘口嗜而欲食之不可多也必自裁也命曰五裁此與宣明五氣篇同此言五味之有五裁即上節之義也五發陰病發於骨陽病發於血陰病發於肉陽病發於冬陰病發於夏此與宣明五氣篇同此言五臟之病有所發也腎為少陰主於骨脾為太陰主於肉故陰分之病發於骨肉心為牡臟主於血故陽分之病發於血此則以五臟所主言陽虛不能勝陰故陽病發於冬陰虛不能勝陽故陰病發於夏此則以五臟之時言也五邪邪入於陽則為狂邪入於陰則為血痹邪入於陽轉則為癲疾邪入於陰轉則為瘖陽入之於陰病靜陰出之於陽病喜怒癲當作巔喜當作善此與宣明五氣篇同此言五邪之為病電邪氣不入於陰而入於陽則陽邪有餘而為狂生氣通天論曰陰不勝其陽則脈流薄疾並乃狂邪氣不入於陽而入於陰則陰邪有餘而為血痹生氣通天論曰陽不勝其陰則五臟氣爭九竅不通而按此曰陰陽乃營氣衛氣然陰陽諸經為表為里其義亦該之矣宣明五氣篇曰搏陽則為巔疾而此曰邪入於陽轉則為癲疾則癲當為巔正以陽氣上升故頂巔有疾如頭痛眩暈等證也宣明五氣篇曰搏陰則為瘖而此曰邪入於陰轉則為瘖正以陰為邪傷則營氣不足而為瘖也此曰陰陽者亦營衛二氣也陽氣之邪入之於陰則其病也能靜陰氣之邪出之於陽則其病也多怒是乃五邪為病也五藏心藏神肺藏魄肝藏魂脾藏意腎藏精志也藏平聲此與宣明五氣篇同但彼則腎止曰藏精不及志難經兼言腎藏精與志故言有兩腎之說此言五臟各有所藏之神也按本經本神篇黃帝曰何謂德氣生精神魂魄心意志思智慮岐伯曰天之在我者德也地之在我者氣也德流氣薄而生者也故生之來謂之精兩精相搏謂之神隨神往來謂之魂並精而出入者謂之魄所以任物者謂之心心之所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智又曰肝藏血血舍魂脾藏營營舍意心藏脈脈舍神肺藏氣氣舍魄腎藏精精舍志觀此則本節大義可識矣五主心主脈肺主皮肝主筋脾主肌腎主骨此與宣明五氣論同此言五臟之所主也按素問痿論曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓是之謂五主也陽明多血多氣太陽多血少氣少陽多氣少血太陰多血少氣厥陰多血少氣少陰多氣少血故曰刺陽明出血氣刺太陽出血惡氣刺少陽出氣惡血刺太陰出血惡氣刺厥陰出血惡氣刺少陽出氣惡血也此節與素問血氣形志篇本經五音五味篇大同小異當以素問為的此言陰陽各經有血氣多少而刺之者必有其數也按素問血氣形志篇曰太陽常多血少氣此同少陽常少血多氣此同陽明常多氣多血此同少陰常少血多氣此同厥陰常多血少氣此同太陰常多氣少血此異還以素問為是又曰刺陽明出血氣此同刺太陽出血惡氣此同刺少陽出氣惡血此同刺太陰出氣惡血此異還以素問為是刺少陰出氣惡血此同刺厥陰出血惡氣此同陽明者手陽明大腸經足陽明胃經也太陽者手太陽小腸經足太陽膀胱經也少陽者手少陽三焦經足少陽膽經也太陽者手太陰肺經足太陰脾經也厥陰者手厥陰心包絡經足厥陰肝經也少陰者手少陰心經足少陰腎經也其各經氣血自有多少故刺之者凡多者則出之少者則惡出之也足陽明太陰為表裡少陽厥陰為表裡太陽少陰為表裡是謂足之陰陽也手陽明太陰為表裡少陽心主為表裡太陽少陰為表裡是謂手之陰陽也此與血氣形志篇同此言手足各有陰陽兩經為表裡也胃與脾膽與肝膀胱與腎各為表裡乃足之陰陽六經也大腸與肺三焦與心包絡小腸與心各為表裡乃手之陰陽六經也曰足者以其井滎輸經合等穴自足而行也曰手者以其井滎輸經合等穴自手而行也血氣形志篇末云今知手足陰陽所苦凡治病必先去其血乃去其所苦伺之所欲然後瀉有餘補不足蓋言必先去其本經受病之血乃去其所苦如肝苦急心苦緩脾苦濕肺苦氣上逆腎苦燥之類又伺其所欲如肝欲散心欲軟脾欲緩肺欲收腎欲堅之類所苦所欲出素問臟氣法時論然後分其有餘不足而補瀉之也歲露論第七十九末以逢其風而遇其雨者為遇歲露故名篇黃帝問於岐伯曰經言夏日傷暑秋病瘧瘧之發以時其故何也岐伯對曰邪客於風府病循膂而下衛氣一日一夜常大會於風府其明日日下一節故其日作晏此其先客於脊背也故每至於風府則腠理開腠理開則邪氣入邪氣入則病作此所以日作尚晏也衛氣之行風府日下一節二十一日下至尾底骶同二十二日入脊內注於伏沖之脈其行九日出於缺盆之中其氣上於故其病稍益按此節當與素問瘧論第三節參看此言瘧之所發也所以有晏有早也帝以瘧之所發或早或晏有時為疑伯言風寒等邪初時感於風府系督脈經穴其邪自項循脊膂而下行脊之兩旁力膂衛氣一日一夜則五十度已畢而明旦又出於足太陽膀胱經之睛明穴上至於頭轉行後項大會於督脈之風府凡人之項骨有三椎而三椎以下乃自大椎又名百勞以下至尾骶骨有二十一節共為二十四節一云應二十四氣其明日日下一節故其作也晏矣蓋此邪先客於脊背也氣每至於風府則腠理開而邪氣先入邪氣先入而病氣遂成此作字與發作之作不同乃病之成也此所以日作尚晏也此作字乃發字之義至於日作早者何哉正以衛氣之行於風府始時邪氣隨腠理而入者日下一節二十一日則下二十一節以至尾骶至二十二日則入於脊內以注於伏沖之脈按瘧論言日下一節二十五日下至尾骶二十六日至於脊內蓋至風府而始連項骨三椎而言也此篇曰日下一節二十一日則下二十一節以至尾骶二十二日則入於脊蓋除風府與項骨之三日而言也又按本經百病始生篇言邪或著於伏沖之脈或著於膂筋則伏沖與膂筋為二下文止言其邪傳舍於伏沖之脈而不言膂筋則伏沖與膂筋又可為一者也至考瘧論言邪入脊內注於伏膂之脈則合伏沖膂筋而言之至考氣穴論骨空論言衝脈所發皆行於腎經之穴則衝脈外行腎穴而內行於腎脈故腎脈與衝脈伏行於膂筋之內遂謂之伏膂之脈信可以合而為一者也又按腎脈從膝內後廉貫脊屬腎其直行者從腎上貫肝鬲入肺中以其貫脊而又直行則脊之內有膂膂之內有筋乃沖腎之所共行者也由是循伏膂之脈而上行約有九日此邪在前出於缺盆之中系足陽明胃經穴在前頷下橫骨陷中其氣上行而日高故其病稍益而早也至其內搏於五臟橫連募原其道遠其氣深其行遲不能日作故次日乃稸積而作焉據瘧論云其間日發者由邪氣內薄於五臟橫連募原也其道遠其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也此節當以瘧論參考宜為間日而發故云然否則上下不相蒙矣此言瘧之間日而作者之義也上節言發有早晏不出於一日之間所發者蓋每日間有早晏不同也至有不於每日發之而次日發者謂之間日而發也正以邪氣內搏於五臟橫連於募原其道路遠其邪氣深其所出而行者遲不與衛氣俱行而皆出故不能日發而次日乃發也黃帝曰衛氣每至於風府腠理乃發發則邪入焉其衛氣日下一節則不當風府奈何岐伯曰風府無常衛氣之所應必開其腠理氣之所舍節則其府也節字衍按瘧論帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不得當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之所發必開其腠理邪氣之所合則其府也今此節不若素問之詳必與彼參看始明此言邪氣雖因衛氣而或入或發然邪之所感無常形則凡邪之所舍無常府也夫衛氣每至於風府則腠理乃發發則邪入其邪氣隨衛氣而日下一節固宜邪之所發者必從風府而出也然有不當於風府者奈何伯言風之所府者常上風府乃督脈經穴名此風府乃風之所舍為府也義見下文及上瘧論如瘧論所謂衛氣之虛實不同邪中異所則不得當其風府也故邪中於頭項者邪氣至頭項而病中於背者邪氣至於背而病中於腰脊者邪氣至腰脊而病中於手足者邪氣至手足而病由是衛氣之所出與邪氣相合則必開其腠理而病發信乎邪氣之所舍則其府也豈必盡由風府而入哉黃帝曰善夫風之與瘧也相與同類而風常在而瘧特以時依何也岐伯曰風氣留其處瘧氣隨經絡沉以內搏故衛氣應乃作也帝曰善依當作休按瘧論帝曰風之與瘧也相似同類而風獨常在瘧得有時而休者何也岐伯曰風氣留其處故常在瘧氣隨經絡沉以內薄故衛氣應乃作此節不若瘧論尤佯當參看此言風證與瘧證相似然風常在而瘧則有時而休也帝問風證之所感者風也瘧證之所感者有風有寒有暑本相似同類然風證常在而瘧則有時而休此所以可疑也伯言風氣客於其處則亦常留其處所以常在而無作止惟瘧氣則隨經絡而入日沉而內薄故必因衛氣之應而瘧始作也風證之風即素問風論之風如寒熱熱中寒中癘風之類黃帝問於少師曰余聞四時八風之中人也故有寒暑寒則皮膚急而腠理閉暑則皮膚緩而腠理開賊風邪氣因得以入乎將必須八正虛邪乃能傷人乎少師答曰不然賊風邪氣之中人也不得以時然必因其開也其入深其內極病其病人也卒暴因其閉也其入淺以留其病也徐以遲此言賊風之中人不必以時其感之暴而發之遲非如八正虛邪之有時也有等賊風之邪氣雖能傷人而非由於八正者彼八正虛邪如前九宮八風篇所謂太乙入徒於中宮乃朝八風占吉凶及本篇下文所謂八正之候候此者常以冬至之日太乙立於葉蟄之宮云云者是也故言賊風邪氣之中人也不得以時然必因腠理之開而入之其入深而內極病所以病人者至猝而暴及因其閉也入淺以留故病之所發者特遲以緩耳黃帝曰有寒溫和適腠理不開然有卒病者其故何也少師答曰帝弗知邪入千雖平居其腠理開閉緩急其故常有時也黃帝曰可得聞乎少師曰人與天地相參也與日月相應也故月滿則海水西盛人血氣積肌肉充皮膚致毛髮堅腠理郤煙垢著當是之時雖遇賊風其入淺不深至月郭空則海水東盛人氣血虛其衛氣去形獨居肌肉減皮膚縱腠理開毛髮殘膲理薄煙垢落當是之時遇賊風則其入深其病人也卒暴此承上文而言人之有病者其所感之邪亦有時也上文言賊風邪氣其中人固不以時而此節則言感之者亦必有時也是故有寒溫和適腠理不開而猝然病者正以平居之際其腠理開閉緩急亦有時也何也人與天地日月本相參相應天之月滿則地之海水盛於西人氣血積於身而凡肌肉皮膚毛髮腠理皆充密堅郤雖煙垢亦內著之故雖遇賊風其入則淺而不深也至於月郭既空則海水盛於東人之氣血亦空虛凡衛氣形體肌肉皮膚腠理膲理皆減去縱薄雖煙垢亦落故一遇賊風其入既深而病人亦卒暴矣此雖有時遇之然豈加八正虛風與八節相應者哉黃帝曰其有卒然暴死暴病者何也少師答曰三虛者其死暴疾也得三實者邪不能傷人也黃帝曰願聞三虛少師曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛故論不知三虛工反為粗帝曰願聞三實少師曰逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也命曰三實黃帝曰善乎哉論明乎哉道請藏之金匱然此一夫之論也此言人之暴病死者以其遇三虛不得三實也乘年之衰者即素問刺法本病二篇所謂司天失守也逢月之空者即上節月郭空則海水東盛云云也失時之和者即春應暖而反寒之類也有此三虛而賊風傷之則暴病而死矣三實反是然此乃一人之所病也至於衆人同病者下文詳之黃帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也黃帝曰候之奈何少師曰常以冬至之日太乙立於葉蟄之宮其至也天必應之以風雨者矣風雨從南方來者為虛風賊傷人者也其以夜半至也萬民皆臥而弗犯也故其歲民少病其以晝至者萬民懈怠而皆中於虛風故萬民多病虛邪入客於骨而不發於外至其立春陽氣大發腠理開因立春之日風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇某雨者命曰遇歲露焉因歲之和而少賊風者民少病而少死歲多賊風邪氣寒溫不和則民多病而死矣此詳言八正之候感於冬至而重感於立春此賊風之所以傷人也候此者常以冬至之日太乙立於葉蟄之宮風雨從南方來是謂從後來者為虛風賊傷人者也夜則可避而晝則難避民或中之則入客於骨而不發於外至於立春則陽氣大發而腠理正開以值風從西方來是亦從後來者為虛風也蓋北方以南為後東方以西為後耳此則兩次之虛邪相搏人之經氣相結而代脈自見矣然不特此也諸凡太乙居於別宮如立春遇西與北風之類皆謂之遇歲露也大抵歲之賊風有多少則民病之多少死生系之矣黃帝曰虛邪之風其所傷貴賤何如候之奈何少師答曰正月朔日太乙居天留之宮其日西北風不雨人多死矣正月朔日平旦北風春民多死正月朔日平旦北風行民病死者十有三也正月朔日日中北風夏民多死正月朔日夕時北風秋民多死終日北風大病死者十有六正月朔日風從南方來命曰旱鄉從西方來命曰白骨將國有殃人多死亡正月朔日風從東方來髮屋揚沙石國有大災也正月朔日風從東南方行春有死亡正月朔日天和溫不風糴賤民不病天寒而風糴貴民多病此所以候歲之風䔲殘傷人者也二月醜不風民多心腹病三月戌不溫民多寒熱四月巳不暑民多疸病十月申不寒民多暴死諸所謂風者皆髮屋折樹木揚沙石起毫毛發腠理者也此言正月朔日有所占之風而余月亦有所占也大惑論第八十首二節論大惑之義故名篇黃帝問於岐伯曰余嘗上於清冷之臺中階而顧匍匐而前則惑余私異之竅內怪之獨瞑獨視安心定氣久而不解獨慱獨眩被髮長跪俯而視之後久之不已也卒然自上何氣使然岐伯對曰五臟六腑之精氣皆上注於目而為之精睛同精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約束里擷筋骨血氣之精而與脈併為系上屬於腦後出於項中故邪中於項因逢其身之虛其入深則隨眼系以入於腦入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪斜同其精睛同其精同上所中去聲不相比去聲也則精散精散則視岐視岐見兩物目者五臟六腑之精也營衛魂魄之所常營也神氣之所生也故神勞則魂魄散志意亂是故瞳子黑眼法於陰白眼赤脈法於陽也故陰陽合傳而精明也目者心使也心者神之舍也故神精亂而不轉卒然見非常處精神魂魄散不相得故曰惑也此因帝問而明惑之所由然也清冷之臺東苑之所有也惑者眩惑也帝之所言形容精神惑亂之義盡矣然此氣卒然而然殆不可測伯言人之精神魂魄散不能收故以之而惑然惑本於心心主五臟六腑五臟六腑通於目目見非常之處而心遂以惑耳蓋五臟六腑之精氣皆上注於目而為之睛睛之窠為眼腎主骨骨之精為瞳子肝主筋筋之精為黑眼心主血血之精為絡所以絡其窠也肺主氣氣之精為白眼脾主肉肉之精為約束所以里擷筋骨血氣之精也而與血脈相併則為系後世五輪之說似是而不典當以此義為正上屬於腦後出於項中故邪中於項又因逢其身之虛則邪入深即隨眼系以入於腦是由腦因邪而轉動至於牽引目系而急惟目系急則目遂眩以轉其睛自斜不相比並精氣自散視物歧一為二而為惑也何也目為五臟六腑之精營衛魂魄之所常通神氣之所內生今神勞則魂魄散志意亂是以不免於惑也且此目者有陰陽之義故瞳子黑眼法於陰白眼赤脈法於陽必陰陽相合而傳斯精且明今見物歧一為二則陰陽不相傳而不得精明矣況此目者固為五臟六腑之精而實統之於心是目真為心之所使也惟心為神之所舍今心之神精既亂而目自不能轉故卒然見非常之處而精神魂魄散不相得此惑之所由然也今帝上清冷之臺而惑者其見非常之處乎黃帝曰余疑其然余每之東苑未曾不惑去之則復余唯獨為東苑勞神乎何其異也岐伯曰不然也心有所喜神有所惡卒然相感則精氣亂視誤故惑神移乃復是故聞者為迷甚者為惑此承上文而明惑本於心必始迷而紗惑也伯又言惑起於心必先有喜悉惡而又猝然感於外物故精氣亂目視誤而遂至於惑耳俟其神氣既定乃復如初也大凡人情始有所聞則迷而不寤繼則惑而不已矣黃帝曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心肺虛虛則營衛留於下久之不以時上故善忘也此以下至末承上文論惑而遂及善忘以下等邪此則言人之所以善忘也惟人之下氣有餘故腸胃居下者實上氣不足故心肺居上者虛心肺虛則營衛之氣留於下之腸胃而久之不以時上宜乎其心之在上者善忘也黃帝曰人之善飢而不嗜食者何氣使然岐伯曰精氣並於脾熱氣留於胃胃熱則消穀谷消故善飢胃氣逆上則胃脘寒故不嗜食也此言人之善飢而不嗜食也夫善飢者宜嗜食今善飢而不嗜食者正以精氣井之於脾而熱氣留之於胃胃熱則消穀故善飢也然胃氣逆上於上脘則其中脘當冷故胃不開而不嗜食也黃帝曰病而不得臥者何氣使然岐伯曰衛氣不得入於陰常留於陽留於陽則陽氣滿陽氣滿則陽蹺盛不得入於陰則陰氣虛故目不瞑矣此言病之所以不得臥也人有病而不得臥者正以衛氣不得入於陰分而常留於陽分則陽氣滿而陽蹺盛故不得入於陰也惟陰氣之虛所以目不得瞑耳黃帝曰病而目不得視者何氣使然岐伯曰衛氣留於陰不得行於陽留於陰則陰氣盛陰氣盛則陰蹺滿不得入於陽則陽氣虛故目閉也此言人之有病而目之所以不能視也言人有病而不能開目以視者正以衛氣留於陰分而不得行於陽分則陰氣盛而陰蹺滿故不得行於陽也惟陽氣之虛所以目不得開耳黃帝曰人之多臥者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則胃氣留久皮膚濕則分肉不解其行遲夫衛氣者晝日常行於陽夜行於陰故陽氣盡則臥陰氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留於陰也久其氣不精則欲瞑故多臥矣此言人之所以多臥者正以人之腸胃大而皮膚濕分肉不解也惟腸胃大則衛氣久留而不得出皮膚濕而分肉不解則衛氣之出於身者遲夫衛氣者晝日常行於陽經陽經之氣既盡則臥夜行於陰經陰經之氣既盡則寤今腸胃大而衛氣之留於內者久皮膚濕分肉不解而衛氣之行於外者遲所以陽氣不精惟欲瞑目而多臥也其腸胃小皮膚滑以緩分肉解利衛氣之留於陽也久故少瞑焉此承上文而反言人之所以少瞑也黃帝曰其非常經也卒然多臥者何氣使然岐伯曰邪氣留於上膲上膲閉而不通已食若飲湯衛氣留久於陰而不行故卒然多臥焉膲焦同此言人之所以猝然多臥也十二經為常經而陰陽二蹺為非常經故帝云然然有等猝然多臥者必有出於二蹺之外伯言上焦者乃宗氣之所積惟邪氣客於上焦閉而不通及己食與飲之後則愈閉矣其衛氣久留於下焦而不得上升以出故衛氣不出則不精明而猝然多臥也黃帝曰善治此諸邪奈何岐伯曰先其臟腑誅其小過後調其氣盛者瀉之虛者補之必先明知其形志之苦樂定乃取之此言治前諸邪之法電自大惑論善忘以下七項雖非外感皆內有邪氣為病也猝然多臥邪氣留於上焦可兼內外之邪言治之者必有其法或臟或腑陽蹺屬膀胱陰蹺屬腎亦不出於臟腑皆分之以責其小過之在何經蓋凡有病皆可以稱為過而自善忘以下非重大之疾謂之小過亦可也其邪氣之盛者則瀉之正氣之虛者則補之然人所以致此疾者有如九針論形樂志苦病生於脈等義及素問血氣形志篇亦云然則此乃其病本所在也必既定之而後取穴以刺之耳癰疽第八十一內論癰疽之義故名篇黃帝曰余聞腸胃受谷上焦出氣以溫分肉而養骨節通腠理中焦出氣如露上注溪谷而滲孫脈津液和調變化而赤為血血和則孫脈先滿溢乃注於絡脈皆盈乃注於經脈陰陽已張因息乃行行有經紀周有道理與天合同不得休止切而調之從虛去實瀉則不足疾則氣減留則先後從實去虛補則有餘血氣已調形氣乃持余已知血氣之平與不平未知癰疽之所從生成敗之時死生之期有遠近何以度之可得聞乎岐伯曰經脈流行不止與天同度與地合紀故天宿失度日月薄蝕地經失紀水道流溢草蓂不成五穀不殖徑路不通民不往來巷聚邑居則別離異處血氣猶然請言其故夫血脈營衛周流不休上應星宿下應經數寒邪客於經絡之中則血泣血泣則不通不通則衛氣歸之不得復反故痛腫寒氣化為熱熱勝則腐肉肉腐則為膿膿不瀉則爛筋筋爛則傷骨骨傷則髓消不當骨空不得泄瀉血枯空虛則筋骨肌肉不相榮經脈敗漏熏於五臟臟傷故死矣泣澀同此詳言癰疽之所由生也帝言胃受穀氣言腸胃者其腸則帶言也化為精微之氣其宗氣出於上焦出喉嚨司呼吸以行於十二經隧之中上注注溪谷而滲孫脈內則津液和調變化而赤為血營衛生會篇云中焦亦出上焦之後此所受氣者泌糟粕蒸精液化其精微上注於肺脈乃化而為血以奉生身莫貴於此故獨得行於經隧命曰營氣又決氣篇云言中焦受氣取汁變化而赤是為血血和則孫脈先滿溢而後注於絡脈絡脈皆滿而後注於經脈陰陽諸經此血張之皆因呼吸而為之行一如宗氣之所行也其行有經有紀周之於身有道有理素問六節藏象論亦有周有道理一句與天同行而不得休止須知切而調之其實者則從虛之之法以去其實所以瀉則不足而為虛也蓋疾去其針則邪氣減矣若久留其針先後如一斯則從實之之法以去其虛所以補則有餘而為實也由是血氣已調形氣乃持故凡血氣平否余已知之但癰疽之所由生其成敗死生遠近殆未可以輕度也伯言經脈流行不止誠與天地同度合紀者也故天宿失度則日月為之薄蝕地經失紀則水道為之流溢草蓂為之不成五穀為之不殖徑路為之不通而民不能往來雖巷聚邑居之中似乎別離異處矣況人身之血氣乎惟寒邪客於經絡之中則血澀不通衛氣歸於內而不得復反於外故癰疽乃生試以其終始言之其始寒化為熱熱勝則肉腐由是肉之內有筋筋之內有骨骨之內有髓者皆因肉腐則為膿而爛筋傷骨消髓相因而至矣若不得骨空以瀉之所以血枯空虛筋骨肌肉不相榮澤經脈敗漏五臟俱傷而死期至矣黃帝曰願盡聞癰疽之形與忌日名岐伯曰癰發於嗌中名曰猛疽猛疽不治化為膿膿不瀉塞咽半日死其化為膿者瀉則合豕膏冷食三日而已此言猛疽之勢急而有瀉之之法也發於頸名曰夭疽其癰大以赤黑不急治則熱氣下入淵腋前傷任脈內熏肝肺熏肝肺十餘日而死矣此言夭疽之勢急當急治之而不治則死也淵腋足少陽膽經穴名也腋下三寸宛宛中舉臂得之陽氣大發消腦留項名曰腦爍其色不樂項痛而如刺以針煩心者死不可治此言腦爍之有死徵也發於肩及臑名曰疵癰其狀赤黑急治之此令人汗出至足不害五臟癰發四五日逞焫之此言疵癰之當急治也發於腋下赤堅者名曰米疽治之以砭石欲細而長疏砭之塗以豕膏六日已勿里之此言米疽之有治法也其癰堅而不潰者為馬刀挾纓急治之此言馬刀挾纓之證當急治之也此證不言其所蓋承上節腋下而言也發於胸名曰井疽其狀如大豆三四日起不早治下入腹不治七日死矣此言井疽之當早治而否則有死期也發於膺名曰甘疽色青其狀如榖實苽蔞常苦寒熱急治之去其寒熱十歲死死後出膿此言甘疽之當急治而死後有膿也榖木名苽蔞即栝蔞也發於脅名曰敗疵敗疵者女子之病也灸之其病大癰膿治之其中乃有主肉大如赤小豆銼䔖𧄍草根各一升以水一斗六升煮之竭為取三升則強飲厚衣坐於釜上令汗出至足已此言女子有敗疵之證而有治之之法也䔖𧄍今之連翹也同連翹及草根各一升共二升煮汁以強飲之發於股脛名曰股脛疽其狀不甚變而癰膿搏骨不急治三十日死矣此言股脛疽之當急治而否則有死期也發於尻名曰鋭疽其狀赤堅大急治之不治三十日死矣此言鋭疽之當急治而否則有死期也發於股陰名曰赤施不急治六十日死在兩股之內不治十日而當死此言赤施之當急治而生股內者之有死期也發於膝名曰疵癰其狀大癰色不變寒熱如堅石勿石石之者死須其柔乃石之者生勿石以下之石即第四節砭石之石此言疵癰之狀堅不可砭而柔則可砭也諸癰疽之發於節而相應者不可治也發於陽者百日死發於陰者三十日死此言癰疽之發於節者不分陰陽而皆死也節者關節也其節之外廉為陽內廉為陰發於脛名曰兔齧其狀赤至骨急治之不治害人也此言兔齧之當急治而否則害人也發於內踝名曰走緩其狀癰也色不變數石其輸而止其寒熱不死數音朔輸腧同穴空此言走緩之狀宜砭之而可以生也發於足上下名曰四淫其狀大癰急治之百日死此言四淫之當急治而否則有死期也發於足傍名曰厲癰其狀不大初如小指發急治之去其黑者不消輒益不治百日死此言厲癰之當急治而否則有死期也發於足捐名曰脫癰其狀赤黑死不治不赤黑不死不衰急斬之不則死矣不否同此言脫癰有生死之辨而病勢不衰則當斬其指否則必至於死也黃帝曰夫子言癰疽何以別之岐伯曰營衛稽留於經脈之中則血泣澀而不行不行則衛氣從之而不通壅遏而不得行故熱大熱不止熱勝則肉腐肉腐則為膿然不能陷骨髓不為焦枯五臟不為傷故命曰癰黃帝曰何謂疽岐伯曰熱氣淳純盛下陷肌膚筋髓枯內連五臟血氣竭當其癰下筋骨良肉皆無餘故命曰疽此言癰疽之別癰輕而疽重也癰疽本皆熱證然癰雖肉腐成膿而不內陷於骨故髓不為枯五臟不為傷疽則筋骨良肉皆無餘而下陷於肌膚筋髓皆枯內連五臟其輕重如此疽者上之皮夭以堅上如牛領之皮癰者其皮上簿以澤此其候也此又言癰疽之別即其皮之堅澤可驗也
