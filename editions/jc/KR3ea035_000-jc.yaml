front:
  text: 注靈樞經序夫醫之有內經也猶吾儒之有六經也如水有源木有根也譚儒而不本之六經偏儒也譚醫而不本之內經偏醫也第六經皆有注跡而內經注獨未詳是涉遠而亡車楫登高而亡階梯也余雅嗜攝生家間手素問靈樞一編以佐藥餌於素問解十之七於靈樞解十之三而不求盡者恨亡注也一日聞玄臺馬君注素問余始迂之不三年素問注成已又聞馬君注難經余更迂之不三年難經注成馬君固名醫經注成名益彰海內人士慕上池之術者即窮山深谷靡不奔走馬君矣馬君雖名聞諸俟垂老而志不衰欲再注靈樞以垂不朽余聞益迂之不三年而靈樞注覆成乃徵余言為之序序曰馬君初為于越諸生有聲一旦棄諸生工醫其志豈鮮小哉環誦則緗為之漶覃思則髯為之枯含毫則研為之穴殺青則囊為之澀傳寫則紙為之貴彼其志豈鮮小哉蓋十年而經注成經注成而名日益廣業日益精余始迂之今信且服矣夫軒轅氏與岐伯鬼臾區六臣朝夕抵掌而筆之此書更千百年而仲景東垣丹溪輩窮年累業卒不能窺內經之精奧乃馬君慨然注之切殆微管哉世之號能醫者堇堇修古方測己臆為湯劑已耳湯劑之外叩其針灸浣熨佐使宣攝司歲陰陽燥濕之宜咸亡以對如是而欲托以死生之柄危矣余觀靈樞八十一篇首講九針之法以應人五臟三十六腧二十七氣十二經絡三百六十五會元元本本不爽毫髮而又先察脈而後用針則湯劑所不周者濟以針法病胡患不治業胡患不精今上垂拱民方熙熙若登春臺遊化國似無藉此書顧人之耳目心志非治術不能濯磨人之體膚毛髮非醫不能湔祓請以馬君之書奏之當寧贊成仁壽之治何如賜進士第尚書虞部郎奉敕督理漕務河道同典京闈華亭章憲文撰
