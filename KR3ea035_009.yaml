body:
  text: 卷之九官能第七十三官者任也任其所能也即本篇第七節雷公有官能之問故名篇黃帝問於岐伯曰余聞九針於夫子衆多矣不可勝數余推而論之以為一紀余司誦之子聽其理非則語余請正其道令可久傳後世無患得其人乃傳非其人勿言岐伯稽首再拜曰請聽聖王之道黃帝曰用針之理必知形氣之所在左右上下陰陽表裡血氣多少行之逆順出入之合謀伐有過知解結知補虛瀉買上下氣門明通於四海審其所在寒熱淋露以腧異處審於調氣明於經隧左右肢絡盡知其會寒與熱爭能合而調之虛與實鄰知決而通之左右不調犯而行之明於逆順乃知可治陰陽不奇故知起時審於本末察其寒熱得邪所在萬刺不殆知官九針刺道畢矣數去聲令平聲奇音箕此帝詳刺道以問伯也凡用針之道必知人之形氣有餘不足或形盛氣衰或氣盛形衰或形氣皆盛或形氣皆衰病之在左在右在上在下在陰在陽在表在裡或血多氣少或血少氣多或血氣皆多或血氣皆少大義見素問血氣形志篇其脈之所行有逆有順如手太陰經自中府而出於少商者為順至少商而到於中府者為逆見前邪客篇有出有入如自表而之裡為入自里而之表為出然後即其犯病而為有過者則謀伐之知解其所結本經衛氣篇云能知解結契紹於門戶知虛者則補實者則瀉又知脈之上下於氣門即氣穴也素問明有氣穴論凡穴皆可以氣穴稱又知脈之流通於四海本經海論云膻中為氣之海衝脈為血之海胃為水穀之海腦為髓之海審其所在之有病或為寒熱或為淋露疑即歲露篇之所謂遇歲露也大義見歲露篇以其腧穴必皆異處當審於調其脈氣之往來明於十二經脈之經隧大義見經脈篇及左右肢絡即前經脈篇所謂其支其別者是也盡知其會可也若寒與熱爭則能合陰陽而調之若虛與實鄰則知決虛實而通之設不能調其左右左右之義在病人則左右穴相同在醫人則針時用左右手是謂犯而行之也故必明於逆順乃知可治脈之所行有逆順針法亦有逆順況人身陰陽諸經相為配合未嘗有奇行者能知各經之所起審於本末寒熱禁服篇云審其本末察其寒熱又終始篇云本末之寒溫之相守同也得邪所在而刺之則雖萬刺可以不殆矣然九針不同各有所宜能任而用之此刺道之所以畢也明於五腧徐疾所在屈伸出入皆有條理言陰與陽合於五行五臟六腑亦有所藏四時八風盡有陰陽各得其位合於明堂各處色部五臟六腑察其所痛左右上下知其寒溫何經所在審皮膚之寒溫滑澀知其所苦膈有上下知其氣所在先得其道稀而疏之稍深以留故能徐入之大熱在上推而下之從下上者引而去之視前痛者常先取之大寒在外留而補之入於中青從合瀉之針所不為灸之所宜上氣不足推而揚之下氣不足積而從之陰陽皆虛火自當之厥而寒甚骨廉陷下寒過於膝下陵三里陰絡所過得之留止寒入於中推而行之經陷下者火則當之結絡堅緊火所治之不知所苦兩蹺之下男陰女陽良工所禁針論畢矣此帝詳針論以問伯也五臟有井滎輸經合之五腧六腑有井滎輸原經合之六腧然六腑之原並於腧則皆可稱為五腧也徐疾者針法也九針十二原小針解云徐而疾則實疾而徐則虛屈伸出入者經脈往來也見邪客篇屈折順逆之數言陰與陽合於五行者泛言陰陽分而為五行也五臟六腑亦有所藏者指人身有陰陽五行也如肺為陰大腸為陽肺為金肝為木之類四時八風盡有陰陽者指天道有陰陽五行也八風見九官八風篇各得其位合於明堂各處色部者言人身之面部各得其五行之位合於明堂及各處之色部也大義見五色篇其面部之分為五臟六腑者可以察其身形之所痛五色篇云沉濁為內浮澤為外黃赤為風青黑為痛白為寒黃而膏潤為膿赤甚者為血痛甚者為攣寒甚為皮不仁其色見於左右上下者可以知其何經之寒溫又審皮膚之寒溫滑澀斯能知其病之所苦也且膈有上下心肺居於膈上脾居中州肝腎居於膈下必知其病氣之所在先得其經脈之道然後可以用針稀者針之少也疏者針之闊也終始篇云疏取之上深者深入其針也留者久留其針也即如有大熱在上則當推針而使之下所謂高者抑之也熱從下而上則當引針而去其邪所謂外者發之也視先痛者常先取穴以刺之所謂凡病必先治其本也素問標本病傳論本經病傳篇除大小便不利外皆當治其本又如大寒在外則留其針以補之大寒入中則從合穴以瀉之凡病有針所不當用者則用灸以治之又如有上氣不足則推入其針以揚之而使上氣之足下氣不足則積其針以順之而使下氣之足若陰陽皆虛而針所難用則用火以灸之又有厥而寒甚或骨廉下陷或寒過於膝則取下陵三里穴以補之下陵三里即三里見本輸篇又有陰絡所過為寒留止或寒入於中則必推其針而行以散之又有經脈陷下者則惟灸以當之經脈篇云陷下則灸之禁服篇云陷下則徒灸之徒但也又有絡脈結而堅緊者亦用灸以治之倘不知病之所苦及男子以陽蹺為經陰蹺為絡女子以陰蹺為經陽蹺為絡見脈度篇故男子忌取陰蹺女子忌取陽蹺乃良工所禁此針論之所以畢也用針之服必有法則上視天光下司八正以闢奇邪而觀百姓審於虛實無犯其邪是得天之露遇歲之虛救而不勝反受其殃故曰必知天忌此節與八正神明論大義相同闢當作避奇音箕此言用針之事必當知天忌也服事也此二句出八正伸明論又詩小雅六月篇云其武之服大雅板篇云我言維服上視天光即八正神明論之所謂天寒無刺天溫無疑月生無瀉月滿無補月郭空無治者是也下司八正即八正神明論之所謂八正者所以候八風之虛邪以時至者也蓋四立二分二至為八節之正氣九宮八風篇有八風八正當以避八風故八正神明論謂八正之虛邪而避之勿犯也所謂得天之露者本經歲露篇黃帝曰願聞歲之所以皆同病者何因而然少師曰此八正之候也候此者常以冬至之日太一立於葉蟄之官其至也天必應之以風雨者矣風雨從南方來者為虛風即從後來者為虛風下四方同入客於骨而不發於外至其立春陽氣大發風從西方來萬民又皆中於虛風此兩邪相搏經氣結代者矣故諸逢其風而遇其雨者命曰遇歲露焉蓋指天之風雨為露也所謂遇歲之虛者本經歲露篇曰乘年之衰逢月之空失時之和因為賊風所傷是謂三虛逢年之盛遇月之滿得時之和雖有賊風邪氣不能危之也故得天之風雨而又遇歲之虛則雖救之而不能勝反受其所害矣故八正神明論又曰天忌不可不知者此也乃言針意法於往古驗於來今觀於窈冥通於無窮粗之所不見良工之所貴莫知其形若神倣佛此節與八正神明論大義亦相同此承上文而言針意之妙無形而至神者也八正神明論岐伯曰法往古者先知針經也驗於來今者先知日之寒溫月之虛盛以候氣之浮沉而調之於身觀其立有驗也觀其冥冥者言形氣營衛之不形於外而工獨知之以日之寒溫月之虛盛四時氣之浮沉參伍相合而調之工常先見之然而不形於外故曰觀於冥冥焉通於無窮者可以傳於後世也是故工之所以異也然而不形見於外故俱不能見也視之無形嘗之無味故謂冥冥若神倣佛邪氣之中人也灑淅動形正邪之中人也微先見於色不知於其身若有若無若亡若存有形無形莫知其情是故上工之取氣乃救其萌芽下工守其己成因敗其形中去聲此與八正神明論本經邪氣臟腑病形篇大義俱相同據兩篇當以虛邪正邪為說此言邪氣之微而上工能蚤救之也灑淅惡寒貌動形者振動其形也八正神明論曰虛邪者八正之虛邪氣也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形邪氣臟腑病形篇曰虛邪之中身也灑淅動形正邪之中人也微先見於色不知於身若有若無若亡若存有形無形莫知其情又八正神明論曰上工救其萌芽必先見三部九候之氣盡調不敗而救之故曰上工下工救其已成者言不知三部九候之相失因病而敗之也上工論氣不論形所以預取其氣而蚤救其萌芽彼下工則反是矣是故工之用針也知氣之所在而守其門戶明於調氣補瀉所在徐疾之意所取之處瀉必用圓切而轉之其氣乃行疾而徐出邪氣乃出伸而迎之遙大其穴氣出乃疾補必用方外引其皮令當其門左引其樞右推其膚微旋而徐推之必端以正安以靜堅心無解欲微以留氣下而疾出之推其皮蓋其外門真氣乃存用針之要無忘其神此節與八正神明論略同據彼義則此當以是故工之用針至所取之處別為一節遙搖同解懈同圓當作方方當作圓此承上文而言上工因氣以行補瀉之法其要則在於守神也八正神明論曰知其所在者知診三部九候之病脈處而治之故曰守其門戶焉正本節之所謂明於調氣補瀉所在徐疾之意所取之處也瀉必用圓補必用方八正神明論作瀉必用方補必用圓者是也岐伯曰瀉必用方者以氣方盛也以月方滿也以日方溫也以身方定也以息方吸而納針乃復候其方吸而轉針乃復候其方呼而徐引針故曰瀉必用方其氣而行焉補必用圓圓者行也行者移也刺必中其營復以吸排針也故圓與方非針也其言如此此節之方圓誤可知矣方瀉之時切而轉之其氣乃行即所謂方吸而轉針者是也疾入而徐出之邪氣乃出即所謂方呼而徐引針者是也又必搖大其穴則邪氣之出者自速此瀉法也其補之時外引其皮令當其門左手則引其樞右手則推其膚微旋而徐推其針其針必端正安靜堅心無懈即所謂如侍貴人不知日暮神無營於衆物者是也正欲微留其針候氣下而疾出之即推其皮以蓋其外門則真氣得存矣離合真邪論曰推闔其門令神氣存此補法也然補瀉雖殊而用針之要當無忘人之神八正神明論曰養神者必知形之肥瘦營衛血氣之盛衰血氣者人之神不可不謹養也小針解云上守神者守人之血氣有餘不足可補瀉也雷公問於黃帝曰針論曰得其人乃傳非其人勿言何以知其可傳黃帝曰各得其人任之其能故能明其事雷公曰願聞官能奈何黃帝曰明目者可使視色聰耳者可使聽音捷疾辭語者可使傳論語徐而安靜手巧而心審諦者可使行針艾理血氣而調諸逆順察陰陽而兼諸方緩節柔筋而心和調者可使導引行氣疾毒言語輕人者可使唾癰咒病爪苦手毒為事善傷人者可使按積抑痹各得其能方乃可行其名乃彰不得其人其功不成其師無名故曰得其人乃言非其人勿傳此之謂也手毒者可使試按龜置龜於器下而按其上五十日而死矣手甘者復生如故也此言任人者各因其能而未示以驗手毒之法也官人之能者任人之能猶書之所謂在官人也蓋欲視病人之色聽病人之聲傳所論之語於病人以行針灸以導引行氣以唾癰咒病以按積抑痹非各得其人不可也即如任手毒者試以按龜之法則其手之甘毒自別矣蓋遇人之手有凶有善猶味之甘苦故即以甘毒名之毒即苦也論疾診尺第七十四篇內詳論各疾診尺知病故名篇黃帝問於岐伯曰余欲無視色持脈獨調其尺以言其病從外知內為之奈何岐伯曰審其尺之緩急小大滑澀肉之堅脆而病形定矣此言審尺部之脈與肉而可以知病形也本經邪氣臟腑病形篇曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀故善調尺者不待於寸蓋脈在內肉在外內外相應故審其脈驗其肉而病形自定也愚謂診人脈時惟臂至尺澤可驗難以周身知之故止以尺言也視人之目窠上微癰如新臥起狀其頸脈動時咳按其手足上窅而不起者風水膚脹也癰壅同窅窈同此驗風水與膚脹之法也目窠者目下也窅者沉也視人之目窠上微有壅起如新臥起之狀蓋凡人之臥而起者目下必有微腫也其頸脈動時必有其咳正以人迎大迎之脈皆在頸上屬足陽明胃經穴所以脈動而發之為咳也按其手足窅然不起此風水與膚脹之證候相同者也按水脹論岐伯曰水始起也目窠上微腫如新臥起之狀其頸脈動時咳陰股間寒足脛腫腹乃在其水成矣以手按其腹如里水之狀此其候電水脹論水證與此節風水大同而此節所按在手足不按其腹此節按手足窅而不起水脹論按腹如里水之狀意者水與風水其手足腹皆大而按之之時窅而不起為風水窅而起者止為水歟然觀下節有尺膚滑而淖澤澤脂皆為風則水證未必然也此二證之可辨歟又按水脹論言膚脹者寒氣客於皮膚之間𪔣𪔣然不堅腹大身盡腫皮厚按其腹窅而不起腹色不變此其候也夫水脹論以按其腹窅而不起腹色不變為膚脹今此節按手足不按腹蓋言手足而腹在其中矣尺膚滑其淖澤者風也尺肉弱者解㑊安臥脫肉者寒熱不治尺膚滑而澤脂者風也尺膚澀者風痹也尺膚粗如枯魚之鱗者水泆飲也尺膚熱甚脈盛躁者病溫也其脈盛而滑者病且出也尺膚寒其脈小者泄少氣尺膚炬然先熱後寒者寒熱也尺膚先寒久大之而熱者亦寒熱也此承上文而言詳審尺脈尺肉可以定諸病也尺之皮膚滑潤而淖澤者風也其肉弱者主蝍㑊安臥蓋弱不弱強不強寒不寒熱不熱為蝍㑊不能自寧故安臥耳若肉不但弱而至於脫者當為寒熱不可治之病也尺之皮膚滑潤而澤脂者風也上節言按其手足窅而不起者為風水膚脹而此以膚滑而澤者為風信乎欲知有風必其滑而潤澤如脂膏者真為風也若尺之皮膚澀者乃風痹也素問痹論曰以風氣勝者為行痹尺之皮膚甚粗如枯魚之鱗者不但躁澀而已則為水泆飲之證也本經邪氣臟腑病形篇有肝脈澀甚為溢飲尺膚熱甚其脈盛躁當為溫病也其脈雖盛不至於躁且帶滑者則病當自出矣尺之皮膚寒冷其脈小者主下泄及正氣衰故身寒而脈小也尺之皮膚炬然如火而先發其熱後乃為寒及先發其寒而後乃為熱者皆為寒熱之病也肘所獨熱者腰以上熱手所獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四寸熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上白肉有青血脈者胃中有寒此即肘手臂掌諸所之冷熱而驗其各病皆承上文調尺言病之意而並及之也人之手自曲池以上為肘自曲池以下為臂肘在上應腰以上手臂在下應腰以下故肘所獨熱者其腰以上必熱手臂之所獨熱者其腰以下必熱肘之前廉即內廉也據大體為在前故以內廉為肘前肘前獨熱者主前之膺前有熱蓋肘之內廉與膺前皆屬陰也肘之後廉即外廉也據大體為在後故以外廉為肘後肘後獨熱者主後之肩背有熱蓋肘之外廉與肩背皆屬陽也至於臂中獨熱者其臂外熱主腰有熱臂內熱主腹有熱肘後粗大以下三四寸間即曲池為粗大處而以下則為三里之所其間熱者主腸中有蟲蓋不上不下之所正合於腸中也掌中熱者為掌之內廉熱主腹中熱其冷則腹中亦冷也魚際之上白肉際屬陰經內有青血脈來見者亦主胃中有寒也尺炬然熱人迎大者當奪血尺堅大脈小甚少氣悗有加立死悗悶同此又承上文診尺之未盡者而備言之也尺之皮膚炬然而熱其左手寸部人迎之脈大者當有去血之證也愚意尺堅則腎水不足左寸脈大則心火有餘其去血者宜矣尺之皮膚堅而且大而脈則小甚主正氣衰少若躁悶有加則立死也目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中此即人之目有五色而知其病之在何臟也診目痛赤脈從上下者少陽病從下上者陽明病從外走內者少陽病按本經經筋篇云太陽為目上網陽明為目下網此言診目痛之法也目痛屬火必有赤脈然赤脈在目之內今自上而下者主病在太陽經蓋足太陽膀胱經自目內眥之睛明攢竹以上於腦之四行其經脈在目之上故自上而下者乃太陽有邪入於目中也又赤脈在目之內今自下而上者主病在陽明經蓋足陽明胃經自足次指之厲兌以至目下之四白承泣其經脈在目之下故自下而上者乃陽明有邪入於目中也又赤脈在目之內今從外而走於內者主病在少陽經蓋足少陽膽經起於足之四指竅陰以至於外眥之瞳子憩其經脈皆在於外眥故自外而走內者乃少陽有邪入於目中也診寒熱赤脈上下至瞳子見一脈一歲死見一脈半一歲半死見二脈二歲死見二脈半二歲半死見三脈三歲死此言診瘰癧寒熱之有法也大義與寒熱篇第七十同診齲齒痛按其陽之來有過者獨熱在左左熱在右右熱在上上熱在下下熱齲丘禹切此言診齒痛之有法也齒痛曰齲上齒屬手陽明大腸經下齒屬足陽明胃經故按其陽脈之來有過者必為獨熱其脈在左右上下則病熱亦分左右上下也診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱此言診血脈之有法也凡診血脈者必自其各部之分肉而視之身痛而色微黃齒垢黃爪甲上黃黃疸也安臥小便黃赤脈小而澀者不嗜食素問平人氣象論篇云溺黃赤安臥者黃疸已食如飢者胃疸此言診黃疸之有法也人病其寸口之脈與人迎之脈小大等及其浮沉等者病難己也此言診病有難已之法也素問六節藏象論本經禁服終始四時氣等篇皆以寸口探足手六陰經之病為內傷以人迎探手足六陽經之病為外感故寸口大者為關人迎大者為格今寸口與人迎之脈小大浮沉相等者其內傷外感俱未能自己也女子手少陰脈動甚者妊子素問平人氣象論云婦人手少陰脈動甚者妊子也與此同此言診女子有子之法也手少陰者心也為左手寸部心與小腸為表裡而小腸為手太陽故少陰脈動則太陽之脈亦動也所以女子有妊者當為男子之應後世以足易手字蓋以腎脈不止為有妊也不知此子字乃男子也不然則素問靈樞豈皆誤乎脈訣云太陽大是男妊手足太陽也嬰兒病其頭毛皆逆上者必死此言診嬰兒病之有法也頭毛逆上則血枯而不潤如草之枯者相似故以死擬之然曰病則無病之時尤宜忌也耳間青脈起者掣痛此言診身中掣痛之有法也上文診血脈之多青者為痛以青為寒也今耳間有青脈起則少陽陽明諸經有寒故為身中牽掣而痛也大便赤辦飧泄脈小者手足寒難已飧泄脈小手足溫泄易已辦按海篇瓣溥莧切瓜瓠瓣則赤辦當作瓣此言診便泄有難易之法也凡大便有赤瓣或飧泄赤當為熱而下迫亦主於火也今脈小而手足寒則是證脈相背所以為難已也若止於飧泄脈體亦小但得手足尚溫則泄亦易已矣四時之變寒暑之勝重陰必陽重陽必陰故陰主寒陽主熱故寒甚則熱熱甚則寒故曰寒生熱熱生寒此陰陽之變也故曰冬傷於寒春生疸熱春傷於風夏生後泄腸澼夏傷於暑秋生痎瘧秋傷於濕冬生咳嗽是謂四時之序也此節與素問陰陽應象大論第九節大義相同此言陰陽有四時之變而即四時之病以證之也夫四時有變以寒暑之相勝也重陰則必變而為陽故陰主寒而寒甚則必熱故曰寒生熱也重陽則必變而為陰故陽主熱而熱甚則必寒故曰熱生寒也此乃陰陽之變也試觀冬傷於寒而至春變為痹熱之病春傷於風而至夏變為後泄腸澼之病則寒生熱之義可見矣夏傷於暑而至秋變為痎瘧之病秋傷於濕而至冬變為咳嗽之病則熱生寒之義可見矣此雖四時之變要亦四時之序為之也刺節真邪第七十五前論刺有五節後論有真氣有邪氣故名篇黃帝問於岐伯曰余聞刺有五節奈何岐伯曰固有五節一曰振埃二曰發蒙三曰去爪四曰徹衣五曰解惑黃帝曰夫子言五節余未知其意岐伯曰振埃者刺外經去陽病也發蒙者刺腑腧去腑病也去爪者刺關節肢絡也徹衣者盡刺諸陽之奇腧也解惑者盡知調陰陽補瀉有餘不足相傾移也此言刺有五節而先指各經之所用也振埃者如振落塵埃也其法刺其外經以去陽氣大逆之病耳發蒙者開發矇聵也其法刺其腑腧以去其腑病耳去爪者如脫去其爪也其法刺其關節肢絡耳徹衣者如徹去衣服也其法盡刺諸陽經之奇腧耳解惑者如解其迷惑也其法盡知調陰陽諸經之虛實以移其病耳黃帝曰刺節言振埃夫子乃言刺外經去陽病余不知其所謂也願卒聞之岐伯曰振埃者陽氣大逆上滿於胸中憤䐜肩息大氣逆上喘喝坐伏病惡埃煙𩜺不得息請言振埃尚疾于振埃黃帝曰取之何如岐伯曰取之天容黃帝曰其咳上氣窮詘胸痛者取之奈何岐伯曰取之廉泉黃帝曰取之有數乎岐伯曰取天容者無過一里取廉泉者血變而止帝曰善哉䐜充人切惡去聲𩜺音噎詘音屈此承上文而詳言振埃之義也刺法用振埃者以其陽氣大逆上滿於胸中氣憤而脹竦肩而息大氣逆於上為喘為喝坐伏不常病勢內煩甚惡埃煙𩜺不得息乃行振埃之法效亦甚捷其法當取之天容系手太陽小腸經如有咳而上氣窮屈胸痛則當取之廉泉系任脈經穴但所取之數在天容者無過人行一里許而止針在廉泉者至其血變而即止針耳黃帝曰刺節言發蒙余不得其意夫發蒙者耳無所聞目無所見夫子乃言刺腑腧去腑病何腧使然願聞其故岐伯曰妙乎哉問也此刺之大約針之極也神明之類也口說書卷猶不能及也請言發蒙耳尚疾於發蒙也黃帝曰善願卒聞之岐伯曰刺此者必於日中刺其聽宮中其眸子聲聞於耳此其腧也黃帝曰善何謂聲聞於耳岐伯曰刺邪以手堅按其兩鼻竅而疾偃其聲必應於針也黃帝曰善此所謂弗見為之而無目視見而取之神明相得者也禮仲尼燕居篇云於夫子昭然若發蒙注云若目不明為人所發而有所見也此承上文而詳言發蒙之義也夫發蒙者其人耳無所聞目無所見今言刺腑腧以去腑病其腧不知何在伯言此乃刺法之大約即此一腑以觀之真足以發蒙也如耳目無所聞見者即於日中刺其手太陽小腸經之聽宮穴其氣與眸子相通當中其眸子也若聲則與耳自相聞矣何也以手堅按兩鼻之竅而急偃其聲頃則聲必應於耳也此所謂彼雖弗見所為而不必以有目以為視吾能見而取之真有神明相得之妙也黃帝曰刺節言去爪夫子乃言刺關節肢絡願卒聞之岐伯曰腰脊者身之大關節也肢脛者人之管以趨翔也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下留於睪血道不通日大不休俯仰不便趨翔不能此病滎然有水不上不下鈹石所取形不可匿常不得蔽故命曰去爪帝曰善睪音皋此詳言去爪之義也夫去爪之法所以為刺關節肢絡者正以腰脊為身之大關節肢脛為人之管莖垂為身中之機陰精之候津液之道也故飲食喜怒不調津液內溢乃下留於睪陰丸血道不通其狀日以益大俯仰甚有不便趨翔甚有不能此病滎然有水凝稸不行所以不上且不下也若用鈹石之針以取之則形雖大而不可復匿日常不得隱蔽其水矣黃帝曰刺節言徹衣夫子乃言盡刺諸陽之奇腧未有常處也願卒聞之岐伯曰是陽氣有餘而陰氣不足陰氣不足則內熱陽氣有餘則外熱內熱相搏熱如懷炭外畏綿帛近不可近身又不可近席腠理閉塞則汗不出舌焦唇槁臘干嗌燥飲食不讓美惡黃帝曰善取之奈何岐伯曰取之於其天府大杼三痏又刺中臂以去其熱補足手太陰以出其汗熱去汗稀疾於徹衣黃帝曰善臘思亦切此承上文而詳言徹衣之義也夫徹衣之法以為盡刺陽經之奇腧者正以陽氣有餘而陰氣不足惟陰氣不足則內有熱如陽氣有餘則外有熱其內熱甚如懷炭其外熱畏綿帛而不可近身與席時則腠理閉塞汗不得出其舌焦其唇槁而臘干其嗌燥凡口中無味美惡莫辨刺之者亦惟取其手太陰肺經之大府穴足太陽膀胱經之大杼穴各三次其刺瘡有三故為三痏也又取足太陽膀胱經之中膂內俞以去其熱又補足太陰脾經手太陰肺經以出其汗由是熱去而汗少其速如徹衣也黃帝曰刺節言解惑夫子乃言盡知調陰陽補瀉有餘不足相傾移也惑何以解之岐伯曰大風在身血脈偏虛虛者不足實者有餘輕重不得傾側宛伏不知東西不知南北乍上乍下乍反乍覆顛倒無常甚於迷惑黃帝曰善取之奈何岐伯曰瀉其有餘補其不足陰陽平復用針若此疾於解惑黃帝曰善請藏之靈蘭之室不敢妄出也此承上文而詳言解惑之義也夫解惑以補虛瀉實為法者正以大風在身血脈偏虛其虛者為不足而輕其實者為有餘而重大體當傾側宛伏雖四方上下皆已反覆顛倒其狀甚於迷惑刺之者即其有餘而瀉之不足而補之則陰陽諸經自然平復真如解惑之速也黃帝曰余聞刺有五邪何謂五邪岐伯曰病有持癰者有容大者有狹小者有熱者有寒者是謂五邪黃帝曰刺五邪奈何岐伯曰凡刺五邪之方不過五章疸熱消滅腫聚散亡寒痹益溫小者益陽大者必去請道其方此言刺分五邪當用五章之法也凡刺五邪之方不過五章而已五章者漢史約法三章猶言五事也故邪有熱者今行刺法則疸熱消滅邪有持癰者今行刺法則腫聚散亡邪有寒者今行刺法則寒痹益溫邪有狹小者今行刺法則小者益陽蓋小者不使之大則其在外為陽者無害而有陽也邪有容大者今行刺法則大者必去此五章者所以刺五邪也下文乃析言之凡刺癰邪無迎隴易俗移性不得膿脆道更行去其鄉不安處所乃散亡諸陰陽過癰者取之其輸瀉之隴隆同素問生氣通天論有日中而陽氣隆本經營衛生會篇作隴古蓋隴隆互用道去聲此承上文而言腫聚散亡之法也凡刺癰邪無迎其氣之來隆所謂避其來鋭者是也如易風俗如移性情相似須緩以待之若不得膿則揉以脆之導以行之去其癰腫之鄉彼當不安處所乃自散亡矣凡諸陰陽經之有病生癰者取其本經之輸穴以瀉之如手太陰輸穴太淵之類手陽明輸穴三間之類凡刺大邪日以小泄奪具有餘乃益虛剽其通針其邪肌肉親視之毋有反其真刺諸陽分肉間此承上文而詳言大者必去之法也凡刺邪之大者日漸使之小焉可也彼大者成於有餘當泄奪之則邪益虛遂乃剽竊其通流之所針其大邪之移又即其分部肌肉以親視之毋使之反其真氣可也其所取之穴當刺諸陽經之分肉間耳凡刺小邪日以大補其不足乃無害視其所在迎之界遠近盡至其不得外侵而行之乃自費刺分肉間費廢同此承上文而詳言小者益陽之法電凡刺邪之小者慮其日以益大故必補其不足則真氣當復而無害又視其分部所在以迎其氣來之界而奪之此乃先補不足之經而後瀉其有餘之經是以遠近之真氣盡至其邪不得外侵而行之乃自廢而無留也所謂小者益陽之義如此然刺之之法當取其有邪之分肉間耳凡刺熱邪越而蒼出遊不歸乃無病為通闢門戶使邪得出病乃已闢闢同此承上文而詳言疸熱消滅之法也凡刺熱邪其熱盛則神思外越而意氣蒼茫若出遊不歸乃欲無病當開闢之以通其門戶使熱邪得出所謂瀉其有餘也則病乃自已矣凡刺寒邪日以除徐往徐來致其神門戶已閉氣不分虛實得調其氣存也此承上文而詳言寒痹益溫之法也凡刺寒邪一日之內即當除之用針之間徐往徐來以致其神氣使門戶已閉分氣不泄則虛實得調其真氣自存而寒者溫矣黃帝曰官針奈何岐伯曰刺癰者用鈹針刺大者用鋒針刺小者用圓利針刺熱者用鑱針刺寒者用毫針也第七篇同此承上文而言刺五邪之針各有所宜用也按本經九針論五曰鈹針主大癰膿兩熱爭者也故此曰刺癰者用鈹針又四曰鋒針主癰熱出氣故此曰刺大者用鋒針又六曰圓利針主取遠痹者也故此曰刺小者用圓利針一日鑱針主熱在頭身故此曰刺熱者用鑱針又七曰毫針主寒熱痛痹在絡故此曰刺寒者用毫針請言解論與天地相應與四時相副人參天地故可為解下有漸洳上生葦蒲此所以知形氣之多少也陰陽者寒暑也熱則滋雨而在上根荄少汁人氣在外皮膚緩腠理開血氣減汗大泄皮淖澤寒則地凍水冰人氣在中皮膚致腠理閉汗不出血氣強肉堅澀當是之時善行水者不能往冰善穿地者不能鑿凍善用針者亦不能取四厥血脈凝結堅搏不往來者亦未可即柔故行水者必待天溫冰釋凍解而水可行地可芽也人脈猶是也治厥者必先尉調和其經掌與腋肘與腳項與脊以調之火氣已通血脈乃行然後視其病脈淖澤者刺而平之堅緊者破而散之氣下乃止此所謂以解結者也此詳言針論之義針論二字見官能篇此論字根彼來而有解結之法也官能篇原有解結二字伯言請以言解針論之義必即天地四時為應為副而以人身參之始可為解是故地下有漸洳則上生葦蒲人稟大地之氣有厚薄斯有形氣之多少也天地之陰陽者即寒暑也暑熱則地氣上蒸而滋雨氣在於上所以物之氣亦不在下而在上其根荄當少汁至以人身論之其氣當在表以皮膚則緩以血氣則減以汗則大泄而皮上淖澤此人得天地之暑熱故氣之在外者如此若天地氣寒則地凍水冰氣尚在裡以皮膚則緻密以腠理則閉以汗則不出以血氣則強硬以肌肉則堅澀當是之時其水成冰雖善行水者不能使水之往流其地正凍雖善穿地者不能鑿凍人氣在中雖善用針者不能取四肢厥逆之脈血脈凝堅結聚不能往來未可使之即能和柔故行水者必待天溫冰釋凍解而水可行地可穿也人身之脈既已猶是故治四肢厥逆之脈者必先用火以尉調之和其各經凡掌與腋肘與腳項與脊無不尉之使火氣已通血脈乃行然後視其病脈之淖澤者則刺而平復之其脈堅緊者則破而散之候其氣下乃止針此乃針論解結之法也用針之類在於調氣氣積於胃以通營衛各行其道宗氣流於海其下者注於氣街其上者走於息道故厥在於足宗氣不下脈中之血凝而留止弗之火調弗能取之此承上節用火尉調之義而推明之也凡用針之類在於調病人之氣其氣由胃中而生故氣積於胃也然由中焦之氣降於下焦而生此營氣由下焦之氣升於中焦以升上焦而生此衛氣營衛生會篇所謂營氣出於中焦衛氣出於下焦又曰清者為營濁者為衛是也皆由胃中所積之氣通此營衛之氣以各行其道營氣則隨宗氣以行於經隧之中衛氣則行於各經皮膚分肉之間且所謂宗氣者則流於膻中為氣之海者是也其下而為中下二焦者則注於氣街即足陽明胃經之氣衝穴也故在上之宗氣出喉嚨司呼吸以行息道凡氣自足而上厥則上之宗氣不降脈中之血凝而留止斯時也若弗用火以尉而調之烏能取四肢氣血逆之而解其結哉用針者必先察其經絡之實虛切而循之按而彈之視其應動者乃後取之而下之此言用針者有先察後取之義亦承上文先尉後行之意而推廣之也凡用針者必先察其經絡之或虛或實則實者當瀉虛者當補穴在何經切而循之按而彈之視其氣之來應而動者然後取其穴而下針焉斯可也六經調者謂之不病雖病謂之自已也一經上實下虛而不通者此必有橫絡盛加於大經令之不通視而瀉之此所謂解結也此言六經調者為不病而一經病者即用解結之法也手足各有三陰三陽謂之六經也六經之脈各調和者謂之不病內有一經之脈上實下虛而不通此則足經之氣厥逆而上故上實而下虛其在外必有橫絡之脈盛加於大經之中令其不通乃視之可見者也當視而瀉之此亦所謂解結之法也上寒下熱先刺其項太陽久留之已刺則尉項與肩胛令熱下合乃止此所謂推而上之者也此治上冷下熱之法也凡上冷下熱者先刺其項乃足太陽膀胱經穴也久留其針候其氣至而熱且方已入針之時必尉項與肩胛中令其熱與下合乃止針此其熱在於下者若或推之而上所謂推而上之之法也上熱下寒視其虛脈而陷之於經絡者取之氣下乃止此所謂引而下之者也此治上熱下冷之法也凡上熱下冷者視其下脈之虛而陷之於經絡者補之使上之氣下乃止此其熱在於上者若引而下之所謂引而下之之法也大熱遍身狂而妄見妄聞妄言視足陽明及大絡取之虛者補之血而實者瀉之因其偃臥居其頭前以兩手四指挾按頸動脈久持之卷而切之下至缺盆中而復止如前熱去乃止此所謂推而散之者也此治大熱之法也上文上寒下熱上熱下寒其熱非遍身者也今大熱遍身狂而聞見言語以無為有則熱之極也足陽明經多氣多血為五臟六腑之海故當視其足陽明之大絡取之虛則補之血而實者則瀉之又必因病人偃臥之際醫工居其頭前以兩手各用大指食指共四指挾其頸之動脈而按之即人迎大迎處也又久而持之又卷而切之下至缺盆之中而後止又如前法行之候其熱去乃止此所謂推而散之之法也黃帝曰有一脈生數十病者或痛或癰或熱或寒或癢或痹或不仁變化無窮其故何也岐伯曰此皆邪氣之所生也此言一脈而生數十病者皆邪氣之所生也邪氣者即下文之虛邪也蓋虛邪賊風善行而數變故為病之多有如是也黃帝曰余聞氣者有真氣有正氣有邪氣何謂真氣岐伯曰真氣者所受於天與穀氣井而充身者也正氣者正風也從一方來非實風又非虛風也邪氣者虛風之賊傷人也其中人也深不能自去正風者其中人也淺合而自去其氣來柔弱不能勝真氣故自去此承上文而言氣分為三唯邪氣能傷真氣也真氣者與生俱生受之於天日與穀氣相併而充滿於身者也正氣者正風也從一方來此風非實非虛如春之東風夏之南風秋之西風冬之北風者是也其中人也淺以其風氣之來柔弱不能勝人真氣故耳邪氣者乃虛風之賊傷人者也如冬居葉蟄之官而風自後來者是也大義見歲露篇其中人也深不能自去也所以變化無窮而一脈有數十病耳虛邪之中人也灑淅動形起毫毛而發腠理其入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中則為血閉不通則為癰搏於肉與衛氣相搏陽勝者則為熱陰勝者則為寒寒則真氣去去則虛虛則寒搏於皮膚之間其氣外發腠理開毫毛搖氣往來行則為癢留而不去為痹衛氣不行則為不仁此承上文而言虛邪入人之深有為骨痹為筋攣為癰為熱為寒為癢為不仁等病也虛邪之中人也初時灑淅惡寒以振動其形起人毫毛發人腠理其邪既入深內搏於骨則為骨痹搏於筋則為筋攣搏於脈中而血閉不通則為癰腫搏於肉而與衛氣相搏當是時陽氣勝者則為熱乃陽經之氣勝陰經也陰氣勝者則為寒乃陰經之氣勝陽經也寒則真氣去而且虛其寒搏於皮膚之間邪氣外發腠理開其毫毛搖氣往來而行則為癢留而不去則為痹衛氣不行則為不仁不知痛癢也虛邪偏客於身半其入深內居營衛營衛稍袁則真氣去邪氣獨留發為偏枯其邪氣淺者脈偏痛此承上文而言虛邪之入人深則為偏枯淺則為脈痛皆變化無窮之義也虛邪之入於身也深寒與熱相搏久留而內著寒勝其熱則骨疼肉枯熱勝其寒則爛肉腐肌為膿內傷骨內傷骨為骨蝕有所疾前筋筋屈不得伸邪氣客居其間而不反發為筋溜有所結氣歸之衛氣留之不得反津液久留合而為腸溜久者數歲乃成以手按之柔已有所結氣歸之津液留之邪氣中之凝結日以易甚連以聚居為昔瘤以手按之堅有所結深中骨氣因於骨骨與氣並日以益大則為骨疽有所結中於肉宗氣歸之邪留而不去有熱則化而為膿無熱則為肉疽凡此數氣者其發無常處而有常名也著著同此承上文而悉舉虛邪中人之病亦變化無窮之義也虛邪入於人者既深則寒與熱相搏如久留而內著其寒勝夫熱則為骨疼而肉枯熱勝夫寒則為肉爛而肌腐且為膿及內傷其骨也內傷其骨則為骨蝕骨蝕者骨有所損也必有其所如內傷其筋而疾在前筋則筋自屈而不得伸邪氣居其中而不出則發為筋溜筋溜者筋有所流注也亦必有其所如邪氣有所結而歸於內衛氣亦留於內而不得出以反於外所以津液亦久留於其中則合而為腸溜腸溜者腸有所流注也久者數歲乃成以手按之則可至於柔然亦必有其所如或邪氣之結者歸於內津液留於內而又有邪氣中之則凝結易至於日甚遂致相連而聚居於內當為昔瘤言非一日而成者也以手按之則堅且有其所又或結深中骨則邪氣因於骨骨與氣並日以益大則為骨疽亦有其所若或結氣中之於肉上焦宗氣正行於其所被邪氣留而不去如有熱則化而為膿如無熱則止為肉疽凡此數等邪氣其發雖無一定之處而各有一定之名也衛氣行第七十六詳論衛氣之行故名篇黃帝問於岐伯曰願聞衛氣之行出入之合何如岐伯曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昂為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五歲是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目鋭眥下手太陽下至手小捐之間外側其散者別於目鋭眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五當作次指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周此言衛氣之行晝行於陽經夜行於陰經而一晝一夜乃五十度周於身也出入者或出陽經以入陰經或出陰經以入陽經也伯言一歲之內有十二月一日之中有十二時其夜之子時晝之午時當為南北之經經者自縱而言之也旦之卯時夕之酉時當為東西之緯緯者自橫而言之也繞大一周有二十八宿而一方計有七星四方各七則四七計有二十八星其房昴為東西之緯虛張為南北之經是故房至畢則為星之屬陽者也昴至心則為星之屬陰者也陽星則主於晝陰星則主於夜故人身衛氣之行一日一夜當為五十周於身其晝日行於陽經者二十五周蓋自足太陽而至手陽明也夜行於陰經者二十五周蓋自足少陰而至足太陰也彼六氣者自甲子以至戊辰五歲方周百刻見素問六微旨大論帝曰願聞其歲六氣始終早晏何如岐伯曰甲子之歲初之氣天氣始於水下一刻至戊辰歲初之氣又始於水下一刻周而復始而衛氣則一晝夜而周故謂之周於五歲也何以見晝行陽經者二十五周是故自平旦之時則行於陰經者盡矣此陽氣者即衛氣也出於目之睛明穴正以目開則衛氣上行於頭乃循項下足太陽膀胱經之衆穴又循背下至足小指之湍至陰穴其在頭而散者別於目之鋭眥近聽宮穴下手太陽小腸經而至於手小指外側之少澤穴其在頭而又散者別於目鋭眥即足少陽之瞳子髎穴以下足少陽之經而注於足第四指間之竅陰穴又從而上循手少陽之分側以下至手小指之間關衝穴其別而散者以上至耳前合於頷脈上近足陽明經之承泣穴乃注足陽明之經而下行至足跗面之衝陽穴人次指之間厲兌穴其在頭而散者從耳下下行手陽明經之迎香等穴以入手大當作次指之間商陽穴入手掌中此則晝行於陽經者如此計二十五度至夜則行於陰經亦二十五度其至於足少陰腎經乃足心之湧泉穴出內踝下行陰分自足少陰腎經而行手少陰心經手太陰肺經足厥陰肝經足太陰脾經其夜行於陰經者計有二十五度至明日平旦陰經已盡而陽經又受氣則復因目開而會於目又自足太陽膀胱經之睛明穴始也故謂之五十度為一周者以此是故曰行一舍人氣行一周與十分身之八日行二舍人氣行二周於身與十分身之六日行三舍人氣行於身五周與十分身之四日行四舍人氣行於身七周與十分身之二日行五舍人氣行於身九周日行六舍人氣行於身十周與十分身之八日行七舍人氣行於身十二周在身與十分身之六日行十四舍人氣二十五周於身有寄分與十分身之四陽盡於陰陰受氣矣其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為周是故夜行一合人氣行於陰臟一周與十分臟之八亦如陽行之二十五周而復合於目陰陽一日一夜合有奇分十分身之四與十分臟之二是故人之所以臥起之時有早晏者奇分不盡故也按伯高所言大約日行舍數衛氣所行之數俱舉成數而言愚今細分其數則於晝夜各行二十五度之數庶無繆矣以俟後之明者而再訂之此承上文而詳言衛氣晝夜各行二十五度之義也是故日行一舍人氣行一周與十分身之八人氣者衛氣也對天之日數而言故謂衛氣為人氣此當言日行舍八分七釐半漏水下三刻一分二釐半人氣行一周五分六釐二毫半日行二舍人氣行二周於身與十分身之六當云日行一舍七分半漏水下六刻二分半人氣行三周一分二釐半日行三舍