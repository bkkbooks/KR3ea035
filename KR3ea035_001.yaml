body:
  text: 卷之一靈樞者內經篇名蓋內經為總名中有素問八十一篇靈樞八十一篇素問曾經唐寶應年間啓玄子王冰有注其靈樞自古迄今並無注釋晉皇甫士安以針經名之按本經首篇九針十二原中有先立針經一語又素問八正神明論亦岐伯云法往古者先知針經也是素問之言亦出自靈樞首篇耳後世王冰釋素問以靈樞針經雜名宋成無己釋傷寒論及各醫籍凡引靈樞者皆不曰靈樞而曰針經其端皆始於皇甫士安也但針經二字止見於本經首篇其餘所論營衛腧穴關格脈體經絡病證三才萬象糜不森具雖每篇各病必用其針自後世易靈樞以針經之名遂使後之學者視此書止為用針棄而不習以故醫無入門術難精詣無以療疾起危深可痛惜豈知素問諸篇隨問而答頭緒頗多入徑殊少靈樞大體渾全細目畢具猶儒書之有大學三綱八目總言互發真醫家之指南其功當先於素問也今愚析為九卷者按班固漢書藝文志曰黃帝內經十八卷素問九卷靈樞九卷乃其數焉又按素問離合真邪論黃帝曰夫九針九篇夫子乃因而九之九九八十一篇以起黃鐘數焉大都神聖經典以九為數而九九重之各有八十一篇王冰分靈樞為十二卷宋史嵩分為二十四卷者皆非也愚今分為九卷一本之神聖遺意耳後世道德經難經俱八十一篇其義仿此然謂之曰靈樞者正以樞為門戶闔闢所繫而靈乃至玄之稱此書之切何以異是且愚注釋此書並以本經為照應而素問有相同者則援引之至於後世醫籍有訛者則以經旨正之於分注之下然後之學者當明病在何經用針合行補瀉則引而伸之用藥矣猶是矣切勿泥為用針之書而與彼素問有所軒輕於其中也九針十二原第一內有九針之名又有十二原穴故名篇自篇內小針之要以下岐伯盡解於第三篇小針解之內故愚釋此篇即以小針解之義入之不敢妄用臆說也素問有針解篇亦與此二篇小同當合三篇而觀之其義無餘蘊矣舊本以第一篇為法天第二篇為法地三篇為法人四篇法時五篇法音六篇法律七篇法星八篇法風九篇法野乃後人襲本經七十八篇九針論之意而分注之殊不知彼乃論針而非論篇目也甚為無理故愚削之黃帝問於岐伯曰餘子萬民養百姓而收其租稅余哀其不給而屬有疾病余欲勿使被毒藥無用砭石欲以微針通其經脈調其血氣營其逆順出入之會令可傳於後世必明為之法令終而不滅久而不絶易用難忘為之經紀異其章別其表裡為之終始令各有形先立針經願聞其情岐伯答曰臣清推而次之令有綱紀始於一終於九焉按本紀記帝經土設井立步制畝藝五穀養萬民則子萬民收租稅信矣令平聲易去聲別彼劣切此帝欲立針經而伯遂推而次之也請言其道小針之要易陳而難入粗守形上守神神乎神客在門未睹其疾惡知其原刺之微在速遲粗守關上守機機之動不離其空空中之機清靜而微其來不可逢其往不可追知機之道者不可掛以發不知機道叩之不發知其往來要與之期粗之喑乎妙哉工獨有之往者為逆來者為順明知逆順正行無問迎而奪之惡得無虛追而濟之惡得無實迎之隨之以意和之針道畢矣令平聲惡音烏下同空上聲按素問至真要大論亦有明知逆順正行無問二句但彼論標本而此論針法辭同而義異也此詳言小針之要而針道之所以畢也小針者即上節微針也小針之要雖曰易陳而人實難入粗工者下工也下工泥於形跡徒守刺法上工則守人之神凡人之血氣虛實可補可瀉一以其神為主不但用此針法而已也所謂神者人之正氣也神乎哉此正氣不可不守也邪氣之所感有時如客之往來有期名之曰客客在門者邪客於各經之門戶也若未能先睹何經之疾則惡知其病源所在自有所治之處哉然既知病源可行刺法但刺之微妙在於速遲速遲者即用針有疾徐之意也粗工則徒守四肢之關節而不知血氣正邪之往來上工則能守其機即知此氣之往來也然此機之動不離於骨空之中素問有骨空論指各經之穴言其間氣有虛實而用針有疾徐故空中之機至清至靜至微針下即已得氣當密意守之勿失也如氣盛則不可補故其來不可逢也如氣虛則不可瀉故其往不可追也知機之道者唯此一氣而已猶不可掛一發以間之故守此氣而勿失也不知機之道者雖叩之亦不能發以其不知虛實不能補瀉則血氣已盡而氣故不下耳由此觀之必能知其往來有逆順盛虛之機然後要與之期乘氣有可取之時彼粗工冥冥不知氣之微密其誠暗乎妙哉工獨有之真上工盡知針意也所謂往來逆順者何哉往者其氣虛小即為逆故追而濟之以行補法惡得無實來者形氣將平即為順故迎而奪之以行瀉法惡得無虛此所以明之逆順乃正行之道而不必復問於人惟以追之隨之而以吾意和之此針道之所以畢也凡用針者虛則實之滿則泄之宛陳則除之邪勝則虛之大要曰徐而疾則實疾而徐則虛言實與虛若有若無察後與先若存若亡為虛為實若得若失虛實之要九針最妙補瀉之時以針為之瀉曰必持內之放而出之排陽得針邪氣得泄按而引針是謂內溫血不得散氣不得出也補曰隨之隨之意若妄之若行若按如蚊虻止如留而還去如弦絶令左屬右其氣故止外門已閉中氣乃實必無留血急取誅之內納同按此節明解於小針解篇彼素問針解篇所解與此稍異此承上文而言用針之要全憑虛實以為補瀉也凡用針者其氣口虛則當補之故曰虛則實之也其氣口盛則當瀉之故曰滿則泄之也氣口為百脈所朝故候此以知盛虛素問陰陽別論云氣口成才以決死生血脈相結則當去之故曰宛陳則除之也諸經邪盛則當瀉之故曰邪勝則虛之也大要有曰凡欲補者徐納其針而疚出之則為補故曰徐而疾則實也凡欲瀉者疾納其針而徐出之則為瀉故曰疾而徐則虛也然言實與虛真若有而若無者蓋實者止於有氣虛者止於無氣氣本無形似在有無之間耳察後與先真若存而若亡者蓋實者先虛而後實若亡而又若存也虛者先實而後虛若存而又若亡也亦以虛實本於一氣似在存亡之間耳為虛與實真若得而若失者蓋瀉之而虛恍然若有所失補之而實佖然若有所得亦以虛實本於一氣似在得失之間耳由此觀之則虛實二字實為用針之要其九針之最妙者乎因虛而補之以時因實而瀉之以時不過以針為之而已其瀉者始必持針以納之終必放針以出之排陽氣以得針則邪氣自得泄矣其補者按而引針以入之是謂內溫使血不得散氣不得出此則所以補之也補之者隨之也隨之之意若人之意妄有所之若人之出妄有所行若人之指妄有所按如蚊虻止於其中如有所留而復有所還及針將去時如弦之絶即始徐而始疾者也右手出針而左手閉其外門乃令左屬右之法其正氣已上於其中門戶已閉於其外中氣乃實必無留血如有留血當急取以責之但此補法必無留血者也佖呼狂切狂貌佖音必滿貌持針之道堅者為寶正指直刺無針左右神在秋毫屬意病者審視血脈刺之無殆方刺之時必在懸陽及與兩衛神屬勿去知病存亡血脈者在腧橫居視之獨澄切之獨堅此言持針之道在守醫者之神氣以視病者之血脈也持針之道貴於至堅故堅者為寶既以堅持其針乃正指而直刺之無得輕針左右當自守神氣不可眩惑其妙在於秋毫之間而已上文言上守神者病者之神氣而此曰神在秋毫神屬勿去乃醫工之神氣也所謂神在秋毫者何哉須知屬意於病者審視其血脈之虛實而刺之則無危殆矣方刺之時又在揚吾之衛氣為陽氣者精爽不昧而病人之衛氣亦陽氣也當彼此皆揚使吾之神氣屬意於病者而勿去則病之存亡可得而知也然血脈何以驗之在於各經腧穴而橫居其中者是也視之獨澄切之獨堅此其為血脈耳然必先自守其神而後可以視病人之血脈其乃要之要乎九針之名各不同形一曰鑱針長一寸六分二曰員針長一寸六分三匙曰針長三寸半四曰鋒針長一寸六分五曰鈹針長四寸廣二分半六曰員利針長一寸六分七曰毫針長三寸六分八曰長針長七寸九曰大針長四寸鑱針者頭大末鋭去瀉陽氣員針者針如卵形揩摩分間不得傷肌肉以瀉分氣匙針者鋒如黍粟之鋭主按脈勿陷以致其氣鋒針者刃三隅以發痼疾鈹針者末如劍峰以取大膿員利針者大如犛且員且鋭中身微大以取暴氣毫針者尖如蚊虻靜以徐往微以久留之而養以取痛痹長針者鋒利身薄可以取遠痹大針者尖如挺其鋒微員以瀉機關之水也九針畢矣鑱擔銜切匙音低鈹音皮喙謝穢切犛音毫此言九針之體而及其所以為用也大義見本經九針論第七十八篇故此不詳解之後九針論有九針圖夫氣之在脈也邪氣在上濁氣在中清氣在下故針陷脈則邪氣出針中脈則濁氣出針太深則邪氣反沉痛益故曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜無實無虛損不足而益有餘是謂甚病病益甚取五脈者死取三脈者框奪陰者死奪陽者狂針害畢矣恇曲王切不足也此言三氣之當刺而又舉針害以為戒也邪氣之中人也高凡風寒暑雨之邪由上感之故曰邪氣在上也邪氣由風府風門而入水穀皆入於胃其精微之氣上注於肺而寒溫不適飲食不節則濁氣獨留於腸胃而病生故曰濁氣在中也清濕之地氣中人也必從足始故曰清氣在下也治之者必針於上以取其陷脈則上之邪氣可出針其中脈以取足陽明胃經之合即三里穴則中之濁氣可出然針之勿宜太深正以淺浮之病不欲深刺若刺之深則邪氣從之反沉而病益深也故曰皮肉筋脈經絡各有所主九針各不同形各當任其所宜無實其實而益其有餘無虛其虛而損其不足若實實虛虛是謂甚人之病彼病反益甚也凡病在中氣不足用針以大瀉其諸經之脈則五臟皆虛故曰取五脈者死手足各有三陽若盡瀉三陽之氣則病人恇然而形體難復故曰取三脈者恇本經玉版篇云追之五里中道而止五至而已五往而臟之氣盡言五里系手陽明大腸經穴乃禁刺者也追之五里以瀉之中道以出針又復刺之者五則五次瀉之而臟之氣已盡所謂臟者手太陰肺經也肺為百脈之宗故曰奪陰者死也取三陽之脈而奪之已盡故曰奪陽者狂也此論針害者已畢矣刺之而氣不至無問其數刺之而氣至乃去之勿復針針各有所宜各不同形各任其所為刺之要氣至而有效效之信若風之吹雲明乎若見蒼夭刺之道畢矣此又言刺道之要以氣之至不至為度也凡刺之而氣尚未至當無問其數以守之所謂如待貴人不知日暮者是也若刺之而氣已至則乃去其針耳上文曰皮肉筋脈各有所處病各有所宜各不同形各以任其所宜而此又重言針各有所宜各不同形各任其所為者叮嚀之意也所謂刺之而氣至乃去之勿復針者何哉正以刺之為要既以氣至而有效則信哉有效之時若風吹雲明乎若見蒼天此為有效之驗也黃帝曰願聞五臟六腑所出之處岐伯曰五臟五腧五五二十五腧六腑六腧六六三十六腧經脈十二絡脈十五凡二十七氣以上下所出為井所溜為滎所注為輸所行為經所入為合二十七氣所行皆在五腧也溜流同難經以流代之此言臟腑有井滎輸原經合之穴皆經絡之脈所由行也五臟者心肝脾肺腎也每臟有井滎輸經合之五腧則五五二十五腧也六腑者膽胃大腸小腸三焦膀胱也每腑有井滎輸原經合之六腧則六六三十六腧也夫臟有五腑有六而又加心包絡一經則經脈計有十二十二經有十二絡穴而又加以督之長強任之尾翳及脾又有大包則絡脈計有十五此十五絡穴據本經經脈篇而言難經不言長強尾翳而言陽蹺陰蹺者非經旨也又據素問平人氣象論則胃有二絡乃豐隆虛里觀脾有二絡公孫大包則胃宜有二絡也以十二而加十五凡有二十七氣也以此井滎輸原經合之腧而行上行下其始所出之穴名為井穴如水之所出從山下之井始也如肺經少商之類水從此而流則為滎穴滎者釋文為小水也如肺經魚際之類又從此而注則為輸穴輸者注此而輸運之也如肺經太淵之類又從而經過之則為經穴如肺經經渠之類又從而水有所會則為合穴如肺經尺澤之類是二十七氣所行皆在此井滎輸經合之五腧耳言五腧而不言原穴者以陰經有輸而無原而陽經之原以輸並之也節之交三百六十五會知其要者一言而終不知其要流散無窮所言節者神氣之所遊行出入也非皮肉筋骨也此言節之所交正神之所出入此其為要之當知也凡節之所交計三百六十五會實經絡滲灌諸節者也此節者乃要之所在故能知其要可一言而終不知其要則流散無窮矣此四句又見素問至真要大論但彼以司天在泉之寸尺左右應與不應言之且節者即神氣之所遊行出入也非皮肉筋骨之謂也由此觀之則欲行針者當守其神而欲守其神者當知其節學者可不於三百六十五會而求之哉觀其色察其目知其散復一其形聽其動靜知其邪正右主推之左持而御之氣至而去之此與後四時氣篇第十四節相似此又言用針之法察色辨形以詳審之然後可以行針也人之五色皆見於目故上工睹其色必察其目知其正氣之散復又必一其形聽其動靜凡尺之小大緩急滑澀無不知之遂以言其所病然後能知虛邪正邪之風由是右手主於推之所以入此針也左手則持針而御之然後可以出此針也正以候其補瀉已調氣之已至始去其針也凡將用針必先診脈視氣之劇易乃可以治也五臟之氣已絶於內而用針者反實其外是謂重竭重竭必死其死也靜治之者輒反其氣取腋與膺五臟之氣已絶於外而用針者反實其內是謂逆厥逆厥者必死其死也躁治之者反取四末此又言用針之要必先診脈而誤治者所以害人也凡將用針必先診脈視脈氣之劇易乃可以治之五臟之氣已絶於內則脈口氣內絶不至內絶不至者重按之而脈不至當實其內焉可也而用針者反取其外之病處與陽經之合穴有留針以致陽氣陽氣至則內重竭重竭則死其死也無氣以動故靜所謂反實其外者即輒反其氣取腋與膺也腑與膺者諸臟穴之標也外也五臟之脈已絶於外則脈口之氣外絶不至外絶不至輕舉之而脈不至當實其外焉可也而用針者反實其內取其四末之穴即井滎輸經合諸臟穴之本也內也乃留針以致其陰氣則陽氣入陽氣入則厥逆厥逆則必死其死也陰氣為陽搏而有餘故躁陽氣內入而陰氣有餘故陽入則躁按此節以脈口氣內絶不至為陰虛理當補陰即補臟脈口氣外絶不至理當補陽即補腑難經以寸口之心肺為外為陽尺之腎肝為內為陰乃秦越人之臆說而非小針解之本義也刺之害中而不去則精泄害中而去則致氣精泄則病益甚而恇致氣則主為癰瘍中去聲按本經寒熱病篇云凡刺之害中而不去則精泄不中而去則致氣比此節多一不字據大義此分補瀉彼止以瀉實言此承上文而言行針之誤也凡刺者瀉實既中其害則當去其針而久之不去則精氣反泄所以病益甚而恇也凡刺者補虛既中其害則當留針而遂乃去之則邪氣仍致所以生為癰瘍也彼寒熱病篇乃曰不中而去則致氣是亦本瀉實者而言也蓋言不中其害而疾去其針則邪氣仍在所以生為癰疽也癰疽與癰瘍無異五臟有六腑六腑有十二原十二原出於四關四關主治五臟五臟有疾當取之十二原十二原者五臟之所以稟三百六十五節氣味也五臟有疾也應出十二原十二原各有所出明知其原睹其應而知五臟之害矣陽中之少陰肺也其原出於太淵太淵二陽中之太陽心也其原出於大陵大陵二陰中之少陽肝也其原出於太衝太衝二陰中之至陰脾也其原出於太白太白二陰中之太陰腎也其原出於太溪太溪二青之原出於鳩尾鳩尾一肓之原出於脖胦脖胦一凡此十二原者主治五臟六腑之有疾者也脖蒲沒切此言五臟六腑之有疾者當取之十二原穴也內有五臟外有六腑以為之表裡臟腑有十二原穴十二原穴出於四關四關者即手肘足膝之所乃關節之所繫也故凡井滎輸經合之穴皆手不過肘而足不過膝也此四關者主治五臟凡五臟有疾當取之十二原正以十二原者五臟之所以稟三百六十五節之氣味也故五臟有疾應出於十二原十二原各有所出必明知其原睹其應而知五臟之為害矣故心肺居於膈上皆為陽陽中之少陰肺也其原出於太淵左右各一掌後陷中肺脈所注為輸土針二分留二呼灸三壯陰經無原輸穴代之余仿此陽中之太陽心也其原出於大陵左右各一按大陵系手厥陰心包絡經穴所注為輸土此經代心經以行事故不曰本經之神門而曰包絡經之大陵在掌後骨下兩筋間針六分留七呼灸三壯腎肝居於膈下而脾居中州皆為陰陰中之少陽肝也其原出於太衝左右各一足大指本節後二寸動脈應手陷中肝脈所注為輸土針三分留七呼灸三壯陰中之至陰脾也其原出於太白左右各一足大指內側內踝前核骨下陷中脾脈所注為輸土針三分留七呼灸三壯陰中之太陰腎也其原出於太溪左右各一足內踝後跟骨上動脈陷中男子婦人病有此脈則生無則死腎脈所注為輸土針三分留七呼灸三壯膏之原出於鳩尾其穴一一名尾翳一名𩩲骬蔽骨之端在臆前蔽骨下五分人無蔽骨者從岐骨下一寸言其骨垂下如鳩尾形禁灸大妙手方可針育之原出於脖胦其穴一一名下氣海一名下盲臍下一寸半宛宛中男子生氣之海針八分得氣瀉後宜補之灸七壯按本篇止言五臟之原而不言六腑乃以鳩尾脖胦足之難經六十六難則五臟之外言少陰之原出於兌骨膽之原出於丘墟胃之原出於衝陽三焦之原出於陽池膀胱之原出於京骨大腸之原出於合谷小腸之原出於腕骨則始於十二原為悉耳脹取三陽飧泄取三陰此言脹與飧泄各有所取之經也凡病脹者當取足三陽經即胃膽膀胱也凡飧泄者當取足三陰經即脾肝腎也今夫五臟之有疾也譬猶刺也猶汙也猶結也猶柿也刺雖久猶可拔也汙雖久猶可雪也結雖久猶可解也柿雖久猶可決也或言久疾之不可取者非其說也夫善用針者取其疾也猶拔刺也猶雪汙也猶解結也猶決柿也疾雖久猶可畢也言不可治者未得其術也柿讀為閉此詳喻久疾之猶可治也刺諸熱者如以手探湯刺寒清者如人不欲行陰有陽疾者取之下陵三里正往無殆氣下乃止不下復始也疾高而內者取之陰之陵泉疾高而外者取之陽之陵泉也此言諸病各有當治之穴也凡刺諸熱者如以手探湯其熱可畏也刺寒冷者如人不欲行其寒可畏也陰經有陽病者當取之下陵三里系足陽明胃經穴即三里穴系四字一名又見下本輸篇用針以正往者則無殆候其氣至乃止針如不下當復始也疾高而在內者當取之下故陰陵泉在膝下內廉系足太陰脾經穴必取此而刺之所以應其上之內也疾高而在外者亦當取之下故陽陵泉在膝下外廉系足少陽膽經穴必取此而刺之所以應其上之外也本輸第二輸俞腧三字古通用輸者以其脈氣之轉輸也俞者從省腧從肉本篇輸字是言推本各經之有腧穴也故名篇黃帝問於岐伯曰凡刺之道必通十二經絡之所終始絡脈之所別處五腧之所留六腑之所與臺四時之所出入五臟之所溜處闊數之度淺深之狀高下所至願聞其解岐伯曰請言其次也肺出於少商少商者手大捐端內側也為井木溜於魚際魚際者手魚也為滎注於太淵太淵魚後一寸陷者中也為輸行於經渠經渠寸口中也動而不居為經入於尺澤尺澤肘中之動脈也為臺手太陰經也此言肺經井滎輸經合之穴也十二經者手足經各有三陰三陽也十二絡者十二經各有一絡穴惟脾有公孫大包二絡其督脈經之長強任脈經之尾翳共有十五絡穴也五腧者即每經之井滎輸經合也六腑者膽胃大小腸膀胱三焦也凡經脈之所出者為井所流者為滎所注者為輸所行者為經所入者為合如水之出於谷井而流之注之經之始有所合也陽經則有原穴遇輸穴並過之故治原即所以治輸也陰經止有輸穴遇輸穴即代之故治輸即所以治原也陽經之井屬庚金以陰經之井乙木為之合陰經之井屬乙木以陽經之井庚金為之合陽井金生陽滎水陽滎水生陽輸木陽輸木生陽經火陽經火生陽合土陰井木生陰滎火陰滎火生陰輸土陰輸土生陰經金陰經金生陰合水此五行相生之次也試以肺經言之肺出於少商手大指端內側也為井木去爪甲如韭葉針一分留三呼瀉五吸不宜灸溜者流也流於魚際即手之魚肉也為滎火大指本節後內側陷中針一分留三呼灸三壯注於太淵魚後一寸陷者中也為輸土掌後陷中針一分留二呼灸三壯行於經渠寸口中也動而不居為經金寸口陷中針一分留三呼禁灸入於尺澤肘中約紋之動脈也為合水針三分留三呼灸三壯此皆手太陰肺經之穴也心出於中衝中衝手中指之端也為井木溜於勞宮勞宮掌中中指本節之內間也為滎注於大陵大陵掌後兩骨之間方下者也為輸行於間使間使之道兩筋之間三寸之中也有過則至無過則止為經入於曲澤曲澤肘內廉下陷者之中也屈而得之為合手少陰也間去聲又以手厥陰心包絡經言之出於中衝在手中指之端為井木去爪甲如韭葉陷中針一分留三呼灸一壯溜於勞宮在掌中即中指本節後之內間也為滎火針三分留六呼禁灸注於大陵在掌後兩骨之間方下者也為輸土針五分留七呼灸三壯行於間使間使脈行兩筋之間三寸之中有過者有病也有病則其脈至無病則其脈止所行為經金針三分留三呼灸三壯入於曲澤即肘內廉下陷者之中也屈肘而得之所入為合水針三分留七呼灸三壯此皆手少陰心經之穴也蓋心為五臟六腑之大主不可受病而心包絡與心經相通代君主以行事者也凡刺穴者刺心包絡而已故此諸穴本系心包絡經而遂以手少陰心經名之也大義又見後邪客篇六七八節肝出於大敦大敦者足大捐之端及三毛之中也為井木溜於行間行間足大指間也為滎注於太衝太衝行間上二寸陷者之中也為輸行於中封中封內踝之前一寸半陷者之中使逆則宛使和則通搖足而得之為經入於曲泉曲泉輔骨之下大筋之上也屈膝而得之為合足厥陰也踝胡瓦切後同此言肝經井滎輸經合之穴也肝出於大敦在足大指之端三毛之中也為井木去爪甲如韭葉一云內側為隱白外側為大敦針三分留十呼灸三壯流於行間在足大指縫間動脈應手之陷中為滎火針三分留五呼灸三壯注於太衝在行間上二寸陷者之中動脈應手為輸土素問上古天真論女子二七太衝脈盛月事以時下故能有子又診病人太衝脈有無可以決死生針三分留十呼灸三壯行於中封在內踝之前一寸半筋里宛宛陷中使針而逆其氣是謂迎之也迎而瀉之則宛宛中之穴可得使其氣既和則其氣自通搖其足而得之大筋之上屈膝橫紋頭取之為合水針六分留十呼灸三壯此皆足厥陰肝經之穴也脾出於隱白隱白者足大指之端內側也為井木溜於大都大都本節之後下陷者之中也為滎注於太白太白核骨之下也為輸行於商丘商丘內踝之下陷者之中也為經入於陰之陵泉陰之陵泉輔骨之下陷者之中也伸而得之為合足太陰也此言脾經井滎輸經合之穴也脾出於隱白在足大指之端內側為井木去爪甲如韭葉針一分留三呼灸三壯流於大都在本節之後內側陷者之中赤白肉之際為滎火針三分灸三壯注於太白在內踝前核骨下陷中為輸土針三分灸三壯行於商丘在內踝之下陷者之中為經金針三分灸三壯入於陰陵泉在膝內廉輔骨之下陷者之中伸足而得之為合水取曲泉當屈膝取陰陵泉當伸足與外廉陽陵泉相對針五分此皆足太陰脾經之穴也腎出於湧泉湧泉者足心也為井木溜於然谷然谷然骨之下者也為滎注於太溪太溪內踝之後跟骨之上陷中者也為輸行於復溜復溜上內踝二寸動而不休為經入於陰谷陰谷輔骨之後大筋之下小筋之上也按之應手屈膝而得之為合足少陰經也此言腎經井滎輸經合之穴也腎出於湧泉在足心為井木屈足踡指足心宛宛陷中跪取之針三分留三呼無令出血灸三壯灸不及針流於然谷在然骨之下為滎火一名龍淵足內踝起大骨一寸下陷中針三分留三呼不宜見血令人立飢灸三壯注於太溪在內踝之後跟骨之上動脈應手為輸土男女有此脈則生無此脈則死針三分留七呼灸三壯行於復溜在足內踝上二寸筋骨陷中其脈動而不休為經金前旁骨是復溜後旁筋是交信二穴止隔一條筋針三分留七呼灸五壯入於陰谷在輔骨之後大筋之下小筋之上按之應手屈膝乃得之為合水此皆足少陰腎經之穴也膀胱出於至陰至陰者足小指之骨端也為井金溜於通谷通告本節之前外側也為滎注於束骨束骨本節之後陷者中也為輸過於京骨京骨足外側大骨之下為原行於崑崙崑崙在外踝之後跟骨之上為經入於委中委中膕中央為合委而取之足太陽也此言膀胱經井滎輸原經合之穴也膀胱出於至陰在足小指外側端為井金去爪甲如韭葉針一分留五呼灸三壯流於通谷在本節前外側陷中為滎水針二分留五呼灸三壯注於束骨在本節之後赤白肉際陷者中為輸木針三分留七呼灸三壯過於京骨在外側大骨之下赤白肉際陷中為原木針三分留七呼灸三壯行於崑崙在外踝之後跟骨之上細脈應手為經火針三分留十呼妊婦刺之落胎灸三壯入於委中膝後膕中約紋中動脈為合土一名郤血令人面挺伏地臥取之針五分留七呼灸三壯此皆足太陽膀胱經之穴也膽出於竅陰竅陰者足小指次指之端也為井金溜於俠溪俠溪足小揩次指之間也為滎注於臨位臨泣上行一寸半陷者中也為輸過於丘墟丘墟外踝之前下陷者中也為原行於陽輔陽輔外踝之上輔骨之前及絶骨之端也為經入於陽之陵泉陽之陵泉在膝外陷者中也為合伸而得之足少陽也俠音匣此言膽經井滎輸原經合之穴也膽出於竅陰在足小指之次指即第四指之端為井金去爪甲如韭葉針一分留三呼灸三壯流於俠溪在足小指次指岐骨間本節前為滎水針三分留三呼灸二壯注於臨泣去俠溪上行一寸半即本節後陷者中為輸木針二分留五呼灸三壯過於丘墟在足外踝之前陷中去臨泣三寸為原木針五分留七呼灸三壯行於陽輔在外踝之上四寸輔骨之前絶骨之端三分去丘墟七寸為經火針五分留七呼灸三壯入於陽陵泉在膝外廉下一寸陷者中伸足而得之為合土針六分留十呼灸七壯此皆足少陽膽經之穴也胃出於厲兌厲兌者足大指內次捐之端也為井金溜於內庭內庭次捐外間也為滎注於陷谷陷谷者上中捐內間上行二寸陷者中也為輸過於衝陽衝陽足跗上五寸陷者中也為原搖足而得之行於解溪解溪上衝陽一寸半陷者中也為經入於下陵下陵膝下三寸胻骨外三里也為合復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉也大腸屬上小腸屬下足陽明胃脈也大腸小腸皆屬於胃是足陽明也此言胃經井滎輸原經合之穴也胃出於厲兌在足大指之次指端為井金去爪甲如韭葉針一分灸一壯流於內庭在次指外間陷中為滎水針三分留十呼灸三壯注於陷谷在次指之外間上中指之內間上行去內庭二寸陷者中為輸木針五分留七呼灸三壯過於衝陽在足跗上五寸去陷谷三寸陷者中搖足而得之為原木針三分留十呼灸三壯行於解溪上衝陽一寸半陷者中為經火針五分留三呼灸三壯入於下陵即膝下三寸䯒骨外廉大筋宛宛中之三里穴也為合土針五分留五呼多可日灸七壯加至百壯又三里下三寸為巨虛上廉一名上巨虛復下上廉三寸為巨虛下廉一名下巨虛大腸經屬於上巨虛小腸經屬於下巨虛正以胃為五臟六腑之海而大小腸二經又屬之胃穴耳此皆足陽明胃經之穴也三焦者上合手少陽出於關衝關衝者手小指次指之端也為井金溜於液門液門小指次指之間也為滎注於中諸中諸本節之後陷者中也為輸過於陽池陽池在腕上陷者之中也為原行於支溝支溝上腕三寸兩骨之間陷者中也為經入於天井天井在肘外大骨之上陷者中也為合屈肘乃得之三焦下腧在於足大指之前少陽之後出於膕中外廉名曰委陽是太陽絡也手少陽經也三焦者足少陽太陰當作太陽之所將太陽之別也上踝五寸別入貫腨腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則瀉之腨時兗切此言三焦經井滎輸原經合之穴也本經本臟篇言腎合三焦膀胱則是左腎合膀胱而右腎合三焦也然三焦下與右腎相合而其脈上行於手之第四指故曰上合於手之少陽也出於關衝在手小指之次指即手第四指之端也為井金針一分留三呼灸三壯流於液門在小指之次指間陷中握拳取之為滎水針一分留二呼灸三壯注於中渚在手小指之次指本節後陷中為輸木液門下一寸針二分留三呼灸三壯過於陽池在手腕上陷中為原木針二分留六呼禁灸行於支溝上手腕後臂外二寸兩骨間陷中為經火一名飛虎針二分留七呼灸三壯入於天井在肘外大骨之上陷中屈肘拱胸得之為合土針三分留七呼灸五壯此手少陽三焦經穴也然三焦之經脈雖行於手而其腑則附於右腎而生故其所附之下腧又在於足其穴在足大指之前當作足小指之前蓋小指乃足太陽膀胱經脈氣所行也即足太陽膀胱經脈氣所行及足少陽膽經脈氣所行之後出於膕中外廉名曰委陽是足太陽膀胱經之絡脈所別正手少陽三焦經之下腧也此三焦者乃足少陽膽經足太陽膀胱經之所將將者相將而行也此委陽者正足太陽膀胱經脈別行之穴也其上外踝計五寸名光明穴又足少陽膽經之絡穴別行者三焦與之別入腨腸腨腸者即足腹也共出於委陽穴乃並足太陽膀胱經之正脈入內絡於膀胱同約束下焦素問靈蘭祕典論曰三焦者決瀆之官水道出焉本篇後云三焦者中瀆之腑也水道出焉屬膀胱義同實則為病閉癃閉癃者水道不利也當瀉之虛則為病遺溺當補之手太陽小腸者上合手太陽出於少澤少澤小捐之端也為井金溜於前谷前谷在手外廉本節前陷者中也為滎注於後溪後溪者在手外側本節之後也為輸過於腕骨腕骨在手外側腕骨之前為原行於陽谷陽谷在鋭骨之下陷者中也為經入於小海小海在肘內大骨之外去端半寸陷者中也伸臂而得之為合手太陽經也此言小腸經井滎輸原經合之穴也手太陽小腸經者其腑在於腹而經脈所行在於手故曰上合手太陽也出於少澤在手小指之端外側為井金去爪甲如韭葉針一分留三呼灸三壯流於前谷在手小指外側本節前陷中為滎水針一分留三呼灸三壯注於後溪在手小指外側本節後捏拳得之為輸木針一分留二呼灸三壯過於腕骨在手外側腕骨之前陷中為原木針二分留三呼灸三壯行於陽谷在手外側腕中鋭骨下陷中為經火針二分留三呼灸三壯入於小海在肘內大骨外去肘半寸陷者中屈手向頭取之為合上針三分留七呼灸五壯此皆手太陽小腸經之穴也大腸上合手陽明出於商陽商陽大指次指之端也為井金溜於本節之前二間為滎注於本節之後三間為輸過於合谷合谷在大捐岐骨之間為原行於陽溪陽溪在兩筋間陷者中也為經入於曲池在肘外輔骨陷者中屈臂而得之為合手陽明也此言大腸經井滎輸原經合之穴也大腸之為腑在下而其經脈則行於手故曰上合手陽明也出於商陽在手大指之次指端為井金去爪甲如韭葉針一分留一呼灸三壯流於二間在次指本節前內側陷中為滎水針三分留六呼灸三壯注於三間在本節後內側陷中為輸木針三分留二呼灸三壯過於合谷在大指次指歧骨間陷中為原木針三分留六呼灸三壯行於陽溪在腕中上側兩筋間陷中為經火針三分留七呼灸三壯人於曲池在肘外輔骨屈肘兩骨中以手拱胸取之為合土針五分留七呼灸七壯此皆手陽明大腸經之穴也是謂五臟六腑之腧五五二十五腧六六三十六腧也六腑皆出足之三陽上合於手者也腧從肉者穴之總名非井滎輸經合之腧此承上文之論諸穴者而結言其數也夫五臟各有井滎輸經合五穴是謂五五二十五腧也六腑各有井滎輸原經合六穴是謂六六三十六喻也六腑足有太陽膀胱經而手則有太陽小腸經足有陽明胃經而手則有陽明大腸經足有少陽膽經而手則有少陽三焦經是足經上合於手經者也然謂之曰足者正以其井滎輸原經合等穴自足而行謂之曰手者正以其井滎輸原經合等穴自手而行此曰手曰足之辨也缺盆之中任脈也名曰天突一次次字下據下文當有一脈字猶言脈之一行也下仿此任脈側之動脈足陽明也名曰人迎二次脈手陽明也名曰扶突三次脈手太陽也名曰天窗四次脈足少陽也名曰天客按天容系手太陽經非足少陽經疑是天衝穴五次脈手少陽也名曰天牖六次脈足太陽也名曰天柱七次脈頸中央之脈督脈也名曰風府腋內動脈手太陰也名曰天府腋下三寸手心主也名曰天池此舉諸經之穴有列其行次而言者有指其穴所而言者皆示人以覓穴之法也腹部中行系任脈經然在缺盆之中間是為任脈其穴曰天突在頸前結喉下四寸宛宛中乃腹中央第一行次之脈也缺盆系足陽明胃經穴在肩下橫骨陷中去中行二寸故任脈當為缺盆之中間任脈之側開二寸即足陽明胃經也其頸之穴名曰人迎夾結喉兩旁一寸半乃腹部第二行次之脈也手陽明大腸經名曰扶突乃腹部第三行次之脈也在頸當曲頰下一寸人迎後一寸半手太陽小腸經名曰天窗乃前部第四行次之脈也在頸大筋間前曲頰下扶突後動脈應手陷中足少陽膽經名曰天衝乃側部第五行次之脈也耳後髮際二寸耳上如前三寸手少陽三焦經名曰天牖乃側部第六行次之脈也在頸大筋外缺盆上天容後天柱前完骨下髮際上足太陽膀胱經名曰天柱乃背後第七行次之脈也蓋自在前任脈為第一行次自前而側而後則以此為第七行也宜矣天柱挾項後髮際大筋外廉陷中頸之中央即後項也後項之下乃督脈一經其在項後人髮際一寸大筋內宛宛中名曰風府一名舌本疾言其肉立起言休立下禁灸令人失音由此而一直下行以至長強皆督脈經穴也腋內動脈即腋下三寸臂臑內廉動脈陷中以鼻取之系手太陰肺經也其穴名曰天府自此而下行肘臂以至大指之端少商皆肺經穴也腋下三寸即乳後一寸著脅直腋撅肋間系手心主即手厥陰心包絡經也其穴名曰天池自此而上行於腋以至下於肘臂之天泉曲澤至手中指之中衝皆手厥陰心包絡經穴也夫自督脈至此三經蓋各指在項在臂在腋之首穴無非示人以覓穴之法耳刺上關者呿不能缺刺下關者缺不能呿刺犢鼻者屈不能伸刺兩關者伸不能屈呿祛遮切此言取穴之法也上關即客主人穴系足少陽膽經呿大張口貌缺撮口出氣也刺上關者必開口有空故張口乃得之所以呿而不能缺也在耳後起骨上廉針一分灸七壯下關系足陽明胃經穴刺下關者必合口乃得之故能缺而不能呿也在客主人下耳前動脈下廉開口則閉閉口有穴針三分留七呼灸三壯犢鼻系足陽明胃經穴膝臏下䯒骨上俠解溪大筋陷中形如牛鼻故名針三分灸七壯刺犢鼻者必屈足以取之故屈而不能伸也兩關者內關系手厥陰心包絡經手掌腕後二寸兩筋間與外關相抵針五分灸三壯外關系手少陽三焦經手背腕後二寸兩筋間陽池上一寸針三分留七呼灸三壯刺兩關者必伸手以取之故伸而不能屈也足陽明挾喉之動脈也其腧在膺中手陽明次在其腧外不至曲頰一寸手太陽當曲頰足少陽在耳下曲頰之後手少陽出耳後上加完骨之上足太陽挾項大筋之中髮際陰此歷承上文缺盆之中任脈也一節而申言之皆指穴之在行次者有各所也缺盆之中為任脈自天突以下而為一行固至明而不必言矣其曰任脈側之動脈乃足陽明經名人迎者為二行正以人迎為足陽明挾喉之動脈自此而下凡水突氣舍缺盆以至氣戶庫房屋翳之類無非膺中之穴也故曰其腧在膺中何也胸之兩旁謂之膺也其曰手陽明大腸經名扶突者為三行然行次又在足陽明之腧外不至曲頰一寸蓋在曲頰下一寸正扶突穴也其曰手太陽經名天窗者為四行然穴正當曲頰之下扶突之上陷中也其曰足少陽經名天衝者為五行然穴在耳下曲頰之後正耳後髮際二寸耳上如前三寸也其曰手少陽經名天牖者為六行然穴在耳後上加完骨之上正以完骨在上而天牖在下則完骨加其上也其曰足太陽經名天柱者為七行然穴挾項後大筋之中髮際之陰也尺動脈在五里五腧之禁也素問氣穴論云大禁二十五在天府下五寸此舉大腸經有五里之穴乃五臟之所禁刺者也言肘中約紋上有尺澤穴乃手太陰肺經之動脈也尺澤之上三寸有動脈即肘上三寸向里大脈之中央名五里穴屬手陽明大腸經此穴禁刺乃五臟之腧所同禁者也按本經玉版論黃帝曰能殺生人不能起死者子能反之乎岐伯曰經隧者五臟六腑之大絡也迎而奪之而已矣迎之五里中道而止五至而已而臟之氣盡也故五五二十五而竭其腧矣此所謂奪其天氣者也又曰窺門而刺之者死於家中入門而刺之者死於堂上又九針十二原有云奪陰者死小針解釋云奪陰者死言取尺之五里五往者也由此觀之則五里穴乃最禁刺者不可不慎也肺合大腸大腸者傳道之腑心合小腸小腸者受盛之腑肝合膽膽者中精之腑脾合胃胃者五穀之腑腎合膀胱膀胱者津液之腑也少陽屬腎腎上連肺故將兩臟三焦者中瀆之腑也水道出焉屬膀胱是孤之腑也是六腑之所與合者道導同此言六腑之所合者在五臟也肺與大腸為表裡故肺合大腸經然大腸經者為傳道之腑凡小腸已化之物從此傳道而下也肝與膽為表裡故肝合膽經然膽者為中精之腑蓋他腑之所受者皆至濁之物而唯膽則受五臟之精汁也脾與胃為表裡故脾與胃合然胃者為五穀之腑蓋五穀入胃而胃則納受之也腎與膀胱為表裡故腎合於膀胱然膀胱者為津液之腑蓋飲入於胃遊溢精氣上歸於肺而通調水道下輸膀胱故膀胱為津液之腑也手少陽三焦者屬於右腎而腎又上連於肺本經經脈篇謂腎脈從腎上貫肝膈入肺中正腎之上連於肺也故左腎合膀胱右腎合三焦而將此兩臟膀胱三焦亦可名臟必皆以腎為主耳然此三焦者為中瀆之腑乃水道之所由出也素問靈蘭祕典論曰三焦者決瀆之官水道出焉正以下焦如瀆而此有以聚之決之故曰決瀆之官又曰中瀆之腑也彼膀胱合於左腎即此三焦合於右腎然三焦雖與膀胱為類其實膀胱與腎為表裡而三焦不與腎為表裡乃與手厥陰心包絡經為表裡非腑之孤者而何由前觀之凡六腑之所與合者蓋如此春取絡脈諸滎大經分肉之間甚者深取之間者淺取之夏取諸腧孫絡肌肉皮膚之上秋取諸合余如春法冬取諸井諸輸之分欲深而留之此四時之序氣之所處病之所舍臟之所宜轉筋者立而取之可令遂已痿厥者張而刺之可令立快也間去聲令平聲此當與素問水熱穴論第三節參看此言四時各有所刺而善刺者其病立已也絡穴者十二經皆有絡穴如手太陰肺經列缺手陽明大腸經偏歷之類諸滎者十二經皆有滎穴如肺經魚際大腸經二間之類大經者十二經有經穴如肺經經渠大腸經陽溪之類春則取此絡脈諸滎大經之分肉間且以病之間甚而為刺之淺深也諸輸者十二經皆有輸穴如肺經太淵大腸經三間之類孫絡者大絡之小絡也夏則取此諸輸孫絡於肌肉皮膚之上諸合者十二經皆有合穴如肺經尺澤大腸經曲池之類秋則取此諸合穴及絡穴諸滎大經等穴之分肉如春時之所刺也諸井者十二經皆有井穴如肺經少商大腸經商陽之類諸輸者即前太淵三間之類冬則取此諸井諸輸之分但比他時所刺則深而留之以冬氣入臟也此乃四時之序脈氣之所處各病之所舍各臟之所宜刺也故有轉筋病者當立而取此各穴可令病之遂已也有痿病厥病者當張而取此各穴可令病之即快也張者提其手足而取各穴也小針解第三第一篇九針十二原中有小針之要而此篇正以解其首篇故名之曰小針解其解義俱見首篇故此不復重解當合兩篇而觀之素問又有針解篇與此小同所謂易陳者易言也難入者難著於人也粗守其形者守刺法也上守神者守人之血氣有親不足可補瀉也神客者正邪共會也神者正氣也客者邪氣也在門者邪循正氣之所出入也未睹其疾者先知邪正何經之疾也惡知其原者先知何經之病所取之處也刺之微在數遲者徐疾之意也粗守關者守四肢而不知血氣正邪之往來也上守機者知守氣也機之動不離其空中者知氣之虛實用針之徐疾也空中之機清淨以微者針以已同得氣密意守氣勿失也其來不可逢者氣盛不可補也其往不可追者氣虛不可瀉也不可掛以發者言氣易失也扣之不發者言不知補瀉之意也血氣已盡而氣不下也知其往來者知氣之逆順盛虛也要與之期者知氣之可取之時也粗之暗者冥冥不知氣之微密也妙哉工獨有之者盡知針意也往者為逆者言氣之虛而小小者逆也來者為順著言形氣之平平者順也明知逆順正行無問者言知所取之處也迎而奪之者瀉也追而濟之者補也所謂虛則買之者氣口虛而當補之也滿則瀉之者氣口盛而當瀉之也宛陳則除之者去血脈也邪勝則虛之者言諸經有盛者皆瀉其邪也徐而疾則實者言徐內而疾出也疾而徐則虛者言疾內而徐出也言實與虛若有若無者言實者有氣虛者無氣也察後與先若亡若存者言氣之虛買補瀉之先後也察其氣之已下與常存也為虛與實若得若失者言補者必然若有得也瀉者恍然若有失也夫氣之在脈也邪氣在上者言邪氣之中人也高故邪氣在上也濁氣在中者言水穀皆入於胃其精氣上注於肺濁溜於腸胃言寒溫不適飲食不節而病主於腸胃故命曰濁氣在中也清冷氣在下者言清濕地氣之中人也必從足始故曰清氣在下也針陷脈則邪氣出者取之上針中脈則邪氣出者取之陽明合也針太深則邪氣反沉著言淺浮之病不欲深刺也深則邪氣從之入故曰反沉也皮肉筋脈各有所處者言經絡各有所主也取五脈者死言病在中氣不足但用針盡大瀉其諸陰之脈也取三陽之脈者唯言盡瀉三陽之氣令病人恇然不復也奪陰者死言取尺之五里五往者也奪陽者狂正言也睹其色察其目知其散復一其形聽其動靜者言上工知相五色於目有知調尺寸小大緩急滑澀以言所病也知其邪正者知論虛邪與正邪之風也右主推之左持而御之者言持針而出入也氣至而去之者言補瀉氣調而去之也調氣在於終始一者持心也節之交三百六十五會者絡脈之滲灌諸節者也所謂五臟之氣已絶於內者脈口氣內絶不至反取其外之病處與陽經之合有留針以致陽氣陽氣至則內重竭重竭則死矣其死也無氣以動故靜所謂五臟之氣已絶於外者脈口氣外絶不至反取其四末之輸有留針以致其陰氣陰氣至則陽氣反入入則逆逆則死矣其死也陰氣有餘故躁所以察其目者五臟使五色循明素問六節藏象論岐伯曰五氣入鼻藏於心肺上使五色修明音聲能彰則循明當作修明循明則聲章聲章者則言聲與平時異也宛於阮切內納同佖音必滿貌恍籲狂切狂貌中俱去聲邪氣臟腑病形第四篇內首三節論邪氣入於臟腑第四節論病形故名篇黃帝問於岐伯曰邪氣之中人也奈何岐伯答曰邪氣之中人也高黃帝曰高下有度乎岐伯曰身半已上者邪中之也身半已下者濕中之也故曰邪之中人也無有常中於陰則溜於腑中於陽則溜於經黃帝曰陰之與陽也異名同類上下相會經絡之相貫如環無端邪之中人或中於陰或中於陽上下左右無有恆常其故何也岐伯曰諸陽之會皆在於面中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中於膺背兩脅亦中其經黃帝曰其中於陰奈何岐伯答曰中於陰者嘗從臂胻始夫臂與胻其陰皮薄其肉淖澤故俱受於風獨傷其陰黃帝曰此故傷其臟乎岐伯答曰身之中於風也不必動臟故邪入於陰經則其臟氣實邪氣入而不能客故還之於腑故中陽則溜於經中陰則溜於腑中去聲溜當作流中於膺背兩脅作中於肩背兩脅亦中其經一本作亦下其經中與下俱通胻戶當反足骨也淖奴教反客一本作容者訛此詳言邪中陰經者其臟氣尚實故流之於腑而邪中陽經者則止流於本經也帝以邪氣之中人為問蓋惡之亦嘆之也伯言邪氣之中人甚高也故身半已上而風寒暑皆能中之故中人高也身半已下而濕能中人則下亦能中於邪此高下之所以有度也且邪之中人無常中於陰經者則流於陽經之為腑而中於陽經者則止流於本經而已何見中於陽經者之流於本經也彼諸陽之會皆在於面凡邪之中人方乘其虛或新用力或用飲食致汗自出腠理開故邪遂中之若中於面則面部乃手足陽明經如手陽明迎香足陽明承泣之類故邪遂下於陽明經也若中於項則項屬手足太陽經如手太陽天窗足太陽天柱之類故邪遂下於太陽經也若中於曲頰則曲頰屬手足少陽經如手少陽天牖足少陽風池之類故邪遂下於少陽經也其有中於肩背兩脅者皆三陽經之分肉亦中其經而下之耳故曰中於陽者必流於本經也何以見中陰經者之流於腑也凡中於陰經者其手經必始於臂足經必始於胻正以其陰經之皮薄而肉淖澤故俱受於風則獨傷此陰經之經脈而內臟未必傷蓋身中於風未必動臟故邪雖入於陰經而臟氣尚實所以邪不能客之而遂還之於腑耳故曰中於陰者則流之於腑也黃帝曰邪之中人臟奈何岐伯曰愁憂恐懼則傷心形寒寒飲則傷肺以其兩寒相感中外皆傷故氣逆而上行有所墮墜惡血留內若有所犬怒氣上而不下積於脅下則傷肝有所擊僕若醉入房汗出當風則傷脾有所用力舉重若入房過度汗出浴水則傷腎黃帝曰五臟之中風奈何岐伯曰陰陽俱感邪乃得往黃帝曰善哉按此與百病始生篇末同此言五臟之邪有內傷者有外感者必其陰陽俱感而後外邪得以入臟也帝承上文而言邪不入臟固以其臟之實也然豈無入臟之時乎伯言邪有不同有所謂內傷者故愁憂恐懼則心神傷矣形寒飲寒則肺本畏寒而肺斯傷矣正以兩寒相感中外皆傷故氣逆而上行也有所墮墜惡血在內及有所大怒氣積脅下則肝斯傷矣有所擊僕醉以入房汗出當風則脾斯傷矣有所用力舉重入房過度汗出浴水則腎斯傷矣此內傷之邪中於人臟者如此雖曰當風浴水而亦由內傷始也彼五臟之中風者亦以陰經陽經俱感於邪則臟腑俱傷邪乃入臟若止感陰經則臟氣尚實其邪豈能以遽入哉黃帝問於岐伯曰首面與身形也屬骨連筋同血合於氣耳天寒則裂地凌冰其卒寒或手足懈惰然而其面不衣何也岐伯答曰十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其彆氣走於耳而為聽其宗氣上出於鼻而為臭其濁氣出於胃走唇舌而為味其氣之津液皆上熏於面而皮又厚其肉堅故無熱甚寒不能勝之也卒音猝此言人面之耐寒以氣之津液皆上熏於面也夫首面之與身皆形也無不連屬筋骨合同氣血宜乎寒則俱寒熱則俱熱也故天有裂地凌冰之寒而人之手足皆畏猝寒而懈情然而其面不衣而獨無所畏者何哉伯言十二經三百六十五絡凡曰空竅曰睛曰聽曰聞臭曰辨味皆在人身之首面者正以氣之津液皆上熏於面而皮厚肉堅故甚寒甚熱皆不能勝面耳黃帝曰邪之中人其病形何如岐伯曰虛邪之中身也灑淅動形正邪之中人也微先見於魚不知於身若有若無若亡若存有形無形莫知其情黃帝曰善哉此節與素問八正神明論本經官能篇大義相同此言邪中人身之形虛邪則易見而正邪則難知也八正神明論曰虛邪者八正之虛邪風也正邪者身形若用力汗出腠理開逢虛風其中人也微故莫知其情莫見其形者是也黃帝問於岐伯曰余聞之見其色知其病命曰明按其脈知其病命曰神問其病知其處命曰工余願聞見而知之按而得之問而極之為之奈何岐伯答曰夫色脈與尺之相應也如桴鼓影響之相應也不得相失也此亦本末根葉之出候也故根死則葉枯矣色脈形肉不得相失也故知一則為工知二則為神知三則神且明矣黃帝曰願車聞之岐伯答曰色青者其脈弦也赤者其脈鉤也黃者其脈代也白者其脈毛黑者其脈石見其色而不得其脈反得其相勝之脈則死矣得其相主之脈則病己矣黃帝問於岐伯曰五臟之所主變化之病形何如岐伯答曰先定其五色五脈之應其病乃可別也黃帝曰色脈已定別之奈何岐伯曰調其脈之緩急小大滑澀而病變定矣黃帝曰調之奈何岐伯答曰脈急者尺之皮膚亦急脈緩者尺之皮膚亦緩脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀凡此變者有微有甚故善調尺者不待於寸善調脈者不待於色能參臺而行之者可以為上工上工十全九行二者為中工中工十全七行一者為下工下工十全六賁奔同此詳言色脈病之相應而全此三法者之難也夫見色知病為明按脈知病為神問病知處為工處者各經也正以色脈與尺相應如桴鼓影響如本末根葉故知一為工知二為神知三為神且明何也肝主木其色青脈當弦心主火其色赤脈當鉤脾主土其色黃脈當代肺主金其色白脈當毛腎主水其色黑脈當石見其色而其脈未合反得其相勝之脈如色本青而脈來浮澀而短是金來剋木也此病之所以死也如色本青而脈來沉石而滑是水來生木也此病之所以已也故五臟變化之病形雖異而色脈已定乃可別之別之者調其脈之緩急大小滑澀也調之者調其尺之皮膚緩急大小滑澀與脈同也則病變雖有微甚知病本無難易自然調尺而可知寸調脈而可知色所謂見色而知病按脈而知病問病而知處者此之謂也本經論疾診尺篇云審其尺之緩急小大滑澀肉之堅脆而病形定矣人能行此三者為上工行二者為中工行一者為下工以其所全有九分七分六分之異故其人有上中下之分耳黃帝曰請問脈之緩急小大滑澀之病形何如岐伯曰臣請言五臟之病變也心脈急甚者為瘛瘲微急為心痛引背食不下緩甚為狂笑微緩為伏梁在心下上下行時唾血大甚為喉吤微大為心痹引背善淚出小甚為善噦微小為消疸滑甚為善渴微滑為心疝引臍小腹鳴澀甚為瘖微澀為血溢維厥耳鳴顛疾瘛音治瘲音縱吤音介噦乙劣切此詳言五臟之病異脈變而先以心言之也脈有緩急小大滑澀則病必隨脈而變也故急脈屬肝心得急脈而甚當為風邪入心病成瘛瘲瘛為筋脈踡急而瘲為筋脈弛縱即今所謂急慢驚風之意耳若脈急而微則其病為心痛引背食亦不下正以急甚病亦甚病於內而又病於外故曰瘛瘲急微則病微病止在於中也緩脈屬脾心得緩脈而甚當為土邪相併病成狂笑心在聲為笑狂則失神矣若脈緩而微其病有伏梁之積在於心下或升或降而行時或唾中有血正以甚則病成於驟故曰狂笑微則病成於素故曰伏梁也大脈屬心故得大脈而甚當為心火充溢喉中吤然有聲若脈大而微其病為心痹引背時善淚出正以心脈繫於喉嚨附於背通於目故甚則病勢有餘而為喉吤微則病勢漸成而為痛引於背及出淚也小脈者大脈之反也心脈既小而又小之甚則心氣不足無以資土其病當為噦心脈而為小之微則血液枯燥病為消疸也滑脈者澀脈之反也心脈既滑而又滑之甚則心火有餘病為善渴若滑而微則病為心疝引臍小腹必鳴也澀為肺脈心得澀脈而甚金火相爍病成為瘖若脈澀而微其血當損而溢其陰維陽維之脈必厥其耳必鳴其疾在巔正以心火不足金反乘之故甚則中外皆不足微則內證雜見也肺脈急甚為癲疾微急為肺寒熱怠惰咳唾血引腰背胸若鼻息肉不通緩甚為多汗微緩為痿瘻偏風頭以下汗出不可止大甚為脛腫微大為肺痹引胸背起惡日光小甚為泄微小為消疸滑甚為息賁上氣微滑為上下出血澀甚為嘔血微澀為鼠瘻在頸支腋之間下不勝其上其應善痠矣賁音奔痠音酸此言肺經之脈異病變也急為肝脈肺得急脈而甚則木邪反乘所不勝故為癲疾若得急脈而微則肺為寒熱為怠惰為咳為唾血其咳引腰背與胸又鼻中有息肉不通皆肺氣不足風邪有餘所致也但甚則邪發於驟而為咳微則邪積於素而為諸病耳緩為脾脈肺得緩脈而甚則血不養脾脾虛不能生金當為虛汗甚多也若得緩脈而微則為痿證為鼠瘻為偏風為頭以下汗出不可止蓋甚則病發於驟虛汗甚多而微則病成有日故諸證悉見也大為心脈肺得大脈而甚則金為火爍腎水隨涸脛發為腫若得脈大而微則肺痹引於胸背見火知畏雖日光亦所惡也蓋甚則心肺腎之交病病為脛腫內外俱形也微則肺經之為病成於內也小脈為大之反肺得小脈而甚則中氣大衰病當為泄若得小脈而微則為消疸也正以甚則虛甚土金皆衰而成泄小則病微其消疸之病止在於肺也滑為澀脈之反肺得滑脈而甚則火盛病熾當為息賁之積而其氣上逆也若得滑脈而微則火逼肺與大腸當為上下出血也蓋滑主氣為病氣上而不下微則主血為病血乃上下俱行也澀為肺脈肺得澀脈而甚則肺邪有餘血溢而嘔若得澀脈而微則為鼠瘻在頸與支腋之間身為上足為下下體不勝其上故足軟無力其應善痠矣正以甚則血為有傷微則病積於素所以有不同耳肝脈急甚者為惡言微急為肥氣在脅下若覆杯緩甚為善嘔微緩為水瘕痹也大甚為內癰善嘔衄微大為肝疸陰縮咳引小腹小甚為多飲微小為消疸滑甚為㿉疝微滑為遺溺澀甚為溢飲微澀為瘛攣筋痹瘕音賈㿉徒回切此言肝經之脈異病變也急為肝脈肝脈急甚為惡言蓋肝主怒肝氣有餘則聽言而惡也微急為肥氣在脅下若覆杯蓋肝素有積其脈雖急而漸微也緩為脾脈肝脈緩甚則木土相剋病為善嘔肝脈微緩則土不勝水當成水瘕而為痹也水瘕者水積也大為心脈肝得大脈而甚則火氣炎木內當為癰及善嘔血與鼻中出血為衄也若脈得微大則為肝痹為陰縮為咳引小腹火自陰經而上而為諸病較之甚者僅血不上越耳小為大脈之反肝得小脈而甚則血甚不足當為多飲若得小脈而微則為消疸其病相類而成耳滑為澀脈之反肝得滑脈而甚則睪丸屬於肝經㿉疝已成也若得滑脈而微則疏泄無束當為遺溺也澀為肺脈肝得肺脈而甚則木為金勝邪反干脾土不勝水飲溢四肢也若得澀脈而微則血不養筋當為瘛為攣為筋痹也脾脈急甚為瘛瘲微急為膈中食飲入而還出後沃沫緩甚為痿厥微緩為風痿四肢不用心慧然若無病大甚為擊僕微大為疝氣腹裡大膿血在腸胃之外小甚為寒熱微小為消疸滑甚為㿉癃微滑為蟲毒蛔蠍腹熱澀甚為腸㿉微澀為內㿉多下膿血蛔胡恢切㿉音潰蠍胡葛切此言脾經之脈異病變也急為肝脈脾得急脈而甚則風邪剋土病成瘛瘲也若得急脈而微則木邪侮土其在上為膈中食飲入而還出脾氣不上通也本經上膈篇云氣為上膈食飲入而還出在下為去後沃沫脾氣不下疏也緩為脾脈脾得緩脈而甚則土氣大弱為痿為厥若得緩脈而微則為風為痿四肢不用心則慧然若無病也大為心脈脾得大脈而甚病為擊僕若擊之而仆地也若得大脈而微則脾經成疝腹中必大膿血在於胃之外按腹中論黃帝曰病有少腹盛上下左右皆有根可治否岐伯曰名為伏梁里大膿血居腸胃之外不可治治每切按之至死此下則因陰必下膿血上則迫於胃生膈夾胃脘內癰此久病也難治居臍上為逆臍下為從勿動亟奪蓋甚則病形於外微則病積於中也小為大脈之反脾得小脈而甚則為寒熱往來以脾血不足也若得小脈而微則為消疸之證以血枯津竭也滑為澀脈之反脾得滑脈而甚則為㿉疝為癃溺蓋土不勝水則為㿉土不運水則為癃也若得滑脈而微則有蟲毒如蛔蠍之類其腹內當為熱蓋以滑為陽脈其形如珠則必有蟲物毒氣為熱也澀為肺脈脾得澀脈而甚則肺與大腸為表裡今澀脈見於脾土而又至於甚則土不能生金金邪又為有餘其大腸當為內潰也若得澀脈而微則內潰多下膿血蓋潰在內者為甚而膿血之下者為氣當疏通反由於微也腎脈急甚為骨癲疾微急為沉厥奔豚足不收不得前後緩甚為折脊微緩為洞洞者食不化下嗌還出大甚為陰痿微大為石水起臍已下至小腹睡睡然上至胃脘死不治小甚為洞泄微小為消疸滑甚為癃㿉微滑為骨痿坐不能起起則目無所見澀甚為大癰微澀為不月沉痔睡竹垂切此言腎經之脈異病變也急為肝脈腎得急脈而甚則腎主骨風邪入骨當為骨癲疾本經癲狂篇有骨癲疾若得急脈而微則為沉厥蓋風邪入腎則為厥而腎氣不足則當沉滯而無知也及為奔豚以腎邪漸積而成也為足不收以腎脈行於足也為不得前後以腎通竅於二便也正以甚則骨癲自里達表也微則病徐在裡病多也脾為緩脈腎得緩脈而甚則腎與膀胱為表裡膀胱之脈行於脊今土邪乘水腎氣不足當折脊而不能舉也若得緩脈而微則腎氣無束當為洞泄不止其脾氣亦不運行而所下之食宜不化或至食飲下嗌而還出也大為心脈腎得大脈而甚則火盛水衰當為陰痿也若得大脈而微則臍下當有石水起臍已下至少腹覺睡睡然而下垂及上至胃脘此證當至死不治耳按素問陰陽別論云陰陽結邪多陰少陽為石水又大奇論有腎肝並沉為石水本經水脹篇有石水之問而伯無所答今以本節考之則石水多生於腎經而居下部者小為大脈之反腎為小脈而甚則腎氣甚衰無以主下焦而為洞泄若得小脈而微亦水不配火當為消疸之證也滑為腎脈腎得滑脈而甚則腎邪有餘當膀胱閉癃及成㿉疝也若得腎脈而微則腎氣亦衰當為骨痿而不能起床起則昏暈目盲矣澀為肺脈腎得澀脈而甚則精血俱衰內為大癰若得澀脈而微則精血亦衰當為經閉與痔下也黃帝曰病之六變者刺之奈何岐伯答曰諸急者多寒緩者多熱大者多氣少血小者血氣皆少滑者陽氣盛微有熱澀者多血少氣微有寒是故刺急者深內而久留之刺緩者淺內而疾髮針以去其熱刺大者微瀉真氣無出其血刺滑者疾髮針而淺內之以瀉其陽氣而去其血刺澀者必中其脈隨其逆順而久留之必先按而循之已髮針疾按其痏無令其出血以和其脈諸小者陰陽形氣俱不足勿取以針而調以甘藥也內納同瀉去聲痏滎美切此言刺上六脈之有法而唯小脈用藥也六變者以病因脈而變也故諸部急者必多寒凡刺急脈者必深納其針而久留之則寒自熱也諸部脈緩者必多熱凡刺緩脈者必淺納其針而疾發之則熱可去也蓋寒必入內故其針深熱必達外故其針淺也諸部脈大者多氣少血凡刺大脈者微瀉其氣無出其血可也諸部脈小者血氣皆少其陰陽形氣俱不足勿取以針而當調以甘和之藥可也諸部皆滑者陽氣必盛且微有熱凡刺滑脈者必疾發其針而淺納之以瀉其陽氣而去其熱可也諸部脈澀者多血少氣且微有寒凡刺澀脈者必中其脈隨其逆順而久留之必先按而循之及已髮針當速按其焰無令其血出以和其脈可也黃帝曰余聞五臟六腑之氣滎輸所入為合令何道從入入安連過願聞其故岐伯答曰此陽脈之別入於內屬於腑者也黃帝曰滎輸與合各有名乎岐伯答曰滎輸治外經合治內腑黃帝曰治內腑奈何岐伯曰取之於合黃帝曰合各有名於岐伯答曰胃合於三里大腸合入於巨虛上廉小腸合入於巨虛下廉三焦合入於委陽膀胱合入於委中央膽合入於陽陵泉黃帝曰取之奈何岐伯答曰取之三里者低跗取之巨虛者舉足取之委陽者屈伸而索之委中者屈而取之陽陵泉者正豎膝豫之齊下至委陽之陽取之取諸外經著榆申而從之輸腧同豎音柱豫與同齊臍同榆舂朱切按此節曰滎輸治外經為句觀末云取諸外經者自明彼有以經字連下者非且此經字乃經脈之經即首節中陽則流於經之經非井滎輸經合之經也此言滎輸治外病合治內腑遂舉治內腑之合穴以明之也夫五臟六腑之氣脈雖始於井而井之所注為滎所行為輸所經為經所入為合是果何道而入入何連過伯乃不言五臟之陰脈止言六腑之陽脈謂此滎輸與合即陽脈之入於內而屬於腑也蓋滎輸與合皆各有名然滎輸之穴氣脈尚在於外所以治病之在外經脈也合之穴氣脈則入於內所以治病之在內腑也是以內焉之腑曰胃外焉之合曰三里故胃與三里而相合也內焉之腑曰大腸外焉之合曰巨虛上廉此本足陽明胃經之穴其實為大腸之合前本輸篇有云復下三里三寸為巨虛上廉復下上廉三寸為巨虛下廉大腸屬上廉小腸屬下廉放大腸與巨虛上廉而相合也內焉之腑曰小腸外焉之合曰巨虛下廉義見上故小腸與巨虛下廉而相合也內焉之腑曰三焦外焉之合曰委陽屬足太陽膀胱經之穴其實為三焦之合故三焦與委陽而相合也內焉之腑曰膀胱外焉之合曰委中故膀胱與委中而相合也內焉之腑曰膽外焉之合曰陽陵泉故膽與陽陵泉而相合也此所以刺此諸合則內腑之病治矣然取穴各有其法取三里者將足之跗面低下著地而取之不使之舉足取上下巨虛者則舉足而取之取委陽者屈其體以覓承扶之陰紋伸其體以度委陽之分寸故曰屈伸而索之委陽在承扶下一寸六分承扶在尻臀下陷紋中取委中者則屈其足而不伸也在膕中央約紋陷中必屈足而取之取陽陵泉者則正豎其膝以與其穴在膝下一寸䯒骨外陷中也然委陽在委中之上承扶之下而委陽之外廉即委陽之陽也古人謂外為表又名之曰陽彼陽陵泉者正在委陽之外也齊下至此處以覓至膝下而取陽陵泉耳夫取合之法如此若滎輸治外經則取外病之經脈當覓滎穴輸穴以治之亦必偷揚以申其手足而善取之耳上文有滎輸治外經之答而帝未之問故伯不明言滎輸之名而告以取穴之法也黃帝曰願聞六腑之病岐伯答曰面熱者足陽明病魚絡血者手陽明病兩跗之上脈豎陷者足陽明病此胃脈也大腸病者腸中切痛而鳴濯濯冬日重感於寒即泄當臍而痛不能久立與胃同候取巨虛上廉胃病者腹䐜脹胃脘當心而痛上支兩脅膈咽不通食飲不下取之三里也此言手足陽明經之病而有刺之之穴也足陽明者胃也胃脈上於面故面熱者足陽明病手陽明者大腸也魚絡在魚際之下陽溪列缺之間大腸之脈行於此故魚絡有血者手陽明病足面為跗兩跗之上其脈或豎或陷者乃衝陽解溪等穴也故知其為足陽明胃經有病耳且大腸經有病者腸中切痛而鳴濯濯切痛者痛之緊也濯濯者腸中有水而往來氣衝則有聲也若冬日重感於寒則即泄矣其當臍而痛不能久立以大腸正在臍也彼胃有巨虛上廉為大腸之合故曰與胃同候取之巨虛上廉也後脹論有大腸脹者證與此同又胃經有病者腹必䐜脹其胃脘當心而痛上支兩脅膈咽等處氣不能通食飲不下當取本經三里穴也小腸病者小腹痛腰脊控睪而痛時窘之後當耳前熱若寒甚若獨肩上熱甚及手小捐次捐之間熱若脈陷者此其候也手太陽病也取之巨虛下廉睪音皋陰丸此言小腸經之病而有刺之之穴也小腸近小腹之內後附腰脊下連睪丸故小腹痛腰脊控引睪丸而痛痛時窘甚而欲往去後也小腸脈自手外側出踝中上臂出肘後端出肩解繞肩腫交肩上故耳前熱或耳前寒甚或肩上熱甚又手小指連及次指之間熱若由小指而上至前腕處脈有下陷皆本經有病之候也彼胃經有巨虛下廉穴為小腸經之合故當取此以刺之三焦病者腹氣滿小腹尤堅不得小便窘急溢則水留即為脹候在足太陽之外大絡大絡在太陽少陽之間亦見於脈取委陽按此三焦分明是後三焦乃有名有形者與營衛生會篇之前三焦有名無形者不同此言三焦之病而有刺之之穴也手少陽三焦經之脈入缺盆布膻中絡心包下膈循屬三焦故腹氣滿小腹尤堅也三焦為決瀆之官故病則不得小便而窘急也甚則水溢留內而為脹彼委陽穴者足太陽膀胱經之大絡也其穴在足太陽經之外足少陽經之前出於委中外廉兩筋間為三焦之合故三焦有病則脈必下陷當取此穴以刺之膀胱病者小腹偏腫而痛以手按之即欲小便而不得肩上熱若脈陷及足小指外廉及脛踝後皆熱若脈陷取委中央此言膀胱經之病而有刺之之穴也膀胱有病則欲小便時奈小腹中偏腫而痛以手按痛處即欲小便而不可得其肩上熱脈或陷以膀胱之脈凡大抒等穴皆在肩背也足小指外廉用脛踝後皆熱脈亦若陷以其脈自至陰通谷束骨金門申脈僕參崑崙附陽飛揚等穴皆在足小指外廉與脛踝等處也委中者乃本經之合穴故當取此穴以刺之膽病者善太息口苦嘔宿汁心下淡淡恐人將捕之嗌中吤吤然數唾在足少陽之本末亦視其脈之陷下者灸之其寒熱者取陽陵泉此言膽經之病而有刺之之穴也膽病者善太息口苦嘔宿膽汁心下淡淡然加人將捕之蓋以膽氣之虛也嗌中吤吤然有聲且數多唾以膽之有邪也在取足少陽經之本末而視之蓋以經穴之始為本經穴之終為末也其本末脈有陷下者當灸之若有寒熱往來則取陽陵泉之合穴而刺之黃帝曰刺之有道乎岐伯答曰刺此者必中氣穴無中肉節中氣穴則針染一本作遊於巷中肉節即皮膚痛補瀉反則病益篤中筋則筋緩邪氣不出與其真相搏亂而不去反還內著用針不審以順為逆也中俱去聲著著同此言刺穴有道而反之者有害也凡刺上節等穴者必中其經氣所會之正穴無中氣穴之肉節相連處也蓋中氣穴則針遊於巷而氣脈相通即素問氣穴論遊針之居也如名氣衝穴為氣街而衛氣篇有胸氣腹氣頭氣脛氣皆有街則巷即街之義中肉節則皮膚徒痛若中於筋則筋緩無束若當補而瀉當瀉而補補瀉相反病當益篤是以邪氣不出與真氣相搏而亂邪反內著此皆用針不審以順為逆之故殊非刺穴之道也根結第五內有陰陽諸經根於某穴結於某穴故名篇岐伯曰天地相感寒暖相移陰陽之道孰少孰多陰道偶陽道奇發於春夏陰氣少陽氣多陰陽不調何補何瀉發於秋冬陽氣少陰氣多陰氣盛而陽氣衰故莖葉枯槁濕雨下歸陰陽相移何瀉何補奇邪離經不可勝數不知根結五臟六腑折關敗樞開闔而走陰陽大失不可復取九針之玄要在終始故能知終始一言而畢不知終始針道咸絶奇音箕此言九針之玄其要在於終始篇也天地相感而寒暑生其陰陽之道有多有少陰道為偶陽道為奇故人身與天地相參凡病發於春夏者則陰氣少而陽氣多是謂陰陽不調也當於何經而補之瀉之凡病發於秋冬者則陽氣少而陰氣多是謂陰陽相移也當於何經而補之瀉之奇邪不正之邪也感此人彼謂之離經脈氣所起為根所歸為結素問離合真邪論曰太陽為開陽明為闔少陽為樞太陰為開厥陰為闔少陰為樞正與下文相同今曰關者是有關乃所以開闔也終始本經第九篇名言不正之邪至變難紀用針者若不知穴之根結則五臟六腑關折樞敗開闔誤走其氣陰陽大失氣難復取是故九針玄妙之法其要在終始篇中人有知否乃針道之所以明暗也按終始篇全以人迎知六陽經之病氣口知六陰經之病陽盛陰虛則瀉陽補陰陰盛陽虛則瀉陰補陽真針道玄妙之法也太陽根於至陰結於命門命門者目也陽明根於厲兌結於顙大顙大者鉗耳也少陽根於竅陰結於窗籠窗籠者耳中也太陽為開陽明為闔少陽為樞故開折則肉節瀆而暴病起矣故暴病者取之太陽視有餘不足瀆者皮肉宛膲而弱也闔折則氣無所止息而痿疾起矣故痿疾者取之陽明視有餘不足無所止息者真氣稽留邪氣居之也樞折即骨繇而不安於地故骨繇者取之少陽視有餘不足骨繇者節緩而不收也所謂骨繇者搖故也當窮其本也骨繇音骨搖按素問氣交變大論歲土不及之下有筋骨繇復王注亦以為筋骨搖動此言足三陽經之有根結而成病有由治病有法也足太陽膀胱經其根起於至陰在足小指外側去爪甲如韭葉針一分留五呼灸三壯結於命門命門者目也謂睛明穴也目內眥頭一分宛宛中針一分留六呼禁灸足陽明胃經根於厲兌足大指之次指端去爪甲如韭葉針一分灸三壯結於顙大顙大者鉗耳也謂頭維穴也額角入髮際本神旁一寸半神庭旁四寸半針三分禁灸足少陽膽經根於竅陰足小指之四指端去爪甲如韭葉針一分留一呼灸三壯結於窗籠窗籠者耳中也謂聽宮穴也耳微前陷中上關上一寸動脈宛宛中張口得之針三分按手太陽小腸經有天窗穴一名窗籠去頸大筋前曲頰下扶突後動脈應手陷中觀下文腎經結於任脈之廉泉肝經結於任脈經之玉英則本經有結之他經者疑天窗為足少陽經之所結歟太陽為三陽最在表故為關之開陽明為二陽居陽之中故為關之闔少陽為一陽最在裡故為關之樞故關之開折則肉節瀆而暴病起是以有暴病者當取足之太陽視其有餘不足而補瀉之所謂肉節瀆者其皮肉宛膲而弱也關之闔折則氣無所止息而痿疾起是以有痿疾者當取足之陽明視其有餘不足而補瀉之所謂氣無止息者正氣稽留而邪氣反居之也關之樞折則骨繇而不安於地是以有骨繇病者當取足之少陽視其有餘不足而補瀉之所謂骨繇者正以其節緩而不能收即骨之搖動故也夫曰瀆曰氣無所止息曰骨搖皆折關敗樞開闔而走使然也皆當窮其本以治其病者太陰根於隱白結於太倉少陰根於湧泉結於廉泉厥陰根於大敦結於玉英絡於膻中太陰為開厥陰為闔少陰為樞故開折則倉稟無所輸膈洞膈洞者取之太陰視有餘不足故開折者氣不足而生病也闔折即氣絶而喜悲悲者取之厥陰視有餘不足樞折則脈有所結而不通不通者取之少陰視有條不足有結者皆取之不足此言足三陰經之有根結而成病有由治病有法也足太陰脾經其根起於隱白去大指端內側去爪甲如韭葉針一分留三呼灸三壯結於太倉以胃與脾相為表裡也大倉即中脘穴系任脈經臍上四寸針八分灸七壯足少陰腎經根於湧泉足心陷中針三分留三呼灸三壯結於廉泉一名舌本頷下結喉上四寸中央針二分留七呼灸三壯足厥陰肝經其根起於大敦足大指端去爪甲如韭葉三毛中一云內側為隱白外側為大敦針三分留十呼灸三壯結於玉英即玉堂穴系任脈經紫宮下一寸六分針三分灸五壯絡於膻中玉堂下一寸六分兩乳間陷中禁針灸五壯太陰為三陰為陰之表故為關之開厥陰為一陰居陰之裡故為關之闔少陰為二陰居陰之中故為關之樞故關之開折則脾不運化倉廩無所轉輸其病為膈證為洞泄是以有膈洞病者當取足之太陰視其有餘不足而補瀉之正以開折者其脾氣不足而病生膈洞也關之闔折則肝氣絶而喜悲是以氣絶喜悲者當取足之厥陰視其有餘不足而補瀉之關之樞折則腎脈有所結而下焦不通是以下焦不通者當取足之少陰視其有餘不足而補瀉之然此有結者不可以有餘視之仍以不足取之也足太陽根於至陰溜於京骨注於崑崙入於天柱飛揚也足少陽根於竅陰溜於丘墟注於陽輔入於天容光明也足陽明根於厲兌溜於衝陽注於下陵入於人迎豐隆也手太陽根於少澤溜於陽谷注於小海入於天窗支正也手少陽根於關衝溜於陽池注於支溝入於天牖外關也手陽明根於商陽溜於合谷注於陽溪入於扶突偏歷也此所謂十二經者盛絡皆當取之天容當作天衝下陵當作解溪此言手足六陽之經皆自井而入於絡也足太陽膀胱經根於至陰之井流於京骨之原注於崑崙之經入於天柱之在頭者絡于飛揚之在足者足少陽膽經根於竅陰之井流於丘墟之原注於陽輔之經入於天衝之在頭者絡於光明之在足者足陽明胃經根於厲兌之井流於衝陽之原注於解溪之經入於人迎之在頭者絡於豐隆之在足者手太陽小腸經根於少澤之井流於陽谷之經注於小海之合入於天窗之在頭者絡於支正之在手者手少陽三焦經根於關衝之井流於陽池之原注於支溝之經入於天牖之在頭者絡於外關之在手者手陽明大腸經根於商陽之井流於合谷之原注於陽溪之經入於扶突之在頭者絡於偏歷之在手者此所謂十二經之盛絡也皆當取之一日一夜五十營以營五臟之精不應數者名曰狂生所謂五十營者五臟皆受氣持其脈口數其至也五十動而不一代者五臟皆受氣四十動一代者一臟無氣三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期要在終始所謂五十動而不一代者以為常也以知五臟之期豫之短期者乍數乍疏也第一數去聲第二數上聲豫與同此言脈口之脈五十動者為常脈而其數減者其臟危也五十營者脈運五十度也本經有五十營篇正此義耳凡人周身之脈計一十六丈二尺自夫宗氣積於胸中主呼吸而行脈隧一呼脈行三寸一吸脈行三寸呼吸總為一息則脈行六寸由一息六寸推之則一日一夜即一十六丈二尺之脈積至五十次周於身通計一萬三千五百息則脈行八百一十丈以運五臟之精如不應此數者名曰狂生猶云僥幸而生也正以五十營者五臟皆受氣持其脈口之脈脈口以脈會於此故曰脈口又以脈氣會於此故曰氣口又以太淵去魚際一寸故曰寸口數其來至之數五十動而不一代者乃五臟皆受氣也素問脈要精微論曰代則氣衰蓋代脈中止不能自還如有求代之義故名今五十動而不見止脈所以五臟皆受氣也下此而四十動一代者是五臟中一臟無氣也三十動而一代者是五臟中二臟無氣也二十動一代者是五臟中三臟無氣也十動一代者是五臟中四臟無氣也不滿十動一代者是五臟皆無氣也即此可以短期與之其要法在本經之終始篇中終始篇云終始者經脈為紀持其脈口人迎以知陰陽有餘不足平與不平又曰不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也其義甚詳正以五十動而不一代者乃平人之常脈故可以知五臟之期茲乃以短期與之者即乍數乍疏之脈非脈之代者而何黃帝曰逆順五體者言人骨節之小大肉之堅脆皮之厚薄血之清濁氣之滑澀脈之長短血之多少經絡之數余已知之矣此皆布衣匹夫之士也夫王公大人血食之君身體柔脆肌肉軟弱血氣剽悍滑利其刺之徐疾淺深多少可得同之乎岐伯答曰膏粱菽藿之味何可同也氣滑即出疾其氣澀則出遲氣悍則針小而入淺氣澀則針大而入深深則欲留淺則欲疾以此觀之刺布衣者深以留之刺大人者微以徐之此皆國氣剽悍滑利也剽比昭切悍候岸切此言人有貴賤而刺法因以異也五體者即陰陽二十五人篇有五形之人也布衣匹夫之士其骨節有小大肉有堅脆皮有厚薄血有清濁氣有滑澀脈有長短血有多少此皆經絡之數大抵相類至於王公大人血食之君身體肌肉軟弱血氣剽悍滑利必非賤者之可同也其用針之徐疾淺深多少可以同否伯曰貴者之用膏粱賤者之用寂藿難以同也然嘗分而論之凡氣滑者則疾出其針氣澀者則遲出其針氣悍者則針小而所入又淺氣澀者則針大而所人又深入針深者則欲久留其針入針淺者則欲疾去其針以此觀之則刺布衣者氣之澀者也可以針大而深入又當以久留其針也刺大人者氣之滑且悍者也可以針小而入淺又當徐以納之也此皆因其氣之剽悍滑利異於布衣之士耳黃帝曰形氣之逆順奈何岐伯曰形氣不足病氣有餘是邪勝也急瀉之形氣有餘病氣不足此陰陽氣俱不足也不可刺之刺之則重不足重不足則陰陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂陰陽俱有餘也當瀉其邪調其虛實故曰有餘者瀉之不足者補之此之謂也故曰刺不知逆順真邪相搏滿而補之則陰陽四溢腸胃充郭肝肺內䐜陰陽相錯虛而瀉之則經脈空虛血氣竭枯腸胃㒤闢皮膚薄著毛腠夭膲豫之死期故曰用針之要在於知調陰與陽調陰與陽精氣乃光合形與氣使神內藏故曰上工平氣中工亂脈下工絶氣危主故曰下工不可不慎也必審五臟變化之病五臟之應經絡之實虛皮之柔粗而後取之也㒤音攝闢僻同素問調經論有虛㒤闢此詳言補瀉當知逆順而反此者有害所以當明用針之要也人之形氣本不足病氣反有餘是邪勝也急瀉之人之形氣本有餘病氣則衰弱是正衰也急補之若形氣病氣皆不足此陰陽諸經之氣皆不足也不可刺之刺之則重不足而陰陽俱竭血氣皆盡五臟空虛筋骨髓枯年老者必至絶滅其氣壯者其氣終不能復矣形氣病氣皆有餘此謂陰陽諸經之氣皆有餘也急瀉其邪而後調其正氣之虛實此正有餘則瀉不足則補其理為順若有餘則補不足則瀉其理為逆故所刺不知逆順則真邪相搏滿者當瀉而反補之所以邪氣有餘當有陰陽四溢腸胃充郭肝肺內䐜陰陽相錯之害虛者當補而反瀉之所以正氣不足當有經脈空虛血氣枯竭腸胃㒤闢僻積之意皮膚薄著毛腠夭膲之害皆當與之以死期也故用針之要在於知調陰陽自然精氣生光形氣相合而神氣內藏此乃上工平氣之法彼中工下工則亂脈與絶氣耳凡若此者必審五臟有變化之病五脈之異經絡之有虛實皮膚之有柔脆而後可以用針取氣也壽夭剛柔第六內有壽夭剛柔等字故名篇黃帝問於少師曰余聞人之生也有剛有柔有弱有強有短有長有陰有陽願聞其方少師答曰陰中有陰陽中有陽審之陰陽刺之有方得病所始刺之有理謹度病端與時相應內合於五臟六腑外合於筋骨皮膚是故內有陰陽外亦有陰陽在內者五臟為陰六腑為陽在外者筋骨為陰皮膚為陽故曰病在陰之陰者刺陰之滎輸病在陽之陽者刺陽之合病在陽之陰者刺陰之經病在陰之陽者刺絡脈故曰病在陽者名曰風病在陰者名曰痹陰陽俱病命曰風痹病有形而不痛者陽之類也無形而痛者陰之類也無形而痛者其陽憲而陰傷之也急治其陰無攻其陽有形而不痛者其陰完而陽傷之也急治其陽無攻其陰陰陽俱動乍有形乍無形加以煩心命曰陰勝其陽此謂不表不里其形不久度音鐸此詳言病有陰陽而刺之者必分陰陽也帝問人分剛柔強弱長短陰陽然治之者必有其方少師言陰陽之義足以概之但陰中有陰陽中有陽能審知之則刺者可獲其方病者所始有其端得其始故刺之為有理度其端故應之合其時其內合於五臟六腑而分陰分陽故五臟為陰六腑為陽外合於筋骨皮膚而亦分陰分陽故筋骨為陰皮膚為陽是以病有在陰之陰者即五臟有病而在於筋骨當刺陰經之滎輸如刺手太陰肺經之魚際為滎大淵為輸之類病在陽之陽者即六腑有病而在於皮膚當刺陽經之合如刺手陽明大腸經曲池為合之類病有在陽之陰者即六腑有病而在於筋骨當刺陰經之經如刺手太陰肺經經渠為經之類病有在陰之陽者即五臟有病而在於皮膚當刺陽經之絡如刺手陽明大腸經偏歷為絡之類故病在陽經者其名曰風義見素問風論病在陰經者其名曰痹義見素問痹論陰陽兩經俱受其病其名曰風痹不特此也凡病涉有形而按之不痛是乃屬之陽經者也凡病本無形而不免於痛者是乃屬之陰經者也正以無形而痛者乃陽經不傷而陰經受傷耳理當急治其陰經無攻其陽經有形而不痛者乃陰經不傷而陽經受傷耳理當急治其陽經無攻其陰經病有陰陽俱病形似有無而心為之煩此乃陰經陽經各受其傷而陰為尤甚欲治其表陰亦為病欲治其里陽亦為病治之固難形當不久矣黃帝問於伯高曰余聞形氣病之先後外內之應奈何伯高答曰風寒傷形憂恐忿怒傷氣氣傷臟乃病臟寒傷形乃應形風傷筋脈筋脈乃應此形氣內外之相應也黃帝曰刺之奈何伯高答曰病九日者三刺而已病一月者十刺而已多少遠近以此衰之久痹不去身者視其血絡盡出其血黃帝曰內外之病難易之治奈何伯高答曰形先病而未入臟者刺之半其日臟先病而形乃應者刺之倍其日此月內難易之應也衰去聲易去聲此言形氣與病之相應而刺法有難易也風寒傷人之形故寒氣傷形乃病於形而應之於外憂恐忿怒傷人之氣故氣傷臟乃病於臟而應之於內至於風傷筋脈則筋脈為應而應之於內外之間此形氣與病外內之相應者如此然刺之之法病有九日則三次刺之而病可已病有一月則十次刺之而病可已其間人之感病不同日數各有多少遠近以此大略病三日而刺一次者之法等而殺之惟久痹而其身不能往來者則視其血絡盡出其血不必拘於三日一刺之法也然而病有內外治有難易風寒傷形形先病而未入臟者其病尚在於表猶甚淺也刺之日數一半而已如病九日而刺二次病一月而刺五次之謂也憂恐喜怒傷氣氣傷臟而外形又應者其病表裡皆然殊為深也刺之日數必加倍之如病九日而刺三次病一月而刺十次之謂也此乃月內病有多少遠近而刺之有難易之應耳黃帝問於伯高曰余聞形有緩急氣有盛衰骨有大小肉有堅脆皮有厚薄其以立壽夭奈何伯高答曰形與氣相任則壽不相任則夭皮與肉相果則壽不相果則夭血氣經絡勝形則壽不勝形則夭黃帝曰何謂形之緩急伯高答曰形充而皮膚緩者則壽形充而皮膚急者則夭形充而脈堅大者順也形充而脈小以弱者氣衰衰則危矣若形充而顴不起者骨小骨小而夭矣形充而大肉䐃堅而有分者肉堅肉堅則壽矣形充而大肉無分理不堅者肉脆肉脆則夭矣此天之生命所以立形定氣而視壽夭者必明乎此立形定氣而後以臨病人決死生黃帝曰余聞壽夭無以度之伯高答曰牆基卑高不及其地者不滿三十而死其有因加疾者不及二十而死也黃帝曰形氣之相勝以立壽夭奈何伯高答曰平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危矣顴音權䐃渠永切度入聲此詳言立形定氣可以決人之壽夭也帝問人之身形有緩急大氣有盛衰骨有大小肉有堅脆皮有厚薄果可即此五者而定人之壽夭乎伯高言人身之大體為形人形之所充者為氣形緩而氣盛是之謂相任也相任者相當也故曰壽若形緩而氣反衰形急而氣反盛或形急氣衰則不相當也其夭必矣有皮必有肉皮厚而肉堅是謂之相果也相果者如果木之果皮肉相稱即所謂堅果也故曰壽若皮厚而肉脆皮薄而肉堅或皮薄而肉脆則不相果也其夭必矣人身有血有氣有經有絡四者能勝其形如形緩而氣血經絡皆盛也故曰壽若四者不能勝其形如形緩而氣血經絡皆衰也其夭必矣何以謂形之緩急凡形體充大而皮膚寬緩者則壽若形體充大而皮膚緊急者則必夭矣何以為氣有盛衰也凡形體充大而脈氣堅大者為順若形體充大而脈氣小弱者則為危矣何以為骨有大小也凡形體充大而顴骨起者骨大蓋顴為諸骨之宗顴大則一身之骨皆大而勝其形體之充大若形體充大而顴骨不起則諸骨皆小其夭必矣何以為肉有堅脆也凡形體充大而臀為大肉其䐃脂內堅外有紋理為分者則一身之肉皆堅蓋大肉為諸肉之宗肉堅則有壽若形體充大而大肉無有分理則肉急按之不堅則肉脆肉脆則夭矣此天造命於有生之初者立其形即定其氣而凡視人之壽夭亦必立形定氣而後可決死生於有生之後也且壽夭何以度之本經五色篇曰明堂者鼻也闕者眉間也庭者顏也蕃者頰側也蔽者耳門也又曰明堂高骨以起平以直五臟次其中央六腑挾其兩側首面上於闕庭王宮在於下極則五臟六腑固於面部而知之也今面部四旁為牆其基甚卑不及明堂闕庭等地之高當不三十歲而死也其有所因而加之以病者蓋不知慎守而或為外感內傷也則不滿二十歲而死矣何以為形氣相勝而可以立壽夭也平人者不病之人也有是形體必有是元氣氣勝其形則為壽若至於有病而形肉己脫則氣雖勝形形必難復其死必矣或形肉未至盡脫而元氣衰甚不及於形是謂形勝其氣其病必危也夫曰形者可以概皮肉骨矣曰氣者則凡氣盡於是矣黃帝曰余聞刺有三變何謂三變伯高答曰有刺營者有刺衛者有刺寒痹之留經者黃帝曰刺三變者奈何伯高答曰刺營者出血刺衛者出氣刺寒痹者內熱黃帝曰營衛寒痹之為病奈何伯高答曰營之生病也寒熱少氣血上下行衛之生病也氣痛時來時去怫愾賁響風寒客於腸胃之中寒痹之為病也因而不去時痛而皮不仁怫音拂愾音凱此言刺法之異者有三也刺有三變法有不同謂之變也蓋有刺營氣者必出其血正以血者營氣之所化營衛生會篇云營氣化血以奉生身今營氣有餘則陽不勝陰不足則陰不勝陽所以寒熱往來而氣甚衰少其血為陽所搏當上下行此皆血之為病故刺之者必出其血耳素問調經論云取血於營有刺衛氣者必出其氣正以衛氣屬陽痹論謂衛氣循於皮膚之中分肉之間熏於肓膜散於胸腹今衛氣受病其病當時來時去病之或在內而或在外也怫愾者怒意也以其有賁響之聲故曰怫愾風寒之氣客於腸胃之間病之在於內也此皆氣之為病故刺之者必出其氣耳調經論云取氣於衛有刺寒痹之留於經者必尉之以使之內熱其法見下節正以寒痹為病留而不去時或作痛及皮膚不知痛癢而為不仁也黃帝曰刺寒痹內熱奈何伯高答曰刺布衣者以火焠之刺大人者以藥尉之黃帝曰藥尉奈何伯高答曰用淳酒二十斤蜀椒一升乾薑一斤桂心一斤凡四種皆㕮咀漬酒中用綿絮一斤細白布四丈並內酒中置酒馬矢溫中蓋封塗勿使泄五日五夜出布綿絮曝乾之乾復漬以盡其汁每漬必晬其日乃出乾乾井用滓與綿絮復布為復中長六七尺為六七巾則用之生桑炭炙中以尉寒痹所刺之處令熱入至於病所寒復炙中以尉之三十遍而止起步內中無見風每刺必尉如此病己矣此所謂內熱也乾音干內酒之內作納矢屎同熅於文切火氣晬音遂內中內熱之內字如字此言刺寒痹有內熱之法者以其有尉之之法也布衣氣血澀濁刺其寒痹之後當以火焠之大人氣血清滑刺其寒痹之後當以藥尉之㕮咀以口碎藥如豆粒也後世雖以刀代而猶有㕮咀之稱者本此漬浸也馬矢熅中以馬屎燥干而燒之也晬周日也復布為復巾重布為之如今之夾袋所以入藥滓與綿絮也用此法者所以熱其內也官針第七官者任也官針者任九針之所宜也故名篇此與下篇首無起語玩前後篇之義當為岐伯所言也凡刺之要官針最妙九針之宜各有所為長短大小各有所施也不得其用病弗能移疾淺針深內傷良肉皮膚為癰病深針淺病氣不瀉支為大膿病小針大氣瀉太甚疾必為害病大針小氣不泄瀉亦復為敗失針之宜大者瀉小者不移已言其過請言其所施病在皮膚無常處者取以鑱針於病所膚白勿取病在分肉間取以員針於病所病在經絡痼痹者取以鋒針病在脈氣少當補之者取之匙針於井滎分輸病為大膿者取以鈹針病痹氣暴發者取以員利針病痹氣痛而不去者取以毫針病在中者取以長針病水腫不能通關節者取以大針病五臟固痹者取以鋒針瀉於井滎分輸取以四時支為大膿之支當作皮或作反此言九針各有所施也疾淺者針亦宜淺而反入深則內之良肉受傷外之皮膚為癰病深者針亦宜深而反入淺則內之病氣不瀉而外之皮為大膿至病小而針反大則正氣過瀉病大而針反小則邪反不泄此皆失針之宜所以為過誤也九針之各有所施者何如病在皮膚無常處者取以鑱針於病所本經九針十二原篇云鑱針者頭大末鋭去瀉陽氣又九針論云鑱針者取法於巾針去末寸半卒鋭之主熱在頭身也膚白勿取者凡皮膚太白其氣必少故也病在分肉間者取以員利針於病所九針十二原篇云員針者針如卵形揩摩分肉間不得傷肌肉以瀉分氣九針論云取法於絮針筒其身而卵其鋒長一寸六分主治分肉間氣病在經絡痼痹者取以鋒針九針十二原篇云鋒針者刃三隅以發痼疾九針論云四曰鋒針取法於絮針筒其身鋒其末長一寸六分主癰熱出血病有脈氣少而當補之者取之匙針以刺各經之井滎分輸九針十二原篇云匙針者鋒如黍粟之鋭主按脈勿陷以致其氣九針論云三曰匙針取法於黍粟之鋭長三寸半主按脈取氣令邪出病為大膿者取之鈹針一名䤵針九針十二原云鈹針者末如劍鋒以取大膿九針論云五曰鈹針取法於劍鋒廣二寸半長四寸主大癰膿兩熱爭者也病之痹氣暴發者取以員利針九針十二原篇云員利針者大如犛且圓且鋭中身微大以取暴氣九針論云六曰利針取法於犛微大其末反小其身令可深納也長一寸六分主取癰痹者也病之痹氣痛而不去者取以毫針九針十二原篇云毫針者尖如蚊虻喙靜以徐往微以久留之而養以取痛痹九針論云七曰毫針取法於毫毛長一寸六分主寒熱痛痹在絡者也病在中者取以長針九針十二原篇云長針者鋒利身薄可以取遠痹九針論云八曰長針取法於綦針長七寸主取深邪遠痹者也病水腫不能通關節者取以大針九針十二原篇云大針者尖如挺其鋒微圓以瀉機關之水也九針論云九曰大針取法於鋒針其鋒微圓長四寸主取大氣不出關節者病在五臟固痹者取以鋒針瀉其井滎分輸取以四時此節九針論之第四針前曰病在經絡痼痹者取以鋒針此則當同之也但彼止取經取絡而此則瀉其井滎與輸及照五臟以取四時耳凡刺有九以應九變一曰輸刺輸刺者刺諸經滎輸臟腧也二曰遠道刺遠道刺者病在上取之下刺腑腧也三曰經刺經刺者刺大經之結絡經分也四曰絡刺絡刺者刺小絡之血脈也五曰分刺分刺者刺分肉之間也六曰大瀉刺大瀉刺者刺大膿以鈹針也七曰毛刺毛刺者刺浮痹皮膚也八曰巨刺巨刺者在取右右取左九曰焠刺焠刺者刺燔針則取痹也輸腧俞互同焠音萃燔音煩此言刺法有九者之異也變者異也一曰輸刺刺諸經之滎穴輸穴及背間之心俞肺俞脾俞肝俞腎俞也二曰遠道刺凡病在上反取穴於下所以刺足三陽經也三曰經刺刺大經之結絡於經穴之分也四曰絡刺刺小絡之血脈也五曰分刺刺各經分肉之間也六曰大瀉刺用第五鈹針以刺大膿也七曰毛刺刺浮痹之在皮膚也八曰巨刺左病取右右病取左素問論經論曰痛在於左而右脈病者巨刺之素問繆刺論以刺經穴為巨刺刺絡穴為繆刺皆左取右右取左九曰焠刺刺以燔針所以取痹證也調經論曰病在骨焠刺藥尉凡刺有十二節以應十二經一曰偶刺偶刺者以手直心若背直痛所一刺前一刺後以治心痹刺此者傍針之也二曰報刺報刺者刺痛無常處也上下行者直內無拔針以左手隨病所按之乃出針復刺之也三曰恢刺恢刺者直刺傍之舉前前後恢筋急以治筋痹也四曰齊刺齊刺者直入一傍入二以治寒氣小深者或曰三刺三刺者治痹氣小深者也五曰揚刺揚刺者正內一傍內四而浮之以治寒氣之博大者也六曰宜針刺宜針刺者引皮乃刺之以治寒氣之淺者也七曰輸刺輸刺者直入直出稀髮針而深之以治氣盛而熱者也八曰短刺短刺者刺骨痹稍搖而深之致針骨所以上下摩骨也九曰浮刺浮刺者傍入而浮之以治肌急而寒者也十曰陰刺陰刺者左右率刺之以治寒厥中寒厥足踝後少陰也十一曰傍針刺傍針刺者直刺傍刺各一以治留痹久居者也十二曰贊刺贊刺者直入直出數髮針而淺之出血是謂治癰腫也傍當作旁古蓋通用內納同恢苦回切中去聲數音朔此言刺法有十二節要所以應十二經也一曰偶刺以一手直其前心以一手直其後背皆以直其痛所直者當也遂用一針以刺其胸前用一針以刺其後背正以治其心痹耳然不可以正取須斜針以旁刺之恐中心者一日死也按前後各用一針有陰陽配合之義故曰偶刺二曰報刺所以刺其痛無常處也凡痛時上時下者當直納其針無拔出之以左手隨其痛處而按之然後出針俟其相應又復刺之刺而復刺故曰報刺三曰恢刺以針直刺其旁復舉其針前後恢蕩其筋之急者所以治筋痹也四曰齊刺用一針以直入之用二針以旁入之所以治寒痹之小且深者因用三針故又曰三刺也五曰揚刺正納其針一旁納其針四而又浮舉其針而揚之所以治寒氣之博大者也六曰直針刺先用針以引起其皮而後入刺之所以治寒氣之淺者也七曰輸刺將針直入直出稀發其針而又深入之所以治氣之盛而熱者也八曰短刺所以刺其骨痹稍搖針而深入之以致針於骨所然後上下摩其骨耳九曰浮刺旁入其針而浮舉之所以治肌之急而寒者也浮刺似前揚刺但彼有正納旁納而此則止有旁入之針耳十曰陰刺左右俱取穴以刺之所以治寒厥也然中寒厥者必始於陰經自下而厥上故取足踝後少陰經之穴以刺之名陰刺者以其刺陰經也義見素問厥論十一曰旁針刺用針以直刺者一用針以旁刺者一所以治留痹之久居者也十二曰贊刺直入直出其針且數髮針而淺刺之使之出血所以治癰腫也脈之所居深不見者刺之微內針而久留之以致其空脈氣也脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣耳內納同此言脈有淺深而刺之有法也凡脈之所居深不可見者必微納其針而久留之所以致其空中之脈氣上行也脈之所居淺者初時勿即刺之且以左手按其穴中之脈然後以右手刺之蓋欲無使精氣之出將以獨出其邪氣耳所謂三刺則穀氣出者先淺刺絶皮以出陽邪再刺則陰邪出者少益深絶皮致肌肉未入分肉間也已入分肉之間則穀氣出故刺法曰始刺淺之以逐邪氣而來血氣後刺深之以致陰氣之邪最後刺極深之以下穀氣此之謂也按分肉有二各部在外之肉曰分肉其在內近骨之肉與骨相分亦曰分肉此言一刺之中而有三刺之法也按後終始篇云凡刺之屬三刺至穀氣故一刺則陽邪出再刺則陰邪出三刺則穀氣至穀氣至而止所謂穀氣至者已補而實已瀉而虛故已知穀氣至也正與此節相同夫所謂刺有三法而致其穀氣之出者何也先淺刺其按絶之皮以出其衛氣之邪即上節脈淺者勿刺按絶其脈乃刺之無令精出獨出其邪氣之謂也又再刺之以出其營氣之邪則比絶皮稍益深之至肌肉內未入分肉間也肌肉分肉之辨肌肉在皮內肉上而分肉則近於骨者也又最後刺之則已入分肉之間而穀氣乃出彼刺法之言亦與此言互相發明者耳故用針者不知年之所加氣之盛衰虛實之所起不可以為工也此節見素問六節藏象論此言用針之法當知年之所加氣之盛衰虛實之所起也素問六元正紀大論言每年所加各有太過不及即至真要大論加臨之加自初氣以至終氣有主有客有勝有負其天時民病不同中間盛衰虛實悉考而知始足以為工耳凡刺有五以應五臟一曰半刺半刺者淺內而疾髮針無針傷肉如拔毛狀以取皮氣此肺之應也二曰豹文刺豹文刺者左右前後針之中脈為故以取經絡之血者此心之應也三曰關刺關刺者直刺左右盡筋上以取筋痹慎無出血此肝之應也或曰淵刺一曰豈刺四曰合谷刺合谷刺者左右雞足針於分肉之間以取肌痹此脾之應也五曰輸刺輸刺者直入直出深內之至骨以取骨痹此腎之應也內納同此言刺有五法所以應五臟也一曰半刺淺納其針而又速發之似非全刺故曰半刺無深入以傷其肉如拔毛之狀所以止取皮間之氣蓋肺為皮之合故為肺之應也二曰豹文刺因多其針左右前後刺之故曰豹文中其脈以為故悉取經絡中之血蓋心主血故為心之應也三曰關刺直刺左右手足盡筋之上正關節之所在所以取筋痹也慎無出血蓋肝主筋故為肝之應也外此又有淵刺豈刺之名四曰合谷刺左右用針如雞足然針於分肉之間以取肌痹蓋脾主肌肉故為脾之應也五曰輸刺直入直出深納其針以至於骨所以取骨痹蓋腎主骨故為腎之應也按此輸刺乃上文十二節中之第八刺法也又按後世金針賦等書有燒山火八法青龍擺尾四法名色俱出後人揣摩並非聖經宗旨今靈樞明有九變輸刺等法十二節偶刺等法五刺半刺等法刺節真邪篇有振蒙等法後之學者果能熟讀詳味漸能用針起危顧乃棄聖經而宗末學致使針法不行疲癃無所倚賴痛哉本神第八此篇推本五臟之神故名篇黃帝問於岐伯曰凡刺之法必先本於神血脈營氣精神此五臟之所藏也至於淫泆離臟則精失魂魄飛揚志意恍亂智慮去身者何因而然乎天之罪與人之過乎何謂德氣生精神魂魄心意志思智慮請問其故岐伯答曰天之在我者德也地之在我者氣也德流氣薄而主者也故主之來謂之精兩精相搏謂之神隨神往來者謂之魂井精而出入者謂之魄所以任物者謂之心心有所憶謂之意意之所存謂之志因志而存變謂之思因思而遠慕謂之慮因慮而處物謂之智故智者之養生也必順四時而適寒暑和喜怒而安居處節陰陽而調剛柔如是則僻邪不至長生久視相搏之搏音博禮儒行鷙蟲攫搏不程勇者亦讀為博此詳言人身德氣等義而唯智者為能養生也天非無氣而主之以理故在我之德天之德也地非無德而運之以氣故在我之氣地之氣也則吾之生德所流氣所薄而生者也故謂之生然生之來者謂之精易曰男女搆精萬物化生則吾人之精雖見於有生之後而實由有生之初之精為之本也人生有陰斯有營有陽斯有衛營衛相搏神斯見焉其所謂魂者屬於陽然魂則隨神而往來其所謂魄者屬於陰然魄則井精而出入正以精對神而言則精為陰而神為陽故魂屬神而魄屬精也其所謂心意志思智慮舉不外於一心焉耳故凡所以任物者謂之心素問靈蘭祕典論曰心者君主之官神明出焉則萬物之夥孰非吾心之所任者乎由是而心有所憶者意也意有所存者志也志有所變者思也思有所慕者慮也慮有所處者智也此十三者愚人則傷之如下節云云智者善於養生上順天時下盡人事為能節陰陽而調剛柔所以邪僻不至而能長生久視於天地之間也是故怵惕思慮者則傷神神傷則恐懼流淫而不止因悲哀動中者竭絶而失主喜樂者神憚散而不藏愁憂者氣閉塞而不行盛怒者迷惑而不治恐懼者神蕩憚而不收心怵惕思慮則傷神神傷則恐懼自失破䐃脫肉毛悴色夭死於冬脾愁憂而不解則傷意意傷則悗亂四肢不舉毛悴色夭死於春肝悲哀動中則傷魂魂傷則狂忘不精不精則不正當人陰縮而攣筋兩脅骨不舉毛悴色夭死於秋肺喜樂無極則傷魄魄傷則狂狂者意不存人皮革焦毛悴色夭死於夏腎盛怒而不止則傷志志傷則喜忘真前言腰脊不可以俯仰屈伸毛悴色夭死於季夏恐懼而不解則傷精精傷則骨痠痿厥精時自下是故五臟主藏精者也不可傷傷則失守而陰虛陰虛則無氣無氣則死矣是故用針者察觀病人之態以知精神魂魄之存亡得失之意五者已傷針不可以治之也此言傷五神者必傷五臟而危也心藏神脾藏意肝藏魂肺藏魄腎藏精與志是之謂五神臟也故心因怵惕思慮則傷神神傷則心虛而腎來侮之腎在志為恐所以恐懼流淫而不止也惟其恐懼自失故䐃破肉脫毛悴色夭而死於冬何也以水剋火也脾困愁憂而不解則氣閉塞而不行遂傷意意為脾之神也意傷則悶亂四肢不舉脾主四肢也至於毛悴色夭而死於春何也以木剋土也肝因悲哀動中者則傷魂魂傷則善狂善忘而不精爽其志向亦不正其人當陰縮而筋攣其兩脅骨當不舉漸至竭絶而失生毛悴色夭而死於秋何也以金剋木也肺因喜樂無極則傷魄魄傷則神憚散而不藏不藏則狂狂者意不存脾本藏意而母氣亦衰故意不存也其人皮革當焦毛悴色夭而死於夏何也以火剋金也腎盛怒而不止則迷惑而不治遂傷志以腎藏志也志傷則前言易忘及腰脊不可以俯仰屈伸又恐懼而不解則神蕩散而不收及傷精以腎又藏精也精傷則骨痠而為厥以腎主骨而痿厥皆成於下也其精時或自下至於毛悴色夭而死於季夏何也以土剋水也是故五臟皆有氣則各有精而五臟各有以藏之傷則失守而陰氣虛以五臟皆屬陰也陰虛則五臟無氣所以隨時而死耳是故用針者當察觀病人之態以知精神魂魄意志或存或亡或得或失若五神已傷則毛悴色夭死期將至針不能以治之也素問五臟別論篇曰病不許治者病必不治治之無功矣愚思針不可用則藥亦不可妄投矣肝藏血血舍魂肝氣虛則恐實則怒脾藏營營舍意脾氣虛則四肢不用五臟不安實則腹脹經溲不利心藏脈脈舍神心氣虛則悲實則笑不休肺藏氣氣舍魄肺氣虛則鼻塞不利少氣實則喘喝胸盈仰息腎藏精精舍志腎氣虛則厥實則脹五臟不安必審五臟之病形以知其氣之虛實謹而調之也此言五臟有虛實而其病形亦異也人身之血藏於肝素問五臟生成篇云人臥則血歸於肝而血則為魂之舍惟肝氣虛則為恐實則為怒人之營氣藏於脾而營則為意之舍惟脾氣虛則四肢不用及五臟不安以脾主四肢而脾為五臟之主也實則腹脹經溲不利以脾之脈行於腹而土邪有餘故小便不利人之脈藏於心而脈則為神之舍惟心氣虛則悲實則笑不休人之氣藏於肺而氣則為魄之舍惟肺氣虛則鼻塞不利且少氣素問五臟別論云心肺有病而鼻為之不利也實則喘喝其胸必盈而息則首仰也人之精藏於腎而精則為志之舍惟腎氣虛則為厥證據素問厥論當為寒厥實則脹以腎脈行於小腹也其五臟不安蓋脾腎為脹皆五臟不安以脹則自不能安也凡五臟之病形如此當知各臟之氣虛實為病然後可以調之而調之又不可不謹也針藥皆當謹調終始第九終始本古經篇名而伯乃述之故前根結篇有云九針之玄要在終始此又曰畢於終始故知其為古經篇名也按首無起句當同前篇俱為岐伯言也凡刺之道畢於終始明知終始五臟為紀陰陽定矣陰者主臟陽者主腑陽受氣於四末陰受氣於五臟故瀉者迎之補者隨之知迎知隨氣可令和和氣之方必通陰陽五臟為陰六腑為陽傳之後世以血為盟敬之者昌慢之者亡無道行私必得夭殃聲全平此言凡刺之道當知此終始篇之大義也臟為陰腑為陽陽在外受氣於四肢陰在內受氣於五臟故因其氣之來而迎之者瀉之法也因其氣之往而隨之者補之法也知迎隨為補瀉則陰陽諸經之氣可和調矣謹奉天道請言終始終始者經脈為紀持其脈口人迎以知陰陽有餘不足乎與不平天道畢矣所謂平人者不病不病者脈口人迎應四時也上下相應而俱往來也六經之脈不結動也本末之寒溫之相守司也形肉血氣必相稱也是謂平人少氣者脈口人迎俱少而不稱尺寸也如是者則陰陽俱不足補陽則陰竭瀉陰則陽脫如是者可將以甘藥不可飲以至劑如此者弗灸不已者因而瀉之則五臟氣壞矣稱去聲此言持寸口人迎之脈可以別平人與病人而病人之少氣者宜調以甘藥而不宜施以針灸也請言終始篇之義凡以經脈篇為之綱紀耳蓋右手寸部曰脈口左手寸部曰人迎持其脈以診之則陰陽諸經之虛實平否皆可奉天道以知之矣夫所謂平人者不病之人也春夏人迎微大秋冬脈口微大與四時相應又俱往俱來與尺寸相應上謂寸下謂尺手足各有六經無結脈無動脈審其本末察其寒溫此語見本經禁服篇各有所司與時相宜形肉血氣相稱是之謂平人也其正氣衰少故脈口少氣而尺亦然乃陰經不足也人迎少氣而寸亦然乃陽經不足也欲補陽經則陰經愈竭欲瀉陰經則陽經益脫此針之所以不可施也僅可將理以甘和之藥不可飲以至補至瀉之劑且灸亦不可妄用倘病有未已而針灸誤瀉則五臟之氣益壞矣豈可哉人迎一盛病在足少陽一盛而躁病在手少陽人迎二盛病在足太陽二盛而躁病在手太陽人迎三盛病在足陽明三盛而躁病在手陽明人迎四盛且大且數名曰溢陽溢陽為外格脈口一盛病在足厥陰厥陰一盛而躁在手心主脈口二盛病在足少陰二盛而躁在手少陰脈口三盛病在足太陰三盛而躁在手太陰脈口四盛且大且數者名曰溢陰溢陰為內關內關不通死不治人迎與太陰脈口俱盛四倍以上命曰關格關格者與之短期數音朔按脈分氣口人迎此與禁服等篇義同滑伯仁謂古以夾喉兩旁分氣口人迎至王叔和始分左右寸部者未考諸篇故耳此言脈口人迎之脈而決其病在何經甚至脈為關格則死也人迎一盛二盛三盛四盛者較之脈口之脈大一倍二倍三倍四倍也義見本經經脈禁服篇人迎一盛病在足少陽膽經若一盛而加之以躁動則在手少陽三焦經矣人迎二盛病在足太陽膀耽經若二盛而加之以躁動則在手太陽小腸經矣人迎三盛病在足陽明胃經若三盛而加之以躁動則在手陽明大腸經矣蓋人迎主外左手寸關為東南春夏故足手六陽經之病驗於此也其人迎甚至四盛且大且數是六陽泛溢格拒於外而在內六陰經之脈不得運之以出於外矣夫是之謂外格也下文有內關不通死不治則此當云外格不通死不治脈口一盛二盛三盛四盛者較之人迎大一倍二倍三倍四倍也又見本經經脈禁服篇脈口一盛病在足厥陰肝經若一盛而躁則在手厥陰心包絡經矣脈口二盛病在足少陰腎經若二盛而躁則在手少陰心經矣脈口三盛病在足太陰脾經若三盛而躁則在手太陰肺經矣蓋脈口主內右手寸尺為西北為秋冬故足手六陰經之病驗於此也其脈口甚至四盛且大且數是六陰泛溢關閉於內而在外六陽經之脈不得運之以入於內矣夫是之謂內關也內關不通當死不治且人迎脈口之脈具盛而四倍以上是謂關格兼見也皆與之以短期而已後世醫籍皆以飲食不下為關格視此節大義可深慚云人迎一盛瀉足少陽而補足厥陰二瀉一補日一取之必切而驗之疏取之上氣和乃止人迎二盛瀉足太陽補足少陰二瀉一補二日一取之必切而驗之疏取之上氣和乃止人迎三盛瀉足陽明而補足大陰二瀉一補日二取之必切而驗之疏取之上氣和乃止脈口一盛瀉足厥陰而補足少陽二補一瀉日一取之必切而驗之疏而取上氣和乃止脈口二盛瀉足少陰而補足太陽二補一瀉二日一取之必切而驗之疏取之上氣和乃止脈口三盛瀉足太陰而補足陽明二補一瀉日二取之必切而驗之疏而取之上氣和乃止所以日二取之者陽明主胃大富於穀氣故可日二取之也人迎與脈口俱盛三倍以上命曰陰陽俱溢如是者不開則血脈閉塞氣無所行流淫於中五臟內傷如此者固而灸之則變易而為他病矣凡刺之道氣調而止補陰瀉陽音氣益彰耳目聰明反此者氣血不行此言據人迎脈口之脈當施補瀉之法也人迎一盛病在足少陽膽經則膽與肝為表裡乃膽實而肝虛也當瀉足少陽膽經而補足厥陰肝經瀉者二穴而補者一穴瀉倍而補半也一日刺之者一次必切其脈而驗其病之退否疏而取穴於膽肝二經之上蓋彼此之穴相間之謂疏也候至氣和乃止針由此推之則一盛而躁病在手少陽當瀉手少陽三焦經而補手厥陰心包絡經矣人迎二盛病在足太陽膀胱經則膀胱與腎為表裡乃膀胱實而腎虛也當瀉足太陽膀胱經而補足少陰腎經瀉者二穴而補者一穴二日內止刺一次則間日一刺也必切其脈而驗其病之退否疏而取穴於膀胱腎經之上由此推之則二盛而躁病在手太陽當瀉手太陽小腸經而補手少陰心經矣人迎三盛病在足陽明胃經則胃與脾為表裡乃胃實而脾虛也當瀉足陽明胃經而補足太陰脾經瀉者二穴而補者一穴一日之內二次刺之必切其脈而驗其病之退否疏而取穴於脾胃二經之上候其氣和而乃止針下文曰所謂日二取之者陽明主胃大富於穀氣故可日二取之此處缺此語由此推之則三盛而躁病在手陽明當瀉手陽明大腸經而補手太陰肺經矣脈口一盛病在足厥陰肝經則肝實而膽虛也當瀉足厥陰肝經而補足少陽膽經補者二穴而瀉者一穴補倍而瀉半也一日刺之者一次必切其脈而驗其病之退否疏而取穴於肝膽之上候至其氣和而乃止針由此推之則一盛而躁病在手心主當瀉手厥陰心包絡經而補手少陽三焦經矣脈口二盛病在足少陰腎經則腎實而膀胱虛也當瀉足少陰腎經而補足太陽膀胱經補者二穴而瀉者一穴二日內止刺一次則間日一刺也必切其脈而驗其病之退否疏而取穴於腎與膀胱之上候至氣和而乃止針由此推之則二盛而躁病在手少陰當瀉手少陰心經而補手太陽小腸經矣脈口三盛病在足太陰脾經則脾實而胃虛也當瀉足太陰脾經而補足陽明胃經補者二穴而瀉者一穴一日之內二次刺之必切其脈而驗其病之退否疏而取穴於脾胃二經之上候至氣和而乃止針由此推之則三盛而躁病在手太陰當瀉手太陰肺經而補手陽明大腸經矣夫肝膽則曰一日一取之膀胱與腎則曰間日一刺之惟胃與脾則曰一日二取之者正以陽明主胃大富於穀氣故一日可二取之耳人迎與脈口俱盛皆三倍以上命曰陰陽俱溢謂之夫格如此者而不刺以開之則血氣閉塞脈氣不行邪氣流淫於中五臟內傷病至若此而始圖灸之則變易而為他病矣由此觀之則灸不及針後人不察病勢已危而概用灸火者晚矣是以凡行刺者必早乘其病勢以調其氣候至氣和而止針或補陰經以瀉陽經或補陽經以瀉陰經則音聲能彰耳聰目明矣否則血氣不行而病必至危也按此即人迎脈口以知虛實遂瀉陰補陽瀉陽補陰乃診治至妙之法也豈特用針為然奈何後世不講而脈既不明治亦無法致人夭札者多痛哉所謂氣至而有效者瀉則益虛虛者脈如其故而不堅也堅如其故者適雖言故病未去也補則益實實者脈大如其故而益堅也夫如其故而不堅者適雖言快病未去也故補則實瀉則虛病雖不隨針病必衰去必先通十二經脈之所生病而後可得傳於終始矣故陰陽不相移虛買不相傾取之其經此承上文而言補瀉之法候氣至而有效也九針十二原篇有云刺之要氣至而有效效之信若風之吹雲明乎若見蒼天夫所謂氣至而有效者正以其瀉者已虛而補者已實也蓋瀉則益之以虛虛者貴於脈之不堅所以脈盡如其舊而按之不堅也大如其舊猶今之所謂盡如其舊非脈之盛大也苟堅如其初則適才雖言病去復舊其病尚未去也補則益之以實實則貴於脈之堅所以脈盡如其舊而按之堅也苟不堅如其初則適才雖言身體已快其病尚未去也夫然則脈之堅與不堅虛實之所由驗也故補之而實則脈必堅瀉之而虛則脈必不堅其病有痛者雖不隨針而即去然亦必以漸而衰矣為醫者必先通於十二經脈之所生病或虛或實當補當瀉而後可傳以終始篇之大義矣欲通十二經脈所生病及虛實補瀉必明於本經經脈第十篇而後可正以陰經陽經病各有在不相轉移虛之實之法有攸當不得傾易故當取之於其各經耳按此則用藥以補瀉而病之去否亦可以脈之堅否為驗矣凡刺之屬三法至穀氣邪僻妄合陰陽易居逆順相反沉浮異處四時不得稽留淫泆須針而去故一刺則陽邪出再刺則陰邪出三刺則穀氣至而止所謂穀氣至者已補而實已瀉而虛故已知穀氣至也邪氣獨去者陰與陽未能調而病知愈也故曰補則實瀉則虛痛雖不隨針病必衰去矣此節大意見前官針第五節此承上文而言病必衰去者正以三法行而穀氣至也凡刺法之所屬有三由初刺次刺三刺以致其穀氣來至者何哉蓋病者始時邪僻之氣妄合正脈陰陽諸經似相易而居表裡逆順似相反而行脈氣浮沉似所處各異其邪氣稽留淫泆必待針以去之耳故初刺之以出其陽氣之邪再刺之以出其陰氣之邪三刺之以致其穀氣則已補而實已瀉而虛故已知其穀氣之至也斯時也邪氣已去陰陽諸經雖未即調而知其病之必愈上文所謂補則實瀉則虛病雖不隨針即去而病必衰去者復何疑哉陰盛而陽虛先補其陽後瀉其陰而和之陰虛而陽盛先補其陰後瀉其陽而和之此承上文而言陰經陽經之補瀉其法當有先後也夫脈口盛而六陰為病是陰經盛而陽經虛也然必先補其陽而後瀉其陰以和之人迎盛而六陽為病是陽經盛而陰經虛也必先補其陰而後瀉其陽以和之何也邪氣雖當去而尤以扶正氣為先也三脈動於足大指之間必審其實虛虛而瀉之是謂重虛重虛病益甚凡刺此者以捐按之脈動而實且疾者疾瀉之虛而徐者則補之反此者病益甚其動也陽明在上厥陰在中少陰在下重平聲此言足之三經當驗其虛實而補瀉之也按本節後文則三脈者足陽明胃經足厥陰肝經足少陰腎經也三脈動於足大指之間者正以陽明動於大指次指之間凡厲兌陷谷衝陽解溪皆在足跗上也厥陰動於大指次指之間正以大敦行間太衝中封在足跗內也少陰則動於足心其穴湧泉乃足跗之下也必審其脈之虛實若虛者而瀉之是謂重虛病之所以益甚也凡刺此者須以指按之脈動而實且疾者為實宜急瀉之脈動而虛且徐者為虛宜急補之否則重虛其虛重實其實其病當益甚也且視其脈之所動者陽明則在於足之上厥陰則在於二經之中少陰則在於足之下耳膺腧中膺背腧中背肩膊虛者取之中去聲膊音博此言凡取穴者必當各中其所也胸之兩旁謂之膺故膺內有腧如胃經氣戶庫房屋翳膺窗腎經或中神藏靈墟神封之類凡刺膺腧者當中其膺可也背內有腧如督脈經諸穴居脊之中膀胱經諸穴居背之四行之類凡刺背腧者當中其背與肩膊可也凡按分肉虛處則取之耳上重舌刺舌柱以鈹針也鈹音皮此言刺重舌之法也舌在上故曰上舌下生舌謂之重舌當刺其舌柱在舌下之柱用之以鈹針耳九針篇云鈹針取法於劍鋒廣二分半長四寸去大癰膿兩熱相爭官能篇云病為大膿者取以鈹針手屈而不伸者其病在筋伸而不屈者其病在骨在骨守骨在筋守筋此言屈伸可驗筋骨之病當各守其法以刺之也凡手雖能屈而實不能伸者正以筋甚拘攣故屈易而伸難其病在筋治之者亦惟在筋守筋耳不可誤求之骨也手雖能伸而實不能屈者正以骨有所傷故伸易而屈難其病在骨治之者亦惟在骨守骨耳不可誤求之筋也補須一方實深取之稀按其痏以極出其邪氣一方虛淺刺之以養其脈疾按其痏無使邪氣得入邪氣來也緊而疾穀氣來也徐而和脈實者深刺之以泄其氣脈虛者淺刺之使精氣無得出以養其脈獨出其邪氣此言補瀉之法所以出其邪氣而復其正氣也補瀉之法須待其一時方實則行瀉法方猶俗云才方也當深刺其針以取之少按其痏以極出其邪氣一時方虛當淺刺其針以取之以養其正氣之脈且急按其痏無使邪氣又得而入也蓋邪氣之來其針下必緊而疾穀氣之來其針下必徐而和可得而驗者也況病之虛實繫於脈之虛實故即脈之虛實以為刺之深淺而泄其邪氣養其正氣焉耳刺諸痛者其脈皆實此承上文而言脈實者當瀉以凡刺諸痛者其脈必實故也故曰從腰以上者手太陰陽明皆主之從腰以下者足太陰陽明皆主之此言病有所主之經見治之者當分經也素問六微旨大論曰天樞之上天氣主之天樞之下地氣主之天樞臍旁二寸本經陰陽系日月篇曰腰以上為大腰以下為地故曰從腰以上手太陰肺經手陽明大腸經主之蓋肺經自胸行手大腸經自手行頭也從腰以下足太陰脾經足陽明胃經主之蓋脾經自足入腹胃經自足上面也四經各有所主則各經宜各有所取耳病在上者下取之病在下者高取之病在頭者取之足病在腰者取之矚此言治病有遠取之法也有病雖在上其脈與下通當取之下病雖在下其脈與上通當取之高故病在於頭而取之於足病在於腰而取之於膕皆在上取下之法也至於在下取高之義可反觀矣病生於頭者頭重生於手者臂重生於足者足重治病者先刺其病所從生者也此言治病有先取之法也病生於頭者其頭必重余病皆從此始故治病者先取之頭至於手病而臂重足病而足重其法亦猶是耳即先求其本之義也春氣在毛夏氣在皮膚秋氣在分肉冬氣在筋骨刺此病者各以其時為齊故刺肥人者以秋冬之齊刺瘦人者以春夏之齊齊劑同素問有刺齊論此言治法有淺深當隨時因人而施也春氣邪發在毫毛間夏氣則出於皮膚秋氣初入於分肉間冬氣則入於筋骨凡刺此四者春夏則取之毫毛皮膚而淺其針秋冬則取之分肉筋骨而深其針所謂隨時以為刺也後世之齊從劑蓋用刀以製藥也今針曰齊者猶之用藥故耳故云然人之肥者其病必深故用秋冬之劑人之瘦者其病乃淺故用春夏之劑所謂因人而施者又如此病痛者陰也痛而以手按之不得者陰也深刺之病在上者陽也病在下者陰也癢者陽也淺刺之此言病有陰陽故刺之有淺深也陰經為陰陽經為陽痛為陰癢為陽上為陽下為陰病在陰者深取之病在陽者淺刺之病先起陰者先治其明而後治其陽病先起陽者先治其陽而後治其陰此言病有所由起故刺有所先也陰陽者陰經陽經也按此節大義與上病生於頭者頭重一節相同刺熱厥者留針反為寒刺寒厥者留針反為熱刺熱厥者二陰一陽刺寒厥者二陽一陰所謂二陰者二刺陰也一陽者一刺陽也素問明有厥論本經寒熱病篇亦有刺寒厥熱厥法此言刺厥病之有法也素問厥論有寒熱二證刺熱厥者久留其針反能為寒而熱可去刺寒厥者久留其針反能為熱而寒可去刺熱厥者補陰經二次瀉陽經一次蓋陰盛陽退熱當自去也刺寒厥者補陽經二次瀉陰經一次蓋陽盛則陰退寒當自去也所謂二陰者二次刺陰經也一陽者一刺瀉陽經也其二陽一陰可推矣久病者邪氣入深刺此病者深內而久留之間日而復刺之必先調其左右去其血脈刺道畢矣內納同間去聲此言治久病之有法也凡刺之法必察其形氣形肉未脫少氣而脈又躁躁厥者必為纓刺之散氣可收聚氣可布此言氣虛脈盛者當行繆刺之法也形肉雖未脫元氣則衰少然而脈又躁動是謂氣虛脈盛也當行繆刺之法即左病取右絡穴右病取左絡穴是也其精氣之散可以收之邪氣之聚可以散之深居靜處占神往來閉戶塞牖魂魄不散專意一神精氣之分毋聞人聲以收其精必一其神令志在針淺而留之微而浮之以移其神氣至乃休分去聲此言用針者當預養其神以行針也凡用針者雖占病者之神氣往來然必先自養其神氣故深居靜處閉戶塞牖魂魄神意精氣皆會於一令志已在針方淺而留之或微而浮之以移病者之神候其真氣已至而乃止針也男內女外堅拒勿出謹守勿內是謂得氣凡刺之禁新內勿刺新刺勿內已醉勿刺已刺勿醉新怒勿刺已刺勿怒新勞勿刺已刺勿勞已飽勿刺已刺勿飽已飢勿刺已刺勿飢已渴勿刺已刺勿渴大驚大恐必定其氣乃刺之乘車來者臥而休之如食傾乃刺之出行來者坐而休之如行十里頃乃刺之凡此十二禁者其脈亂氣散逆其營衛經氣不次因而刺之則陽病入於陰陰病出於陽則邪氣復生粗工勿察是謂伐身形體淫泆乃消腦髓津液不化脫其五味是謂失氣也按素問刺禁論云無刺大醉令人氣亂無刺大怒令人氣逆無刺大勞人無刺新飽人無刺大飢人無刺大渴人無刺大驚人此言病人與醫人善養善針者為得氣而反此者為失氣也氣真氣也病人善守禁忌男子則忌內而謹守無內女人則忌外而堅拒勿出則未刺之先或己刺之後真氣不失是之謂得氣也然凡刺之禁曰外曰內曰醉曰怒曰勞曰飽曰飢曰渴曰驚曰恐曰車曰步皆當慎之正以此十二禁者脈氣散亂營衛相逆經氣不次病人失於自守醫人妄於行刺則陽病入陰陰病出陽邪氣復而真氣衰不謂之失氣而何太陽之脈其終也戴眼反折瘛瘲其色白絶皮乃絶汗絶汗則終矣少陽終者耳聾百節盡縱目系絶目系絶一日半則死矣其死也色青白乃死陽明終者口目動作喜驚妄言色黃其上下之經盛而不行則終矣少陰終者面黑齒長而垢腹脹閉塞上下不通而終矣厥陰終者中熱嗌乾喜溺心煩甚則舌卷卵上縮而終矣太陰終者腹脹不得息氣噫善嘔嘔則逆逆則面赤不逆則上下不通上下不通則面黑皮毛燋而終矣閉同見素問診要經終論經脈篇亦有各經氣絶此言足之六經其終各有所候也足太陽膀胱之脈起目內眥上額交巔從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱故其終時其眼反戴而上其背反折而為瘛瘲之狀色白者肺絶也絶汗出而終矣足少陽膽經之脈起於目鋭眥上抵頭角下耳後入耳中出走耳前故其終也時百節盡縱而目系絶也色青白者金木相剋也足陽明胃經之脈起於鼻交額中下循鼻外入上齒中還出挾口環唇下交承漿其支循喉嚨入缺盆下腹屬胃絡脾故其終時必口目動作喜驚妄言胃邪盛也色黃者土色泄也上下之經盛而不通者胃氣絶也足少陰腎經主水其色黑腎主骨齒乃骨余腎脈入於腹通竅於二便故其終時面黑齒長而垢腹脹而不通也足厥陰肝經之脈循股陰入毛中過陰器抵小腹上貫膈布脅肋循喉嚨故其終時中熱嗌乾喜溺而心煩甚則舌卷卵縮也足太陰脾經之脈循足大指內側出腨內上陰股入腹上膈挾咽連舌本散舌下故其終時腹脹閉而不得息噫嘔交作上下不通面黑而皮毛燋也
